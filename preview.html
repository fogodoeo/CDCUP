<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>방송 화면 실시간 미리보기 및 배치기 - CDCUP</title>
    <script src="supabase-bridge.js"></script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0F172A;
            --card-bg: #1E293B;
            --border: #334155;
            --text: #F8FAFC;
            --text2: #94A3B8;
            --accent: #2563EB;
            --accent-hover: #1D4ED8;
            --green: #10B981;
            --red: #EF4444;
            --font: 'Pretendard Variable', 'Pretendard', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .header-bar {
            width: 100%;
            max-width: 1080px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 14px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .title-area h1 {
            font-size: 18px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .title-area p {
            font-size: 12px;
            color: var(--text2);
            margin-top: 4px;
        }

        .nav-links {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .btn-nav {
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .btn-nav:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-nav.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* ══ Studio Screen Container (16:9) ══ */
        .workspace {
            width: 100%;
            max-width: 1080px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .screen-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border: 4px solid #1E293B;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        /* The actual live broadcast screen loaded in iframe */
        .broadcast-iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        /* Transparent drag overlay */
        .drag-overlay {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            background: rgba(0, 0, 0, 0.15);
            pointer-events: auto;
        }

        /* Draggable elements */
        .draggable-element {
            position: absolute;
            cursor: move;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            user-select: none;
            transition: opacity 0.3s;
        }

        .draggable-element.hidden-state {
            opacity: 0.25 !important;
            border-style: dotted !important;
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: var(--red) !important;
        }

        /* 🏷️ Draggable Nametag 1 (PAGE1 only) */
        .draggable-nametag1 {
            width: 16%;
            height: 8%;
            background: rgba(168, 85, 247, 0.15);
            border: 2px dashed #A855F7;
            border-radius: 8px;
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.4);
        }
        .draggable-nametag1:hover {
            border-color: #C084FC;
            background: rgba(168, 85, 247, 0.25);
        }

        /* 🏷️ Draggable Nametag 2 (PAGE1 only) */
        .draggable-nametag2 {
            width: 16%;
            height: 8%;
            background: rgba(236, 72, 153, 0.15);
            border: 2px dashed #EC4899;
            border-radius: 8px;
            box-shadow: 0 0 12px rgba(236, 72, 153, 0.4);
        }
        .draggable-nametag2:hover {
            border-color: #F472B6;
            background: rgba(236, 72, 153, 0.25);
        }

        /* 🖼️ Draggable Banner */
        .draggable-banner {
            width: auto;
            height: auto;
            max-width: 42%;
            max-height: 50%;
            background: rgba(37, 99, 235, 0.15);
            border: 2px dashed var(--accent);
            border-radius: 8px;
            box-shadow: 0 0 12px rgba(37, 99, 235, 0.4);
            overflow: hidden;
        }

        .draggable-banner:hover {
            border-color: #3B82F6;
            background: rgba(37, 99, 235, 0.25);
        }

        /* 📢 Draggable Ticker (Zamak Bar) */
        .draggable-ticker {
            width: 100%;
            height: 12%; /* Simulates actual ticker ratio */
            background: rgba(16, 185, 129, 0.25);
            border: 2px dashed var(--green);
            border-radius: 4px;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.3);
        }

        .draggable-ticker:hover {
            border-color: #34D399;
            background: rgba(16, 185, 129, 0.35);
        }

        .element-label {
            pointer-events: none;
            background: rgba(15, 23, 42, 0.85);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 리사이즈 핸들 */
        .resize-handle {
            position: absolute;
            z-index: 30;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid var(--accent);
            border-radius: 3px;
            pointer-events: auto;
        }
        .resize-handle-se {
            width: 14px; height: 14px;
            right: -4px; bottom: -4px;
            cursor: nwse-resize;
            border-radius: 0 0 6px 0;
        }
        .resize-handle-n {
            width: 40px; height: 10px;
            top: -4px; left: 50%; transform: translateX(-50%);
            cursor: ns-resize;
            border-color: var(--green);
            border-radius: 4px;
        }

        /* ══ Status Bar & Helper controls ══ */
        .control-panel {
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            width: 100%;
        }

        .status-txt {
            font-size: 12px;
            color: var(--text2);
        }

        .status-txt strong {
            color: var(--text);
        }

        .toggle-switch-group {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .switch-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
        }

        .switch-input {
            width: 38px;
            height: 20px;
            appearance: none;
            background: #475569;
            border-radius: 20px;
            position: relative;
            outline: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .switch-input:checked {
            background-color: var(--green);
        }

        .switch-input::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }

        .switch-input:checked::before {
            transform: translateX(18px);
        }

        .actions-row {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            color: #fff;
            transition: background-color 0.2s;
        }

        .btn-action.save {
            background-color: var(--accent);
        }

        .btn-action.save:hover {
            background-color: var(--accent-hover);
        }

        .btn-action.reset {
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-action.reset:hover {
            background-color: rgba(255, 255, 255, 0.12);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--accent);
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>
    <div class="header-bar">
        <div class="title-area">
            <h1 id="page-title">📺 방송 자막 및 배너 위치 에디터</h1>
            <p>배너와 자막 바를 드래그해서 배치하고 화면 표시 여부(ON/OFF)를 즉석에서 켜고 끌 수 있습니다.</p>
        </div>
        <div class="nav-links">
            <a href="index.html" class="btn-nav">⬅️ 개체 관리</a>
            <a href="settings.html" class="btn-nav">⚙️ 설정</a>
            <a href="preview.html?page=1" id="btn-tab-p1" class="btn-nav">1P (진행용) 배치기</a>
            <a href="preview.html?page=2" id="btn-tab-p2" class="btn-nav">2P (개체용) 배치기</a>
        </div>
    </div>

    <div class="workspace">
        <!-- 16:9 OBS screen simulation -->
        <div class="screen-container" id="screen-container">
            <!-- Actual broadcast page inside -->
            <iframe class="broadcast-iframe" id="broadcast-frame" src="broadcast.html"></iframe>
            
            <!-- Draggable wrapper layer -->
            <div class="drag-overlay" id="drag-overlay">
                <!-- 1. Draggable Banner -->
                <div class="draggable-element draggable-banner" id="draggable-banner" data-type="banner">
                    <div id="draggable-banner-blur" style="position:absolute; top:0; left:0; width:100%; height:100%; background-size:cover; background-position:center; filter:blur(10px) brightness(0.65); transform:scale(1.1); pointer-events:none; display:none; z-index:0; border-radius:6px;"></div>
                    <img id="draggable-banner-preview" style="width:100%; height:100%; object-fit:contain; border-radius:6px; pointer-events:none; display:none; position:relative; z-index:1;" alt="">
                    <div class="element-label" id="draggable-banner-label" style="z-index:2;">🖼️ 롤링 배너</div>
                    <div class="resize-handle resize-handle-se" id="resize-banner" title="드래그로 크기 조절"></div>
                </div>

                <!-- 2. Draggable Ticker (Zamak Bar) -->
                <div class="draggable-element draggable-ticker" id="draggable-ticker" data-type="ticker">
                    <div class="element-label">📢 공지사항 자막 (티커)</div>
                    <div class="resize-handle resize-handle-n" id="resize-ticker" title="드래그로 높이 조절"></div>
                </div>

                <!-- 3. Draggable Nametag 1 (PAGE1 only) -->
                <div class="draggable-element draggable-nametag1" id="draggable-nametag1" data-type="nametag1" style="display:none;">
                    <div class="element-label">🏷️ 네임택 1</div>
                    <div class="resize-handle resize-handle-se" id="resize-nametag1" title="크기 조절" style="border-color: #A855F7;"></div>
                </div>

                <!-- 4. Draggable Nametag 2 (PAGE1 only) -->
                <div class="draggable-element draggable-nametag2" id="draggable-nametag2" data-type="nametag2" style="display:none;">
                    <div class="element-label">🏷️ 네임택 2</div>
                    <div class="resize-handle resize-handle-se" id="resize-nametag2" title="크기 조절" style="border-color: #EC4899;"></div>
                </div>
            </div>
        </div>

        <!-- Coordinates Status & Live Control Bar -->
        <div class="control-panel">
            <div class="control-row" style="border-bottom: 1px solid var(--border); padding-bottom: 12px;">
                <div class="toggle-switch-group">
                    <div class="switch-container">
                        <span>📢 자막 노출</span>
                        <input type="checkbox" id="toggle-ticker-show" class="switch-input" checked onchange="toggleShowState('ticker')">
                    </div>
                    <div class="switch-container">
                        <span>🖼️ 배너 노출</span>
                        <input type="checkbox" id="toggle-banner-show" class="switch-input" checked onchange="toggleShowState('banner')">
                    </div>
                    <div class="switch-container" id="toggle-nametag1-group" style="display:none;">
                        <span>🏷️ 네임택1 노출</span>
                        <input type="checkbox" id="toggle-nametag1-show" class="switch-input" checked onchange="toggleShowState('nametag1')">
                    </div>
                    <div class="switch-container" id="toggle-nametag2-group" style="display:none;">
                        <span>🏷️ 네임택2 노출</span>
                        <input type="checkbox" id="toggle-nametag2-show" class="switch-input" checked onchange="toggleShowState('nametag2')">
                    </div>
                </div>
                <div class="actions-row">
                    <button class="btn-action reset" onclick="resetPositions()">기본 좌표 복구</button>
                    <button class="btn-action save" onclick="saveCoordinates(false)">💾 현재 상태 전체 저장</button>
                </div>
            </div>

            <div class="control-row">
                <div class="status-txt">
                    배너 좌표: Top <strong id="banner-val-top">0%</strong>, Left <strong id="banner-val-left">0%</strong> | 
                    자막 좌표: Top <strong id="ticker-val-top">0%</strong>, Left <strong id="ticker-val-left">0%</strong>
                    <span id="nametag1-coords" style="display:none;"> | 네임택1: <strong id="nametag1-val-top">0%</strong>, <strong id="nametag1-val-left">0%</strong></span>
                    <span id="nametag2-coords" style="display:none;"> | 네임택2: <strong id="nametag2-val-top">0%</strong>, <strong id="nametag2-val-left">0%</strong></span>
                    <span id="save-status" style="margin-left: 10px; color: var(--green); display: none;">✓ 저장 완료</span>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // URL Parameter Parsing (page=1 or page=2)
        const params = new URLSearchParams(window.location.search);
        const pageNum = params.get('page') || '2'; // Default: page=2 (개체용)

        // Set Nav Active and iframe source
        const frame = document.getElementById('broadcast-frame');
        if (pageNum === '1') {
            document.getElementById('btn-tab-p1').classList.add('active');
            document.getElementById('page-title').textContent = "📺 진행용 (1P) 실시간 레이아웃 배치기";
            frame.src = "broadcast.html?page=1";
        } else {
            document.getElementById('btn-tab-p2').classList.add('active');
            document.getElementById('page-title').textContent = "📺 개체용 (2P) 실시간 레이아웃 배치기";
            frame.src = "broadcast.html"; // Default page2 layout
        }

        // PAGE1 전용 요소 표시
        if (pageNum === '1') {
            document.getElementById('draggable-nametag1').style.display = '';
            document.getElementById('draggable-nametag2').style.display = '';
            document.getElementById('toggle-nametag1-group').style.display = '';
            document.getElementById('toggle-nametag2-group').style.display = '';
            document.getElementById('nametag1-coords').style.display = '';
            document.getElementById('nametag2-coords').style.display = '';
        }

        // 페이지별 config 접두사 (PAGE2는 p2_)
        const cfgPrefix = pageNum === '1' ? '' : 'p2_';

        // Draggables Configuration
        const container = document.getElementById('screen-container');
        const dragOverlay = document.getElementById('drag-overlay');
        const elements = {
            banner: {
                el: document.getElementById('draggable-banner'),
                top: "auto", left: "auto", right: "1%", bottom: "4%",
                show: "1", width: "42%", height: "50%"
            },
            ticker: {
                el: document.getElementById('draggable-ticker'),
                top: "auto", left: "auto", right: "auto", bottom: "4%",
                show: "1", width: "100%", height: "12%"
            }
        };

        // PAGE1 전용: 네임택 2개 개별 드래그
        if (pageNum === '1') {
            elements.nametag1 = {
                el: document.getElementById('draggable-nametag1'),
                top: "auto", left: "3%", right: "auto", bottom: "6%", show: "1",
                width: "16vw", height: "8vh"
            };
            elements.nametag2 = {
                el: document.getElementById('draggable-nametag2'),
                top: "auto", left: "18%", right: "auto", bottom: "6%", show: "1",
                width: "16vw", height: "8vh"
            };
        }

        let activeDragKey = null;
        let isDragging = false;
        let isResizing = false;
        let resizeTarget = null;
        let startX = 0;
        let startY = 0;
        let resizeStartW = 0;
        let resizeStartH = 0;

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => { t.classList.remove('show'); }, 2000);
        }

        function convertToPercent(val) {
            if (!val) return '';
            const raw = String(val).trim().toLowerCase();
            if (raw.endsWith('vw') || raw.endsWith('vh')) {
                return parseFloat(raw) + '%';
            }
            return val;
        }

        // Load configuration from database
        function loadConfigurations() {
            google.script.run.withSuccessHandler(function(cfg) {
                if (!cfg) return;

                // Load Banner values (페이지별 접두사 적용)
                elements.banner.top = cfg[cfgPrefix+'banner_top'] || 'auto';
                elements.banner.left = cfg[cfgPrefix+'banner_left'] || 'auto';
                elements.banner.right = cfg[cfgPrefix+'banner_right'] || 'auto';
                elements.banner.bottom = cfg[cfgPrefix+'banner_bottom'] || 'auto';
                elements.banner.show = cfg[cfgPrefix+'banner_show'] !== undefined ? String(cfg[cfgPrefix+'banner_show']) : '1';
                elements.banner.width = cfg[cfgPrefix+'banner_width'] || cfg.banner_maxwidth || '42vw';
                elements.banner.height = cfg[cfgPrefix+'banner_height'] || cfg.banner_maxheight || '50vh';

                // Load Ticker values
                elements.ticker.top = cfg[cfgPrefix+'ticker_top'] || 'auto';
                elements.ticker.left = cfg[cfgPrefix+'ticker_left'] || 'auto';
                elements.ticker.right = cfg[cfgPrefix+'ticker_right'] || 'auto';
                elements.ticker.bottom = cfg[cfgPrefix+'ticker_bottom'] || 'auto';
                elements.ticker.show = cfg[cfgPrefix+'ticker_show'] !== undefined ? String(cfg[cfgPrefix+'ticker_show']) : '1';
                elements.ticker.height = cfg[cfgPrefix+'ticker_height'] || '12vh';

                // Load Nametag 1 & 2 values (PAGE1 only)
                if (elements.nametag1) {
                    elements.nametag1.top = cfg.nametag1_top || 'auto';
                    elements.nametag1.left = cfg.nametag1_left || '3%';
                    elements.nametag1.right = cfg.nametag1_right || 'auto';
                    elements.nametag1.bottom = cfg.nametag1_bottom || '6%';
                    elements.nametag1.show = cfg.nametag1_show !== undefined ? String(cfg.nametag1_show) : '1';
                    elements.nametag1.width = cfg.nametag1_width || '16vw';
                    elements.nametag1.height = cfg.nametag1_height || '8vh';
                }
                if (elements.nametag2) {
                    elements.nametag2.top = cfg.nametag2_top || 'auto';
                    elements.nametag2.left = cfg.nametag2_left || '18%';
                    elements.nametag2.right = cfg.nametag2_right || 'auto';
                    elements.nametag2.bottom = cfg.nametag2_bottom || '6%';
                    elements.nametag2.show = cfg.nametag2_show !== undefined ? String(cfg.nametag2_show) : '1';
                    elements.nametag2.width = cfg.nametag2_width || '16vw';
                    elements.nametag2.height = cfg.nametag2_height || '8vh';
                }

                // Apply states visually
                applyVisualState('banner');
                applyVisualState('ticker');
                if (elements.nametag1) applyVisualState('nametag1');
                if (elements.nametag2) applyVisualState('nametag2');

                // Update switch checkboxes
                document.getElementById('toggle-banner-show').checked = elements.banner.show === "1";
                document.getElementById('toggle-ticker-show').checked = elements.ticker.show === "1";
                if (elements.nametag1) document.getElementById('toggle-nametag1-show').checked = elements.nametag1.show === "1";
                if (elements.nametag2) document.getElementById('toggle-nametag2-show').checked = elements.nametag2.show === "1";

                updateLabelReadouts();

                // Apply custom sizes from saved config (vw/vh → % for preview display)
                elements.banner.el.style.width = convertToPercent(elements.banner.width);
                elements.banner.el.style.height = convertToPercent(elements.banner.height);
                elements.banner.el.style.maxWidth = 'none';
                elements.banner.el.style.maxHeight = 'none';
                elements.ticker.el.style.height = convertToPercent(elements.ticker.height);
                // 네임택 크기 적용
                if (elements.nametag1) {
                    elements.nametag1.el.style.width = convertToPercent(elements.nametag1.width);
                    elements.nametag1.el.style.height = convertToPercent(elements.nametag1.height);
                }
                if (elements.nametag2) {
                    elements.nametag2.el.style.width = convertToPercent(elements.nametag2.width);
                    elements.nametag2.el.style.height = convertToPercent(elements.nametag2.height);
                }

                // Load first banner image as preview inside drag box
                const banner1 = (cfg.banner1 || '').trim();
                const bannerPreviewImg = document.getElementById('draggable-banner-preview');
                const bannerBlurBg = document.getElementById('draggable-banner-blur');
                const bannerLabel = document.getElementById('draggable-banner-label');
                if (banner1) {
                    bannerPreviewImg.src = banner1;
                    bannerPreviewImg.style.display = 'block';
                    if (bannerBlurBg) {
                        bannerBlurBg.style.backgroundImage = 'url(' + JSON.stringify(banner1) + ')';
                        bannerBlurBg.style.display = 'block';
                    }
                    bannerLabel.style.position = 'absolute';
                    bannerLabel.style.bottom = '2px';
                    bannerLabel.style.left = '50%';
                    bannerLabel.style.transform = 'translateX(-50%)';
                    bannerLabel.style.background = 'rgba(15,23,42,0.8)';
                    bannerLabel.style.fontSize = '8px';
                    bannerLabel.style.padding = '1px 4px';
                    bannerLabel.style.whiteSpace = 'nowrap';
                    bannerLabel.style.border = 'none';
                    bannerLabel.textContent = '🖼️ 롤링 배너';
                } else {
                    bannerPreviewImg.style.display = 'none';
                    if (bannerBlurBg) bannerBlurBg.style.display = 'none';
                    bannerLabel.style.position = 'static';
                    bannerLabel.style.transform = 'none';
                    bannerLabel.textContent = '🖼️ 롤링 배너 (이미지 없음)';
                }
            }).getConfigMap();
        }

        function applyVisualState(key) {
            const data = elements[key];
            data.el.style.removeProperty('left');
            data.el.style.removeProperty('right');
            data.el.style.removeProperty('top');
            data.el.style.removeProperty('bottom');

            const isVal = (val) => val && val !== 'auto' && val !== 'initial' && val !== 'unset';

            if (isVal(data.right)) {
                data.el.style.right = data.right;
            } else if (isVal(data.left)) {
                data.el.style.left = data.left;
            } else {
                data.el.style.left = '0%';
            }

            if (isVal(data.bottom)) {
                data.el.style.bottom = data.bottom;
            } else if (isVal(data.top)) {
                data.el.style.top = data.top;
            } else {
                data.el.style.top = '0%';
            }

            if (data.show === "0") {
                data.el.classList.add('hidden-state');
            } else {
                data.el.classList.remove('hidden-state');
            }
        }

        function updateLabelReadouts() {
            const b = elements.banner;
            const t = elements.ticker;
            
            const bXStr = b.right !== 'auto' ? `Right ${b.right}` : `Left ${b.left}`;
            const bYStr = b.bottom !== 'auto' ? `Bottom ${b.bottom}` : `Top ${b.top}`;
            const tXStr = t.right !== 'auto' ? `Right ${t.right}` : `Left ${t.left}`;
            const tYStr = t.bottom !== 'auto' ? `Bottom ${t.bottom}` : `Top ${t.top}`;

            document.getElementById('banner-val-top').textContent = bYStr;
            document.getElementById('banner-val-left').textContent = `${bXStr} (${elements.banner.width}×${elements.banner.height})`;
            document.getElementById('ticker-val-top').textContent = tYStr;
            document.getElementById('ticker-val-left').textContent = `H ${elements.ticker.height}`;

            if (elements.nametag1) {
                const n = elements.nametag1;
                document.getElementById('nametag1-val-top').textContent = n.bottom !== 'auto' ? `B ${n.bottom}` : `T ${n.top}`;
                document.getElementById('nametag1-val-left').textContent = n.right !== 'auto' ? `R ${n.right}` : `L ${n.left}` + ` (${n.width})`;
            }
            if (elements.nametag2) {
                const n = elements.nametag2;
                document.getElementById('nametag2-val-top').textContent = n.bottom !== 'auto' ? `B ${n.bottom}` : `T ${n.top}`;
                document.getElementById('nametag2-val-left').textContent = n.right !== 'auto' ? `R ${n.right}` : `L ${n.left}` + ` (${n.width})`;
            }
        }

        // Drag Setup
        Object.keys(elements).forEach(key => {
            const el = elements[key].el;
            el.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('resize-handle')) return;
                startDrag(e, key);
            });
            el.addEventListener('touchstart', (e) => {
                if (e.target.classList.contains('resize-handle')) return;
                startDrag(e, key);
            }, { passive: true });
        });

        // Resize Setup
        const resizeBanner = document.getElementById('resize-banner');
        const resizeTicker = document.getElementById('resize-ticker');

        function startResize(e, key) {
            e.stopPropagation();
            isResizing = true;
            resizeTarget = key;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            startX = clientX;
            startY = clientY;
            resizeStartW = elements[key].el.offsetWidth;
            resizeStartH = elements[key].el.offsetHeight;
        }
        resizeBanner.addEventListener('mousedown', (e) => startResize(e, 'banner'));
        resizeBanner.addEventListener('touchstart', (e) => startResize(e, 'banner'), { passive: false });
        resizeTicker.addEventListener('mousedown', (e) => startResize(e, 'ticker'));
        resizeTicker.addEventListener('touchstart', (e) => startResize(e, 'ticker'), { passive: false });

        // 네임택 리사이즈 핸들 (PAGE1 only)
        if (pageNum === '1') {
            const rn1 = document.getElementById('resize-nametag1');
            const rn2 = document.getElementById('resize-nametag2');
            rn1.addEventListener('mousedown', (e) => startResize(e, 'nametag1'));
            rn1.addEventListener('touchstart', (e) => startResize(e, 'nametag1'), { passive: false });
            rn2.addEventListener('mousedown', (e) => startResize(e, 'nametag2'));
            rn2.addEventListener('touchstart', (e) => startResize(e, 'nametag2'), { passive: false });
        }

        window.addEventListener('mousemove', drag);
        window.addEventListener('touchmove', drag, { passive: false });

        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);

        function startDrag(e, key) {
            isDragging = true;
            activeDragKey = key;

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const elRect = elements[key].el.getBoundingClientRect();
            startX = clientX - elRect.left;
            startY = clientY - elRect.top;
        }

        function drag(e) {
            if (isResizing && resizeTarget) {
                if (e.cancelable) e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const containerRect = container.getBoundingClientRect();
                const dx = clientX - startX;
                const dy = clientY - startY;

                if (resizeTarget === 'banner') {
                    const newW = Math.max(80, resizeStartW + dx);
                    const newH = Math.max(60, resizeStartH + dy);
                    elements.banner.width = ((newW / containerRect.width) * 100).toFixed(1) + 'vw';
                    elements.banner.height = ((newH / containerRect.height) * 100).toFixed(1) + 'vh';
                    elements.banner.el.style.width = convertToPercent(elements.banner.width);
                    elements.banner.el.style.height = convertToPercent(elements.banner.height);
                    elements.banner.el.style.maxWidth = 'none';
                    elements.banner.el.style.maxHeight = 'none';
                } else if (resizeTarget === 'ticker') {
                    const newH = Math.max(40, resizeStartH - dy);
                    elements.ticker.height = ((newH / containerRect.height) * 100).toFixed(1) + 'vh';
                    elements.ticker.el.style.height = convertToPercent(elements.ticker.height);
                } else if (resizeTarget === 'nametag1' || resizeTarget === 'nametag2') {
                    const newW = Math.max(50, resizeStartW + dx);
                    const newH = Math.max(30, resizeStartH + dy);
                    elements[resizeTarget].width = ((newW / containerRect.width) * 100).toFixed(1) + 'vw';
                    elements[resizeTarget].height = ((newH / containerRect.height) * 100).toFixed(1) + 'vh';
                    elements[resizeTarget].el.style.width = convertToPercent(elements[resizeTarget].width);
                    elements[resizeTarget].el.style.height = convertToPercent(elements[resizeTarget].height);
                }
                updateLabelReadouts();
                return;
            }
            if (!isDragging || !activeDragKey) return;
            if (e.cancelable) e.preventDefault();

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const containerRect = container.getBoundingClientRect();
            const el = elements[activeDragKey].el;

            let x = clientX - containerRect.left - startX;
            let y = clientY - containerRect.top - startY;

            // Constrain
            const maxX = containerRect.width - el.offsetWidth;
            const maxY = containerRect.height - el.offsetHeight;

            x = Math.max(0, Math.min(x, maxX));
            y = Math.max(0, Math.min(y, maxY));

            // Dynamic boundary switching based on center point
            const centerX = x + el.offsetWidth / 2;
            const centerY = y + el.offsetHeight / 2;

            // 티커는 수직 이동만 (좌우 항상 풀사이즈)
            if (activeDragKey === 'ticker') {
                elements[activeDragKey].left = 'auto';
                elements[activeDragKey].right = 'auto';
            } else {
                if (centerX > containerRect.width / 2) {
                    const rightPx = containerRect.width - (x + el.offsetWidth);
                    elements[activeDragKey].right = ((rightPx / containerRect.width) * 100).toFixed(1) + "%";
                    elements[activeDragKey].left = 'auto';
                } else {
                    elements[activeDragKey].left = ((x / containerRect.width) * 100).toFixed(1) + "%";
                    elements[activeDragKey].right = 'auto';
                }
            }

            if (centerY > containerRect.height / 2) {
                const bottomPx = containerRect.height - (y + el.offsetHeight);
                elements[activeDragKey].bottom = ((bottomPx / containerRect.height) * 100).toFixed(1) + "%";
                elements[activeDragKey].top = 'auto';
            } else {
                elements[activeDragKey].top = ((y / containerRect.height) * 100).toFixed(1) + "%";
                elements[activeDragKey].bottom = 'auto';
            }

            applyVisualState(activeDragKey);
            updateLabelReadouts();
        }

        function endDrag() {
            if (isResizing) {
                isResizing = false;
                resizeTarget = null;
                saveCoordinates(true);
                return;
            }
            if (!isDragging) return;
            isDragging = false;
            saveCoordinates(true);
            activeDragKey = null;
        }

        // Toggle visibility state for banner or ticker
        function toggleShowState(key) {
            const checkbox = document.getElementById(`toggle-${key}-show`);
            elements[key].show = checkbox.checked ? "1" : "0";
            applyVisualState(key);
            saveCoordinates(false);
        }

        function saveCoordinates(isAuto = false) {
            const configMap = {};
            // 페이지별 접두사 적용
            configMap[cfgPrefix+'banner_top'] = elements.banner.top;
            configMap[cfgPrefix+'banner_left'] = elements.banner.left;
            configMap[cfgPrefix+'banner_right'] = elements.banner.right;
            configMap[cfgPrefix+'banner_bottom'] = elements.banner.bottom;
            configMap[cfgPrefix+'banner_show'] = elements.banner.show;
            configMap[cfgPrefix+'banner_width'] = elements.banner.width;
            configMap[cfgPrefix+'banner_height'] = elements.banner.height;
            configMap[cfgPrefix+'ticker_top'] = elements.ticker.top;
            configMap[cfgPrefix+'ticker_left'] = elements.ticker.left;
            configMap[cfgPrefix+'ticker_right'] = elements.ticker.right;
            configMap[cfgPrefix+'ticker_bottom'] = elements.ticker.bottom;
            configMap[cfgPrefix+'ticker_show'] = elements.ticker.show;
            configMap[cfgPrefix+'ticker_height'] = elements.ticker.height;

            // PAGE1 전용: 네임택 1,2 좌표 저장
            if (elements.nametag1) {
                configMap.nametag1_top = elements.nametag1.top;
                configMap.nametag1_left = elements.nametag1.left;
                configMap.nametag1_right = elements.nametag1.right;
                configMap.nametag1_bottom = elements.nametag1.bottom;
                configMap.nametag1_show = elements.nametag1.show;
                configMap.nametag1_width = elements.nametag1.width;
                configMap.nametag1_height = elements.nametag1.height;
            }
            if (elements.nametag2) {
                configMap.nametag2_top = elements.nametag2.top;
                configMap.nametag2_left = elements.nametag2.left;
                configMap.nametag2_right = elements.nametag2.right;
                configMap.nametag2_bottom = elements.nametag2.bottom;
                configMap.nametag2_show = elements.nametag2.show;
                configMap.nametag2_width = elements.nametag2.width;
                configMap.nametag2_height = elements.nametag2.height;
            }

            google.script.run.withSuccessHandler(function() {
                // Flash Save status indicator
                const indicator = document.getElementById('save-status');
                indicator.style.display = 'inline';
                setTimeout(() => { indicator.style.display = 'none'; }, 1200);

                if (!isAuto) toast("💾 방송 배치 정보 및 가시성 설정이 성공적으로 저장되었습니다!");

                // Reload iframe inside visual screen simulator to show real result
                frame.contentWindow.location.reload();
            }).updateConfigs(configMap);
        }

        function resetPositions() {
            elements.banner.top = "auto";
            elements.banner.left = "auto";
            elements.banner.right = "1%";
            elements.banner.bottom = "4%";
            elements.banner.show = "1";
            elements.banner.width = "42vw";
            elements.banner.height = "50vh";
            elements.banner.el.style.width = '42%';
            elements.banner.el.style.height = '50%';
            elements.banner.el.style.maxWidth = 'none';
            elements.banner.el.style.maxHeight = 'none';

            elements.ticker.top = "auto";
            elements.ticker.left = "auto";
            elements.ticker.right = "auto";
            elements.ticker.bottom = "4%";
            elements.ticker.show = "1";
            elements.ticker.height = "12vh";
            elements.ticker.el.style.height = '12%';

            document.getElementById('toggle-banner-show').checked = true;
            document.getElementById('toggle-ticker-show').checked = true;

            if (elements.nametag1) {
                elements.nametag1.top = "auto"; elements.nametag1.left = "3%";
                elements.nametag1.right = "auto"; elements.nametag1.bottom = "6%";
                elements.nametag1.show = "1";
                elements.nametag1.width = "16vw"; elements.nametag1.height = "8vh";
                elements.nametag1.el.style.width = '16%'; elements.nametag1.el.style.height = '8%';
                document.getElementById('toggle-nametag1-show').checked = true;
                applyVisualState('nametag1');
            }
            if (elements.nametag2) {
                elements.nametag2.top = "auto"; elements.nametag2.left = "18%";
                elements.nametag2.right = "auto"; elements.nametag2.bottom = "6%";
                elements.nametag2.show = "1";
                elements.nametag2.width = "16vw"; elements.nametag2.height = "8vh";
                elements.nametag2.el.style.width = '16%'; elements.nametag2.el.style.height = '8%';
                document.getElementById('toggle-nametag2-show').checked = true;
                applyVisualState('nametag2');
            }

            applyVisualState('banner');
            applyVisualState('ticker');
            updateLabelReadouts();
            saveCoordinates();
        }

        // Initial Initialization
        window.addEventListener('DOMContentLoaded', () => {
            loadConfigurations();
        });
    </script>
</body>

</html>
