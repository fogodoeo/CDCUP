                e.photos[key] = null;
            }
            closeParentPopup();
        }

        function clearParent(eid, key) {
            const e = entries.find(function (x) { return x.id === eid; });
            if (!e) return;
            if (key === 'sire') e.sireId = '';
            else e.damId = '';
            const picker = document.getElementById('pp-' + eid + '-' + key);
            picker.classList.remove('selected');
        }

        // ── 부모개체 관리 모달 (다중등록) ──
        var _pmEntryId = 0;
        var _pmEntries = [];

        function openParentModal(presetGender) {
            _pmEntries = [];
            _pmEntryId = 0;
            document.getElementById('pm-entries').innerHTML = '';
            addPmEntry(presetGender || '');
            loadParents(function () { renderParentList(); });
            document.getElementById('parent-modal-overlay').classList.add('show');
        }

        function closeParentModal() {
            document.getElementById('parent-modal-overlay').classList.remove('show');
        }

        function addPmEntry(presetGender) {
            var id = _pmEntryId++;
            _pmEntries.push({ id: id, photoBase64: '' });
            var div = document.createElement('div');
            div.className = 'pm-form';
            div.id = 'pme-' + id;
            div.innerHTML =
                '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
                '<span style="font-size:12px;font-weight:700;color:var(--text2);">부모개체 #' + _pmEntries.length + '</span>' +
                '<button style="background:none;border:none;font-size:18px;color:var(--text3);cursor:pointer;padding:0 2px;" onclick="removePmEntry(' + id + ')">✕</button></div>' +
                '<div class="pm-form-row"><input type="text" id="pme-name-' + id + '" placeholder="개체명 *" style="flex:1.5">' +
                '<input type="text" id="pme-company-' + id + '" placeholder="업체명" style="flex:1"></div>' +
                '<div class="pm-form-row"><input type="text" id="pme-morph-' + id + '" placeholder="종/모프" style="flex:1">' +
                '<select id="pme-gender-' + id + '" style="flex:0.6"><option value="">성별</option><option value="M"' + (presetGender === 'M' ? ' selected' : '') + '>수컷</option><option value="F"' + (presetGender === 'F' ? ' selected' : '') + '>암컷</option></select></div>' +
                '<input type="text" id="pme-memo-' + id + '" placeholder="메모 (선택)">' +
                '<div class="pm-photo-area" id="pme-pa-' + id + '" onclick="document.getElementById(\'pme-pf-' + id + '\').click()">' +
                '<img class="pm-photo-preview" id="pme-pp-' + id + '">' +
                '<span class="pm-photo-text">📷 사진 선택</span>' +
                '<input type="file" id="pme-pf-' + id + '" accept="image/*" style="display:none" onchange="onPmPhotoEntry(' + id + ',this)"></div>';
            document.getElementById('pm-entries').appendChild(div);
        }

        function removePmEntry(id) {
            _pmEntries = _pmEntries.filter(function (e) { return e.id !== id; });
            var el = document.getElementById('pme-' + id);
            if (el) el.remove();
        }

        function onPmPhotoEntry(id, input) {
            if (!input.files || !input.files[0]) return;
            var reader = new FileReader();
            reader.onload = function (ev) {
                var entry = _pmEntries.find(function (e) { return e.id === id; });
                if (entry) entry.photoBase64 = ev.target.result;
                var area = document.getElementById('pme-pa-' + id);
                area.classList.add('has-photo');
                document.getElementById('pme-pp-' + id).src = ev.target.result;
                area.querySelector('.pm-photo-text').textContent = '사진 선택됨 ✓';
            };
            reader.readAsDataURL(input.files[0]);
        }

        function submitParentsBatch() {
            var items = [];
            for (var i = 0; i < _pmEntries.length; i++) {
                var e = _pmEntries[i];
                var nameEl = document.getElementById('pme-name-' + e.id);
                if (!nameEl) continue;
                var name = nameEl.value.trim();
                if (!name) continue;
                items.push({
                    name: name,
                    company: document.getElementById('pme-company-' + e.id).value.trim(),
                    morph: document.getElementById('pme-morph-' + e.id).value.trim(),
                    gender: document.getElementById('pme-gender-' + e.id).value,
                    memo: document.getElementById('pme-memo-' + e.id).value.trim(),
                    photo: e.photoBase64
                });
            }
            if (items.length === 0) { alert('등록할 개체명을 입력하세요.'); return; }

            var btn = document.querySelector('.pm-add-btn');
            btn.textContent = '등록중... (' + items.length + '개 일괄 처리)';
            btn.disabled = true;

            google.script.run
                .withSuccessHandler(function (r) {
                    btn.textContent = '일괄 등록';
                    btn.disabled = false;
                    if (r && !r.success) { toast('등록 실패: ' + (r.error || ''), true); return; }
                    _pmEntries = [];
                    _pmEntryId = 0;
                    document.getElementById('pm-entries').innerHTML = '';
                    addPmEntry();
                    loadParents(function () { renderParentList(); });
                    toast(r.count + '개 부모개체 등록 완료');
                })
                .withFailureHandler(function (err) {
                    btn.textContent = '일괄 등록';
                    btn.disabled = false;
                    toast('오류: ' + err.message, true);
                })
                .addParentsBatch(items);
        }

        function deleteParentItem(pid) {
            if (!confirm('삭제하시겠습니까?')) return;
            google.script.run
                .withSuccessHandler(function () {
                    loadParents(function () { renderParentList(); });
                    toast('삭제됨');
                })
                .withFailureHandler(function (e) { alert('삭제 실패: ' + e.message); })
                .deleteParent(pid);
        }

        function renderParentList() {
            const el = document.getElementById('pm-list');
            if (parentCache.length === 0) {
                el.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px 0;color:var(--text3);font-size:13px;">등록된 부모개체가 없습니다</div>';
                return;
            }
            const gm = { M: '수컷', F: '암컷' };
            el.innerHTML = parentCache.map(function (p) {
                return '<div class="pm-item">' +
                    (p.photo ? '<img class="pm-item-img" src="' + p.photo + '">' :
                        '<div class="pm-item-img" style="display:flex;align-items:center;justify-content:center;font-size:20px;">🦎</div>') +
                    '<div class="pm-item-info"><div class="pm-item-name">' + esc(p.name) + '</div>' +
                    '<div class="pm-item-sub">' + [p.company, p.morph, gm[p.gender] || '', p.memo].filter(Boolean).join(' · ') + '</div></div>' +
                    '<button class="pm-item-del" onclick="deleteParentItem(\'' + p.id + '\')">삭제</button></div>';
            }).join('');
        }

        // ── 관리자 비밀번호 ──
        function getAdminPw() {
            let pw = sessionStorage.getItem('adminPw');
            if (!pw) {
                pw = prompt('관리자 비밀번호를 입력하세요:');
                if (!pw || !pw.trim()) return null;
                pw = pw.trim();
                sessionStorage.setItem('adminPw', pw);
            }
            return pw;
        }
        function clearAdminPw() { sessionStorage.removeItem('adminPw'); }

        // HTML 특수문자 이스케이프 (XSS 방어 — 전역 함수)
        function esc(s) {
            if (!s) return '';
            return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function showTab(tab, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
            // 헤더 타이틀 갱신
            const titles = { register: '개체 등록', list: '개체 목록', dodosi: '배송지 조회', print: '인쇄', tournament: '토너먼트 대진표' };
            const h1 = document.getElementById('header-title');
            if (h1) {
                h1.style.opacity = '0';
                setTimeout(() => { h1.textContent = titles[tab] || tab; h1.style.opacity = '1'; }, 120);
            }
            if (tab === 'list') loadList();
            if (tab === 'dodosi') { loadDodosiData(); setTimeout(function () { document.getElementById('dodosi-search').focus(); }, 200); }
            if (tab === 'print') loadPrint();
            if (tab === 'tournament') loadTournament();
        }

        // ── 개체 행 추가 ──
        function addEntry() {
            const id = entryId++;
            const e = { id, photos: { item: null, sire: null, dam: null, sibling: null }, sireId: '', damId: '' };
            entries.push(e);

            const div = document.createElement('div');
            div.className = 'item-entry';
            div.id = 'entry-' + id;
            div.innerHTML = `
    <div class="entry-header">
      <span class="entry-num">#${entries.length}</span>
      <button class="entry-del" onclick="removeEntry(${id})">✕</button>
    </div>
    <div class="entry-fields">
      <div class="ef" style="flex:2"><label>개체명 *</label><input type="text" id="en-${id}" placeholder="이름"></div>
      <div class="ef" style="flex:1"><label>시작가</label><input type="text" id="ep-${id}" placeholder="미입력 시 1만" inputmode="numeric"></div>
    </div>
    <div class="photo-row-mini">
      ${['item', 'sibling'].map(k => `
        <div class="photo-slot-mini">
          <span class="slot-label">${k === 'item' ? '개체' : '동배'}</span>
          <div class="drop-mini" id="dz-${id}-${k}" onclick="trigUp(${id},'${k}')">
            <span class="ph">+</span>
            <button class="rm" onclick="event.stopPropagation();rmPh(${id},'${k}')">✕</button>
            <input type="file" accept="image/*" id="fi-${id}-${k}" onchange="hFile(event,${id},'${k}')">
          </div>
        </div>
      `).join('')}
      ${['sire', 'dam'].map(k => `
        <div class="photo-slot-mini parent-slot">
          <span class="slot-label">${k === 'sire' ? '부' : '모'}</span>
          <div class="parent-picker" id="pp-${id}-${k}" onclick="openParentPopup(${id},'${k}')">
            <div class="pp-placeholder">
              <span class="material-symbols-rounded">genetics</span>
              <span>탭하여 선택</span>
            </div>
            <img class="pp-img" id="pp-img-${id}-${k}">
            <div class="pp-name-tag" id="pp-tag-${id}-${k}"></div>
            <button class="pp-clear" onclick="event.stopPropagation();clearParent(${id},'${k}')">✕</button>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="cl-section">
      <div class="cl-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <span>개체 상태 체크</span><span class="arrow">▶</span>
      </div>
      <div class="cl-body" id="clb-${id}">
        <div class="cl-row"><span class="cl-label">성별</span><div class="cl-pills" data-field="gender" data-eid="${id}"><button type="button" class="cl-pill" data-v="M" onclick="clPill(this)">수컷</button><button type="button" class="cl-pill" data-v="F" onclick="clPill(this)">암컷</button><button type="button" class="cl-pill" data-v="U" onclick="clPill(this)">미구분</button></div></div>
        <div class="cl-row"><span class="cl-label">무게(g)</span><input type="number" class="cl-input" id="cl-wt-${id}" placeholder="g" inputmode="decimal"></div>
        <div class="cl-row"><span class="cl-label">출생</span><div style="display:flex;gap:4px;align-items:center;"><select class="cl-select" id="cl-by-${id}" style="width:82px;"><option value="">년도</option>${(function () { var o = ''; for (var y = 2026; y >= 2020; y--)o += '<option value="' + y + '">' + y + '</option>'; return o; })()}</select><select class="cl-select" id="cl-bm-${id}" style="width:58px;"><option value="">월</option>${(function () { var o = ''; for (var m = 1; m <= 12; m++)o += '<option value="' + m + '">' + m + '월</option>'; return o; })()}</select></div></div>
        <div class="cl-row"><span class="cl-label">점</span><div class="cl-pills" data-field="spot" data-eid="${id}"><button type="button" class="cl-pill" data-v="O" onclick="clPill(this)">있음</button><button type="button" class="cl-pill" data-v="X" onclick="clPill(this)">없음</button></div></div>
        <div class="cl-row"><span class="cl-label">풀핀</span><div class="cl-pills" data-field="pin" data-eid="${id}"><button type="button" class="cl-pill" data-v="O" onclick="clPill(this)">있음</button><button type="button" class="cl-pill" data-v="X" onclick="clPill(this)">없음</button></div></div>
        <div class="cl-row"><span class="cl-label">도살</span><div class="cl-stars" data-field="size" data-eid="${id}">${'<span class="cl-star" onclick="clStar(this)">★</span>'.repeat(5)}</div></div>
        <div class="cl-row"><span class="cl-label">월높이</span><div class="cl-stars" data-field="wall" data-eid="${id}">${'<span class="cl-star" onclick="clStar(this)">★</span>'.repeat(5)}</div></div>
        <div class="cl-row"><span class="cl-label">색감</span><div class="cl-stars" data-field="color" data-eid="${id}">${'<span class="cl-star" onclick="clStar(this)">★</span>'.repeat(5)}</div></div>
        <div class="cl-row"><span class="cl-label">활동성</span><div class="cl-stars" data-field="activity" data-eid="${id}">${'<span class="cl-star" onclick="clStar(this)">★</span>'.repeat(5)}</div></div>
        <div class="cl-row"><span class="cl-label">먹이붙임</span><div class="cl-stars" data-field="feed" data-eid="${id}">${'<span class="cl-star" onclick="clStar(this)">★</span>'.repeat(5)}</div></div>
        <div class="cl-row"><span class="cl-label">체형</span><div class="cl-stars" data-field="structure" data-eid="${id}">${'<span class="cl-star" onclick="clStar(this)">★</span>'.repeat(5)}</div></div>
        <div class="cl-row"><span class="cl-label">비고</span><input type="text" class="cl-input-wide" id="cl-note-${id}" placeholder="탈피예정 등 메모"></div>
      </div>
    </div>
  `;
            document.getElementById('entries').appendChild(div);

            // 드래그앤드랍 (item, sibling만 — sire/dam은 카드 피커)
            ['item', 'sibling'].forEach(k => {
                const dz = document.getElementById('dz-' + id + '-' + k);
                if (!dz) return;
                dz.addEventListener('dragover', ev => { ev.preventDefault(); dz.classList.add('drag-over'); });
                dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
                dz.addEventListener('drop', ev => {
                    ev.preventDefault(); dz.classList.remove('drag-over');

        function procFile(file, id, k) {
            if (!file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = e => resize(e.target.result, 600, res => {
                const entry = entries.find(x => x.id === id);
                if (entry) entry.photos[k] = res;
                showPrev(id, k, res);
            });
            reader.readAsDataURL(file);
        }

        function resize(url, max, cb) {
            const img = new Image();
            img.onload = () => {
                let w = img.width, h = img.height;
                if (w > max || h > max) { if (w > h) { h = h * max / w; w = max; } else { w = w * max / h; h = max; } }
                const c = document.createElement('canvas'); c.width = w; c.height = h;
                c.getContext('2d').drawImage(img, 0, 0, w, h);
                cb(c.toDataURL('image/jpeg', 0.5));
            };
            img.onerror = () => {
                toast('이미지 로드 실패. 다른 파일을 선택해주세요.', true);
            };
            img.src = url;
        }

            const dz = document.getElementById('dz-' + id + '-' + k);
            const ph = dz.querySelector('.ph');
            let img = dz.querySelector('img');
            if (!img) { img = document.createElement('img'); dz.insertBefore(img, dz.firstChild); }
            img.src = url; ph.style.display = 'none'; dz.classList.add('has-img');
        }

        // ── 일괄 제출 (사진 일괄 업로드 1회 호출) ──
        async function submitAll() {
            if (entries.length === 0) { toast('개체를 추가해주세요', true); return; }
            const company = document.getElementById('f-company').value.trim();

            // 유효성

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            const prog = document.getElementById('prog');
            const fill = document.getElementById('prog-fill');
            prog.style.display = 'block';

            try {
                // 1) 모든 사진을 배열로 수집
                const photoArray = [];   // [{base64, filename}]
                const photoIndex = [];   // [{entryId, key}] — 결과 매핑용
                const photoResults = {}; // {entryId: {item:'', sire:'', dam:'', sibling:''}}

                for (const e of entries) {
                    photoResults[e.id] = { item: '', sire: '', dam: '', sibling: '' };
                    const ename = document.getElementById('en-' + e.id).value.trim();
                    for (const k of ['item', 'sire', 'dam', 'sibling']) {
                        if (e.photos[k]) {
                            photoArray.push({ base64: e.photos[k], filename: ename + '_' + k + '.jpg' });

                        }
                    }
                }

                if (photoArray.length > 0) {
                    fill.style.width = '10%';
                    btn.textContent = '사진 ' + photoArray.length + '장 업로드중...';
                    const urls = await new Promise((ok, ng) => {
                        google.script.run
                            .withSuccessHandler(ok)
                            .withFailureHandler(ng)
                            .uploadPhotos(photoArray);
                    });
                    // 결과 매핑
                    for (let i = 0; i < urls.length; i++) {
                        const pi = photoIndex[i];
                        photoResults[pi.entryId][pi.key] = urls[i];

                    fill.style.width = '70%';
                }

                // 2) 시트 일괄 등록
                fill.style.width = '85%';
                btn.textContent = '시트 등록중...';
                const itemsData = entries.map(e => {
                    // 부모개체 선택 시 해당 부모의 photo URL 사용
                    let sirePhoto = photoResults[e.id].sire;
                    let damPhoto = photoResults[e.id].dam;
                    if (e.sireId) {
                        const sp = parentCache.find(p => p.id === e.sireId);
                        if (sp && sp.photo) sirePhoto = sp.photo;
                    }
                    if (e.damId) {
                        const dp = parentCache.find(p => p.id === e.damId);
                        if (dp && dp.photo) damPhoto = dp.photo;
                    }
                    return {
                        company: company,
                        name: document.getElementById('en-' + e.id).value.trim(),
                        startPrice: document.getElementById('ep-' + e.id).value.trim(),
                        note: '',
                        announce: '',
                        photoItem: photoResults[e.id].item,
                        photoSire: sirePhoto,
                        photoDam: damPhoto,
                        photoSibling: photoResults[e.id].sibling,
                        checklist: gatherChecklist(e.id),
                        sireId: e.sireId || '',
                        damId: e.damId || ''
                    };

                await new Promise((ok, ng) => {
                    google.script.run.withSuccessHandler(r => {
                        if (r && r.success === false) { ng(new Error(r.error || '등록 실패')); return; }

                    }).withFailureHandler(ng).registerBatch(itemsData);
                });

                fill.style.width = '100%';

        function clPill(btn) {
            var wasOn = btn.classList.contains('on') || btn.classList.contains('on-green');
            btn.parentElement.querySelectorAll('.cl-pill').forEach(function (b) { b.classList.remove('on', 'on-green'); });
            if (!wasOn) btn.classList.add('on');
        }
        function clStar(star) {
            var stars = star.parentElement.querySelectorAll('.cl-star');
            var idx = Array.from(stars).indexOf(star);
            var allBefore = true;
            stars.forEach(function (s, i) { if (i <= idx && !s.classList.contains('filled')) allBefore = false; });
            var onlyUpTo = true;
            stars.forEach(function (s, i) { if (i > idx && s.classList.contains('filled')) onlyUpTo = false; });
            if (allBefore && onlyUpTo) {
                stars.forEach(function (s) { s.classList.remove('filled'); });
            } else {
                stars.forEach(function (s, i) { s.classList.toggle('filled', i <= idx); });
            }
        }
        function gatherChecklist(eid) {
            var parts = [];
            // 토글 필드 (gender, spot, pin)
            ['gender', 'spot', 'pin'].forEach(function (f) {
                var container = document.querySelector('[data-field="' + f + '"][data-eid="' + eid + '"]');
                if (!container) return;
                var sel = container.querySelector('.cl-pill.on');
                if (sel) parts.push(f + ':' + sel.dataset.v);
            });
            // 숫자/텍스트 필드
            var wt = document.getElementById('cl-wt-' + eid);
            if (wt && wt.value) parts.push('weight:' + wt.value);
            var by = document.getElementById('cl-by-' + eid);
            var bm = document.getElementById('cl-bm-' + eid);
            if (by && by.value) {
                var birthVal = by.value;
                if (bm && bm.value) birthVal += '-' + bm.value;
                parts.push('birth:' + birthVal);
            }
            // 별점 필드
            ['size', 'wall', 'color', 'activity', 'feed', 'structure'].forEach(function (f) {
                var container = document.querySelector('[data-field="' + f + '"][data-eid="' + eid + '"]');
                if (!container) return;
                var count = container.querySelectorAll('.cl-star.filled').length;
                if (count > 0) parts.push(f + ':' + count);
            });
            // 비고
            var note = document.getElementById('cl-note-' + eid);
            if (note && note.value.trim()) parts.push('memo:' + note.value.trim());
            return parts.join('|');
        }

            });

            items.forEach(it => { if (it.company && it.company.trim()) comps.add(it.company.trim()); });
            const compList = Array.from(comps).sort();

            if (compList.length <= 1) { // 1개 이하면 필터 불필요
                bar.style.display = 'none';
                return;

            if (currentCompanyFilter !== 'all' && !comps.has(currentCompanyFilter)) {

        // ═══ 드래그앤드롭 순서 변경 (터치 + 마우스) ═══
        (function () {
            var dragSrc = null, ghost = null, dragRow = -1;
            var startX = 0, startY = 0, lastY = 0;
            var lpTimer = null, dragging = false;

            function rowOf(card) { return parseInt((card.id || '').replace('card-', ''), 10); }

            function pDown(e) {
                if (isSelectMode || dragging) return;
                var card = e.target.closest('.item-card');
                if (!card) return;
                if (e.target.closest('.cb-container, .row-cb, input, button, select, textarea')) return;
                dragSrc = card;
                dragRow = rowOf(card);
                var pt = e.touches ? e.touches[0] : e;
                startX = pt.clientX; startY = pt.clientY; lastY = pt.clientY;
                lpTimer = setTimeout(function () { beginDrag(); }, 500);
            }

            function beginDrag() {
                if (!dragSrc) return;
                dragging = true;
                if (navigator.vibrate) navigator.vibrate(30);
                var rect = dragSrc.getBoundingClientRect();
                ghost = dragSrc.cloneNode(true);
                ghost.id = '';
                ghost.style.cssText =
                    'position:fixed;left:' + rect.left + 'px;top:' + rect.top + 'px;' +
                    'width:' + rect.width + 'px;pointer-events:none;z-index:9999;' +
                    'opacity:0.85;box-shadow:0 8px 32px rgba(0,0,0,0.18);' +
                    'border-radius:12px;transform:scale(1.03);transition:none;';
                document.body.appendChild(ghost);
                dragSrc.style.opacity = '0.3';
                document.body.style.userSelect = 'none';
                document.body.style.webkitUserSelect = 'none';
            }

            function pMove(e) {
                var pt = e.touches ? e.touches[0] : e;
                if (!dragging) {
                    if (lpTimer && (Math.abs(pt.clientY - startY) > 10 || Math.abs(pt.clientX - startX) > 10)) {
                        clearTimeout(lpTimer); lpTimer = null; dragSrc = null;
                    }
                    return;
                }
                if (e.cancelable) e.preventDefault();
                lastY = pt.clientY;
                if (ghost) ghost.style.top = (pt.clientY - 30) + 'px';
            }

            function pUp(e) {
                if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
                if (!dragging || !dragSrc) { dragSrc = null; dragging = false; return; }

                // ghost 제거
                if (ghost) { ghost.remove(); ghost = null; }
                dragSrc.style.opacity = '1';
                document.body.style.userSelect = '';
                document.body.style.webkitUserSelect = '';

                if (!window._lastItems || !window._lastItems.length) {
                    dragging = false; dragSrc = null; return;
                }

                // 손가락 위치에서 대상 카드 찾기
                var cards = Array.from(document.querySelectorAll('#item-list > .item-card'));
                var targetRow = -1;
                for (var i = 0; i < cards.length; i++) {
                    if (cards[i] === dragSrc) continue;
                    var r = cards[i].getBoundingClientRect();
                    if (lastY >= r.top && lastY <= r.bottom) {
                        targetRow = rowOf(cards[i]);
                        break;
                    }
                }
                // 카드 사이 빈 공간이면 가장 가까운 카드 찾기
                if (targetRow < 0) {
                    var minDist = 99999;
                    for (var i = 0; i < cards.length; i++) {
                        if (cards[i] === dragSrc) continue;
                        var r = cards[i].getBoundingClientRect();
                        var mid = r.top + r.height / 2;
                        var dist = Math.abs(lastY - mid);
                        if (dist < minDist) { minDist = dist; targetRow = rowOf(cards[i]); }
                    }
                }
                if (targetRow < 0 || targetRow === dragRow) {
                    dragging = false; dragSrc = null; return;
                }

                // _lastItems에서 src/dst 인덱스 찾기
                var srcIdx = -1, dstIdx = -1;
                for (var i = 0; i < window._lastItems.length; i++) {
                    if (window._lastItems[i].row === dragRow) srcIdx = i;
                    if (window._lastItems[i].row === targetRow) dstIdx = i;
                }
                if (srcIdx < 0 || dstIdx < 0 || srcIdx === dstIdx) {
                    dragging = false; dragSrc = null; return;
                }

                // 폴링 차단 (서버 동기화 완료까지)
                window._isDragReordering = true;

                // 배열 이동: src를 빼서 dst 위치에 삽입
                var item = window._lastItems.splice(srcIdx, 1)[0];
                window._lastItems.splice(dstIdx, 0, item);

                // 번호 1부터 재할당
                var updates = [];
                window._lastItems.forEach(function (it, i) {
                    var newNum = String(i + 1);
                    if (it.num !== newNum) {
                        updates.push({ row: it.row, num: newNum });
                    }
                    it.num = newNum;
                });

                // 전체 재렌더링
                renderList(window._lastItems, true);

                dragging = false;
                dragSrc = null;

                // 서버 동기화
                if (updates.length > 0) {
                    google.script.run
                        .withSuccessHandler(function (r) {
                            window._isDragReordering = false;
                            if (r && r.success) showToast(updates.length + '개 순서 변경 완료');
                            else showToast('순서 저장 실패', true);
                        })
                        .withFailureHandler(function () {
                            window._isDragReordering = false;
                            showToast('순서 저장 실패', true);
                        })
                        .reorderItems(updates);
                } else {
                    window._isDragReordering = false;
                }
            }

            document.addEventListener('touchstart', pDown, { passive: true });
            document.addEventListener('touchmove', pMove, { passive: false });
            document.addEventListener('touchend', pUp);
            document.addEventListener('mousedown', pDown);
            document.addEventListener('mousemove', pMove);
            document.addEventListener('mouseup', pUp);
        })();

        // ── 선택 수정 (바텀 시트 인라인) ──
        // ── 수정 모달 사진 헬퍼 ──
        function edPhFile(inp) {
            if (!inp.files || !inp.files[0]) return;
            var reader = new FileReader();
            reader.onload = function (e) {
                inp.dataset.base64 = e.target.result.split(',')[1];
                inp.dataset.changed = 'true';
                var dz = inp.parentElement;
                // 기존 이미지 제거 후 새 이미지 삽입
                var old = dz.querySelector('img');
                if (old) old.remove();
                var img = document.createElement('img');
                img.src = e.target.result;
                img.style = 'width:100%;height:100%;object-fit:cover;border-radius:6px;';
                dz.insertBefore(img, dz.firstChild);
                dz.classList.add('has-img');
                dz.querySelector('.ph').style.display = 'none';
                dz.querySelector('.rm').style.display = '';
            };
            reader.readAsDataURL(inp.files[0]);
        }

            dz.classList.remove('has-img');
            dz.querySelector('.ph').style.display = '';
            dz.querySelector('.rm').style.display = 'none';

        function editItemUI(row, it) {
            const container = document.getElementById('bs-content');
            if (!container) return;
            document.querySelector('.bs-footer').style.display = 'none';

            const cl = parseChecklist(it.checklist || '');
            var birthY = '', birthM = '';
            if (cl.birth) { var bp = cl.birth.split('-'); birthY = bp[0] || ''; birthM = bp[1] || ''; }
            var yearOpts = '<option value="">년도</option>';

        function gatherEditChecklist(container) {
            var parts = [];
            container.querySelectorAll('.cl-pills').forEach(function (grp) {

                if (sel) parts.push(field + ':' + sel.dataset.v);
            });
            container.querySelectorAll('.ed-cl-input').forEach(function (inp) {
                var field = inp.dataset.field;
                if (inp.value.trim()) parts.push(field + ':' + inp.value.trim());
            });
            var byEl = container.querySelector('[data-field="birthY"]');
            var bmEl = container.querySelector('[data-field="birthM"]');
            if (byEl && byEl.value) {
                var bv = byEl.value;
                if (bmEl && bmEl.value) bv += '-' + bmEl.value;
                parts.push('birth:' + bv);
            }
            var starFields = {};
            container.querySelectorAll('.ed-cl-star.filled').forEach(function (s) {
                var f = s.dataset.field;
                var v = parseInt(s.dataset.val);
                if (!starFields[f] || v > starFields[f]) starFields[f] = v;
            });
            for (var sf in starFields) parts.push(sf + ':' + starFields[sf]);
            return parts.join('|');
        }

        async function saveItem(row) {
            const pw = getAdminPw();
            if (!pw) return;
            const container = document.getElementById('bs-content');

            // 저장 버튼 스피너 효과 (임시)
            const saveBtn = document.getElementById('ed-save-' + row);
            if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '저장 중...'; }

            const data = {
                company: document.getElementById('ed-c-' + row).value.trim(),
                name: document.getElementById('ed-n-' + row).value.trim(),
                startPrice: document.getElementById('ed-p-' + row).value.trim(),
                note: (document.getElementById('ed-note-' + row) || {}).value || '',
                announce: (document.getElementById('ed-ann-' + row) || {}).value || '',
                checklist: gatherEditChecklist(container)
            };

            const photoKeys = ['photoItem', 'photoSire', 'photoDam', 'photoSibling'];
            const photosToUpload = [];
            const photoIndex = [];
            const ename = data.name || 'item';
            for (const k of photoKeys) {
                const input = document.getElementById('ed-ph-' + k + '-' + row);
                if (input && input.dataset.changed === 'true' && input.dataset.base64) {
                    photosToUpload.push({ base64: input.dataset.base64, filename: ename + '_' + k + '.jpg' });
                    photoIndex.push(k);
                }
            }

            if (photosToUpload.length > 0) {
                toast('사진 업로드 중...');
                try {
                    const urls = await new Promise((ok, ng) => {
                        google.script.run.withSuccessHandler(ok).withFailureHandler(ng).uploadPhotos(photosToUpload);
                    });
                    for (let i = 0; i < urls.length; i++) {
                        data[photoIndex[i]] = urls[i];
                    }
                } catch (e) {
                    toast('사진 업로드 실패: ' + e.message, true);
                    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '저장 완료'; }
                    return;
                }
            }

            // 부모개체 ID 읽기 + 사진 URL 동기화
            var edSireId = '', edDamId = '';
            var edSirePicker = document.getElementById('ed-pp-' + row + '-sire');
            var edDamPicker = document.getElementById('ed-pp-' + row + '-dam');
            if (edSirePicker) edSireId = edSirePicker.classList.contains('selected') ? (edSirePicker.dataset.parentId || '') : '';
            if (edDamPicker) edDamId = edDamPicker.classList.contains('selected') ? (edDamPicker.dataset.parentId || '') : '';

            // 부모 사진 URL을 data에 포함 (시트 H/I열 수식 동기화)
            if (!data.photoSire) {
                if (edSireId) {
                    var sp = parentCache.find(function (p) { return p.id === edSireId; });
                    if (sp && sp.photo) data.photoSire = sp.photo;
                } else {
                    data.photoSire = '';
                }
            }
            if (!data.photoDam) {
                if (edDamId) {
                    var dp = parentCache.find(function (p) { return p.id === edDamId; });
                    if (dp && dp.photo) data.photoDam = dp.photo;
                } else {
                    data.photoDam = '';
                }
            }

            google.script.run
                .withSuccessHandler(r => {
                    if (r && r.error) { clearAdminPw(); toast(r.error, true); if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '저장 완료'; } return; }
                    // 부모개체 ID 저장
                    google.script.run.updateParentIds(row, edSireId, edDamId);
                    toast('수정 완료');
                    closeBottomSheet();
                    loadList();
                })
                .withFailureHandler(e => {
                    toast('오류: ' + e.message, true);
                    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '저장 완료'; }
                })
                .updateItem(row, data, pw);
        }

        function toast(msg, err) {

        // ═══ 인쇄 탭 ═══
        function fmtPriceP(v) { if (!v && v !== 0) return ''; v = parseFloat(v); if (isNaN(v)) return String(v); return v === Math.floor(v) ? Math.floor(v) + '만' : v + '만'; }
        function fmtPhoneP(raw) {
            var ph = (raw || '').replace(/[^0-9]/g, '');
            if (ph.length === 8) ph = '010' + ph;
            if (ph.length === 11) return ph.slice(0, 3) + '-' + ph.slice(3, 7) + '-' + ph.slice(7);
            if (ph.length === 10) return ph.slice(0, 3) + '-' + ph.slice(3, 6) + '-' + ph.slice(6);
            return ph;
        }
        function parseWinnerP(str) {
            if (!str) return { name: '', phone: '' };
            var s = str.replace(/[\[\]]/g, '').trim();
            var m = s.match(/01[0-9][\-\.\s]?\d{3,4}[\-\.\s]?\d{4}/);
            if (m) { var phone = m[0].replace(/[\-\.\s]/g, ''); var rest = s.replace(m[0], '').replace(/[\/,\.\(\)]/g, ' ').replace(/\s+/g, ' ').trim(); return { name: rest, phone: phone }; }
            if (s.indexOf('/') >= 0) { var parts = s.split('/').map(function (p) { return p.trim(); }); for (var i = 0; i < parts.length; i++) { if (parts[i].replace(/[\-\.\s]/g, '').match(/^\d{7,}$/)) { var ph = parts.splice(i, 1)[0].replace(/[\-\.\s]/g, ''); return { name: parts.join(' / '), phone: ph }; } } return { name: s, phone: '' }; }
            return { name: s, phone: '' };
        }
        function pTraits(cl) {
            var gm = { M: '수컷', F: '암컷', U: '미구분' }, yn = { O: '있음', X: '없음' }, gr = { '1': '낮음', '2': '보통', '3': '양호', '4': '우수', '5': '최상' }, parts = [];
            if (cl.gender) parts.push(gm[cl.gender] || cl.gender); if (cl.weight) parts.push(cl.weight + 'g'); if (cl.birth) parts.push(cl.birth);
            if (cl.spot) parts.push('점:' + (yn[cl.spot] || cl.spot)); if (cl.pin) parts.push('풀핀:' + (yn[cl.pin] || cl.pin));
            ['도살:size', '월높이:wall', '색감:color', '활동성:activity', '먹이:feed', '체형:structure'].forEach(function (s) { var p = s.split(':'); if (cl[p[1]]) parts.push(p[0] + ':' + (gr[cl[p[1]]] || cl[p[1]])); });
            if (cl.memo) parts.push(cl.memo); return parts.join(' / ');
        }
        function pChecklist(str) { var cl = {}; if (!str) return cl; str.split('|').forEach(function (p) { var i = p.indexOf(':'); if (i > 0) cl[p.substring(0, i).trim()] = p.substring(i + 1).trim(); }); return cl; }
        function truncatePrintListName(name, maxChars) {
            var chars = Array.from(String(name || ''));
            if (chars.length <= maxChars) return chars.join('');
            return chars.slice(0, Math.max(0, maxChars - 1)).join('') + '…';
        }

        function buildRow(it, showCo) {
            var st = it.status || '', sc = '', sx = '';
            if (st.indexOf('낙찰') >= 0) { sc = 'color:#C84A31;'; sx = '낙찰'; }
            else if (st.indexOf('유찰') >= 0) { sc = 'color:#888;'; sx = '유찰'; }
            else if (st.indexOf('취소') >= 0) { sc = 'color:#888;'; sx = '취소'; }
            else if (st.indexOf('진행') >= 0) { sx = '진행중'; }
            var w = parseWinnerP(it.winner);
            var shortName = truncatePrintListName(it.name, 10);
            var r = '<tr>';
            r += '<td class="pnum">' + (it.num || '') + '</td>';
            if (showCo) r += '<td class="pcomp">' + (it.company || '') + '</td>';
            r += '<td class="pname">' + shortName + '</td>';
            r += '<td class="pprice">' + fmtPriceP(it.startPrice) + '</td>';
            r += '<td class="psold">' + (it.soldPrice ? fmtPriceP(it.soldPrice) : '') + '</td>';
            r += '<td class="pwinner" style="min-width:100px">' + w.name + '</td>';
            r += '<td class="pphone" style="min-width:120px">' + fmtPhoneP(w.phone) + '</td>';
            r += '<td class="pship"></td>';
            r += '<td class="pstatus" style="' + sc + '">' + sx + '</td>';
            r += '</tr>';
            return r;
        }

        function loadPrint() {
            var items = window._lastItems;
            if (!items || !items.length) {
                google.script.run.withSuccessHandler(function (data) { window._lastItems = data || []; renderPrint(data || []); }).getItems();
                return;
            }
            renderPrint(items);
        }

        function renderPrint(items) {
            var sold = items.filter(function (it) { return it.status && it.status.indexOf('낙찰') >= 0; });
            var unsold = items.filter(function (it) { return it.status && it.status.indexOf('유찰') >= 0; });
            var total = 0; sold.forEach(function (it) { total += parseFloat(it.soldPrice || 0) || 0; });
            var today = new Date(); var dateStr = today.getFullYear() + '.' + String(today.getMonth() + 1).padStart(2, '0') + '.' + String(today.getDate()).padStart(2, '0');

            // 경매 리스트
            document.getElementById('pl-meta').textContent = dateStr + ' · 총 ' + items.length + '개체';

            // 전화번호 → 아이템 맵 (낙찰만)

                selected = selected.filter(function (c) { return c !== company; });

        function renderPcView(selectedCo) {
            var d = window._pcData;
            if (!d) return;
            var items = d.items, phoneMap = d.phoneMap, dateStr = d.dateStr;
            var selectedCompanies = normalizePcCompanies(selectedCo);
            var hasCompanySelection = selectedCompanies.length > 0;
            var selectedCompanySet = {};
            selectedCompanies.forEach(function (company) { selectedCompanySet[company] = true; });
            selectedCo = selectedCompanies[0] || '';

            // 전체 낙찰 통계
            var allSold = items.filter(function (it) { return it.status && it.status.indexOf('낙찰') >= 0; });
            var totalAmt = 0; allSold.forEach(function (it) { totalAmt += parseFloat(it.soldPrice || 0) || 0; });

            // 메타 업데이트
            var meta = dateStr + ' · 전체 낙찰 ' + allSold.length + '건 / 유찰 ' + (items.length - allSold.length) + '건 · 총매출 ' + fmtPriceP(totalAmt);
            if (selectedCo) {
                var coItems = items.filter(function (it) { return (it.company || '').trim() === selectedCo; });
                var coSold = allSold.filter(function (it) { return (it.company || '').trim() === selectedCo; });
                var coUnsold = coItems.length - coSold.length;
                var coAmt = 0; coSold.forEach(function (it) { coAmt += parseFloat(it.soldPrice || 0) || 0; });
                meta = dateStr + ' · ' + selectedCo + ' 낙찰 ' + coSold.length + '건 / 유찰 ' + coUnsold + '건 · 매출 ' + fmtPriceP(coAmt) + ' | 전체 낙찰 ' + allSold.length + '건 · 총매출 ' + fmtPriceP(totalAmt);
            }
            document.getElementById('pc-meta').textContent = meta;

            // 낙찰 아이템만
            var sold = allSold;

            if (hasCompanySelection) {
                var companyRank = {};
                selectedCompanies.forEach(function (company, idx) { companyRank[company] = idx; });
                var selectedItems = items.filter(function (it) {
                    return !!selectedCompanySet[(it.company || '').trim()];
                });
                sold = allSold.filter(function (it) {
                    return !!selectedCompanySet[(it.company || '').trim()];
                });
                var selectedAmt = 0;
                sold.forEach(function (it) { selectedAmt += parseFloat(it.soldPrice || 0) || 0; });
                document.getElementById('pc-meta').textContent =
                    dateStr + ' · 업체 ' + selectedCompanies.join(', ') +
                    ' · 낙찰 ' + sold.length + '건 / 미낙찰 ' + (selectedItems.length - sold.length) +
                    '건 · 매출 ' + fmtPriceP(selectedAmt);

                sold.sort(function (a, b) {
                    var ca = (a.company || '').trim();
                    var cb = (b.company || '').trim();
                    var ra = companyRank[ca] !== undefined ? companyRank[ca] : 9999;
                    var rb = companyRank[cb] !== undefined ? companyRank[cb] : 9999;
                    if (ra !== rb) return ra - rb;
                    var na = parseInt(a.num, 10) || 99999;
                    var nb = parseInt(b.num, 10) || 99999;
                    if (na !== nb) return na - nb;
                    return String(a.name || '').localeCompare(String(b.name || ''));
                });

                var ch = '<div class="pc-wrapper" id="pc-wrapper">';
                ch += '<table class="ptable" id="pc-table"><thead><tr>';
                ch += '<th>업체</th><th>번호</th><th>이름</th><th>낙찰가</th><th>낙찰자</th><th>연락처</th><th>배송</th><th>상태</th>';
                ch += '</tr></thead><tbody>';
                sold.forEach(function (it) {
                    var w = parseWinnerP(it.winner);
                    var st = it.status || '';
                    var sx = st.indexOf('낙찰') >= 0 ? '낙찰' : st;
                    var shortName = truncatePrintListName(it.name, 10);
                    ch += '<tr class="pc-selected-row">';
                    ch += '<td class="pcomp" style="font-weight:700;white-space:nowrap;">' + esc((it.company || '').trim() || '(미입력)') + '</td>';
                    ch += '<td class="pnum">' + esc(it.num || '') + '</td>';
                    ch += '<td class="pname">' + esc(shortName) + '</td>';
                    ch += '<td class="psold">' + (it.soldPrice ? fmtPriceP(it.soldPrice) : '') + '</td>';
                    ch += '<td class="pwinner">' + esc(w.name) + '</td>';
                    ch += '<td class="pphone">' + esc(fmtPhoneP(w.phone)) + '</td>';
                    ch += '<td class="pship"></td>';
                    ch += '<td class="pstatus" style="color:#C84A31;">' + esc(sx) + '</td>';
                    ch += '</tr>';
                });
                if (!sold.length) {
                    ch += '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text3);">선택한 업체의 낙찰 결과가 없습니다</td></tr>';
                }
                ch += '</tbody></table></div>';
                document.getElementById('pc-body').innerHTML = ch;
                document.getElementById('pc-badge-info').innerHTML =
                    '<span class="pc-badge">업체선택 ' + selectedCompanies.length + '개</span>';
                return;
            }

            // 업체 필터 적용
            if (selectedCo) {
                // 선택 업체 낙찰자들의 전화번호 수집
                var selPhones = {};
                sold.forEach(function (it) {
                    if ((it.company || '').trim() === selectedCo) {
                        var w = parseWinnerP(it.winner);
                        var ph = (w.phone || '').replace(/[^0-9]/g, '');
                        if (ph) selPhones[ph] = true;
                    }
                });
                // 해당 전화번호의 모든 낙찰 아이템 (다른 업체 포함)
                sold = sold.filter(function (it) {
                    var w = parseWinnerP(it.winner);
                    var ph = (w.phone || '').replace(/[^0-9]/g, '');
                    return ph && selPhones[ph];
                });
            }

            // 전화번호 기준 그룹핑
            var phoneGroups = {}, phoneOrder = [];
            sold.forEach(function (it) {
                var w = parseWinnerP(it.winner);
                var ph = (w.phone || '').replace(/[^0-9]/g, '') || '_noPhone_' + it.num;
                if (!phoneGroups[ph]) { phoneGroups[ph] = { name: w.name, phone: w.phone, items: [] }; phoneOrder.push(ph); }
                phoneGroups[ph].items.push(it);
            });

            // 선택 업체 아이템을 그룹 내 상단에 배치
            if (selectedCo) {
                phoneOrder.forEach(function (ph) {
                    phoneGroups[ph].items.sort(function (a, b) {
                        var ca = (a.company || '').trim() === selectedCo ? 0 : 1;
                        var cb = (b.company || '').trim() === selectedCo ? 0 : 1;
                        return ca - cb;
                    });
                });
            }

            // 타업체 구매자 우선, 다건 구매자 다음, 단건 마지막
            phoneOrder.sort(function (a, b) {
                var ga = phoneGroups[a], gb = phoneGroups[b];
                var coA = {}, coB = {};
                ga.items.forEach(function (it) { coA[(it.company || '').trim()] = true; });
                gb.items.forEach(function (it) { coB[(it.company || '').trim()] = true; });
                var mcA = Object.keys(coA).length, mcB = Object.keys(coB).length;
                if (mcA !== mcB) return mcB - mcA; // 타업체 구매 우선
                return gb.items.length - ga.items.length; // 그 다음 다건 우선
            });

            // 테이블 생성
            var ch = '<div class="pc-wrapper" id="pc-wrapper">';
            ch += '<table class="ptable" id="pc-table"><thead><tr>';
            ch += '<th>낙찰자</th><th>연락처</th><th>업체</th><th>번호</th><th>이름</th><th>낙찰가</th><th>배송</th><th>상태</th>';
            ch += '</tr></thead><tbody>';

            var multiCount = 0;
            phoneOrder.forEach(function (ph) {
                var grp = phoneGroups[ph];
                var isMulti = grp.items.length >= 2;
                if (isMulti) multiCount++;

                grp.items.forEach(function (it, idx) {
                    var co = (it.company || '').trim() || '(미입력)';
                    var isOtherCo = selectedCo && co !== selectedCo;

                    var st = it.status || '', sc = '', sx = '';
                    if (st.indexOf('낙찰') >= 0) { sc = 'color:#C84A31;'; sx = '낙찰'; }

                    var cls = '';
                    if (isOtherCo) cls += 'pc-other-row';
                    else if (selectedCo) cls += 'pc-selected-row';

                    // 첫 행에 상단 간격 추가 (구매자 구분용)
                    var trStyle = '';
                    if (idx === 0) trStyle = 'border-top:6px solid #eee;';

                    ch += '<tr' + (cls ? ' class="' + cls.trim() + '"' : '') + (trStyle ? ' style="' + trStyle + '"' : '') + '>';

                    // 첫 행에만 낙찰자+연락처 rowspan
                    if (idx === 0) {
                        ch += '<td rowspan="' + grp.items.length + '" class="pwinner" style="font-weight:700;vertical-align:middle;text-align:center;">' + grp.name + '</td>';
                        ch += '<td rowspan="' + grp.items.length + '" class="pphone" style="vertical-align:middle;text-align:center;">' + fmtPhoneP(grp.phone) + '</td>';
                    }

                    var compStyle = isOtherCo ? 'color:#999;' : 'font-weight:700;';
                    var shortName = truncatePrintListName(it.name, 10);
                    ch += '<td class="pcomp" style="' + compStyle + 'white-space:nowrap;">' + co + '</td>';
                    ch += '<td class="pnum">' + (it.num || '') + '</td>';
                    ch += '<td class="pname">' + shortName + '</td>';
                    ch += '<td class="psold">' + (it.soldPrice ? fmtPriceP(it.soldPrice) : '') + '</td>';
                    ch += '<td class="pship"></td>';
                    ch += '<td class="pstatus" style="' + sc + '">' + sx + '</td>';
                    ch += '</tr>';
                });
            });

            if (!sold.length) {
                ch += '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text3);">낙찰 결과가 없습니다</td></tr>';
            }

            ch += '</tbody></table></div>';
            document.getElementById('pc-body').innerHTML = ch;

            // 배지
            document.getElementById('pc-badge-info').innerHTML = multiCount > 0
                ? '<span class="pc-badge">⚠ 동일구매자 ' + multiCount + '명</span>' : '';
        }

        function applyPrintSettings() {

        // ── 컨럼 리사이즈 시스템 (localStorage 저장/복원) ──
        var COLW_KEY = 'print_col_widths';
        function saveColWidths() {
            var data = {};
            ['plist', 'presult', 'pcompany'].forEach(function (id) {
                var sec = document.getElementById('print-sub-' + id);
                if (!sec) return;
                var tbl = sec.querySelector('.ptable');
                if (!tbl) return;
                var ws = [];
                tbl.querySelectorAll('thead th').forEach(function (th) { ws.push(th.style.width || ''); });
                data[id] = ws;
            });
            try { localStorage.setItem(COLW_KEY, JSON.stringify(data)); } catch (e) { }
        }
        function restoreColWidths() {
            try {
                var raw = localStorage.getItem(COLW_KEY);
                if (!raw) return false;
                var data = JSON.parse(raw);
                var applied = false;
                ['plist', 'presult', 'pcompany'].forEach(function (id) {
                    if (!data[id]) return;
                    var sec = document.getElementById('print-sub-' + id);
                    if (!sec) return;
                    var tables = sec.querySelectorAll('.ptable');
                    tables.forEach(function (tbl) {
                        var ths = tbl.querySelectorAll('thead th');
                        if (ths.length !== data[id].length) return;
                        lockPTable(tbl);
                        data[id].forEach(function (w, i) { if (w) ths[i].style.width = w; });
                        applied = true;
                    });
                });
                return applied;
            } catch (e) { return false; }
        }
        function initPrintResize() {
            document.querySelectorAll('#tab-print .ptable th').forEach(function (th) {
                if (th.querySelector('.rh')) return;
                var h = document.createElement('div');
                h.className = 'rh';
                th.appendChild(h);
                // 드래그: 컨럼 폭 조절
                h.addEventListener('mousedown', function (e) {
                    e.preventDefault(); e.stopPropagation();
                    var tbl = th.closest('table');
                    var colIdx = Array.from(th.parentNode.children).indexOf(th);
                    lockPTable(tbl);
                    var startX = e.pageX, startW = th.offsetWidth;
                    function onMove(ev) {
                        var w = Math.max(10, startW + ev.pageX - startX);
                        th.style.width = w + 'px';
                        syncPCompany(th, colIdx, w + 'px');
                    }
                    function onUp() { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); saveColWidths(); }
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
                // 더블클릭: 내용에 맞게 auto-fit (업체별은 전체 테이블 중 최대값)
                h.addEventListener('dblclick', function (e) {
                    e.preventDefault();
                    var tbl = th.closest('table');
                    var colIdx = Array.from(th.parentNode.children).indexOf(th);
                    var sec = th.closest('#print-sub-pcompany');
                    var w;
                    if (sec) {
                        w = 0;
                        sec.querySelectorAll('.ptable').forEach(function (t) {
                            w = Math.max(w, measurePCol(t, colIdx));
                        });
                    } else {
                        w = measurePCol(tbl, colIdx);
                    }
                    lockPTable(tbl);
                    th.style.width = w + 'px';
                    syncPCompany(th, colIdx, w + 'px');
                    saveColWidths();
                });
            });
            // 저장된 폭이 있으면 복원, 없으면 오토핏
            if (!restoreColWidths()) autoFitAllColumns();
            // 글씨/행높이 복원
            restorePrintSettings();
        }
        function autoFitAllColumns() {
            ['plist', 'presult', 'pcompany'].forEach(function (id) {
                var sec = document.getElementById('print-sub-' + id);
                if (!sec) return;
                var tables = sec.querySelectorAll('.ptable');
                if (!tables.length) return;
                var colCount = tables[0].querySelectorAll('thead th').length;
                for (var ci = 0; ci < colCount; ci++) {
                    var maxW = 0;
                    tables.forEach(function (t) { maxW = Math.max(maxW, measurePCol(t, ci)); });
                    tables.forEach(function (t) {
                        lockPTable(t);
                        var th = t.querySelectorAll('thead th')[ci];
                        if (th) th.style.width = maxW + 'px';
                    });
                }
            });
            saveColWidths();
        }
        function lockPTable(tbl) {
            if (tbl.dataset.locked) return;
            var ths = Array.from(tbl.querySelectorAll('thead th'));
            var widths = ths.map(function (h) { return h.offsetWidth; });
            tbl.style.width = tbl.offsetWidth + 'px';
            tbl.style.tableLayout = 'fixed';
            ths.forEach(function (h, i) { h.style.width = widths[i] + 'px'; });
            tbl.dataset.locked = '1';
        }
        function measurePCol(tbl, colIdx) {
            var span = document.createElement('span');
            span.style.cssText = 'position:absolute;visibility:hidden;white-space:nowrap;font:inherit;padding:0 8px;';
            document.body.appendChild(span);
            var max = 0;
            var th = tbl.querySelectorAll('thead th')[colIdx];
            if (th) { span.textContent = th.textContent; max = Math.max(max, span.offsetWidth); }
            tbl.querySelectorAll('tbody tr').forEach(function (tr) {
                var td = tr.children[colIdx];
                if (td) { span.textContent = td.textContent; max = Math.max(max, span.offsetWidth); }
            });
            document.body.removeChild(span);
            return Math.max(max + 4, 20);
        }
        function syncPCompany(th, colIdx, widthStr) {

        //  한글 초성 검색 엔진
        // ══════════════════════════════════════
        const CHO = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];

        function getChosung(str) {
            let r = '';
            for (let i = 0; i < str.length; i++) {
                const c = str.charCodeAt(i);
                if (c >= 0xAC00 && c <= 0xD7A3) r += CHO[Math.floor((c - 0xAC00) / 588)];
                else r += str[i];
            }
            return r;
        }

        function isChosung(str) {
            return /^[ㄱ-ㅎ]+$/.test(str);
        }

        // 검색 점수 계산
        function scoreMatch(d, words) {
            const fields = [
                { v: d.shop, w: 3 },     // 지점명 가중치 높음
                { v: d.sub, w: 2 },       // 소분류
                { v: d.region, w: 2 },    // 대분류
                { v: d.route, w: 1 }      // 노선
            ];
            let total = 0;
            let allFound = true;

            for (const word of words) {
                let wordScore = 0;
                const isCho = isChosung(word);

                for (const f of fields) {
                    const val = f.v.toLowerCase();
                    if (isCho) {
                        // 초성 매칭
                        const cho = getChosung(f.v);
                        if (cho.includes(word)) wordScore = Math.max(wordScore, 30 * f.w);
                    }
                    if (val === word) wordScore = Math.max(wordScore, 100 * f.w);       // 정확 일치
                    else if (val.startsWith(word)) wordScore = Math.max(wordScore, 80 * f.w); // 시작 일치
                    else if (val.includes(word)) wordScore = Math.max(wordScore, 50 * f.w);   // 포함
                }
                if (wordScore === 0) allFound = false;
                total += wordScore;
            }
            return allFound ? total : 0;
        }

        let _dodosiTimer = null;

        function _filterDodosiCore() {
            const q = (document.getElementById('dodosi-search').value || '').trim().toLowerCase();
            const list = document.getElementById('dodosi-list');
            if (!dodosiCache || dodosiCache.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text3);font-size:13px;">데이터 없음</div>';
                return;
            }
            let base = dodosiCache;
            if (dodosiActiveRoute) base = base.filter(d => d.route === dodosiActiveRoute);
            if (!q) { list.innerHTML = renderDodosiGroup(base, q, false); return; }

            // 단어 분리 + 점수 매칭
            const words = q.split(/\s+/).filter(w => w);
            const scored = [];
            for (const d of base) {
                const s = scoreMatch(d, words);
                if (s > 0) scored.push({ d, s });
            }
            scored.sort((a, b) => b.s - a.s);
            const exact = scored.map(x => x.d);

            // 지리적 근접 추천
            let nearby = [];
            let geoRoutes = [];
            for (const w of words) geoRoutes.push(...findRoutesByLocation(w));
            geoRoutes = [...new Set(geoRoutes)];

            if (exact.length <= 5 || exact.length === 0) {
                if (exact.length > 0) {
                    const mr = [...new Set(exact.map(d => d.route))];
                    geoRoutes = [...new Set([...mr, ...geoRoutes])];
                }
                if (geoRoutes.length > 0) {
                    nearby = base.filter(d => geoRoutes.includes(d.route) && !exact.includes(d));
                }
            }

            if (exact.length === 0 && nearby.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text3);font-size:13px;">검색 결과 없음</div>';
                return;

            let html = '';

                html += '<span class="material-symbols-rounded" style="font-size:14px;">search</span>';

                html += '</div>';
                html += renderDodosiGroup(exact, q, false);

                    html += '<div style="margin-top:20px;padding:10px 4px 6px;font-size:12px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:4px;">';
                    html += '<span class="material-symbols-rounded" style="font-size:16px;">near_me</span> 같은 노선 근처 지점</div>';
                    html += renderDodosiGroup(nearby, q, true);
                }
            } else {
                // 직접 매칭 없음 → 지리적 결과를 메인으로 (밝게)
                html += '<div style="font-size:12px;color:var(--text2);padding:4px 4px 10px;display:flex;align-items:center;gap:4px;">';
                html += '<span class="material-symbols-rounded" style="font-size:16px;">near_me</span>';

                html += '</div>';
                html += renderDodosiGroup(nearby, q, false);
            }
            list.innerHTML = html;
        }

        function findRoutesByLocation(query) {
            const scored = [];
            for (const route in GEO_MAP) {
                let best = 0;
                for (const city of GEO_MAP[route]) {
                    let s = 0;
                    if (city === query) s = 100;                          // 정확 일치
                    else if (query.startsWith(city)) s = 80;              // "성북구".startsWith("성북") → 서울B
                    else if (city.startsWith(query)) s = 60;              // "성".startsWith... 부분 매칭
                    else if (city.includes(query) && query.length >= 2) s = 40;
                    // query.includes(city)는 오탐 많아서 제외 ("성북구"에 "북구" 걸림)
                    if (s > best) best = s;
                }
                if (best > 0) scored.push({ route, score: best });
            }
            scored.sort((a, b) => b.score - a.score);
            return scored.map(s => s.route);
        }

        function highlightMatch(text, q) {
            if (!q) return esc(text);

            return safe.substring(0, idx) + '<mark style="background:#FFF3CD;border-radius:2px;padding:0 1px;">' + safe.substring(idx, idx + q.length) + '</mark>' + safe.substring(idx + q.length);

        function renderBracketTree() {
            const container = document.getElementById('bracket-tree');
            container.innerHTML = '';
            
            const rounds = [];
            let r = tournamentScale;
            while (r >= 2) {
                rounds.push(r);
                r = r / 2;
            }
            
            // 각 라운드별 컬럼 생성
            rounds.forEach(round => {
                const col = document.createElement('div');
                col.className = 'bracket-round-column';
                
                const matchCount = round / 2;
                for (let i = 1; i <= matchCount; i++) {
                    const matchKey = round + '_' + i;
                    const match = getMatchData(tournamentScale, matchKey);
                    
                    const node = document.createElement('div');
                    node.className = 'bracket-match-node';
                    node.id = 'node-' + matchKey;
                    if (currentEditingMatchKey === matchKey) {
                        node.classList.add('active-match');
                    }
                    
                    const titleText = (round === 2) ? '결승전' : (round === 4 ? '준결승 ' + i + '조' : (round === 8 ? '8강 ' + i + '조' : '16강 ' + i + '조'));

                        </div>
                        <div class="match-slot ${match.winner === 'right' ? 'winner-slot' : ''}" 
                             ondragover="onDragOverSlot(event)" 
                             ondragleave="onDragLeaveSlot(event)" 
                             ondrop="onDropOnSlot(event, '${matchKey}', 'right')"

        }

        function getMatchData(scale, matchKey) {
            const data = tournamentBrackets[scale];
            if (!data.matches) data.matches = {};
            if (!data.matches[matchKey]) {
                data.matches[matchKey] = { left: '', right: '', winner: '' };
            }
            return data.matches[matchKey];
        }

        function onDragOverSlot(e) {
            e.preventDefault();
            e.currentTarget.classList.add('dragover');
        }

        function onDragLeaveSlot(e) {
            e.currentTarget.classList.remove('dragover');
        }

        function onDropOnSlot(e, matchKey, slot) {
            e.preventDefault();
            e.currentTarget.classList.remove('dragover');
            const team = e.dataTransfer.getData('text/plain');
            if (!team) return;
            
            const match = getMatchData(tournamentScale, matchKey);
            match[slot] = team;
            
            // 만약 승자가 이미 정해져 있었는데 팀이 바뀌었다면 승자 초기화 및 부모 슬롯 초기화
            if (match.winner) {
                match.winner = '';
                propagateWinner(tournamentScale, matchKey, '');
            }
            
            renderBracketTree();
        }

        function clearMatchSlot(e, matchKey, slot) {
            e.stopPropagation(); // div 클릭 이벤트 전파 방지
            const match = getMatchData(tournamentScale, matchKey);
            match[slot] = '';
            if (match.winner) {
                match.winner = '';
                propagateWinner(tournamentScale, matchKey, '');
            }
            renderBracketTree();
        }

        function selectWinnerClick(matchKey, slot) {
            // 슬롯 클릭 시 수동으로 승자 마킹 (단, 팀 정보가 입력되어 있을 때만)
            const match = getMatchData(tournamentScale, matchKey);
            if (!match[slot]) return;
            
            match.winner = (match.winner === slot) ? '' : slot; // 토글
            const winningTeam = match.winner ? match[slot] : '';
            
            propagateWinner(tournamentScale, matchKey, winningTeam);
            renderBracketTree();
            
            if (currentEditingMatchKey === matchKey) {
                selectMatchForControl(matchKey);
            }
        }

        // 승자 진출 전파
        function propagateWinner(scale, matchKey, winningTeam) {
            const parts = matchKey.split('_');
            const round = parseInt(parts[0]);
            const matchIdx = parseInt(parts[1]);
            
            const parent = getParentMatchSlot(round, matchIdx);
            if (parent) {
                const parentMatch = getMatchData(scale, parent.key);
                parentMatch[parent.slot] = winningTeam;
                // 부모 노드에 새 팀이 배치되면 부모의 기존 승자도 초기화
                if (parentMatch.winner) {
                    parentMatch.winner = '';
                    propagateWinner(scale, parent.key, '');
                }
            }
        }

        function getParentMatchSlot(round, matchIdx) {
            const parentRound = round / 2;
            if (parentRound < 2) return null;
            const parentMatchIdx = Math.ceil(matchIdx / 2);
            const slot = (matchIdx % 2 === 1) ? 'left' : 'right';
            return { key: parentRound + '_' + parentMatchIdx, slot: slot };
        }

        function resetBracket() {
            if (!confirm('대진표를 초기화하시겠습니까?')) return;
            tournamentBrackets[tournamentScale] = { matches: {} };
            renderBracketTree();
            document.getElementById('bracket-match-controller').style.display = 'none';
        }

        function randomFillBracket() {
            // 참가 팀 목록 랜덤 셔플 후 순서대로 1라운드(가장 왼쪽 라운드)에 배치
            google.script.run
                .withSuccessHandler(function (items) {
                    const teams = [...new Set((items || []).map(i => i.company).filter(Boolean))];
                    if (teams.length === 0) {
                        alert('등록된 경매 개체의 업체명이 없습니다.');
                        return;
                    }
                    
                    // 셔플
                    for (let i = teams.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [teams[i], teams[j]] = [teams[j], teams[i]];
                    }
                    
                    // 브래킷 초기화 후 1라운드 슬롯 채우기
                    tournamentBrackets[tournamentScale] = { matches: {} };
                    const matchCount = tournamentScale / 2;
                    
                    for (let i = 1; i <= matchCount; i++) {
                        const matchKey = tournamentScale + '_' + i;
                        const match = getMatchData(tournamentScale, matchKey);
                        match.left = teams.pop() || '';
                        match.right = teams.pop() || '';
                    }
                    renderBracketTree();
                })
                .withFailureHandler(function (err) {
                    alert('팀 목록 조회 실패: ' + err.message);
                })
                .getItems();
        }

        function saveBracket() {
            const payload = {};
            payload['tournament_bracket_' + tournamentScale] = JSON.stringify(tournamentBrackets[tournamentScale]);
            
            google.script.run
                .withSuccessHandler(function () {
                    toast(tournamentScale + '강 대진표가 저장되었습니다.');
                })
                .withFailureHandler(function (err) {
                    toast('대진표 저장 실패: ' + err.message, true);
                })
                .updateConfigs(payload);
        }

        function changeActiveTournament(val) {
            activeTournament = val;
            google.script.run
                .withSuccessHandler(function () {
                    toast('송출 모드가 변경되었습니다: ' + (val === 'none' ? '비송출' : val + '강 송출'));
                })
                .withFailureHandler(function (err) {
                    toast('송출 모드 갱신 실패: ' + err.message, true);
                })
                .updateConfigs({ active_tournament: val });
        }

        // 매치 진행 제어판 구현
        function selectMatchForControl(matchKey) {
            currentEditingMatchKey = matchKey;
            
            // 모든 대진 노드 하이라이트 해제 후 선택된 것만 하이라이트
            document.querySelectorAll('.bracket-match-node').forEach(node => {
                node.classList.remove('active-match');
            });
            const node = document.getElementById('node-' + matchKey);
            if (node) node.classList.add('active-match');
            
            const match = getMatchData(tournamentScale, matchKey);
            const ctrl = document.getElementById('bracket-match-controller');
            ctrl.style.display = 'block';
            
            const parts = matchKey.split('_');
            const round = parseInt(parts[0]);
            const i = parseInt(parts[1]);
            const titleText = (round === 2) ? '결승전' : (round === 4 ? '준결승 ' + i + '조' : (round === 8 ? '8강 ' + i + '조' : '16강 ' + i + '조'));
            
            document.getElementById('ctrl-match-title').textContent = titleText + ' 진행 및 자막 제어';
            document.getElementById('ctrl-left-team').textContent = match.left || '(대기중)';
            document.getElementById('ctrl-right-team').textContent = match.right || '(대기중)';
            
            // 현재 저장된 스코어 불러와서 셀렉트박스 설정
            google.script.run
                .withSuccessHandler(function (map) {
                    const scoreKey = 'score_' + tournamentScale + '_' + matchKey;
                    let scores = { r1: '', r2: '', r3: '', r4: '' };
                    if (map && map[scoreKey]) {
                        try { scores = JSON.parse(map[scoreKey]); } catch(e){}
                    }
                    document.getElementById('score-r1').value = scores.r1 || '';
                    document.getElementById('score-r2').value = scores.r2 || '';
                    document.getElementById('score-r3').value = scores.r3 || '';
                    document.getElementById('score-r4').value = scores.r4 || '';
                    calculateCumulativeScore(scores);
                })
                .withFailureHandler(function () {
                    calculateCumulativeScore({ r1: '', r2: '', r3: '', r4: '' });
                })
                .getConfigMap();
        }

        function updateMatchScore() {
            if (!currentEditingMatchKey) return;
            const r1 = document.getElementById('score-r1').value;
            const r2 = document.getElementById('score-r2').value;
            const r3 = document.getElementById('score-r3').value;
            const r4 = document.getElementById('score-r4').value;
            
            const scores = { r1, r2, r3, r4 };
            calculateCumulativeScore(scores);
            
            const scoreKey = 'score_' + tournamentScale + '_' + currentEditingMatchKey;
            const payload = {};
            payload[scoreKey] = JSON.stringify(scores);
            
            google.script.run
                .withSuccessHandler(function () {
                    toast('매치 스코어가 저장되었습니다.');
                })
                .withFailureHandler(function (err) {
                    toast('스코어 저장 실패: ' + err.message, true);
                })
                .updateConfigs(payload);
        }

        function calculateCumulativeScore(scores) {
            let leftScore = 0;
            let rightScore = 0;
            ['r1', 'r2', 'r3', 'r4'].forEach(r => {
                if (scores[r] === 'left') leftScore++;
                else if (scores[r] === 'right') rightScore++;
            });
            document.getElementById('ctrl-score-text').textContent = leftScore + ' : ' + rightScore;
        }

        function setMatchStatus(status) {
            if (!currentEditingMatchKey) {
                alert('대진표에서 먼저 경기를 선택(타이틀 클릭)해주세요.');
                return;
            }
            
            const payload = {
                battle_current_match: tournamentScale + '_' + currentEditingMatchKey,
                battle_state: status
            };
            
            google.script.run
                .withSuccessHandler(function () {
                    const statusMap = {
                        'start': '경기 시작 송출',
                        'r1_end': '1R 종료 송출',
                        'r2_end': '2R 종료 송출',
                        'r3_end': '3R 종료 송출',
                        'r4_ready': '대장전 준비 송출',
                        'r4_end': '대장전 종료 송출',
                        'final_reveal': '최종 결과 및 업체명 송출!'
                    };
                    toast('오버레이 상태가 변경되었습니다: ' + statusMap[status]);
                })
                .withFailureHandler(function (err) {
                    toast('상태 전환 실패: ' + err.message, true);
                })
                .updateConfigs(payload);
        }

        // 초기화
        try {
            loadParents();
            addEntry();
            loadList();
            // 도도시 데이터 백그라운드 프리로드 (탭 클릭 전에 미리 가져오기)
            google.script.run
                .withSuccessHandler(function (r) {
                    if (r && r.success) {
                        dodosiCache = r.data || [];
                    }
                })
                .withFailureHandler(function () { /* 프리로드 실패는 무시 — 탭 클릭 시 재시도 */ })
                .getDodosiData();
        } catch (initErr) {
            document.getElementById('item-list').innerHTML = '<div style="color:red;padding:20px;">초기화 오류: ' + initErr.message + '</div>';
        }
    </script>
    <!-- 부모 선택 팝업 -->
    <div class="pp-popup-overlay" id="pp-popup-overlay" onclick="if(event.target===this)closeParentPopup()">
        <div class="pp-popup">
            <div class="pp-popup-header">
                <span class="pp-popup-title" id="pp-popup-title">부개체 선택</span>
                <button class="pp-popup-close" onclick="closeParentPopup()">✕</button>
            </div>
            <div class="pp-grid" id="pp-popup-grid"></div>
        </div>
    </div>

    <!-- 부모개체 관리 모달 -->
    <div class="parent-modal-overlay" id="parent-modal-overlay" onclick="if(event.target===this)closeParentModal()">
        <div class="parent-modal">
            <div class="pm-header">
                <h3>부모개체 관리</h3>
                <button class="pm-close" onclick="closeParentModal()">✕</button>
            </div>
            <div id="pm-entries"></div>
            <div style="padding:0 16px;">
                <button class="add-btn" style="margin-bottom:8px;" onclick="addPmEntry()">+ 부모개체 행 추가</button>
                <button class="pm-add-btn" style="margin-bottom:12px;" onclick="submitParentsBatch()">일괄 등록</button>
            </div>
            <div class="pm-list-title">등록된 부모개체</div>
            <div class="pm-grid" id="pm-list"></div>
        </div>
    </div>
