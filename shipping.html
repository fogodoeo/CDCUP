<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CDCUP - 배송/수령 정보 등록</title>
    <script src="supabase-bridge.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard-dynamic-subset.css" />
    <style>
        /* ══════════════════════════════════════
           PREMIUM OBSIDIAN SPACE GLASS DESIGN SYSTEM
           (VERCEL / LINEAR STYLE / DARK GLASSMORPHISM)
           ══════════════════════════════════════ */
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.css");

        :root {
            --font-pretendard: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            --bg: #05070B; /* Deep Space Black */
            --bg-gradient: radial-gradient(circle at 50% 0%, #111A2E 0%, #05070B 70%);
            --card: rgba(13, 18, 30, 0.7); /* Frosted Glass Obsidian */
            --text-title: #FFFFFF; /* Glowing Pure White */
            --text: #E2E8F0; /* Soft Silver */
            --text-secondary: #94A3B8; /* Cool Grey */
            --accent: #3182F6; /* Cyber Neon Blue */
            --accent-hover: #60A5FA;
            --accent-light: rgba(49, 130, 246, 0.1);
            --border: rgba(255, 255, 255, 0.08); /* Frosted glass border */
            --radius: 24px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 16px 48px rgba(0, 0, 0, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-pretendard);
            background: var(--bg);
            background-image: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.3px;
        }

        .container {
            width: 100%;
            max-width: 740px;
            transition: max-width 0.3s ease;
        }

        body.admin-mode .container {
            max-width: 1350px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-title);
            letter-spacing: -0.8px;
            background: linear-gradient(135deg, #FFFFFF 0%, #94A3B8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .header p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
            font-weight: 500;
        }

        /* Glassmorphic Obsidian Card */
        .card {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 28px;
            box-shadow: var(--shadow);
            margin-bottom: 28px;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            padding-left: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Styled inputs */
        .input-text, .select-custom {
            padding: 12px 18px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            font-family: inherit;
            background: rgba(10, 15, 26, 0.6);
            color: #FFFFFF;
            width: 100%;
            transition: all 0.2s ease;
        }

        .input-text:focus, .select-custom:focus {
            border-color: var(--accent);
            background: rgba(10, 15, 26, 0.9);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        /* Buttons with gradients and neon shadows */
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
            color: white;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.25);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
            background: linear-gradient(135deg, #60A5FA 0%, #2563EB 100%);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #E2E8F0;
            border: 1px solid var(--border);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #FFFFFF;
            border-color: rgba(255, 255, 255, 0.2);
            transform: none;
            box-shadow: none;
        }

        .btn-full {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            border-radius: 16px;
        }

        /* Table Design */
        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 28px;
            background: var(--card);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
        }

        .grid-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: left;
        }

        .grid-table th {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
            font-weight: 700;
            padding: 16px;
            border-bottom: 1.5px solid var(--border);
            white-space: nowrap;
            letter-spacing: 0.5px;
            font-size: 13px;
        }

        .grid-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            color: #E2E8F0;
        }

        .grid-table tr:last-child td {
            border-bottom: none;
        }

        .grid-table tr:hover {
            background: rgba(255, 255, 255, 0.01);
        }

        /* Badges */
        .combined-shipping-badge {
            font-size: 11px;
            color: #F59E0B;
            background: rgba(245, 158, 11, 0.15);
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 700;
            display: inline-block;
            margin-top: 4px;
            border: 1px solid rgba(245, 158, 11, 0.25);
        }

        .price-shipping {
            font-weight: 700;
            color: #60A5FA;
        }

        .price-total {
            font-weight: 900;
            color: #EF4444;
            font-size: 15px;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.15);
        }

        /* Buyer UI option tabs */
        .buyer-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.02);
            font-weight: 600;
        }

        .buyer-shipping-options {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .buyer-option-btn {
            padding: 16px 8px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            font-size: 14px;
            font-weight: 700;
            color: var(--text-secondary);
            cursor: pointer;
            text-align: center;
            transition: all 0.25s ease;
        }

        .buyer-option-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: #FFFFFF;
        }

        .buyer-option-btn.active {
            border-color: var(--accent);
            background: var(--accent-light);
            color: #FFFFFF;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .buyer-form-detail {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .buyer-form-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(13, 18, 30, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            z-index: 5000;
            opacity: 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.35s cubic-bezier(0.32, 0.94, 0.6, 1), opacity 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 7, 11, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 4000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Status Pills (Glassmorphic Badges) */
        .status-select {
            font-weight: 700 !important;
            border-radius: 20px !important;
            padding: 6px 12px !important;
            font-size: 12px !important;
            border: none !important;
            cursor: pointer;
            text-align: center;
            text-align-last: center;
            outline: none;
            transition: all 0.25s ease;
        }
        .status-select.status-waiting {
            background-color: rgba(148, 163, 184, 0.15) !important;
            color: #94A3B8 !important;
            border: 1px solid rgba(148, 163, 184, 0.25) !important;
        }
        .status-select.status-contacted {
            background-color: rgba(99, 102, 241, 0.15) !important;
            color: #818CF8 !important;
            border: 1px solid rgba(99, 102, 241, 0.3) !important;
        }
        .status-select.status-paid {
            background-color: rgba(16, 185, 129, 0.15) !important;
            color: #34D399 !important;
            border: 1px solid rgba(16, 185, 129, 0.3) !important;
        }

        /* Region Categories Quick Tabs */
        .modal-regions-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
            margin-bottom: 8px;
        }

        .region-tab-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .region-tab-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #FFFFFF;
            border-color: rgba(255, 255, 255, 0.12);
        }

        .region-tab-btn.active {
            background: rgba(49, 130, 246, 0.15);
            color: #FFFFFF;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(49, 130, 246, 0.2);
        }

        /* Premium Modal Overlays (Toss Bottom Sheets) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 7, 11, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease-out;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #0D121E;
            border: 1px solid var(--border);
            border-radius: 28px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            max-height: 80vh;
            transform: scale(0.95);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .bottom-sheet-handle {
            display: none;
        }

        .modal-header {
            padding: 22px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-title);
            margin: 0;
            letter-spacing: -0.3px;
        }

        .modal-close-btn {
            background: transparent;
            border: none;
            font-size: 32px;
            font-weight: 200;
            color: var(--text-secondary);
            cursor: pointer;
            line-height: 1;
            padding: 0;
            transition: color 0.2s;
        }
        .modal-close-btn:hover {
            color: var(--text-title);
        }

        .modal-body {
            padding: 28px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-results-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 380px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px;
            background: rgba(5, 7, 11, 0.5);
        }

        .search-item {
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            background: rgba(255, 255, 255, 0.02);
            box-shadow: none;
            transition: all 0.2s ease;
        }
        .search-item:hover {
            background: rgba(255, 255, 255, 0.08) !important;
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .search-item-region {
            font-size: 11px;
            font-weight: 800;
            color: #FFFFFF;
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 10px;
            border-radius: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }
        .form-group label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ══════════════════════════════════════
           MOBILE COLLAPSIBLE CARD VIEW & BOTTOM SHEET
           ══════════════════════════════════════ */
        @media (max-width: 768px) {
            body {
                padding: 24px 8px;
            }

            .container {
                padding: 0 4px;
            }

            .card {
                padding: 20px;
                border-radius: 20px;
            }

            .control-row {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }

            .control-row > * {
                width: 100% !important;
                margin-top: 0 !important;
            }

            /* 슬라이드 업 바텀시트 변환 */
            .modal-overlay {
                align-items: flex-end;
                padding: 0;
            }

            .modal-content {
                max-width: 100%;
                border-radius: 28px 28px 0 0;
                transform: translateY(100%);
                max-height: 85vh;
                background: #0D121E;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                border-left: none;
                border-right: none;
                border-bottom: none;
                transition: transform 0.28s cubic-bezier(0.32, 0.94, 0.6, 1);
            }
            .modal-overlay.active .modal-content {
                transform: translateY(0);
            }

            .bottom-sheet-handle {
                display: block;
                width: 44px;
                height: 5px;
                background: rgba(255, 255, 255, 0.15);
                border-radius: 3px;
                margin: 12px auto 0;
                flex-shrink: 0;
            }

            /* Winner List Grid */
            .winner-list-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
                gap: 20px;
                width: 100%;
                margin-bottom: 32px;
            }

            /* Winner Summary Card */
            .winner-card {
                background: var(--card);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 22px;
                box-shadow: var(--shadow);
                cursor: pointer;
                display: flex;
                flex-direction: column;
                gap: 12px;
                position: relative;
                transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .winner-card:hover {
                border-color: rgba(255, 255, 255, 0.15);
                box-shadow: var(--shadow-md);
                transform: translateY(-2px);
            }

            .winner-card-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 1.5px solid rgba(255, 255, 255, 0.04);
                padding-bottom: 8px;
            }

            .winner-card-name {
                font-size: 15.5px;
                font-weight: 800;
                color: var(--text-title);
            }

            .winner-card-phone {
                font-size: 12px;
                color: var(--text-secondary);
                font-weight: 500;
            }

            .winner-card-body {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
                min-height: 28px;
            }

            .gecko-tag {
                font-size: 11px;
                font-weight: 700;
                color: #A5B4FC;
                background: rgba(99, 102, 241, 0.12);
                border: 1px solid rgba(99, 102, 241, 0.2);
                padding: 3px 8px;
                border-radius: 10px;
                display: inline-flex;
                align-items: center;
                gap: 4px;
            }

            .winner-card-footer {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 4px;
            }

            .winner-card-shipping-summary {
                font-size: 12px;
                font-weight: 700;
                color: var(--text-secondary);
                display: flex;
                align-items: center;
                gap: 4px;
            }

            .winner-card-price {
                font-size: 16px;
                font-weight: 900;
                color: #FFFFFF;
            }

            /* Segmented Controller for shipping types inside modal */
            .segmented-control {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                background: rgba(10, 15, 26, 0.8);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 4px;
                width: 100%;
            }

            .segmented-btn {
                background: transparent;
                border: none;
                border-radius: 12px;
                color: var(--text-secondary);
                font-size: 12.5px;
                font-weight: 700;
                padding: 12px 6px;
                cursor: pointer;
                transition: all 0.2s ease;
                text-align: center;
            }

            .segmented-btn:hover {
                color: #FFFFFF;
            }

            .segmented-btn.active {
                background: var(--accent);
                color: #FFFFFF;
                box-shadow: 0 4px 12px rgba(49, 130, 246, 0.3);
            }

            /* List of geckos in detail editor */
            .modal-gecko-list {
                display: flex;
                flex-direction: column;
                gap: 6px;
                background: rgba(5, 7, 11, 0.4);
                border: 1px solid var(--border);
                border-radius: 18px;
                padding: 12px;
                margin-bottom: 8px;
            }

            .modal-gecko-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 13px;
                font-weight: 600;
                padding: 4px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            }
            .modal-gecko-item:last-child {
                border-bottom: none;
            }

            /* 인풋 필드 모바일 최적화 */
            .input-text, .select-custom {
                padding: 10px 14px;
                font-size: 13px;
            }

            /* 소비자용 배송사 탭 모바일 최적화 */
            .buyer-shipping-options {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            .buyer-shipping-options button:nth-child(4),
            .buyer-shipping-options button:nth-child(5) {
                grid-column: span 1.5;
            }

            .buyer-form-columns {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            /* 모바일 가로 슬라이더 레이아웃 추가 */
            .winner-list-grid {
                display: flex !important;
                flex-direction: row !important;
                overflow-x: auto !important;
                scroll-snap-type: x mandatory !important;
                scroll-behavior: smooth !important;
                gap: 16px !important;
                width: calc(100% + 24px) !important;
                margin-left: -12px !important;
                margin-right: -12px !important;
                padding: 4px 12px 24px !important;
                margin-bottom: 8px !important;
                -webkit-overflow-scrolling: touch !important;
                grid-template-columns: none !important;
            }
            .winner-list-grid::-webkit-scrollbar {
                display: none !important;
            }
            .winner-card {
                flex: 0 0 86% !important;
                scroll-snap-align: center !important;
                margin-bottom: 0 !important;
                box-sizing: border-box !important;
            }
            .slider-indicators {
                display: flex !important;
            }
            .slider-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.2);
                transition: all 0.25s ease;
                cursor: pointer;
            }
            .slider-dot.active {
                background: #3B82F6;
                width: 22px;

    <script>
        // 거점 가격표 데이터베이스
        const SHIPPING_DATA = {
            '픽업': {
                regions: { '직접수령': [{ shop: '현장 직접수령', cost: 0 }] }
            },
            '도도시': {
                regions: {
                    '서울': [
                        { shop: '도도시 강남 거점샵', cost: 5000 },
                        { shop: '도도시 홍대 거점샵', cost: 5000 },
                        { shop: '도도시 노원 거점샵', cost: 5000 }
                    ],
                    '경기': [
                        { shop: '도도시 일산 거점샵', cost: 5000 },
                        { shop: '도도시 수원 거점샵', cost: 5000 },
                        { shop: '도도시 분당 거점샵', cost: 5000 }
                    ],
                    '인천': [
                        { shop: '도도시 부평 거점샵', cost: 5000 }
                    ],
                    '기타지방': [
                        { shop: '도도시 대전 거점샵', cost: 5000 },
                        { shop: '도도시 대구 거점샵', cost: 5000 },
                        { shop: '도도시 부산 거점샵', cost: 5000 },
                        { shop: '도도시 광주 거점샵', cost: 5000 },
                        { shop: '도도시 제주 거점샵', cost: 10000 }
                    ]
                }
            },
            '파르게': {
                regions: {
                    '수도권': [
                        { shop: '파르게 서울본점', cost: 5000 },
                        { shop: '파르게 경기점', cost: 5000 }
                    ],
                    '지방거점': [
                        { shop: '파르게 대전점', cost: 5000 },
                        { shop: '파르게 대구점', cost: 5000 },
                        { shop: '파르게 부산점', cost: 5000 }
                    ]
                }
            },
            '랩팡': {
                regions: {
                    '수도권': [
                        { shop: '랩팡 서울거점', cost: 5000 },
                        { shop: '랩팡 수원거점', cost: 5000 }
                    ],
                    '지방거점': [
                        { shop: '랩팡 대전거점', cost: 5000 },
                        { shop: '랩팡 부산거점', cost: 5000 }
                    ]
                }
            },
            '기타 (직접입력)': {
                regions: { '기타': [{ shop: '직접 기입 주소', cost: 0 }] }
            }
        };

        let allItems = [];
        let uniqueSellerCompanies = [];
        let winnerStateMap = {}; 
        let isAdminMode = true;

        // URL 파라미터 감지 (기본 어드민 모드, ?buyer=1 일 때만 일반 낙찰자 입력 모드)
        const params = new URLSearchParams(window.location.search);
        if (params.get('buyer') === '1') {
            isAdminMode = false;
            document.getElementById('buyer-view').style.display = 'block';
        } else {
            isAdminMode = true;
            document.body.classList.add('admin-mode');
            document.getElementById('admin-view').style.display = 'block';
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isError ? '#EF4444' : '#0F172A';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function showLoading(active, text = '로딩 중...') {
            const overlay = document.getElementById('loading-overlay');
            const txt = document.getElementById('loading-text');
            txt.textContent = text;
            if (active) overlay.classList.add('active');
            else overlay.classList.remove('active');
        }

        // 초기화 로딩
        window.addEventListener('DOMContentLoaded', async () => {
            showLoading(true, '데이터를 불러오는 중...');
            try {
                // 도도시 동적 가격표 로드
                try {
                    const dodosiRes = await getDodosiData();
                    if (dodosiRes && dodosiRes.success && dodosiRes.data && dodosiRes.data.length > 0) {
                        SHIPPING_DATA['도도시'].regions = {};
                        dodosiRes.data.forEach(item => {
                            const regName = item.route || '기타';
                            if (!SHIPPING_DATA['도도시'].regions[regName]) {
                                SHIPPING_DATA['도도시'].regions[regName] = [];
                            }
                            let label = item.shop;
                            if (item.region) {
                                label = `${item.region}${item.sub ? ' ' + item.sub : ''} - ${item.shop}`;
                            }
                            SHIPPING_DATA['도도시'].regions[regName].push({
                                shop: label,
                                cost: item.price || 16000,
                                day: item.day || ''
                            });
                        });
                        console.log('[Dodosi] Successfully loaded dynamic dodosi prices:', Object.keys(SHIPPING_DATA['도도시'].regions).length, 'regions');
                    }
                } catch (dodosiErr) {
                    console.warn('[Dodosi] Failed to load dynamic dodosi data, using fallback:', dodosiErr);
                }

                // 파르게 동적 가격표 로드
                try {
                    const pargeRes = await getPargeData();
                    if (pargeRes && pargeRes.success && pargeRes.data) {
                        SHIPPING_DATA['파르게'].regions = {};
                        Object.keys(pargeRes.data).forEach(regName => {
                            SHIPPING_DATA['파르게'].regions[regName] = pargeRes.data[regName].map(shopItem => ({
                                shop: shopItem.shop,
                                cost: shopItem.cost || (regName.includes('제주') ? 46000 : 19000)
                            }));
                        });
                        console.log('[Parge] Successfully loaded dynamic parge prices:', Object.keys(SHIPPING_DATA['파르게'].regions).length, 'regions');
                    }
                } catch (pargeErr) {
                    console.warn('[Parge] Failed to load dynamic parge data, using fallback:', pargeErr);
                }

                // 랩팡 동적 가격표 로드
                try {
                    const wrapangRes = await getWrapangData();
                    if (wrapangRes && wrapangRes.success && wrapangRes.data) {
                        SHIPPING_DATA['랩팡'].regions = {};
                        Object.keys(wrapangRes.data).forEach(regName => {
                            SHIPPING_DATA['랩팡'].regions[regName] = wrapangRes.data[regName].map(shopItem => ({
                                shop: shopItem.shop,
                                cost: shopItem.cost || (regName.includes('제주') ? 55000 : 25000) // 랩팡 크롤링된 실제 거점별 단가 반영
                            }));
                        });
                        console.log('[Wrapang] Successfully loaded dynamic wrapang prices:', Object.keys(SHIPPING_DATA['랩팡'].regions).length, 'regions');
                    }
                } catch (wrapangErr) {
                    console.warn('[Wrapang] Failed to load dynamic wrapang data, using fallback:', wrapangErr);
                }

                const items = await getItems();
                allItems = (items || []).filter(it => it.status && it.status.indexOf('낙찰') >= 0);

                // ══════════════════════════════════════
                //  테스트용 묶음배송 모의 데이터 주입 (김철수/이영희)
                // ══════════════════════════════════════
                const mockWinners = [
                    { name: '김철수', phone: '010-1234-5678' },
                    { name: '이영희', phone: '010-9876-5432' }

        //  배송비 연산 공통 헬퍼 함수
        // ══════════════════════════════════════
        function calculateShippingCost(company, type, region, hub, itemCount) {
            if (type !== '배송') return 0;
            const compData = SHIPPING_DATA[company];
            let baseCost = 0;
            if (compData && compData.regions && region) {
                const hubs = compData.regions[region] || [];
                const hubItem = hubs.find(h => h.shop === hub);
                if (hubItem) baseCost = hubItem.cost;
            }

            if (company === '파르게') {
                const isJeju = region.includes('제주');
                return itemCount <= 1 ? baseCost : baseCost + (itemCount - 1) * (isJeju ? 4000 : 7000);
            } else if (company === '랩팡') {
                return itemCount <= 1 ? baseCost :
                       itemCount <= 4 ? baseCost + (itemCount - 1) * 7000 :
                       itemCount <= 20 ? baseCost + 28000 : baseCost + 35000;
            } else if (company === '도도시') {
                return baseCost;
            }
            return 0; // 픽업 / 기타 (기본값)
        }

            const selectedCo = document.getElementById('company-select').value;
            if (!selectedCo) return;

            const selfItems = allItems.filter(it => (it.company || '').trim() === selectedCo);
            if (selfItems.length === 0) {
                showToast('저장할 개체가 없습니다.', true);
                return;
            }

            showLoading(true, '배송 설정을 데이터베이스에 저장 중...');
            try {
                for (let i = 0; i < selfItems.length; i++) {
                    const it = selfItems[i];
                    const winnerName = (it.winner || '').replace(/[\[\]]/g, '').trim().split('/')[0].trim();
                    const state = winnerStateMap[winnerName];

                    let shipping_type = state.shipping_type;
                    let shipping_company = '';

                    const costCellText = document.getElementById(`cost-${it.row}`).textContent;

                    if (shipping_type === '배송') {

                    if (memoVal) {
                        shipping_region = `${shipping_region} [메모: ${memoVal}]`.trim();
                    }

                    let status = state.status || '낙찰-대기';

                    await updateItemShipping(it.row, {
                        shipping_type,

                        shipping_region,
                        shipping_cost,

                    });

                showToast('성공적으로 저장되었습니다! 💾');

        //  거점 검색 및 초성 검색 기능 구현 (지리적 인접 매칭 포함)
        // ══════════════════════════════════════
        const CHO = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];

        function getChosung(str) {
            let r = '';
            for (let i = 0; i < str.length; i++) {
                const c = str.charCodeAt(i);
                if (c >= 0xAC00 && c <= 0xD7A3) r += CHO[Math.floor((c - 0xAC00) / 588)];
                else r += str[i];
            }
            return r;
        }

        function isChosung(str) {
            return /^[ㄱ-ㅎ\s]+$/.test(str);
        }

        function scoreMatch(d, words) {
            const fields = [
                { v: d.shop || "", w: 3 },
                { v: d.region || "", w: 2 }
            ];
            let total = 0;
            let allFound = true;

            for (const word of words) {
                let wordScore = 0;
                const isCho = isChosung(word);

                for (const f of fields) {
                    const val = f.v.toLowerCase();
                    if (isCho) {
                        const cho = getChosung(f.v);
                        if (cho.includes(word)) wordScore = Math.max(wordScore, 30 * f.w);
                    }
                    if (val === word) wordScore = Math.max(wordScore, 100 * f.w);
                    else if (val.startsWith(word)) wordScore = Math.max(wordScore, 80 * f.w);
                    else if (val.includes(word)) wordScore = Math.max(wordScore, 50 * f.w);
                }
                if (wordScore === 0) allFound = false;
                total += wordScore;
            }
            return allFound ? total : 0;
        }

        function findRoutesByLocation(query) {
            const scored = [];
            for (const route in GEO_MAP) {
                let best = 0;
                for (const city of GEO_MAP[route]) {
                    let s = 0;
                    if (city === query) s = 100;
                    else if (query.startsWith(city)) s = 80;
                    else if (city.startsWith(query)) s = 60;
                    else if (city.includes(query) && query.length >= 2) s = 40;
                    if (s > best) best = s;
                }
                if (best > 0) scored.push({ route, score: best });
            }
            scored.sort((a, b) => b.score - a.score);
            return scored.map(s => s.route);
        }

        function filterBuyerHubs() {
            const q = (document.getElementById('buyer-hub-search').value || '').trim().toLowerCase();
            const resultsBox = document.getElementById('buyer-hub-search-results');
            
            const comp = buyerShippingState.company;
            if (comp === '픽업' || comp === '기타' || !comp) {
                resultsBox.style.display = 'none';
                return;
            }

            const compData = SHIPPING_DATA[comp];
            if (!compData || !compData.regions) {
                resultsBox.style.display = 'none';
                return;
            }

            // Flatten all hubs of this company
            let allHubs = [];
            Object.keys(compData.regions).forEach(regName => {
                compData.regions[regName].forEach(h => {
                    allHubs.push({
                        region: regName,
                        shop: h.shop,
                        cost: h.cost
                    });
                });
            });

            if (!q) {
                // Show all if focused but empty
                renderSearchItems(allHubs, []);
                return;
            }

            const words = q.split(/\s+/).filter(Boolean);
            const scored = allHubs.map(h => {
                const score = scoreMatch(h, words);
                return { hub: h, score: score };
            }).filter(item => item.score > 0)
              .sort((a, b) => b.score - a.score);

            const exact = scored.map(item => item.hub);

            // Geographical matching (if exact matches are few)
            let nearby = [];
            let geoRoutes = [];
            words.forEach(w => {
                geoRoutes.push(...findRoutesByLocation(w));
            });
            geoRoutes = [...new Set(geoRoutes)];

            if (exact.length <= 4) {
                const compMap = GEO_TO_COMPANY_REGION[comp];
                if (compMap) {
                    let targetRegs = [];
                    geoRoutes.forEach(gr => {
                        if (compMap[gr]) targetRegs.push(...compMap[gr]);
                    });
                    targetRegs = [...new Set(targetRegs)];

                    if (targetRegs.length > 0) {
                        nearby = allHubs.filter(h => targetRegs.includes(h.region) && !exact.some(ex => ex.shop === h.shop));
                    }
                }
            }

            renderSearchItems(exact, nearby);
        }

        // 소비자 화면 총 계산
        function recalculateBuyerTotal() {
            let totalBid = 0;
            buyerFoundItems.forEach(it => {
                totalBid += (parseFloat(it.soldPrice || it.sold_price) || 0);
            });

            // 합배송사 분석 및 +7,000 연산 동일 적용
            const sellerCos = [...new Set(buyerFoundItems.map(it => (it.company || '').trim()))];
            const companyCount = sellerCos.length;

            let totalShipping = 0;
            if (buyerShippingState.type === '배송') {
                if (buyerShippingState.company === '기타 (직접입력)') {
                    totalShipping = 0;
                } else {
                    const baseCost = buyerShippingState.cost;
                    totalShipping = baseCost;
                    if (companyCount > 1) {
                        totalShipping = baseCost + (companyCount - 1) * 7000;
                    }
                }
            }

            document.getElementById('b-summary-bid').textContent = totalBid + '만';
            document.getElementById('b-summary-ship').textContent = totalShipping.toLocaleString() + '원';
            
            const grandTotalWon = (totalBid * 10000) + totalShipping;
            document.getElementById('b-summary-total').textContent = grandTotalWon.toLocaleString() + '원';
        }

        // 소비자 직접 제출
        async function submitBuyerShipping() {
            if (buyerFoundItems.length === 0) return;

            showLoading(true, '배송 정보를 전송하는 중...');
            try {
                const type = buyerShippingState.type;
                const sellerCos = [...new Set(buyerFoundItems.map(it => (it.company || '').trim()))];
                const companyCount = sellerCos.length;

                // 전체 배송비 구한 뒤, 업체별로 쪼개기
                let totalShipping = 0;
                if (type === '배송') {
                    if (buyerShippingState.company === '기타 (직접입력)') {
                        totalShipping = 0;
                    } else {
                        totalShipping = buyerShippingState.cost;
                        if (companyCount > 1) {
                            totalShipping = buyerShippingState.cost + (companyCount - 1) * 7000;
                        }
                    }
                }

                const splitCostPerCompany = Math.round(totalShipping / companyCount);

                // 업체별 첫 개체에 쪼갠 금액 배부하고 업데이트
                for (const co of sellerCos) {
                    const coItems = buyerFoundItems.filter(it => (it.company || '').trim() === co);
                    
                    coItems.forEach(async (it, idx) => {
                        let shipping_type = type;
                        let shipping_company = '';
                        let shipping_region = '';
                        let shipping_cost = 0;

                        if (type === '배송') {
                            if (buyerShippingState.company === '기타 (직접입력)') {
                                shipping_company = document.getElementById('buyer-custom-company').value.trim() || '기타';
                                shipping_region = document.getElementById('buyer-custom-region').value.trim() || '직접기입';
                            } else {
                                shipping_company = buyerShippingState.company;
                                shipping_region = `${buyerShippingState.region} (${buyerShippingState.hub})`;
                            }

                            // 첫 번째 개체에 배송비 배정
                            if (idx === 0) {
                                shipping_cost = splitCostPerCompany;
                            }
                        }

                        // 메모
                        const memoVal = document.getElementById('buyer-memo-input').value.trim();
                        if (memoVal) {
                            shipping_region = `${shipping_region} [요청: ${memoVal}]`.trim();
                        }

                        await updateItemShipping(it.row, {
                            shipping_type,
                            shipping_company,
                            shipping_region,
                            shipping_cost
                        });
                    });
                }

                showToast('배송 정보 등록이 완료되었습니다! 판매자 정산서에 실시간 반영됩니다. 🚚');
                setTimeout(() => {
                    location.reload();
                }, 2000);
            } catch (e) {
                console.error(e);
                showToast('저장 실패: ' + e.message, true);
            } finally {
                showLoading(false);
            }
        }

                ? getSelfItemsOfWinner(activeModalWinner)
                : buyerFoundItems;

            // Flatten all hubs of this company
            let allHubs = [];
            Object.keys(compData.regions).forEach(regName => {
                compData.regions[regName].forEach(h => {
                    allHubs.push({
                        region: regName,
                        shop: h.shop,
                        cost: h.cost,
                        day: h.day || ''
                    });

            // Filter by Region Tab

            let exact = [];

            if (!q) {

                    const score = scoreMatch(h, words);
                    return { hub: h, score: score };

                  .sort((a, b) => b.score - a.score);

                // Geographical proximity recommendations

            // Helper to calculate total cost for the winner
            function getFinalCost(baseCost, regName) {
                const isJeju = regName.includes('제주');
                if (comp === '파르게') {
                    if (itemCount <= 1) return baseCost;
                    return baseCost + (itemCount - 1) * (isJeju ? 4000 : 7000);
                } else if (comp === '랩팡') {
                    if (itemCount <= 1) return baseCost;
                    if (itemCount <= 4) return baseCost + (itemCount - 1) * 7000;
                    if (itemCount <= 20) return baseCost + 28000;
                    return baseCost + 35000;
                }
                // Dodosi or default
                return baseCost;

                    const customComp = document.getElementById(`custom-company-${it.row}`);
                    if (customComp) customComp.value = compVal;

                    const customReg = document.getElementById(`custom-region-${it.row}`);
                    if (customReg) customReg.value = regVal;

                    // Update button badge UI
                    const btn = document.getElementById(`hub-select-btn-${it.row}`);
                    if (btn) {
                        styleHubButton(btn, compVal, regVal, '');
                    }

                    // PERSIST IN MEMORY FOR CROSS-COMPANY SYNC
                    it.shipping_type = '배송';
                    it.shipping_company = compVal;
                    it.shipping_region = regVal;
                });

                // Update winner state
                const state = winnerStateMap[winnerName];
                state.shipping_company = compVal;
                state.shipping_region = regVal;
                state.shipping_hub = '';

                recalculateAllCosts();
            } else {
                // Buyer view
                document.getElementById('buyer-custom-company').value = compVal;
                document.getElementById('buyer-custom-region').value = regVal;

                // Update search button text
                const btn = document.getElementById('buyer-hub-btn');
                if (btn) {
                    styleHubButton(btn, compVal, regVal, '');
                }

                recalculateBuyerTotal();
            }
        }

        function onHubButtonClick(rowId, winnerName) {
            const state = winnerStateMap[winnerName];
            const comp = state.shipping_company;
            if (comp === '기타') {
                openCustomModalForWinner(rowId, winnerName, 'admin');
            } else {
                openHubModalForWinner(rowId, winnerName, 'admin');
            }
        }

        function onBuyerHubButtonClick() {
            const comp = buyerShippingState.company;
            if (comp === '기타') {
                openCustomModalForWinner(0, '', 'buyer');
            } else {
                openHubModalForWinner(0, '', 'buyer');
            }
        }

        // Initialize modal event listener
        document.addEventListener('DOMContentLoaded', () => {
            const modalSearch = document.getElementById('hub-modal-search');
            if (modalSearch) modalSearch.addEventListener('input', filterModalHubs);

            // Update active slide dot on scroll
            const listContainer = document.getElementById('winner-list-container');
            if (listContainer) {
                listContainer.addEventListener('scroll', () => {
                    const card = listContainer.querySelector('.winner-card');
                    if (!card) return;
                    const cardWidth = card.offsetWidth;
                    const activeIndex = Math.round(listContainer.scrollLeft / (cardWidth + 16)); // 16 is gap
                    
                    const dots = document.querySelectorAll('.slider-dot');
                    dots.forEach((dot, idx) => {
                        if (idx === activeIndex) {
                            dot.classList.add('active');
                        } else {
                            dot.classList.remove('active');
                        }
                    });
                });
            }
        });

        function scrollToSlide(idx) {
            const container = document.getElementById('winner-list-container');
            if (!container) return;
            const card = container.querySelector('.winner-card');
            if (!card) return;
            const cardWidth = card.offsetWidth;
            container.scrollTo({
                left: idx * (cardWidth + 16), // 16 is gap
                behavior: 'smooth'
            });
        }

        // 전화번호 포맷 헬퍼
        function fmtPhone(raw) {
            var ph = (raw || '').replace(/[^0-9]/g, '');
            if (ph.length === 8) ph = '010' + ph;
            if (ph.length === 11) return ph.slice(0, 3) + '-' + ph.slice(3, 7) + '-' + ph.slice(7);
            if (ph.length === 10) return ph.slice(0, 3) + '-' + ph.slice(3, 6) + '-' + ph.slice(6);
            return ph;
        }
    </script>
</body>
</html>
