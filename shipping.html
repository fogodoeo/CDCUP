<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CDCUP - 낙찰 배송 정보 등록</title>
    <script src="supabase-bridge.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard-dynamic-subset.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --text-title: #0F172A;
            --text: #334155;
            --text-secondary: #64748B;
            --accent: #2563EB;
            --accent-hover: #1D4ED8;
            --accent-light: rgba(37, 99, 235, 0.08);
            --border: #E2E8F0;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 680px;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-title);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        /* 필터 바 */
        .filter-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .filter-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-text {
            flex: 1;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
            background: white;
        }

        .input-text:focus {
            border-color: var(--accent);
        }

        .select-custom {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            font-family: inherit;
            background: white;
            cursor: pointer;
        }

        .select-custom:focus {
            border-color: var(--accent);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: #E2E8F0;
            color: #475569;
        }

        .btn-secondary:hover {
            background: #CBD5E1;
        }

        .btn-full {
            width: 100%;
            padding: 14px;
            font-size: 16px;
        }

        /* 결과 목록 */
        .result-header {
            margin-bottom: 16px;
            font-size: 16px;
            font-weight: 800;
            color: var(--text-title);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 8px;
        }

        .result-count {
            background: var(--accent-light);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 13px;
        }

        /* 낙찰자별 그룹 카드 */
        .winner-group-card {
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
            background: #FFFFFF;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .winner-group-header {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-title);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1.5px solid var(--border);
            padding-bottom: 10px;
        }

        .winner-phone {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* 개체 아이템 행 */
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 8px;
            background: #F8FAFC;
            transition: opacity 0.2s;
        }

        /* 타업체 낙찰건 (희미하게 표시) */
        .item-row.other-company {
            opacity: 0.45;
            background: #F1F5F9;
            border-style: dotted;
        }

        .item-row.other-company:hover {
            opacity: 0.8;
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .item-title-text {
            font-weight: 700;
            font-size: 14px;
            color: var(--text-title);
        }

        .item-company-badge {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .item-price-text {
            font-weight: 800;
            color: #E11D48;
            font-size: 14px;
        }

        .other-company-label {
            background: #E2E8F0;
            color: #475569;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            margin-left: 6px;
        }

        /* 수령 방식 버튼 그룹 */
        .shipping-company-group {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }

        .shipping-company-btn {
            padding: 10px 4px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            background: white;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .shipping-company-btn.active {
            border-color: var(--accent);
            background: var(--accent-light);
            color: var(--accent);
        }

        .shipping-detail-form {
            background: #F8FAFC;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-row label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .form-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .shipping-cost-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        /* 토스트 */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #0F172A;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 로딩 오버레이 */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🏆 배송/수령 정보 입력</h1>
            <p>경매 출품 업체별 개체의 낙찰자 배송 정보를 등록합니다.</p>
        </div>

        <!-- 1단계: 출품 업체(경매 주체) 필터 선택 카드 -->
        <div class="card" id="filter-card">
            <div class="filter-section">
                <div class="form-row">
                    <label>출품 업체 [경매 주체] 검색/필터링</label>
                    <div class="filter-row">
                        <input type="text" id="company-filter-input" class="input-text" placeholder="출품 업체명 입력..." oninput="onCompanyFilterInput()">
                        <button class="btn btn-secondary" onclick="clearCompanyFilter()">초기화</button>
                    </div>
                </div>
                <div class="form-row">
                    <label>출품 업체 선택</label>
                    <select id="company-select" class="select-custom" onchange="onCompanySelectChange()">
                        <!-- 동적 렌더링 -->
                    </select>
                </div>
            </div>
        </div>

        <!-- 2단계: 낙찰 목록 및 배송정보 입력 -->
        <div class="card" id="result-card">
            <div class="result-header">
                <div>📋 낙찰자 배송 정보 목록</div>
                <span class="result-count" id="result-count-badge">0명</span>
            </div>

            <div id="groups-container">
                <!-- 동적 렌더링 (낙찰자별로 그룹화) -->
            </div>

            <!-- 합산 금액 정보 -->
            <div id="total-summary-card" style="margin-top: 16px; margin-bottom: 16px; padding: 16px; background: #F1F5F9; border-radius: 8px; border: 1px solid var(--border);">
                <div style="display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; font-weight: 500;">
                    <span>총 낙찰 금액 (선택 업체 기준)</span>
                    <span id="summary-items-price" style="font-weight: 700;">0만</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; font-weight: 500;">
                    <span>총 배송비</span>
                    <span id="summary-shipping-price" style="font-weight: 700;">0원</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding-top: 8px; border-top: 1px dashed #CBD5E1; font-size: 16px; font-weight: 800; color: var(--text-title);">
                    <span>최종 합산 금액</span>
                    <span id="summary-total-price" style="color: #E11D48;">0만 + 0원</span>
                </div>
            </div>

            <button class="btn btn-full" onclick="submitAllShippingInfo()" style="margin-top: 10px;">
                <span class="material-symbols-rounded">send</span> 배송 정보 제출하기
            </button>
        </div>
    </div>

    <!-- 토스트 & 로딩 -->
    <div class="toast" id="toast"></div>
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div style="font-weight: 700; color: var(--text-title);" id="loading-text">데이터를 저장하는 중...</div>
    </div>

    <script>
        // 거점 정보 데이터베이스 (도도시, 파르게, 랩팡)
        const SHIPPING_DATA = {
            '픽업': {
                regions: {
                    '직접수령': [
                        { shop: '현장 직접수령', cost: 0 }
                    ]
                }
            },
            '도도시': {
                regions: {
                    '서울': [
                        { shop: '도도시 강남 거점샵', cost: 5000 },
                        { shop: '도도시 홍대 거점샵', cost: 5000 },
                        { shop: '도도시 노원 거점샵', cost: 5000 },
                        { shop: '도도시 신도림 거점샵', cost: 5000 }
                    ],
                    '경기 북부': [
                        { shop: '도도시 일산 거점샵', cost: 5000 },
                        { shop: '도도시 의정부 거점샵', cost: 5000 },
                        { shop: '도도시 남양주 거점샵', cost: 5000 }
                    ],
                    '경기 남부': [
                        { shop: '도도시 수원 거점샵', cost: 5000 },
                        { shop: '도도시 성남 거점샵', cost: 5000 },
                        { shop: '도도시 부천 거점샵', cost: 5000 },
                        { shop: '도도시 안산 거점샵', cost: 5000 },
                        { shop: '도도시 평택 거점샵', cost: 5000 }
                    ],
                    '인천': [
                        { shop: '도도시 부평 거점샵', cost: 5000 },
                        { shop: '도도시 송도 거점샵', cost: 5000 }
                    ],
                    '충청': [
                        { shop: '도도시 대전 거점샵', cost: 5000 },
                        { shop: '도도시 천안 거점샵', cost: 5000 },
                        { shop: '도도시 청주 거점샵', cost: 5000 }
                    ],
                    '경상': [
                        { shop: '도도시 부산 거점샵', cost: 5000 },
                        { shop: '도도시 대구 거점샵', cost: 5000 },
                        { shop: '도도시 울산 거점샵', cost: 5000 },
                        { shop: '도도시 창원 거점샵', cost: 5000 }
                    ],
                    '전라/제주': [
                        { shop: '도도시 광주 거점샵', cost: 5000 },
                        { shop: '도도시 전주 거점샵', cost: 5000 },
                        { shop: '도도시 제주 거점샵', cost: 10000 }
                    ]
                }
            },
            '파르게': {
                regions: {
                    '수도권': [
                        { shop: '파르게 서울본점 거점샵', cost: 5000 },
                        { shop: '파르게 경기 거점샵', cost: 5000 },
                        { shop: '파르게 인천 거점샵', cost: 5000 }
                    ],
                    '충청': [
                        { shop: '파르게 대전 거점샵', cost: 5000 },
                        { shop: '파르게 천안 거점샵', cost: 5000 }
                    ],
                    '경상': [
                        { shop: '파르게 대구 거점샵', cost: 5000 },
                        { shop: '파르게 부산 거점샵', cost: 5000 },
                        { shop: '파르게 울산 거점샵', cost: 5000 }
                    ],
                    '전라': [
                        { shop: '파르게 광주 거점샵', cost: 5000 },
                        { shop: '파르게 전주 거점샵', cost: 5000 }
                    ]
                }
            },
            '랩팡': {
                regions: {
                    '수도권': [
                        { shop: '랩팡 강남 거점샵', cost: 5000 },
                        { shop: '랩팡 신촌 거점샵', cost: 5000 },
                        { shop: '랩팡 수원 거점샵', cost: 5000 }
                    ],
                    '충청/강원': [
                        { shop: '랩팡 대전 거점샵', cost: 5000 },
                        { shop: '랩팡 원주 거점샵', cost: 6000 }
                    ],
                    '경상': [
                        { shop: '랩팡 대구 거점샵', cost: 5000 },
                        { shop: '랩팡 부산 거점샵', cost: 5000 }
                    ],
                    '전라': [
                        { shop: '랩팡 광주 거점샵', cost: 5000 }
                    ]
                }
            },
            '기타 (직접입력)': {
                regions: {
                    '기타': [
                        { shop: '기타 거점 직접입력', cost: 0 }
                    ]
                }
            }
        };

        let allItems = [];
        let uniqueSellerCompanies = [];

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isError ? '#EF4444' : '#0F172A';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function showLoading(active, text = '로딩 중...') {
            const overlay = document.getElementById('loading-overlay');
            const txt = document.getElementById('loading-text');
            txt.textContent = text;
            if (active) overlay.classList.add('active');
            else overlay.classList.remove('active');
        }

        // 초기 로딩
        window.addEventListener('DOMContentLoaded', async () => {
            showLoading(true, '낙찰 및 출품 업체 정보를 가져오는 중...');
            try {
                const items = await getItems();
                // 낙찰 완료된 데이터만 필터링
                allItems = (items || []).filter(it => it.status && it.status.indexOf('낙찰') >= 0);

                // 고유 출품 업체 수집
                const companies = allItems.map(it => (it.company || '').trim()).filter(Boolean);
                uniqueSellerCompanies = [...new Set(companies)].sort();

                populateCompanySelect();
                renderFilteredGroups();
            } catch (err) {
                console.error(err);
                showToast('데이터 로딩 오류: ' + err.message, true);
            } finally {
                showLoading(false);
            }
        });

        // 출품 업체 셀렉트 박스 채우기
        function populateCompanySelect(filteredList = null) {
            const select = document.getElementById('company-select');
            const list = filteredList || uniqueSellerCompanies;

            if (list.length === 0) {
                select.innerHTML = '<option value="">출품 업체가 없습니다</option>';
                return;
            }

            select.innerHTML = list.map(c => `<option value="${c}">${c}</option>`).join('');
            select.value = list[0] || '';
        }

        // 출품 업체명 타이핑 필터링
        function onCompanyFilterInput() {
            const q = document.getElementById('company-filter-input').value.trim().toLowerCase();
            if (!q) {
                populateCompanySelect();
                renderFilteredGroups();
                return;
            }

            const filtered = uniqueSellerCompanies.filter(c => c.toLowerCase().indexOf(q) >= 0);
            populateCompanySelect(filtered);
            renderFilteredGroups();
        }

        function clearCompanyFilter() {
            document.getElementById('company-filter-input').value = '';
            populateCompanySelect();
            renderFilteredGroups();
        }

        function onCompanySelectChange() {
            renderFilteredGroups();
        }

        // ════════════════════════════════════════════
        //  그룹핑 및 렌더링 로직 (인쇄 페이지의 renderPcView 개념 차용)
        // ════════════════════════════════════════════
        let winnerGroupsData = {}; // 낙찰자별 임시 입력 상태 저장소

        function renderFilteredGroups() {
            const selectedCo = document.getElementById('company-select').value;
            const container = document.getElementById('groups-container');
            container.innerHTML = '';
            winnerGroupsData = {};

            if (!selectedCo) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);font-size:14px;">선택된 출품 업체가 없습니다.</div>';
                return;
            }

            // 1. 선택된 출품 업체의 낙찰자들 추출
            const selectedCoWinners = new Set();
            allItems.forEach(it => {
                if ((it.company || '').trim() === selectedCo) {
                    const cleanWinner = (it.winner || '').replace(/[\[\]]/g, '').trim().split('/')[0].trim();
                    if (cleanWinner) selectedCoWinners.add(cleanWinner);
                }
            });

            // 2. 해당 낙찰자들의 전체 낙찰 개체 수집 (타업체 낙찰건 포함)
            const groups = {};
            selectedCoWinners.forEach(winner => {
                groups[winner] = {
                    winnerName: winner,
                    winnerPhone: '',
                    items: []
                };
            });

            allItems.forEach(it => {
                const cleanWinner = (it.winner || '').replace(/[\[\]]/g, '').trim().split('/')[0].trim();
                if (groups[cleanWinner]) {
                    groups[cleanWinner].items.push(it);
                    if (!groups[cleanWinner].winnerPhone && it.winner_phone) {
                        groups[cleanWinner].winnerPhone = it.winner_phone;
                    }
                }
            });

            const winnerList = Object.values(groups);
            document.getElementById('result-count-badge').textContent = winnerList.length + '명';

            if (winnerList.length === 0) {
                container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-secondary);font-size:14px;">'${selectedCo}'의 낙찰 정보가 없습니다.</div>`;
                recalculateAllTotals(selectedCo, []);
                return;
            }

            // 3. 각 낙찰자별 그룹 렌더링
            winnerList.forEach((group, groupIdx) => {
                const groupCard = document.createElement('div');
                groupCard.className = 'winner-group-card';
                groupCard.id = `winner-group-${groupIdx}`;

                // 그룹 내 타사/자사 아이템 정렬 (자사 출품작 상단)
                group.items.sort((a, b) => {
                    const ca = (a.company || '').trim() === selectedCo ? 0 : 1;
                    const cb = (b.company || '').trim() === selectedCo ? 0 : 1;
                    return ca - cb;
                });

                // 낙찰자 그룹에 속한 고유 출품업체 계산
                const sellerCompaniesInGroup = [...new Set(group.items.map(it => (it.company || '').trim()))];

                // 배송 정보 기본값 바인딩 (이 그룹의 첫 자사 아이템 기준)
                const firstSelfItem = group.items.find(it => (it.company || '').trim() === selectedCo) || group.items[0];
                const currentType = firstSelfItem.shipping_type || '직접수령';
                const currentCompany = firstSelfItem.shipping_company || '도도시';
                // 거점 정보에서 괄호 앞의 지역명 추출
                const fullRegion = firstSelfItem.shipping_region || '';
                const currentRegion = fullRegion.split(' ')[0] || '';
                const currentHub = fullRegion.indexOf('(') >= 0 ? fullRegion.slice(fullRegion.indexOf('(') + 1, -1) : '';
                
                // 그룹 상태 객체 보존
                winnerGroupsData[groupIdx] = {
                    winnerName: group.winnerName,
                    items: group.items,
                    shipping_type: currentType,
                    shipping_company: currentCompany,
                    shipping_region: currentRegion,
                    shipping_hub: currentHub
                };

                let itemsHtml = '';
                group.items.forEach(it => {
                    const isOtherCo = (it.company || '').trim() !== selectedCo;
                    const cleanItemWinner = (it.winner || '').replace(/[\[\]]/g, '').trim();
                    let priceText = it.soldPrice || '';
                    if (!isNaN(priceText) && priceText !== '') {
                        priceText = parseFloat(priceText) + '만';
                    }

                    itemsHtml += `
                        <div class="item-row ${isOtherCo ? 'other-company' : ''}">
                            <div class="item-info">
                                <div class="item-title-text">
                                    ${it.name || '이름 없음'}
                                    ${isOtherCo ? '<span class="other-company-label">타사 낙찰</span>' : ''}
                                </div>
                                <div class="item-company-badge">
                                    <span>🎪 ${it.company || '출품사 미지정'}</span>
                                    ${isOtherCo ? `<span>👤 낙찰 정보: ${cleanItemWinner}</span>` : ''}
                                </div>
                            </div>
                            <div class="item-price-text">${priceText}</div>
                        </div>
                    `;
                });

                groupCard.innerHTML = `
                    <div class="winner-group-header">
                        <div>🎉 ${group.winnerName}</div>
                        <div class="winner-phone">${group.winnerPhone ? fmtPhone(group.winnerPhone) : '연락처 없음'}</div>
                    </div>

                    <div class="form-row" style="margin-bottom: 12px;">
                        <label>배송/수령 방식 선택</label>
                        <div class="shipping-company-group">
                            <button type="button" class="shipping-company-btn ${currentType === '직접수령' ? 'active' : ''}" 
                                id="btn-com-pickup-${groupIdx}" onclick="setGroupCompanyType(${groupIdx}, '픽업')">픽업</button>
                            <button type="button" class="shipping-company-btn ${currentType === '배송' && currentCompany === '도도시' ? 'active' : ''}" 
                                id="btn-com-dodosi-${groupIdx}" onclick="setGroupCompanyType(${groupIdx}, '도도시')">도도시</button>
                            <button type="button" class="shipping-company-btn ${currentType === '배송' && currentCompany === '파르게' ? 'active' : ''}" 
                                id="btn-com-parge-${groupIdx}" onclick="setGroupCompanyType(${groupIdx}, '파르게')">파르게</button>
                            <button type="button" class="shipping-company-btn ${currentType === '배송' && currentCompany === '랩팡' ? 'active' : ''}" 
                                id="btn-com-wrapang-${groupIdx}" onclick="setGroupCompanyType(${groupIdx}, '랩팡')">랩팡</button>
                            <button type="button" class="shipping-company-btn ${currentType === '배송' && currentCompany.indexOf('기타') >= 0 ? 'active' : ''}" 
                                id="btn-com-custom-${groupIdx}" onclick="setGroupCompanyType(${groupIdx}, '기타 (직접입력)')">기타</button>
                        </div>
                    </div>

                    <!-- 배송 상세 정보 폼 -->
                    <div class="shipping-detail-form" id="detail-form-${groupIdx}" style="display: ${currentType === '배송' ? 'block' : 'none'};">
                        
                        <!-- 기타 수동 배송사 입력 -->
                        <div class="form-row" id="custom-company-row-${groupIdx}" style="display: ${currentCompany === '기타 (직접입력)' ? 'flex' : 'none'}; margin-bottom: 8px;">
                            <label>배송업체명 입력</label>
                            <input type="text" class="input-text" id="input-custom-company-${groupIdx}" placeholder="배송업체명 직접 기입" value="${currentCompany !== '도도시' && currentCompany !== '파르게' && currentCompany !== '랩팡' && currentCompany !== '기타 (직접입력)' ? currentCompany : ''}" oninput="onCustomCompanyInput(${groupIdx})">
                        </div>

                        <div class="form-columns">
                            <!-- 지역 목록 -->
                            <div class="form-row" id="region-row-${groupIdx}">
                                <label>지역</label>
                                <select class="select-custom" id="select-region-${groupIdx}" onchange="onGroupRegionChange(${groupIdx})">
                                    <!-- 동적 렌더링 -->
                                </select>
                            </div>

                            <!-- 거점샵 목록 -->
                            <div class="form-row" id="hub-row-${groupIdx}">
                                <label>거점샵 선택</label>
                                <select class="select-custom" id="select-hub-${groupIdx}" onchange="onGroupHubChange(${groupIdx})">
                                    <!-- 동적 렌더링 -->
                                </select>
                            </div>
                        </div>

                        <!-- 기타 지역 거점 직접입력 -->
                        <div class="form-row" id="custom-region-row-${groupIdx}" style="display: ${currentCompany === '기타 (직접입력)' ? 'flex' : 'none'}; margin-top: 8px;">
                            <label>배송지/거점 주소 입력</label>
                            <input type="text" class="input-text" id="input-custom-region-${groupIdx}" placeholder="배송 지역 또는 주소 상세 기입" value="${currentCompany === '기타 (직접입력)' || (currentCompany !== '도도시' && currentCompany !== '파르게' && currentCompany !== '랩팡') ? fullRegion : ''}" oninput="onCustomRegionInput(${groupIdx})">
                        </div>

                        <div class="shipping-cost-info">
                            <span id="cost-split-lbl-${groupIdx}">예상 배송비 (배송사별 합산 계산됨)</span>
                            <span id="cost-display-${groupIdx}" style="color: var(--accent);">0원</span>
                        </div>
                    </div>

                    <div style="font-size: 13px; font-weight: 700; color: var(--text-title); margin-bottom: 8px;">낙찰 개체 목록</div>
                    <div class="items-list-wrap">
                        ${itemsHtml}
                    </div>
                `;

                container.appendChild(groupCard);

                // 현재 그룹 입력 상태를 기준으로 셀렉트박스 목록 채우기
                const companyKey = currentType === '직접수령' ? '픽업' : currentCompany;
                populateGroupFormInputs(groupIdx, companyKey, currentRegion, currentHub);
            });

            recalculateAllTotals(selectedCo);
        }

        // 수량/배송사 토글
        function setGroupCompanyType(groupIdx, companyKey) {
            const btns = ['pickup', 'dodosi', 'parge', 'wrapang', 'custom'];
            btns.forEach(b => {
                const btn = document.getElementById(`btn-com-${b}-${groupIdx}`);
                if (btn) btn.classList.remove('active');
            });

            const pickupBtn = document.getElementById(`btn-com-pickup-${groupIdx}`);
            const dodosiBtn = document.getElementById(`btn-com-dodosi-${groupIdx}`);
            const pargeBtn = document.getElementById(`btn-com-parge-${groupIdx}`);
            const wrapangBtn = document.getElementById(`btn-com-wrapang-${groupIdx}`);
            const customBtn = document.getElementById(`btn-com-custom-${groupIdx}`);

            const detailForm = document.getElementById(`detail-form-${groupIdx}`);
            const customCompanyRow = document.getElementById(`custom-company-row-${groupIdx}`);
            const regionRow = document.getElementById(`region-row-${groupIdx}`);
            const hubRow = document.getElementById(`hub-row-${groupIdx}`);
            const customRegionRow = document.getElementById(`custom-region-row-${groupIdx}`);

            const state = winnerGroupsData[groupIdx];

            if (companyKey === '픽업') {
                if (pickupBtn) pickupBtn.classList.add('active');
                detailForm.style.display = 'none';
                
                state.shipping_type = '직접수령';
                state.shipping_company = '';
                state.shipping_region = '';
                state.shipping_hub = '';

                document.getElementById(`cost-display-${groupIdx}`).textContent = '0원';
                recalculateAllTotals();
                return;
            }

            detailForm.style.display = 'block';
            state.shipping_type = '배송';

            if (companyKey === '도도시') { dodosiBtn.classList.add('active'); state.shipping_company = '도도시'; }
            else if (companyKey === '파르게') { pargeBtn.classList.add('active'); state.shipping_company = '파르게'; }
            else if (companyKey === '랩팡') { wrapangBtn.classList.add('active'); state.shipping_company = '랩팡'; }
            else if (companyKey === '기타 (직접입력)') { customBtn.classList.add('active'); state.shipping_company = '기타 (직접입력)'; }

            if (companyKey === '기타 (직접입력)') {
                customCompanyRow.style.display = 'flex';
                regionRow.style.display = 'none';
                hubRow.style.display = 'none';
                customRegionRow.style.display = 'flex';
                
                state.shipping_region = '';
                state.shipping_hub = '';
            } else {
                customCompanyRow.style.display = 'none';
                regionRow.style.display = 'flex';
                hubRow.style.display = 'flex';
                customRegionRow.style.display = 'none';
            }

            populateGroupFormInputs(groupIdx, companyKey);
        }

        function populateGroupFormInputs(groupIdx, companyKey, selectedRegion = null, selectedHub = null) {
            const selectRegion = document.getElementById(`select-region-${groupIdx}`);
            const selectHub = document.getElementById(`select-hub-${groupIdx}`);
            if (!selectRegion || !selectHub) return;

            const companyData = SHIPPING_DATA[companyKey];
            if (!companyData || companyKey === '픽업' || companyKey === '기타 (직접입력)') {
                return;
            }

            const regions = Object.keys(companyData.regions);
            selectRegion.innerHTML = regions.map(r => `<option value="${r}">${r}</option>`).join('');

            if (selectedRegion && companyData.regions[selectedRegion]) {
                selectRegion.value = selectedRegion;
            }

            winnerGroupsData[groupIdx].shipping_region = selectRegion.value;
            populateGroupHubs(groupIdx, companyKey, selectRegion.value, selectedHub);
        }

        function populateGroupHubs(groupIdx, companyKey, regionName, selectedHub = null) {
            const selectHub = document.getElementById(`select-hub-${groupIdx}`);
            if (!selectHub) return;

            const hubs = SHIPPING_DATA[companyKey].regions[regionName] || [];
            selectHub.innerHTML = hubs.map(h => `<option value="${h.shop}" data-cost="${h.cost}">${h.shop} (${h.cost.toLocaleString()}원)</option>`).join('');

            if (selectedHub) {
                const matched = hubs.find(h => h.shop === selectedHub);
                if (matched) selectHub.value = selectedHub;
            }

            winnerGroupsData[groupIdx].shipping_hub = selectHub.value;
            updateGroupCalculatedCost(groupIdx);
        }

        function onGroupRegionChange(groupIdx) {
            const selectRegion = document.getElementById(`select-region-${groupIdx}`);
            const companyKey = winnerGroupsData[groupIdx].shipping_company;
            winnerGroupsData[groupIdx].shipping_region = selectRegion.value;
            populateGroupHubs(groupIdx, companyKey, selectRegion.value);
        }

        function onGroupHubChange(groupIdx) {
            const selectHub = document.getElementById(`select-hub-${groupIdx}`);
            winnerGroupsData[groupIdx].shipping_hub = selectHub.value;
            updateGroupCalculatedCost(groupIdx);
        }

        function onCustomCompanyInput(groupIdx) {
            const customVal = document.getElementById(`input-custom-company-${groupIdx}`).value.trim();
            winnerGroupsData[groupIdx].shipping_company = customVal || '기타';
            recalculateAllTotals();
        }

        function onCustomRegionInput(groupIdx) {
            const customVal = document.getElementById(`input-custom-region-${groupIdx}`).value.trim();
            winnerGroupsData[groupIdx].shipping_region = customVal || '기타';
            recalculateAllTotals();
        }

        // 낙찰자 그룹의 배송비 갱신
        function updateGroupCalculatedCost(groupIdx) {
            const selectHub = document.getElementById(`select-hub-${groupIdx}`);
            const costDisplay = document.getElementById(`cost-display-${groupIdx}`);
            if (!selectHub || !costDisplay) return;

            recalculateAllTotals();
        }

        // ════════════════════════════════════════════
        //  핵심 배송비 계산 및 분할 계산식 로직
        // ════════════════════════════════════════════
        function recalculateAllTotals(selectedCo = null) {
            if (!selectedCo) {
                selectedCo = document.getElementById('company-select').value;
            }
            if (!selectedCo) return;

            let totalItemsPrice = 0; // 선택한 경매 주체의 낙찰 금액 합산
            let totalShippingPrice = 0; // 합계 배송비

            // 1. 선택한 출품 업체의 낙찰 금액 집계
            allItems.forEach(it => {
                if ((it.company || '').trim() === selectedCo) {
                    totalItemsPrice += (parseFloat(it.soldPrice || it.sold_price) || 0);
                }
            });

            // 2. 낙찰자 그룹별 배송비 계산 (+7,000원 추가 수수료 및 출품 업체별 분할 청구 적용)
            Object.keys(winnerGroupsData).forEach(groupIdx => {
                const group = winnerGroupsData[groupIdx];
                const type = group.shipping_type;

                if (type === '직접수령') {
                    document.getElementById(`cost-display-${groupIdx}`).textContent = '0원';
                    return;
                }

                // 배송비 책정 (거점 기준 기본료)
                let baseCost = 5000;
                if (group.shipping_company === '도도시' || group.shipping_company === '파르게' || group.shipping_company === '랩팡') {
                    const selectHub = document.getElementById(`select-hub-${groupIdx}`);
                    if (selectHub) {
                        const selectedOpt = selectHub.options[selectHub.selectedIndex];
                        if (selectedOpt) {
                            baseCost = parseInt(selectedOpt.getAttribute('data-cost')) || 5000;
                        }
                    }
                } else {
                    baseCost = 0; // 기타 수동은 일단 0원 시작
                }

                // 그룹 내 고유 출품 업체 집계
                const uniqueCompaniesInGroup = [...new Set(group.items.map(it => (it.company || '').trim()))];
                const companyCount = uniqueCompaniesInGroup.length;

                // 🌟 요건 반영: 다른 낙찰자가 여러 업체꺼를 구매한 경우, X2 배송비가 아니라 +7,000원 추가
                // 예: 2개 업체 낙찰시 기본료(5,000원) + 7,000원 = 12,000원
                let totalGroupShipping = baseCost;
                if (companyCount > 1) {
                    totalGroupShipping = baseCost + (companyCount - 1) * 7000;
                }

                // 🌟 요건 반영: 배송비를 업체끼리 나눠서 분할 청구
                const splitCostPerCompany = Math.round(totalGroupShipping / companyCount);

                // 현재 선택한 경매 주체(selectedCo)가 이 낙찰자 그룹에 포함되어 있다면
                // 배송비 총액에 해당 분할 금액을 더해줍니다.
                const hasSelectedCo = uniqueCompaniesInGroup.indexOf(selectedCo) >= 0;
                if (hasSelectedCo) {
                    totalShippingPrice += splitCostPerCompany;
                }

                // 화면에 배송비 정보 상세히 표시
                const displayLabel = document.getElementById(`cost-split-lbl-${groupIdx}`);
                const costDisplay = document.getElementById(`cost-display-${groupIdx}`);

                if (companyCount > 1) {
                    displayLabel.innerHTML = `예상 배송비 (총 ${companyCount}개 업체 묶음배송: <strong>총 ${totalGroupShipping.toLocaleString()}원</strong>)`;
                    costDisplay.innerHTML = `<span style="font-size:12px;color:var(--text-secondary);font-weight:normal;">분할 청구액:</span> ${splitCostPerCompany.toLocaleString()}원`;
                } else {
                    displayLabel.innerHTML = '예상 배송비';
                    costDisplay.innerHTML = `${totalGroupShipping.toLocaleString()}원`;
                }
            });

            // 3. 총합 바인딩
            document.getElementById('summary-items-price').textContent = totalItemsPrice + '만';
            document.getElementById('summary-shipping-price').textContent = totalShippingPrice.toLocaleString() + '원';
            
            let totalStr = totalItemsPrice + '만';
            if (totalShippingPrice > 0) {
                totalStr += ' + ' + totalShippingPrice.toLocaleString() + '원';
            }
            document.getElementById('summary-total-price').textContent = totalStr;
        }

        // ════════════════════════════════════════════
        //  데이터베이스 제출
        // ════════════════════════════════════════════
        async function submitAllShippingInfo() {
            const selectedCo = document.getElementById('company-select').value;
            const groups = Object.values(winnerGroupsData);

            if (groups.length === 0) {
                showToast('제출할 배송 정보 목록이 없습니다.', true);
                return;
            }

            showLoading(true, '배송 및 분할 청구 금액을 저장하는 중...');
            try {
                // 각 낙찰자 그룹을 순회하며 DB에 일괄 저장
                for (let i = 0; i < groups.length; i++) {
                    const group = groups[i];
                    const type = group.shipping_type;

                    // 그룹 내 고유 출품 업체 리스트
                    const uniqueCompaniesInGroup = [...new Set(group.items.map(it => (it.company || '').trim()))];
                    const companyCount = uniqueCompaniesInGroup.length;

                    // 이 그룹의 전체 배송비 계산
                    let baseCost = 5000;
                    if (type === '배송' && (group.shipping_company === '도도시' || group.shipping_company === '파르게' || group.shipping_company === '랩팡')) {
                        const selectHub = document.getElementById(`select-hub-${i}`);
                        if (selectHub) {
                            const selectedOpt = selectHub.options[selectHub.selectedIndex];
                            if (selectedOpt) {
                                baseCost = parseInt(selectedOpt.getAttribute('data-cost')) || 5000;
                            }
                        }
                    } else if (type === '직접수령') {
                        baseCost = 0;
                    } else {
                        baseCost = 0; //기타 수동
                    }

                    let totalGroupShipping = baseCost;
                    if (type === '배송' && companyCount > 1) {
                        totalGroupShipping = baseCost + (companyCount - 1) * 7000;
                    }
                    // 업체당 분할 비용
                    const splitCostPerCompany = type === '배송' ? Math.round(totalGroupShipping / companyCount) : 0;

                    // 자사(selectedCo) 아이템과 타사 아이템별로 배송비를 나누어 저장
                    // (자사 아이템 중 첫 번째 개체에만 분할된 배송비 cost를 부과하고 나머지는 0원)
                    let selfItemAssigned = false;
                    for (const it of group.items) {
                        const itCompany = (it.company || '').trim();
                        
                        // 자사 출품 아이템인 경우
                        if (itCompany === selectedCo) {
                            let shipping_type = type;
                            let shipping_company = '';
                            let shipping_region = '';
                            let shipping_cost = 0;

                            if (type === '배송') {
                                shipping_company = group.shipping_company;
                                if (shipping_company === '기타 (직접입력)') {
                                    shipping_region = group.shipping_region || '상세주소 미입력';
                                } else {
                                    shipping_region = `${group.shipping_region} (${group.shipping_hub})`;
                                }
                                // 첫 개체에만 분할 배송비 부과
                                if (!selfItemAssigned) {
                                    shipping_cost = splitCostPerCompany;
                                    selfItemAssigned = true;
                                }
                            }

                            await updateItemShipping(it.row, {
                                shipping_type,
                                shipping_company,
                                shipping_region,
                                shipping_cost
                            });
                        }
                    }
                }

                showToast('출품 업체별 배송비 분할 정보가 정상 제출되었습니다! 🚚');
                
                // 최신 데이터 조회 및 리스트 리프레시
                const items = await getItems();
                allItems = (items || []).filter(it => it.status && it.status.indexOf('낙찰') >= 0);
                renderFilteredGroups();

            } catch (err) {
                console.error(err);
                showToast('저장 중 오류 발생: ' + err.message, true);
            } finally {
                showLoading(false);
            }
        }

        // 전화번호 포맷 헬퍼
        function fmtPhone(raw) {
            var ph = (raw || '').replace(/[^0-9]/g, '');
            if (ph.length === 8) ph = '010' + ph;
            if (ph.length === 11) return ph.slice(0, 3) + '-' + ph.slice(3, 7) + '-' + ph.slice(7);
            if (ph.length === 10) return ph.slice(0, 3) + '-' + ph.slice(3, 6) + '-' + ph.slice(6);
            return ph;
        }
    </script>
