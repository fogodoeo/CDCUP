<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CDCUP - 낙찰 배송 정보 등록</title>
    <script src="supabase-bridge.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard-dynamic-subset.css" />
    <style>
        :root {
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --text-title: #0F172A;
            --text: #334155;
            --text-secondary: #64748B;
            --accent: #2563EB;
            --accent-hover: #1D4ED8;
            --accent-light: rgba(37, 99, 235, 0.06);
            --border: #E2E8F0;
            --radius: 8px;
            --shadow: 0 1px 3px rgba(0,0,0,0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-title);
        }

        .header p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        /* 컨트롤 영역 */
        .control-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-group label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .input-text {
            padding: 8px 12px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            font-family: inherit;
            background: white;
        }

        .input-text:focus {
            border-color: var(--accent);
        }

        .select-custom {
            padding: 8px 12px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            font-family: inherit;
            background: white;
            cursor: pointer;
        }

        .select-custom:focus {
            border-color: var(--accent);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: white;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: #E2E8F0;
            color: #475569;
        }

        .btn-secondary:hover {
            background: #CBD5E1;
        }

        /* 그리드 테이블 */
        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 20px;
        }

        .grid-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: left;
        }

        .grid-table th {
            background: #F1F5F9;
            color: var(--text-title);
            font-weight: 700;
            padding: 10px 12px;
            border-bottom: 1.5px solid var(--border);
            white-space: nowrap;
        }

        .grid-table td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .grid-table tr:hover {
            background: #F8FAFC;
        }

        /* 합배송 정보 텍스트 */
        .combined-shipping-badge {
            font-size: 11px;
            color: #D97706;
            background: #FEF3C7;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            display: inline-block;
            margin-top: 4px;
        }

        /* 가격 표시 */
        .price-sold {
            font-weight: 700;
            color: var(--text-title);
        }

        .price-shipping {
            font-weight: 700;
            color: var(--accent);
        }

        .price-total {
            font-weight: 800;
            color: #E11D48;
            font-size: 14px;
        }

        /* 토스트 */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #0F172A;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            z-index: 1000;
            opacity: 0;
            transition: transform 0.3s, opacity 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 로딩 */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.7);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>낙찰자 배송/수령 관리</h1>
            <p>출품 업체별 낙찰 개체 확인, 배송 옵션 일괄 계산 및 안내 금액 조회 페이지입니다.</p>
        </div>

        <!-- 1단계: 업체 필터 바 -->
        <div class="card" style="padding: 14px 20px;">
            <div class="control-row">
                <div class="control-group" style="width: 160px;">
                    <label>출품 업체 필터</label>
                    <input type="text" id="company-filter-input" class="input-text" placeholder="업체명 검색..." oninput="onCompanyFilterInput()">
                </div>
                <div class="control-group" style="width: 200px;">
                    <label>출품 업체 선택</label>
                    <select id="company-select" class="select-custom" onchange="onCompanySelectChange()">
                        <!-- 동적 로딩 -->
                    </select>
                </div>
                <button class="btn btn-secondary" onclick="clearCompanyFilter()" style="margin-top: 16px;">필터 초기화</button>
                
                <button class="btn" onclick="submitAllShippingInfo()" style="margin-top: 16px; margin-left: auto;">
                    💾 설정 일괄 저장
                </button>
            </div>
        </div>

        <!-- 2단계: 개체별 배송 관리 그리드 테이블 -->
        <div class="card">
            <div class="table-wrap">
                <table class="grid-table">
                    <thead>
                        <tr>
                            <th style="width: 120px;">개체명</th>
                            <th style="width: 100px;">낙찰자</th>
                            <th style="width: 110px;">연락처</th>
                            <th style="width: 120px;">배송 방식</th>
                            <th style="width: 160px;">지역 거점샵 / 입력</th>
                            <th style="width: 90px;">개별 배송비</th>
                            <th style="width: 130px;">최종 안내 금액</th>
                            <th>메모 / 상세주소</th>
                        </tr>
                    </thead>
                    <tbody id="grid-tbody">
                        <tr>
                            <td colspan="8" style="text-align: center; padding: 40px; color: var(--text-secondary);">출품 업체를 선택해 주세요.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 토스트 & 로딩 -->
    <div class="toast" id="toast"></div>
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div style="font-weight: 700; color: var(--text-title); font-size: 13px;" id="loading-text">로딩 중...</div>
    </div>

    <script>
        // 거점 가격표 데이터베이스
        const SHIPPING_DATA = {
            '픽업': {
                regions: { '직접수령': [{ shop: '현장 직접수령', cost: 0 }] }
            },
            '도도시': {
                regions: {
                    '서울': [
                        { shop: '도도시 강남 거점샵', cost: 5000 },
                        { shop: '도도시 홍대 거점샵', cost: 5000 },
                        { shop: '도도시 노원 거점샵', cost: 5000 }
                    ],
                    '경기': [
                        { shop: '도도시 일산 거점샵', cost: 5000 },
                        { shop: '도도시 수원 거점샵', cost: 5000 },
                        { shop: '도도시 분당 거점샵', cost: 5000 }
                    ],
                    '인천': [
                        { shop: '도도시 부평 거점샵', cost: 5000 }
                    ],
                    '기타지방': [
                        { shop: '도도시 대전 거점샵', cost: 5000 },
                        { shop: '도도시 대구 거점샵', cost: 5000 },
                        { shop: '도도시 부산 거점샵', cost: 5000 },
                        { shop: '도도시 광주 거점샵', cost: 5000 },
                        { shop: '도도시 제주 거점샵', cost: 10000 }
                    ]
                }
            },
            '파르게': {
                regions: {
                    '수도권': [
                        { shop: '파르게 서울본점', cost: 5000 },
                        { shop: '파르게 경기점', cost: 5000 }
                    ],
                    '지방거점': [
                        { shop: '파르게 대전점', cost: 5000 },
                        { shop: '파르게 대구점', cost: 5000 },
                        { shop: '파르게 부산점', cost: 5000 }
                    ]
                }
            },
            '랩팡': {
                regions: {
                    '수도권': [
                        { shop: '랩팡 서울거점', cost: 5000 },
                        { shop: '랩팡 수원거점', cost: 5000 }
                    ],
                    '지방거점': [
                        { shop: '랩팡 대전거점', cost: 5000 },
                        { shop: '랩팡 부산거점', cost: 5000 }
                    ]
                }
            },
            '기타 (직접입력)': {
                regions: { '기타': [{ shop: '직접 기입 주소', cost: 0 }] }
            }
        };

        let allItems = [];
        let uniqueSellerCompanies = [];
        let winnerStateMap = {}; // 낙찰자별 배송 설정 상태 맵

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isError ? '#EF4444' : '#0F172A';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function showLoading(active, text = '로딩 중...') {
            const overlay = document.getElementById('loading-overlay');
            const txt = document.getElementById('loading-text');
            txt.textContent = text;
            if (active) overlay.classList.add('active');
            else overlay.classList.remove('active');
        }

        window.addEventListener('DOMContentLoaded', async () => {
            showLoading(true, '데이터를 불러오는 중...');
            try {
                const items = await getItems();
                allItems = (items || []).filter(it => it.status && it.status.indexOf('낙찰') >= 0);

                const companies = allItems.map(it => (it.company || '').trim()).filter(Boolean);
                uniqueSellerCompanies = [...new Set(companies)].sort();

                populateCompanySelect();
                renderGrid();
            } catch (err) {
                console.error(err);
                showToast('로딩 실패: ' + err.message, true);
            } finally {
                showLoading(false);
            }
        });

        function populateCompanySelect(filteredList = null) {
            const select = document.getElementById('company-select');
            const list = filteredList || uniqueSellerCompanies;

            if (list.length === 0) {
                select.innerHTML = '<option value="">출품 업체 없음</option>';
                return;
            }

            select.innerHTML = list.map(c => `<option value="${c}">${c}</option>`).join('');
            select.value = list[0] || '';
        }

        function onCompanyFilterInput() {
            const q = document.getElementById('company-filter-input').value.trim().toLowerCase();
            if (!q) {
                populateCompanySelect();
                renderGrid();
                return;
            }

            const filtered = uniqueSellerCompanies.filter(c => c.toLowerCase().indexOf(q) >= 0);
            populateCompanySelect(filtered);
            renderGrid();
        }

        function clearCompanyFilter() {
            document.getElementById('company-filter-input').value = '';
            populateCompanySelect();
            renderGrid();
        }

        function onCompanySelectChange() {
            renderGrid();
        }

        // ════════════════════════════════════════════
        //  그리드 테이블 렌더링 & 실시간 계산
        // ════════════════════════════════════════════
        function renderGrid() {
            const selectedCo = document.getElementById('company-select').value;
            const tbody = document.getElementById('grid-tbody');
            tbody.innerHTML = '';
            winnerStateMap = {};

            if (!selectedCo) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-secondary);">출품 업체를 선택해 주세요.</td></tr>';
                return;
            }

            // 1. 해당 출품 업체의 낙찰 데이터 선별
            const selfItems = allItems.filter(it => (it.company || '').trim() === selectedCo);
            if (selfItems.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-secondary);">'${selectedCo}'의 낙찰 정보가 없습니다.</td></tr>`;
                return;
            }

            // 2. 낙찰자별 그룹핑
            const winnerGroups = {};
            selfItems.forEach(it => {
                const winnerName = (it.winner || '').replace(/[\[\]]/g, '').trim().split('/')[0].trim();
                if (!winnerGroups[winnerName]) {
                    winnerGroups[winnerName] = [];
                }
                winnerGroups[winnerName].push(it);
            });

            // 3. 각 낙찰자 그룹에 대한 배송 상태 분석 및 행 렌더링
            Object.keys(winnerGroups).forEach(winnerName => {
                const groupItems = winnerGroups[winnerName];

                // 낙찰자가 가져간 전체 개체 (타사 출품 포함)
                const winnerAllItems = allItems.filter(it => {
                    const clean = (it.winner || '').replace(/[\[\]]/g, '').trim().split('/')[0].trim();
                    return clean === winnerName;
                });

                // 이 낙찰자가 낙찰받은 고유 출품사 목록
                const sellerCos = [...new Set(winnerAllItems.map(it => (it.company || '').trim()))];
                
                // 첫 자사 개체 기준 배송 기본 설정 로딩
                const firstSelfItem = groupItems[0];
                const currentType = firstSelfItem.shipping_type || '직접수령';
                const currentCompany = firstSelfItem.shipping_company || '도도시';
                const fullRegion = firstSelfItem.shipping_region || '';
                const currentRegion = fullRegion.split(' ')[0] || '';
                const currentHub = fullRegion.indexOf('(') >= 0 ? fullRegion.slice(fullRegion.indexOf('(') + 1, -1) : '';

                winnerStateMap[winnerName] = {
                    allItems: winnerAllItems,
                    sellerCompanies: sellerCos,
                    shipping_type: currentType,
                    shipping_company: currentCompany,
                    shipping_region: currentRegion,
                    shipping_hub: currentHub,
                    phone: firstSelfItem.winner_phone || ''
                };

                // 개별 개체 행 추가
                groupItems.forEach(it => {
                    const tr = document.createElement('tr');
                    tr.id = `row-${it.row}`;

                    const otherCos = sellerCos.filter(c => c !== selectedCo);
                    const isCombined = otherCos.length > 0;
                    const combinedBadge = isCombined ? `<br><span class="combined-shipping-badge">합배송: ${otherCos.join(', ')}</span>` : '';

                    const typeOptions = ['픽업', '도도시', '파르게', '랩팡', '기타'];
                    const typeSelectHtml = `
                        <select class="select-custom" id="type-${it.row}" onchange="changeRowType(${it.row}, '${winnerName}')">
                            ${typeOptions.map(t => `<option value="${t}" ${
                                (currentType === '직접수령' && t === '픽업') ||
                                (currentType === '배송' && currentCompany === t) ||
                                (currentType === '배송' && currentCompany !== '도도시' && currentCompany !== '파르게' && currentCompany !== '랩팡' && t === '기타')
                                ? 'selected' : ''
                            }>${t}</option>`).join('')}
                        </select>
                    `;

                    tr.innerHTML = `
                        <td style="font-weight: 700; color: var(--text-title);">${it.name || '이름 없음'}</td>
                        <td><span style="font-weight: 700;">${winnerName}</span>${combinedBadge}</td>
                        <td>${fmtPhone(it.winner_phone)}</td>
                        <td>${typeSelectHtml}</td>
                        <td>
                            <div id="shipping-controls-${it.row}" style="display: ${currentType === '배송' ? 'flex' : 'none'}; gap: 4px; align-items: center;">
                                <input type="text" class="input-text" id="custom-company-${it.row}" placeholder="배송사 직접기입" style="display:none; width: 100px;" oninput="onCustomCompanyInput(${it.row}, '${winnerName}')">
                                <select class="select-custom" id="region-${it.row}" style="width: 80px;" onchange="changeRowRegion(${it.row}, '${winnerName}')"></select>
                                <select class="select-custom" id="hub-${it.row}" style="width: 120px;" onchange="changeRowHub(${it.row}, '${winnerName}')"></select>
                                <input type="text" class="input-text" id="custom-region-${it.row}" placeholder="주소 직접기입" style="display:none; width: 140px;" oninput="onCustomRegionInput(${it.row}, '${winnerName}')">
                            </div>
                            <span id="pickup-lbl-${it.row}" style="display: ${currentType === '직접수령' ? 'inline' : 'none'}; color: var(--text-secondary);">현장 직접 수령</span>
                        </td>
                        <td id="cost-${it.row}" class="price-shipping">0원</td>
                        <td id="total-${it.row}" class="price-total">0원</td>
                        <td>
                            <input type="text" class="input-text" id="memo-${it.row}" placeholder="메모 또는 상세주소" style="width: 100%; border: none; border-bottom: 1px solid var(--border); border-radius: 0; padding: 2px;" value="${it.shipping_region && it.shipping_company && it.shipping_company.indexOf('기타') >= 0 ? it.shipping_region : ''}">
                        </td>
                    `;

                    tbody.appendChild(tr);

                    const companyKey = currentType === '직접수령' ? '픽업' : currentCompany;
                    populateRowInputs(it.row, winnerName, companyKey, currentRegion, currentHub);
                });

                // 합계 행 추가 (낙찰자별 합배송/묶음 정산 금액 표시)
                const subtotalTr = document.createElement('tr');
                subtotalTr.style.background = '#EEF2F6';
                subtotalTr.style.borderTop = '1.5px solid var(--border)';
                subtotalTr.style.borderBottom = '2px solid var(--border)';
                subtotalTr.innerHTML = `
                    <td colspan="5" style="text-align: right; font-weight: 700; color: var(--text-title); padding: 10px 12px;">
                        <strong>${winnerName}님 안내 합계:</strong>
                    </td>
                    <td id="subtotal-cost-${winnerName}" style="font-weight: 700; color: var(--accent); padding: 10px 12px;">0원</td>
                    <td id="subtotal-total-${winnerName}" style="font-weight: 900; color: #E11D48; font-size: 14px; padding: 10px 12px;">0원</td>
                    <td style="padding: 6px 12px; text-align: center;">
                        <button class="btn btn-secondary" style="padding: 4px 10px; font-size: 11px; font-weight: 800;" onclick="copyBillingMessage('${winnerName}')">
                            안내 메시지 복사
                        </button>
                    </td>
                `;
                tbody.appendChild(subtotalTr);
            });

            recalculateAllCosts();
        }

        // 인풋 세팅
        function populateRowInputs(rowId, winnerName, companyKey, selectedRegion = null, selectedHub = null) {
            const selectRegion = document.getElementById(`region-${rowId}`);
            const selectHub = document.getElementById(`hub-${rowId}`);
            const customComp = document.getElementById(`custom-company-${rowId}`);
            const customReg = document.getElementById(`custom-region-${rowId}`);

            if (!selectRegion || !selectHub) return;

            if (companyKey === '픽업') {
                return;
            }

            if (companyKey !== '도도시' && companyKey !== '파르게' && companyKey !== '랩팡') {
                // 기타 직접입력
                customComp.style.display = 'inline-block';
                selectRegion.style.display = 'none';
                selectHub.style.display = 'none';
                customReg.style.display = 'inline-block';
                return;
            }

            customComp.style.display = 'none';
            selectRegion.style.display = 'inline-block';
            selectHub.style.display = 'inline-block';
            customReg.style.display = 'none';

            const companyData = SHIPPING_DATA[companyKey];
            if (!companyData) return;

            // 지역 채우기
            const regions = Object.keys(companyData.regions);
            selectRegion.innerHTML = regions.map(r => `<option value="${r}">${r}</option>`).join('');
            if (selectedRegion && companyData.regions[selectedRegion]) {
                selectRegion.value = selectedRegion;
            }

            // 거점샵 채우기
            populateRowHubs(rowId, winnerName, companyKey, selectRegion.value, selectedHub);
        }

        function populateRowHubs(rowId, winnerName, companyKey, regionName, selectedHub = null) {
            const selectHub = document.getElementById(`hub-${rowId}`);
            if (!selectHub) return;

            const hubs = SHIPPING_DATA[companyKey].regions[regionName] || [];
            selectHub.innerHTML = hubs.map(h => `<option value="${h.shop}" data-cost="${h.cost}">${h.shop} (${h.cost.toLocaleString()}원)</option>`).join('');

            if (selectedHub) {
                const matched = hubs.find(h => h.shop === selectedHub);
                if (matched) selectHub.value = selectedHub;
            }

            winnerStateMap[winnerName].shipping_hub = selectHub.value;
        }

        // 배송사 변경시 낙찰자가 보유한 자사의 모든 개체 행 설정을 동기화
        function changeRowType(rowId, winnerName) {
            const val = document.getElementById(`type-${rowId}`).value;
            const state = winnerStateMap[winnerName];

            const selfItemsOfWinner = getSelfItemsOfWinner(winnerName);

            // 동일 낙찰자 행 일괄 적용
            selfItemsOfWinner.forEach(it => {
                const typeSelect = document.getElementById(`type-${it.row}`);
                if (typeSelect) typeSelect.value = val;

                const controls = document.getElementById(`shipping-controls-${it.row}`);
                const pickupLbl = document.getElementById(`pickup-lbl-${it.row}`);

                if (val === '픽업') {
                    if (controls) controls.style.display = 'none';
                    if (pickupLbl) pickupLbl.style.display = 'inline';
                } else {
                    if (controls) controls.style.display = 'flex';
                    if (pickupLbl) pickupLbl.style.display = 'none';
                }
            });

            // 내부 상태 변경
            if (val === '픽업') {
                state.shipping_type = '직접수령';
                state.shipping_company = '';
                state.shipping_region = '';
                state.shipping_hub = '';
            } else {
                state.shipping_type = '배송';
                state.shipping_company = val;
            }

            selfItemsOfWinner.forEach(it => {
                if (val !== '픽업') {
                    populateRowInputs(it.row, winnerName, val);
                }
            });

            recalculateAllCosts();
        }

        function changeRowRegion(rowId, winnerName) {
            const selectRegion = document.getElementById(`region-${rowId}`);
            const state = winnerStateMap[winnerName];
            state.shipping_region = selectRegion.value;

            const selfItemsOfWinner = getSelfItemsOfWinner(winnerName);
            selfItemsOfWinner.forEach(it => {
                const rSelect = document.getElementById(`region-${it.row}`);
                if (rSelect) rSelect.value = selectRegion.value;
                populateRowHubs(it.row, winnerName, state.shipping_company, selectRegion.value);
            });

            recalculateAllCosts();
        }

        function changeRowHub(rowId, winnerName) {
            const selectHub = document.getElementById(`hub-${rowId}`);
            const state = winnerStateMap[winnerName];
            state.shipping_hub = selectHub.value;

            const selfItemsOfWinner = getSelfItemsOfWinner(winnerName);
            selfItemsOfWinner.forEach(it => {
                const hSelect = document.getElementById(`hub-${it.row}`);
                if (hSelect) hSelect.value = selectHub.value;
            });

            recalculateAllCosts();
        }

        function onCustomCompanyInput(rowId, winnerName) {
            const inputVal = document.getElementById(`custom-company-${rowId}`).value.trim();
            winnerStateMap[winnerName].shipping_company = inputVal || '기타';

            const selfItemsOfWinner = getSelfItemsOfWinner(winnerName);
            selfItemsOfWinner.forEach(it => {
                const cInput = document.getElementById(`custom-company-${it.row}`);
                if (cInput) cInput.value = inputVal;
            });
            recalculateAllCosts();
        }

        function onCustomRegionInput(rowId, winnerName) {
            const inputVal = document.getElementById(`custom-region-${rowId}`).value.trim();
            winnerStateMap[winnerName].shipping_region = inputVal || '기타';

            const selfItemsOfWinner = getSelfItemsOfWinner(winnerName);
            selfItemsOfWinner.forEach(it => {
                const rInput = document.getElementById(`custom-region-${it.row}`);
                if (rInput) rInput.value = inputVal;
            });
            recalculateAllCosts();
        }

        function getSelfItemsOfWinner(winnerName) {
            const selectedCo = document.getElementById('company-select').value;
            return allItems.filter(it => {
                const clean = (it.winner || '').replace(/[\[\]]/g, '').trim().split('/')[0].trim();
                return clean === winnerName && (it.company || '').trim() === selectedCo;
            });
        }

        // ════════════════════════════════════════════
        //  비용 계산 로직 (합배송 +7,000 및 1/N 분할 계산)
        // ════════════════════════════════════════════
        function recalculateAllCosts() {
            const selectedCo = document.getElementById('company-select').value;
            if (!selectedCo) return;

            let grandTotalItemsPrice = 0;
            let grandTotalShippingPrice = 0;

            // 자사 출품 아이템 집계
            const selfItems = allItems.filter(it => (it.company || '').trim() === selectedCo);
            selfItems.forEach(it => {
                grandTotalItemsPrice += (parseFloat(it.soldPrice || it.sold_price) || 0);
            });

            // 각 낙찰자별 배송 정보 계산
            Object.keys(winnerStateMap).forEach(winnerName => {
                const state = winnerStateMap[winnerName];
                const type = state.shipping_type;
                const companyCount = state.sellerCompanies.length; // 전체 낙찰받은 출품 업체수
                const selfItemsOfWinner = getSelfItemsOfWinner(winnerName);
                const winnerBidTotal = selfItemsOfWinner.reduce((sum, it) => sum + (parseFloat(it.soldPrice || it.sold_price) || 0), 0);

                if (type === '직접수령') {
                    // 수령방법 픽업 시: 배송비 0원
                    selfItemsOfWinner.forEach(it => {
                        document.getElementById(`cost-${it.row}`).textContent = '0원';
                        const itemSold = parseFloat(it.soldPrice || it.sold_price) || 0;
                        document.getElementById(`total-${it.row}`).textContent = itemSold + '만';
                    });
                    
                    // 서브토탈 갱신
                    const subCostEl = document.getElementById(`subtotal-cost-${winnerName}`);
                    const subTotalEl = document.getElementById(`subtotal-total-${winnerName}`);
                    if (subCostEl) subCostEl.textContent = '0원';
                    if (subTotalEl) subTotalEl.textContent = winnerBidTotal + '만';
                    return;
                }

                // 배송비 계산
                let baseCost = 5000;
                if (state.shipping_company === '도도시' || state.shipping_company === '파르게' || state.shipping_company === '랩팡') {
                    // 매칭되는 거점의 금액 추출
                    const compData = SHIPPING_DATA[state.shipping_company];
                    if (compData && compData.regions[state.shipping_region]) {
                        const matchedHub = compData.regions[state.shipping_region].find(h => h.shop === state.shipping_hub);
                        if (matchedHub) baseCost = matchedHub.cost;
                    }
                } else {
                    baseCost = 0; // 기타
                }

                // 합배송 청구 규칙: 기본료 + (업체수 - 1) * 7000
                let totalGroupShipping = baseCost;
                if (companyCount > 1) {
                    totalGroupShipping = baseCost + (companyCount - 1) * 7000;
                }

                // 1/N 배송비 분할 금액
                const splitCostPerCompany = Math.round(totalGroupShipping / companyCount);

                // 현재 선택한 자사 개체들에 배송비 배정 (첫 자사 개체 행에만 부과하고 나머지는 0원)
                selfItemsOfWinner.forEach((it, idx) => {
                    const rowCost = (idx === 0) ? splitCostPerCompany : 0;
                    document.getElementById(`cost-${it.row}`).textContent = rowCost.toLocaleString() + '원';

                    // 최종 안내 금액: 낙찰가만 + 배송비
                    const itemSold = parseFloat(it.soldPrice || it.sold_price) || 0;
                    let displayTotal = itemSold + '만';
                    if (rowCost > 0) {
                        displayTotal += ' ' + rowCost.toLocaleString() + '원';
                    }
                    document.getElementById(`total-${it.row}`).textContent = displayTotal;

                    // 전체 합산 누적
                    if (idx === 0) {
                        grandTotalShippingPrice += splitCostPerCompany;
                    }
                });

                // 서브토탈 갱신
                const subCostEl = document.getElementById(`subtotal-cost-${winnerName}`);
                const subTotalEl = document.getElementById(`subtotal-total-${winnerName}`);
                if (subCostEl) {
                    subCostEl.textContent = splitCostPerCompany.toLocaleString() + '원';
                }
                if (subTotalEl) {
                    let totalValStr = winnerBidTotal + '만';
                    if (splitCostPerCompany > 0) {
                        totalValStr += ' + ' + splitCostPerCompany.toLocaleString() + '원';
                    }
                    subTotalEl.textContent = totalValStr;
                }
            });

            // 화면 하단 종합 바인딩
            document.getElementById('summary-items-price').textContent = grandTotalItemsPrice + '만';
            document.getElementById('summary-shipping-price').textContent = grandTotalShippingPrice.toLocaleString() + '원';
            
            let totalStr = grandTotalItemsPrice + '만';
            if (grandTotalShippingPrice > 0) {
                totalStr += ' + ' + grandTotalShippingPrice.toLocaleString() + '원';
            }
            document.getElementById('summary-total-price').textContent = totalStr;
        }

        // 안내 메시지 클립보드 복사
        function copyBillingMessage(winnerName) {
            const state = winnerStateMap[winnerName];
            const selfItems = getSelfItemsOfWinner(winnerName);
            const itemNames = selfItems.map(it => it.name).join(', ');
            const totalBid = selfItems.reduce((sum, it) => sum + (parseFloat(it.soldPrice || it.sold_price) || 0), 0);
            
            const firstSelfItem = selfItems[0];
            const costCell = document.getElementById(`cost-${firstSelfItem.row}`);
            const shippingCost = costCell ? parseInt(costCell.textContent.replace(/[^0-9]/g, '')) || 0 : 0;
            
            const grandTotal = (totalBid * 10000) + shippingCost;
            
            const shippingDesc = state.shipping_type === '직접수령' 
                ? '현장 직접수령' 
                : `${state.shipping_company} (${state.shipping_region}${state.shipping_hub ? ' ' + state.shipping_hub : ''})`;

            const msg = `${winnerName}님, 낙찰 및 배송비 정산 안내드립니다.

■ 낙찰 개체: ${itemNames}
■ 낙찰 금액: ${totalBid.toLocaleString()}만원
■ 수령 방식: ${shippingDesc}
■ 배송비: ${shippingCost.toLocaleString()}원 (묶음배송/분할 적용)

★ 최종 입금 금액: ${grandTotal.toLocaleString()}원

계좌정보를 확인하시어 입금해 주시기 바랍니다. 감사합니다.`;

            navigator.clipboard.writeText(msg).then(() => {
                showToast('안내 메시지가 클립보드에 복사되었습니다! 📋');
            }).catch(err => {
                console.error(err);
                showToast('복사 실패. 브라우저 설정을 확인해주세요.', true);
            });
        }

        // ════════════════════════════════════════════
        //  저장 로직
        // ════════════════════════════════════════════
        async function submitAllShippingInfo() {
            const selectedCo = document.getElementById('company-select').value;
            if (!selectedCo) return;

            const selfItems = allItems.filter(it => (it.company || '').trim() === selectedCo);
            if (selfItems.length === 0) {
                showToast('저장할 개체가 없습니다.', true);
                return;
            }

            showLoading(true, '배송 설정을 데이터베이스에 저장 중...');
            try {
                for (let i = 0; i < selfItems.length; i++) {
                    const it = selfItems[i];
                    const winnerName = (it.winner || '').replace(/[\[\]]/g, '').trim().split('/')[0].trim();
                    const state = winnerStateMap[winnerName];

                    let shipping_type = state.shipping_type;
                    let shipping_company = '';
                    let shipping_region = '';
                    let shipping_cost = 0;

                    // 이 행의 개별 계산된 배송비 금액 파싱
                    const costCellText = document.getElementById(`cost-${it.row}`).textContent;
                    shipping_cost = parseInt(costCellText.replace(/[^0-9]/g, '')) || 0;

                    if (shipping_type === '배송') {
                        shipping_company = state.shipping_company;
                        if (shipping_company !== '도도시' && shipping_company !== '파르게' && shipping_company !== '랩팡') {
                            // 수동 기입 주소
                            shipping_region = document.getElementById(`custom-region-${it.row}`).value.trim() || '직접기입';
                        } else {
                            shipping_region = `${state.shipping_region} (${state.shipping_hub})`;
                        }
                    }

                    // 메모
                    const memoVal = document.getElementById(`memo-${it.row}`).value.trim();
                    if (memoVal) {
                        shipping_region = `${shipping_region} [메모: ${memoVal}]`.trim();
                    }

                    await updateItemShipping(it.row, {
                        shipping_type,
                        shipping_company,
                        shipping_region,
                        shipping_cost
                    });
                }

                showToast('배송 설정 및 분할 계산 결과가 성공적으로 저장되었습니다! 💾');
                
                // 최신 데이터 리프레시
                const items = await getItems();
                allItems = (items || []).filter(it => it.status && it.status.indexOf('낙찰') >= 0);
                renderGrid();
            } catch (e) {
                console.error(e);
                showToast('저장 실패: ' + e.message, true);
            } finally {
                showLoading(false);
            }
        }

        // 전화번호 포맷 헬퍼
        function fmtPhone(raw) {
            var ph = (raw || '').replace(/[^0-9]/g, '');
            if (ph.length === 8) ph = '010' + ph;
            if (ph.length === 11) return ph.slice(0, 3) + '-' + ph.slice(3, 7) + '-' + ph.slice(7);
            if (ph.length === 10) return ph.slice(0, 3) + '-' + ph.slice(3, 6) + '-' + ph.slice(6);
            return ph;
        }
    </script>
