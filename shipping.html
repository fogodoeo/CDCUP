<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CDCUP - 배송/수령 정보 등록</title>
    <script src="supabase-bridge.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard-dynamic-subset.css" />
    <style>
        :root {
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --text-title: #0F172A;
            --text: #334155;
            --text-secondary: #64748B;
            --accent: #2563EB;
            --accent-hover: #1D4ED8;
            --accent-light: rgba(37, 99, 235, 0.06);
            --border: #E2E8F0;
            --radius: 8px;
            --shadow: 0 1px 3px rgba(0,0,0,0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 680px;
        }

        /* 어드민 모드일 때는 가로를 넓게 설정 */
        body.admin-mode .container {
            max-width: 1200px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-title);
        }

        .header p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            width: 100%;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .search-item {
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .search-item:last-child {
            border-bottom: none;
        }
        .search-item:hover {
            background: var(--bg);
        }
        .search-item-title {
            font-weight: 600;
            color: var(--text-title);
        }
        .search-item-region {
            font-size: 11px;
            color: var(--text-secondary);
            background: #E2E8F0;
            padding: 1px 6px;
            border-radius: 4px;
        }
        .search-item-price {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
        }

        .control-group label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .input-text {
            padding: 8px 12px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            font-family: inherit;
            background: white;
            width: 100%;
        }

        .input-text:focus {
            border-color: var(--accent);
        }

        .select-custom {
            padding: 8px 12px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            font-family: inherit;
            background: white;
            cursor: pointer;
        }

        .select-custom:focus {
            border-color: var(--accent);
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: white;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: #E2E8F0;
            color: #475569;
        }

        .btn-secondary:hover {
            background: #CBD5E1;
        }

        .btn-full {
            width: 100%;
            padding: 12px;
            font-size: 14px;
        }

        /* 테이블 구조 */
        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 20px;
        }

        .grid-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: left;
        }

        .grid-table th {
            background: #F1F5F9;
            color: var(--text-title);
            font-weight: 700;
            padding: 10px 12px;
            border-bottom: 1.5px solid var(--border);
            white-space: nowrap;
        }

        .grid-table td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .grid-table tr:hover {
            background: #F8FAFC;
        }

        .combined-shipping-badge {
            font-size: 11px;
            color: #D97706;
            background: #FEF3C7;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            display: inline-block;
            margin-top: 4px;
        }

        .price-shipping {
            font-weight: 700;
            color: var(--accent);
        }

        .price-total {
            font-weight: 800;
            color: #E11D48;
            font-size: 14px;
        }

        /* 소비자/낙찰자 개별 정보 폼 */
        .buyer-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 8px;
            background: #F8FAFC;
        }

        .buyer-shipping-options {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 8px;
            margin-bottom: 12px;
        }

        .buyer-option-btn {
            padding: 12px 6px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            background: white;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .buyer-option-btn.active {
            border-color: var(--accent);
            background: var(--accent-light);
            color: var(--accent);
        }

        .buyer-form-detail {
            background: #F8FAFC;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .buyer-form-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        /* 토스트 */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #0F172A;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            z-index: 1000;
            opacity: 0;
            transition: transform 0.3s, opacity 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.7);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 어드민 전용 레이아웃 -->
        <div id="admin-view" style="display: none; width: 100%;">
            <div class="header">
                <h1>낙찰자 배송/수령 관리 (관리자)</h1>
                <p>출품 업체별 낙찰 개체 확인, 배송 옵션 일괄 계산 및 정산 테이블입니다.</p>
            </div>

            <div class="card" style="padding: 14px 20px;">
                <div class="control-row">
                    <div class="control-group" style="width: 160px;">
                        <label>출품 업체 필터</label>
                        <input type="text" id="company-filter-input" class="input-text" placeholder="업체명 검색..." oninput="onCompanyFilterInput()">
                    </div>
                    <div class="control-group" style="width: 200px;">
                        <label>출품 업체 선택</label>
                        <select id="company-select" class="select-custom" onchange="onCompanySelectChange()">
                            <!-- 동적 로딩 -->
                        </select>
                    </div>
                    <button class="btn btn-secondary" onclick="clearCompanyFilter()" style="margin-top: 16px;">필터 초기화</button>
                    
                    <button class="btn" onclick="submitAllShippingInfo()" style="margin-top: 16px; margin-left: auto;">
                        💾 설정 일괄 저장
                    </button>
                </div>
            </div>

            <div class="card">
                <div class="table-wrap">
                    <table class="grid-table">
                        <thead>
                            <tr>
                                <th style="width: 120px;">개체명</th>
                                <th style="width: 100px;">낙찰자</th>
                                <th style="width: 110px;">연락처</th>
                                <th style="width: 120px;">배송 방식</th>
                                <th style="width: 160px;">지역 거점샵 / 입력</th>
                                <th style="width: 90px;">개별 배송비</th>
                                <th style="width: 130px;">최종 안내 금액</th>
                                <th>메모 / 상세주소</th>
                            </tr>
                        </thead>
                        <tbody id="grid-tbody">
                            <tr>
                                <td colspan="8" style="text-align: center; padding: 40px; color: var(--text-secondary);">출품 업체를 선택해 주세요.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 소비자/낙찰자 직접 입력 레이아웃 -->
        <div id="buyer-view" style="display: none; width: 100%;">
            <div class="header">
                <h1>낙찰 배송 정보 등록</h1>
                <p>성함과 연락처를 입력해 배송지 또는 수령 방식을 직접 신청해 주세요.</p>
            </div>

            <!-- 본인 조회 카드 -->
            <div class="card" id="buyer-search-card">
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <div class="control-group">
                        <label>낙찰자 성함</label>
                        <input type="text" id="buyer-name-input" class="input-text" placeholder="성함 입력" onkeyup="if(event.key==='Enter') searchBuyerWins()">
                    </div>
                    <div class="control-group">
                        <label>연락처 뒷자리 (또는 전체)</label>
                        <input type="text" id="buyer-phone-input" class="input-text" placeholder="연락처 입력" onkeyup="if(event.key==='Enter') searchBuyerWins()">
                    </div>
                    <button class="btn btn-full" onclick="searchBuyerWins()">조회하기</button>
                </div>
            </div>

            <!-- 결과 및 입력 카드 -->
            <div class="card" id="buyer-form-card" style="display: none;">
                <div style="font-size: 15px; font-weight: 800; color: var(--text-title); margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px;">
                    <span id="buyer-display-title">김철수</span>님의 낙찰 목록
                </div>

                <div id="buyer-items-container" style="margin-bottom: 16px;">
                    <!-- 동적 렌더링 -->
                </div>

                <div style="font-size: 13px; font-weight: 700; color: var(--text-title); margin-bottom: 6px;">수령 방법 선택</div>
                <div class="buyer-shipping-options">
                    <button type="button" class="buyer-option-btn" id="b-opt-pickup" onclick="setBuyerShippingType('픽업')">픽업</button>
                    <button type="button" class="buyer-option-btn" id="b-opt-dodosi" onclick="setBuyerShippingType('도도시')">도도시</button>
                    <button type="button" class="buyer-option-btn" id="b-opt-parge" onclick="setBuyerShippingType('파르게')">파르게</button>
                    <button type="button" class="buyer-option-btn" id="b-opt-wrapang" onclick="setBuyerShippingType('랩팡')">랩팡</button>
                    <button type="button" class="buyer-option-btn" id="b-opt-custom" onclick="setBuyerShippingType('기타')">기타</button>
                </div>

                <!-- 배송 세부 정보 -->
                <div class="buyer-form-detail" id="buyer-detail-box" style="display: none;">
                    <div class="control-group" id="b-custom-company-group" style="display: none; margin-bottom: 8px;">
                        <label>배송업체명 직접 기입</label>
                        <input type="text" class="input-text" id="buyer-custom-company" placeholder="배송업체 기입">
                    </div>

                    <div class="control-group" id="b-hub-search-group" style="margin-bottom: 12px; position: relative;">
                        <label>거점 검색 (초성 가능)</label>
                        <input type="text" class="input-text" id="buyer-hub-search" placeholder="지역 또는 지점명 검색 (예: 서대문, ㅋㄹ)" oninput="filterBuyerHubs()" onfocus="showBuyerHubsOnFocus()" autocomplete="off">
                        <div id="buyer-hub-search-results" style="display: none; position: absolute; top: 100%; left: 0; right: 0; max-height: 200px; overflow-y: auto; border: 1.5px solid var(--border); border-radius: 6px; margin-top: 4px; background: white; z-index: 1000; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);"></div>
                    </div>

                    <div class="buyer-form-columns" id="b-hub-select-group">
                        <div class="control-group">
                            <label>지역</label>
                            <select class="select-custom" id="buyer-region-select" onchange="onBuyerRegionChange()"></select>
                        </div>
                        <div class="control-group">
                            <label>거점샵</label>
                            <select class="select-custom" id="buyer-hub-select" onchange="onBuyerHubChange()"></select>
                        </div>
                    </div>

                    <div class="control-group" id="b-custom-region-group" style="display: none; margin-top: 8px;">
                        <label>주소 / 거점지 직접 기입</label>
                        <input type="text" class="input-text" id="buyer-custom-region" placeholder="상세 주소 또는 희망 위치 입력">
                    </div>
                </div>

                <div class="control-group" style="margin-bottom: 16px;">
                    <label>메모 또는 기타 요청사항</label>
                    <input type="text" class="input-text" id="buyer-memo-input" placeholder="상세 주소 또는 요청사항이 있으시면 적어주세요.">
                </div>

                <!-- 합산 금액 정보 -->
                <div style="padding: 16px; background: #F1F5F9; border-radius: 8px; margin-bottom: 16px; border: 1px solid var(--border);">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; font-weight: 500;">
                        <span>총 낙찰 금액</span>
                        <span id="b-summary-bid" style="font-weight: 700;">0만</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; font-weight: 500;">
                        <span>배송비</span>
                        <span id="b-summary-ship" style="font-weight: 700;">0원</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding-top: 8px; border-top: 1px dashed #CBD5E1; font-size: 15px; font-weight: 800; color: var(--text-title);">
                        <span>최종 입금액</span>
                        <span id="b-summary-total" style="color: #E11D48;">0원</span>
                    </div>
                </div>

                <button class="btn btn-full" onclick="submitBuyerShipping()">배송 정보 등록 완료</button>
            </div>
        </div>

    </div>

    <!-- 토스트 & 로딩 -->
    <div class="toast" id="toast"></div>
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div style="font-weight: 700; color: var(--text-title); font-size: 13px;" id="loading-text">로딩 중...</div>
    </div>

    <script>
        // 거점 가격표 데이터베이스
        const SHIPPING_DATA = {
            '픽업': {
                regions: { '직접수령': [{ shop: '현장 직접수령', cost: 0 }] }
            },
            '도도시': {
                regions: {
                    '서울': [
                        { shop: '도도시 강남 거점샵', cost: 5000 },
                        { shop: '도도시 홍대 거점샵', cost: 5000 },
                        { shop: '도도시 노원 거점샵', cost: 5000 }
                    ],
                    '경기': [
                        { shop: '도도시 일산 거점샵', cost: 5000 },
                        { shop: '도도시 수원 거점샵', cost: 5000 },
                        { shop: '도도시 분당 거점샵', cost: 5000 }
                    ],
                    '인천': [
                        { shop: '도도시 부평 거점샵', cost: 5000 }
                    ],
                    '기타지방': [
                        { shop: '도도시 대전 거점샵', cost: 5000 },
                        { shop: '도도시 대구 거점샵', cost: 5000 },
                        { shop: '도도시 부산 거점샵', cost: 5000 },
                        { shop: '도도시 광주 거점샵', cost: 5000 },
                        { shop: '도도시 제주 거점샵', cost: 10000 }
                    ]
                }
            },
            '파르게': {
                regions: {
                    '수도권': [
                        { shop: '파르게 서울본점', cost: 5000 },
                        { shop: '파르게 경기점', cost: 5000 }
                    ],
                    '지방거점': [
                        { shop: '파르게 대전점', cost: 5000 },
                        { shop: '파르게 대구점', cost: 5000 },
                        { shop: '파르게 부산점', cost: 5000 }
                    ]
                }
            },
            '랩팡': {
                regions: {
                    '수도권': [
                        { shop: '랩팡 서울거점', cost: 5000 },
                        { shop: '랩팡 수원거점', cost: 5000 }
                    ],
                    '지방거점': [
                        { shop: '랩팡 대전거점', cost: 5000 },
                        { shop: '랩팡 부산거점', cost: 5000 }
                    ]
                }
            },
            '기타 (직접입력)': {
                regions: { '기타': [{ shop: '직접 기입 주소', cost: 0 }] }
            }
        };

        let allItems = [];
        let uniqueSellerCompanies = [];
        let winnerStateMap = {}; 
        let isAdminMode = true;

        // URL 파라미터 감지 (기본 어드민 모드, ?buyer=1 일 때만 일반 낙찰자 입력 모드)
        const params = new URLSearchParams(window.location.search);
        if (params.get('buyer') === '1') {
            isAdminMode = false;
            document.getElementById('buyer-view').style.display = 'block';
        } else {
            isAdminMode = true;
            document.body.classList.add('admin-mode');
            document.getElementById('admin-view').style.display = 'block';
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isError ? '#EF4444' : '#0F172A';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function showLoading(active, text = '로딩 중...') {
            const overlay = document.getElementById('loading-overlay');
            const txt = document.getElementById('loading-text');
            txt.textContent = text;
            if (active) overlay.classList.add('active');
            else overlay.classList.remove('active');
        }

        // 초기화 로딩
        window.addEventListener('DOMContentLoaded', async () => {
            showLoading(true, '데이터를 불러오는 중...');
            try {
                // 도도시 동적 가격표 로드
                try {
                    const dodosiRes = await getDodosiData();
                    if (dodosiRes && dodosiRes.success && dodosiRes.data && dodosiRes.data.length > 0) {
                        SHIPPING_DATA['도도시'].regions = {};
                        dodosiRes.data.forEach(item => {
                            const regName = item.region || '기타';
                            if (!SHIPPING_DATA['도도시'].regions[regName]) {
                                SHIPPING_DATA['도도시'].regions[regName] = [];
                            }
                            let label = item.shop;
                            if (item.sub) label = `${item.sub} [${item.shop}]`;
                            SHIPPING_DATA['도도시'].regions[regName].push({
                                shop: label,
                                cost: item.price || 5000
                            });
                        });
                        console.log('[Dodosi] Successfully loaded dynamic dodosi prices:', Object.keys(SHIPPING_DATA['도도시'].regions).length, 'regions');
                    }
                } catch (dodosiErr) {
                    console.warn('[Dodosi] Failed to load dynamic dodosi data, using fallback:', dodosiErr);
                }

                // 파르게 동적 가격표 로드
                try {
                    const pargeRes = await getPargeData();
                    if (pargeRes && pargeRes.success && pargeRes.data) {
                        SHIPPING_DATA['파르게'].regions = {};
                        Object.keys(pargeRes.data).forEach(regName => {
                            SHIPPING_DATA['파르게'].regions[regName] = pargeRes.data[regName].map(shopItem => ({
                                shop: shopItem.shop,
                                cost: shopItem.cost || (regName.includes('제주') ? 46000 : 19000)
                            }));
                        });
                        console.log('[Parge] Successfully loaded dynamic parge prices:', Object.keys(SHIPPING_DATA['파르게'].regions).length, 'regions');
                    }
                } catch (pargeErr) {
                    console.warn('[Parge] Failed to load dynamic parge data, using fallback:', pargeErr);
                }

                // 랩팡 동적 가격표 로드
                try {
                    const wrapangRes = await getWrapangData();
                    if (wrapangRes && wrapangRes.success && wrapangRes.data) {
                        SHIPPING_DATA['랩팡'].regions = {};
                        Object.keys(wrapangRes.data).forEach(regName => {
                            SHIPPING_DATA['랩팡'].regions[regName] = wrapangRes.data[regName].map(shopItem => ({
                                shop: shopItem.shop,
                                cost: shopItem.cost || (regName.includes('제주') ? 55000 : 25000) // 랩팡 크롤링된 실제 거점별 단가 반영
                            }));
                        });
                        console.log('[Wrapang] Successfully loaded dynamic wrapang prices:', Object.keys(SHIPPING_DATA['랩팡'].regions).length, 'regions');
                    }
                } catch (wrapangErr) {
                    console.warn('[Wrapang] Failed to load dynamic wrapang data, using fallback:', wrapangErr);
                }

                const items = await getItems();
                allItems = (items || []).filter(it => it.status && it.status.indexOf('낙찰') >= 0);

                if (isAdminMode) {
                    const companies = allItems.map(it => (it.company || '').trim()).filter(Boolean);
                    uniqueSellerCompanies = [...new Set(companies)].sort();
                    populateCompanySelect();
                    renderGrid();
                }
            } catch (err) {
                console.error(err);
                showToast('로딩 실패: ' + err.message, true);
            } finally {
                showLoading(false);
            }
        });

        // ════════════════════════════════════════════
        //  어드민 관리자 모드 로직 (admin-view)
        // ════════════════════════════════════════════
        function populateCompanySelect(filteredList = null) {
            const select = document.getElementById('company-select');
            const list = filteredList || uniqueSellerCompanies;
            if (list.length === 0) {
                select.innerHTML = '<option value="">출품 업체 없음</option>';
                return;
            }
            select.innerHTML = list.map(c => `<option value="${c}">${c}</option>`).join('');
            select.value = list[0] || '';
        }

        function onCompanyFilterInput() {
            const q = document.getElementById('company-filter-input').value.trim().toLowerCase();
            if (!q) {
                populateCompanySelect();
                renderGrid();
                return;
            }
            const filtered = uniqueSellerCompanies.filter(c => c.toLowerCase().indexOf(q) >= 0);
            populateCompanySelect(filtered);
            renderGrid();
        }

        function clearCompanyFilter() {
            document.getElementById('company-filter-input').value = '';
            populateCompanySelect();
            renderGrid();
        }

        function onCompanySelectChange() {
            renderGrid();
        }

        function renderGrid() {
            const selectedCo = document.getElementById('company-select').value;
            const tbody = document.getElementById('grid-tbody');
            tbody.innerHTML = '';
            winnerStateMap = {};

            if (!selectedCo) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-secondary);">출품 업체를 선택해 주세요.</td></tr>';
                return;
            }

            const selfItems = allItems.filter(it => (it.company || '').trim() === selectedCo);
            if (selfItems.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-secondary);">'${selectedCo}'의 낙찰 정보가 없습니다.</td></tr>`;
                return;
            }

            // 낙찰자별 그룹핑
            const winnerGroups = {};
            selfItems.forEach(it => {
                const winnerName = (it.winner || '').replace(/[\[\]]/g, '').trim().split('/')[0].trim();
                if (!winnerGroups[winnerName]) {
                    winnerGroups[winnerName] = [];
                }
                winnerGroups[winnerName].push(it);
            });

            Object.keys(winnerGroups).forEach(winnerName => {
                const groupItems = winnerGroups[winnerName];
                const winnerAllItems = allItems.filter(it => {
                    const clean = (it.winner || '').replace(/[\[\]]/g, '').trim().split('/')[0].trim();
                    return clean === winnerName;
                });

                const sellerCos = [...new Set(winnerAllItems.map(it => (it.company || '').trim()))];
                const firstSelfItem = groupItems[0];
                const currentType = firstSelfItem.shipping_type || '직접수령';
                const currentCompany = firstSelfItem.shipping_company || '도도시';
                const fullRegion = firstSelfItem.shipping_region || '';
                const currentRegion = fullRegion.split(' ')[0] || '';
                const currentHub = fullRegion.indexOf('(') >= 0 ? fullRegion.slice(fullRegion.indexOf('(') + 1, -1) : '';

                winnerStateMap[winnerName] = {
                    allItems: winnerAllItems,
                    sellerCompanies: sellerCos,
                    shipping_type: currentType,
                    shipping_company: currentCompany,
                    shipping_region: currentRegion,
                    shipping_hub: currentHub,
                    phone: firstSelfItem.winner_phone || ''
                };

                groupItems.forEach(it => {
                    const tr = document.createElement('tr');
                    tr.id = `row-${it.row}`;

                    const otherCos = sellerCos.filter(c => c !== selectedCo);
                    const isCombined = otherCos.length > 0;
                    const combinedBadge = isCombined ? `<br><span class="combined-shipping-badge">합배송: ${otherCos.join(', ')}</span>` : '';

                    const typeOptions = ['픽업', '도도시', '파르게', '랩팡', '기타'];
                    const typeSelectHtml = `
                        <select class="select-custom" id="type-${it.row}" onchange="changeRowType(${it.row}, '${winnerName}')">
                            ${typeOptions.map(t => `<option value="${t}" ${
                                (currentType === '직접수령' && t === '픽업') ||
                                (currentType === '배송' && currentCompany === t) ||
                                (currentType === '배송' && currentCompany !== '도도시' && currentCompany !== '파르게' && currentCompany !== '랩팡' && t === '기타')
                                ? 'selected' : ''
                            }>${t}</option>`).join('')}
                        </select>
                    `;

                    tr.innerHTML = `
                        <td style="font-weight: 700; color: var(--text-title);">${it.name || '이름 없음'}</td>
                        <td><span style="font-weight: 700;">${winnerName}</span>${combinedBadge}</td>
                        <td>${fmtPhone(it.winner_phone)}</td>
                        <td>${typeSelectHtml}</td>
                        <td>
                            <div id="shipping-controls-${it.row}" style="display: ${currentType === '배송' ? 'flex' : 'none'}; gap: 4px; align-items: center;">
                                <input type="text" class="input-text" id="custom-company-${it.row}" placeholder="배송사 직접기입" style="display:none; width: 100px;" oninput="onCustomCompanyInput(${it.row}, '${winnerName}')">
                                <select class="select-custom" id="region-${it.row}" style="width: 80px;" onchange="changeRowRegion(${it.row}, '${winnerName}')"></select>
                                <select class="select-custom" id="hub-${it.row}" style="width: 120px;" onchange="changeRowHub(${it.row}, '${winnerName}')"></select>
                                <input type="text" class="input-text" id="custom-region-${it.row}" placeholder="주소 직접기입" style="display:none; width: 140px;" oninput="onCustomRegionInput(${it.row}, '${winnerName}')">
                            </div>
                            <span id="pickup-lbl-${it.row}" style="display: ${currentType === '직접수령' ? 'inline' : 'none'}; color: var(--text-secondary);">현장 직접 수령</span>
                        </td>
                        <td id="cost-${it.row}" class="price-shipping">0원</td>
                        <td id="total-${it.row}" class="price-total">0원</td>
                        <td>
                            <input type="text" class="input-text" id="memo-${it.row}" placeholder="메모 또는 상세주소" style="width: 100%; border: none; border-bottom: 1px solid var(--border); border-radius: 0; padding: 2px;" value="${it.shipping_region && it.shipping_company && it.shipping_company.indexOf('기타') >= 0 ? it.shipping_region : ''}">
                        </td>
                    `;

                    tbody.appendChild(tr);

                    const companyKey = currentType === '직접수령' ? '픽업' : currentCompany;
                    populateRowInputs(it.row, winnerName, companyKey, currentRegion, currentHub);
                });

                // 합계 행
                const subtotalTr = document.createElement('tr');
                subtotalTr.style.background = '#EEF2F6';
                subtotalTr.style.borderTop = '1.5px solid var(--border)';
                subtotalTr.style.borderBottom = '2px solid var(--border)';
                subtotalTr.innerHTML = `
                    <td colspan="5" style="text-align: right; font-weight: 700; color: var(--text-title); padding: 10px 12px;">
                        <strong>${winnerName}님 안내 합계:</strong>
                    </td>
                    <td id="subtotal-cost-${winnerName}" style="font-weight: 700; color: var(--accent); padding: 10px 12px;">0원</td>
                    <td id="subtotal-total-${winnerName}" style="font-weight: 900; color: #E11D48; font-size: 14px; padding: 10px 12px;">0원</td>
                    <td style="padding: 6px 12px; display: flex; flex-direction: column; gap: 4px; align-items: center; justify-content: center;">
                        <button class="btn btn-secondary" style="padding: 4px 8px; font-size: 11px; font-weight: 800; background: #64748B; color: white; border: none; width: 100%;" onclick="copyRequestMessage('${winnerName}')">
                            정보 요청 복사
                        </button>
                        <button class="btn" style="padding: 4px 8px; font-size: 11px; font-weight: 800; border: none; width: 100%;" onclick="copyBillingMessage('${winnerName}')">
                            최종 확정 복사
                        </button>
                    </td>
                `;
                tbody.appendChild(subtotalTr);
            });

            recalculateAllCosts();
        }

        // 인풋 세팅
        function populateRowInputs(rowId, winnerName, companyKey, selectedRegion = null, selectedHub = null) {
            const selectRegion = document.getElementById(`region-${rowId}`);
            const selectHub = document.getElementById(`hub-${rowId}`);
            const customComp = document.getElementById(`custom-company-${rowId}`);
            const customReg = document.getElementById(`custom-region-${rowId}`);

            if (!selectRegion || !selectHub) return;
            if (companyKey === '픽업') return;

            if (companyKey !== '도도시' && companyKey !== '파르게' && companyKey !== '랩팡') {
                customComp.style.display = 'inline-block';
                selectRegion.style.display = 'none';
                selectHub.style.display = 'none';
                customReg.style.display = 'inline-block';
                return;
            }

            customComp.style.display = 'none';
            selectRegion.style.display = 'inline-block';
            selectHub.style.display = 'inline-block';
            customReg.style.display = 'none';

            const companyData = SHIPPING_DATA[companyKey];
            if (!companyData) return;

            const regions = Object.keys(companyData.regions);
            selectRegion.innerHTML = regions.map(r => `<option value="${r}">${r}</option>`).join('');
            if (selectedRegion && companyData.regions[selectedRegion]) {
                selectRegion.value = selectedRegion;
            }

            populateRowHubs(rowId, winnerName, companyKey, selectRegion.value, selectedHub);
        }

        function populateRowHubs(rowId, winnerName, companyKey, regionName, selectedHub = null) {
            const selectHub = document.getElementById(`hub-${rowId}`);
            if (!selectHub) return;

            const hubs = SHIPPING_DATA[companyKey].regions[regionName] || [];
            selectHub.innerHTML = hubs.map(h => `<option value="${h.shop}" data-cost="${h.cost}">${h.shop} (${h.cost.toLocaleString()}원)</option>`).join('');

            if (selectedHub) {
                const matched = hubs.find(h => h.shop === selectedHub);
                if (matched) selectHub.value = selectedHub;
            }
            winnerStateMap[winnerName].shipping_hub = selectHub.value;
        }

        function changeRowType(rowId, winnerName) {
            const val = document.getElementById(`type-${rowId}`).value;
            const state = winnerStateMap[winnerName];
            const selfItemsOfWinner = getSelfItemsOfWinner(winnerName);

            selfItemsOfWinner.forEach(it => {
                const typeSelect = document.getElementById(`type-${it.row}`);
                if (typeSelect) typeSelect.value = val;

                const controls = document.getElementById(`shipping-controls-${it.row}`);
                const pickupLbl = document.getElementById(`pickup-lbl-${it.row}`);

                if (val === '픽업') {
                    if (controls) controls.style.display = 'none';
                    if (pickupLbl) pickupLbl.style.display = 'inline';
                } else {
                    if (controls) controls.style.display = 'flex';
                    if (pickupLbl) pickupLbl.style.display = 'none';
                }
            });

            if (val === '픽업') {
                state.shipping_type = '직접수령';
                state.shipping_company = '';
                state.shipping_region = '';
                state.shipping_hub = '';
            } else {
                state.shipping_type = '배송';
                state.shipping_company = val;
            }

            selfItemsOfWinner.forEach(it => {
                if (val !== '픽업') {
                    populateRowInputs(it.row, winnerName, val);
                }
            });

            recalculateAllCosts();
        }

        function changeRowRegion(rowId, winnerName) {
            const selectRegion = document.getElementById(`region-${rowId}`);
            const state = winnerStateMap[winnerName];
            state.shipping_region = selectRegion.value;

            const selfItemsOfWinner = getSelfItemsOfWinner(winnerName);
            selfItemsOfWinner.forEach(it => {
                const rSelect = document.getElementById(`region-${it.row}`);
                if (rSelect) rSelect.value = selectRegion.value;
                populateRowHubs(it.row, winnerName, state.shipping_company, selectRegion.value);
            });
            recalculateAllCosts();
        }

        function changeRowHub(rowId, winnerName) {
            const selectHub = document.getElementById(`hub-${rowId}`);
            const state = winnerStateMap[winnerName];
            state.shipping_hub = selectHub.value;

            const selfItemsOfWinner = getSelfItemsOfWinner(winnerName);
            selfItemsOfWinner.forEach(it => {
                const hSelect = document.getElementById(`hub-${it.row}`);
                if (hSelect) hSelect.value = selectHub.value;
            });
            recalculateAllCosts();
        }

        function onCustomCompanyInput(rowId, winnerName) {
            const inputVal = document.getElementById(`custom-company-${rowId}`).value.trim();
            winnerStateMap[winnerName].shipping_company = inputVal || '기타';
            const selfItemsOfWinner = getSelfItemsOfWinner(winnerName);
            selfItemsOfWinner.forEach(it => {
                const cInput = document.getElementById(`custom-company-${it.row}`);
                if (cInput) cInput.value = inputVal;
            });
            recalculateAllCosts();
        }

        function onCustomRegionInput(rowId, winnerName) {
            const inputVal = document.getElementById(`custom-region-${rowId}`).value.trim();
            winnerStateMap[winnerName].shipping_region = inputVal || '기타';
            const selfItemsOfWinner = getSelfItemsOfWinner(winnerName);
            selfItemsOfWinner.forEach(it => {
                const rInput = document.getElementById(`custom-region-${it.row}`);
                if (rInput) rInput.value = inputVal;
            });
            recalculateAllCosts();
        }

        function getSelfItemsOfWinner(winnerName) {
            const selectedCo = document.getElementById('company-select').value;
            return allItems.filter(it => {
                const clean = (it.winner || '').replace(/[\[\]]/g, '').trim().split('/')[0].trim();
                return clean === winnerName && (it.company || '').trim() === selectedCo;
            });
        }

        function recalculateAllCosts() {
            const selectedCo = document.getElementById('company-select').value;
            if (!selectedCo) return;

            let grandTotalItemsPrice = 0;
            let grandTotalShippingPrice = 0;

            const selfItems = allItems.filter(it => (it.company || '').trim() === selectedCo);
            selfItems.forEach(it => {
                grandTotalItemsPrice += (parseFloat(it.soldPrice || it.sold_price) || 0);
            });

            Object.keys(winnerStateMap).forEach(winnerName => {
                const state = winnerStateMap[winnerName];
                const type = state.shipping_type;
                const companyCount = state.sellerCompanies.length;
                const selfItemsOfWinner = getSelfItemsOfWinner(winnerName);
                const winnerBidTotal = selfItemsOfWinner.reduce((sum, it) => sum + (parseFloat(it.soldPrice || it.sold_price) || 0), 0);

                if (type === '직접수령') {
                    selfItemsOfWinner.forEach(it => {
                        document.getElementById(`cost-${it.row}`).textContent = '0원';
                        const itemSold = parseFloat(it.soldPrice || it.sold_price) || 0;
                        document.getElementById(`total-${it.row}`).textContent = itemSold + '만';
                    });
                    
                    const subCostEl = document.getElementById(`subtotal-cost-${winnerName}`);
                    const subTotalEl = document.getElementById(`subtotal-total-${winnerName}`);
                    if (subCostEl) subCostEl.textContent = '0원';
                    if (subTotalEl) subTotalEl.textContent = winnerBidTotal + '만';
                    return;
                }

                let baseCost = 25000;
                if (state.shipping_company === '도도시' || state.shipping_company === '파르게' || state.shipping_company === '랩팡') {
                    const compData = SHIPPING_DATA[state.shipping_company];
                    if (compData && compData.regions[state.shipping_region]) {
                        const matchedHub = compData.regions[state.shipping_region].find(h => h.shop === state.shipping_hub);
                        if (matchedHub) baseCost = matchedHub.cost;
                    }
                } else {
                    baseCost = 0;
                }

                // Get ALL items won by this buyer across all companies in the auction
                const allItemsOfWinner = allItems.filter(it => {
                    const clean = (it.winner || '').replace(/[\[\]]/g, '').trim().split('/')[0].trim();
                    return clean === winnerName;
                });
                const totalGeckoCount = allItemsOfWinner.length;

                // 거점 및 지역별 추가 마리당 요금 (파르게 제주일 때만 4,000원, 그 외 전체 7,000원)
                let surchargePerGecko = 7000;
                if (state.shipping_company === '파르게') {
                    const isJeju = state.shipping_region && (state.shipping_region.includes('제주') || state.shipping_region.includes('제주도'));
                    if (isJeju) {
                        surchargePerGecko = 4000;
                    }
                }

                // 총 묶음 배송비 계산
                let totalGroupShipping = baseCost;
                if (totalGeckoCount > 1) {
                    if (state.shipping_company === '랩팡') {
                        // 랩팡의 구간별 정액 추가 요금 적용
                        let wrapangSurcharge = 0;
                        if (totalGeckoCount === 2) {
                            wrapangSurcharge = 7000;
                        } else if (totalGeckoCount === 3) {
                            wrapangSurcharge = 14000;
                        } else if (totalGeckoCount === 4) {
                            wrapangSurcharge = 21000;
                        } else if (totalGeckoCount >= 5 && totalGeckoCount <= 20) {
                            wrapangSurcharge = 28000;
                        } else if (totalGeckoCount >= 21 && totalGeckoCount <= 50) {
                            wrapangSurcharge = 35000;
                        } else if (totalGeckoCount >= 51 && totalGeckoCount <= 100) {
                            wrapangSurcharge = 45000;
                        } else {
                            wrapangSurcharge = 45000 + (totalGeckoCount - 100) * 1000;
                        }
                        totalGroupShipping = baseCost + wrapangSurcharge;
                    } else {
                        // 도도시, 파르게 등 기본 추가 요금 방식 (1/N 균등배분)
                        totalGroupShipping = baseCost + (totalGeckoCount - 1) * surchargePerGecko;
                    }
                }

                // 개체당 배송비 (1/N 균등 배분)
                const costPerGecko = Math.round(totalGroupShipping / totalGeckoCount);

                let companySubtotalShipping = 0;

                selfItemsOfWinner.forEach(it => {
                    document.getElementById(`cost-${it.row}`).textContent = costPerGecko.toLocaleString() + '원';

                    const itemSold = parseFloat(it.soldPrice || it.sold_price) || 0;
                    let displayTotal = itemSold + '만';
                    if (costPerGecko > 0) {
                        displayTotal += ' ' + costPerGecko.toLocaleString() + '원';
                    }
                    document.getElementById(`total-${it.row}`).textContent = displayTotal;

                    companySubtotalShipping += costPerGecko;
                });

                grandTotalShippingPrice += companySubtotalShipping;

                const subCostEl = document.getElementById(`subtotal-cost-${winnerName}`);
                const subTotalEl = document.getElementById(`subtotal-total-${winnerName}`);
                if (subCostEl) subCostEl.textContent = companySubtotalShipping.toLocaleString() + '원';
                if (subTotalEl) {
                    let totalValStr = winnerBidTotal + '만';
                    if (companySubtotalShipping > 0) {
                        totalValStr += ' + ' + companySubtotalShipping.toLocaleString() + '원';
                    }
                    subTotalEl.textContent = totalValStr;
                }
            });

            document.getElementById('summary-items-price').textContent = grandTotalItemsPrice + '만';
            document.getElementById('summary-shipping-price').textContent = grandTotalShippingPrice.toLocaleString() + '원';
            
            let totalStr = grandTotalItemsPrice + '만';
            if (grandTotalShippingPrice > 0) {
                totalStr += ' + ' + grandTotalShippingPrice.toLocaleString() + '원';
            }
            document.getElementById('summary-total-price').textContent = totalStr;
        }

        function copyRequestMessage(winnerName) {
            const state = winnerStateMap[winnerName];
            const selfItems = getSelfItemsOfWinner(winnerName);
            const itemNames = selfItems.map(it => it.name).join(', ');
            const totalBid = selfItems.reduce((sum, it) => sum + (parseFloat(it.soldPrice || it.sold_price) || 0), 0);

            // 합배송 안내 정보 구성
            let combinedInfo = '';
            if (state && state.sellerCompanies && state.sellerCompanies.length > 1) {
                combinedInfo = `■ 합배송 대상 출품사: ${state.sellerCompanies.join(', ')} (묶음배송 적용 및 배송비 분할 정산 대상)\n`;
            } else if (state && state.sellerCompanies && state.sellerCompanies.length === 1) {
                combinedInfo = `■ 출품사: ${state.sellerCompanies[0]}\n`;
            }

            const msg = `${winnerName}님, CDCUP 낙찰 및 배송 정보 취합 안내드립니다.

■ 낙찰 개체: ${itemNames} (총 ${totalBid.toLocaleString()}만원)
${combinedInfo}
원활한 배송 및 수령을 위해 아래 정보를 회신해 주시면 배송비를 합산한 최종 정산 금액을 안내해 드리겠습니다.

1. 수령 방식 선택: 직접수령(픽업) / 도도시 / 파르게 / 랩팡 / 기타 배송
2. 수령 희망 지역 또는 거점샵 이름: 

감사합니다.`;

            navigator.clipboard.writeText(msg).then(() => {
                showToast('정보 요청 메시지가 클립보드에 복사되었습니다! 📋');
            }).catch(err => {
                console.error(err);
                showToast('복사 실패. 브라우저 설정을 확인해주세요.', true);
            });
        }

        function copyBillingMessage(winnerName) {
            const state = winnerStateMap[winnerName];
            const selfItems = getSelfItemsOfWinner(winnerName);
            const itemNames = selfItems.map(it => it.name).join(', ');
            const totalBid = selfItems.reduce((sum, it) => sum + (parseFloat(it.soldPrice || it.sold_price) || 0), 0);
            
            const firstSelfItem = selfItems[0];
            const costCell = document.getElementById(`cost-${firstSelfItem.row}`);
            const shippingCost = costCell ? parseInt(costCell.textContent.replace(/[^0-9]/g, '')) || 0 : 0;

            const msg = `${winnerName}님, 낙찰 및 배송비 정산 안내드립니다.

■ 낙찰 개체: ${itemNames}
■ 낙찰 금액: ${totalBid.toLocaleString()}만원
■ 수령 방식: ${shippingDesc}
■ 배송비: ${shippingCost.toLocaleString()}원 (묶음배송/분할 적용)

★ 최종 입금 금액: ${grandTotal.toLocaleString()}원

계좌정보를 확인하시어 입금해 주시기 바랍니다. 감사합니다.`;

            navigator.clipboard.writeText(msg).then(() => {
                showToast('안내 메시지가 클립보드에 복사되었습니다! 📋');
            }).catch(err => {
                console.error(err);
                showToast('복사 실패. 브라우저 설정을 확인해주세요.', true);

        async function submitAllShippingInfo() {
            const selectedCo = document.getElementById('company-select').value;
            if (!selectedCo) return;

            const selfItems = allItems.filter(it => (it.company || '').trim() === selectedCo);
            if (selfItems.length === 0) {
                showToast('저장할 개체가 없습니다.', true);
                return;
            }

            showLoading(true, '배송 설정을 데이터베이스에 저장 중...');
            try {
                for (let i = 0; i < selfItems.length; i++) {
                    const it = selfItems[i];
                    const winnerName = (it.winner || '').replace(/[\[\]]/g, '').trim().split('/')[0].trim();
                    const state = winnerStateMap[winnerName];

                    let shipping_type = state.shipping_type;
                    let shipping_company = '';
                    let shipping_region = '';
                    let shipping_cost = 0;

                    const costCellText = document.getElementById(`cost-${it.row}`).textContent;
                    shipping_cost = parseInt(costCellText.replace(/[^0-9]/g, '')) || 0;

                    if (shipping_type === '배송') {
                        shipping_company = state.shipping_company;
                        if (shipping_company !== '도도시' && shipping_company !== '파르게' && shipping_company !== '랩팡') {
                            shipping_region = document.getElementById(`custom-region-${it.row}`).value.trim() || '직접기입';
                        } else {
                            shipping_region = `${state.shipping_region} (${state.shipping_hub})`;
                        }
                    }

                    const memoVal = document.getElementById(`memo-${it.row}`).value.trim();
                    if (memoVal) {
                        shipping_region = `${shipping_region} [메모: ${memoVal}]`.trim();
                    }

                    await updateItemShipping(it.row, {
                        shipping_type,
                        shipping_company,
                        shipping_region,
                        shipping_cost
                    });
                }
                showToast('성공적으로 저장되었습니다! 💾');
                
                const items = await getItems();
                allItems = (items || []).filter(it => it.status && it.status.indexOf('낙찰') >= 0);
                renderGrid();
            } catch (e) {
                console.error(e);
                showToast('저장 실패: ' + e.message, true);
            } finally {
                showLoading(false);
            }
        }


        // ════════════════════════════════════════════
        //  소비자/낙찰자 직접 조회 및 제출 모드 (buyer-view)
        // ════════════════════════════════════════════
        let buyerFoundItems = [];
        let buyerShippingState = {
            type: '직접수령',
            company: '',
            region: '',
            hub: '',
            cost: 0
        };

        // 낙찰자 정보 찾기
        function searchBuyerWins() {
            const name = document.getElementById('buyer-name-input').value.trim().toLowerCase();
            const phone = document.getElementById('buyer-phone-input').value.trim().replace(/[^0-9]/g, '');

            if (!name) {
                showToast('성함을 입력해 주세요.', true);
                return;
            }

            // DB 전체 낙찰 품목 중 이름 및 전화번호가 일치하는 항목 필터링
            buyerFoundItems = allItems.filter(it => {
                const winnerClean = (it.winner || '').replace(/[\[\]]/g, '').trim();
                const parts = winnerClean.split('/');
                const wName = parts[0].trim().toLowerCase();
                const wPhone = it.winner_phone ? it.winner_phone.replace(/[^0-9]/g, '') : '';
                
                // 이름 일치 & (번호 비었거나 번호 일치)
                const nameMatch = wName === name;
                const phoneMatch = !phone || wPhone.endsWith(phone);
                return nameMatch && phoneMatch;
            });

            if (buyerFoundItems.length === 0) {
                showToast('일치하는 낙찰 내역이 없습니다. 정보를 다시 확인해 주세요.', true);
                document.getElementById('buyer-form-card').style.display = 'none';
                return;
            }

            // 정보 입력 카드 활성화
            document.getElementById('buyer-display-title').textContent = name;
            document.getElementById('buyer-form-card').style.display = 'block';

            // 낙찰 개체 목록 렌더링
            const container = document.getElementById('buyer-items-container');
            container.innerHTML = buyerFoundItems.map(it => `
                <div class="buyer-item-row">
                    <div>
                        <strong style="color: var(--text-title); font-size: 14px;">${it.name || '개체명 없음'}</strong>
                        <div style="font-size: 11px; color: var(--text-secondary); margin-top: 2px;">출품: ${it.company || '미지정'}</div>
                    </div>
                    <div style="font-weight: 800; color: #E11D48;">${parseFloat(it.soldPrice || it.sold_price)}만</div>
                </div>
            `).join('');

            // 기본 데이터 바인딩
            const firstItem = buyerFoundItems[0];
            const initType = firstItem.shipping_type || '직접수령';
            const initCompany = firstItem.shipping_company || '도도시';
            const fullRegion = firstItem.shipping_region || '';
            const initRegion = fullRegion.split(' ')[0] || '';
            const initHub = fullRegion.indexOf('(') >= 0 ? fullRegion.slice(fullRegion.indexOf('(') + 1, -1) : '';

            setBuyerShippingType(initType === '직접수령' ? '픽업' : initCompany, true);
            if (initType === '배송' && (initCompany === '도도시' || initCompany === '파르게' || initCompany === '랩팡')) {
                document.getElementById('buyer-region-select').value = initRegion;
                onBuyerRegionChange(initHub);
            } else if (initType === '배송') {
                document.getElementById('buyer-custom-company').value = initCompany;
                document.getElementById('buyer-custom-region').value = fullRegion;
            }

            recalculateBuyerTotal();
        }

        // 소비자용 배송사 탭 선택
        function setBuyerShippingType(companyKey, isInit = false) {
            const btns = ['pickup', 'dodosi', 'parge', 'wrapang', 'custom'];
            btns.forEach(b => document.getElementById(`b-opt-${b}`).classList.remove('active'));

            const detailBox = document.getElementById('buyer-detail-box');
            const customCompanyGroup = document.getElementById('b-custom-company-group');
            const hubSelectGroup = document.getElementById('b-hub-select-group');
            const customRegionGroup = document.getElementById('b-custom-region-group');

            if (companyKey === '픽업') {
                document.getElementById('b-opt-pickup').classList.add('active');
                detailBox.style.display = 'none';
                buyerShippingState.type = '직접수령';
                buyerShippingState.company = '';
                buyerShippingState.region = '';
                buyerShippingState.hub = '';
                buyerShippingState.cost = 0;
            } else {
                detailBox.style.display = 'block';
                buyerShippingState.type = '배송';

                if (companyKey === '도도시') {
                    document.getElementById('b-opt-dodosi').classList.add('active');
                    buyerShippingState.company = '도도시';
                    customCompanyGroup.style.display = 'none';
                    hubSelectGroup.style.display = 'grid';
                    customRegionGroup.style.display = 'none';
                } else if (companyKey === '파르게') {
                    document.getElementById('b-opt-parge').classList.add('active');
                    buyerShippingState.company = '파르게';
                    customCompanyGroup.style.display = 'none';
                    hubSelectGroup.style.display = 'grid';
                    customRegionGroup.style.display = 'none';
                } else if (companyKey === '랩팡') {
                    document.getElementById('b-opt-wrapang').classList.add('active');
                    buyerShippingState.company = '랩팡';
                    customCompanyGroup.style.display = 'none';
                    hubSelectGroup.style.display = 'grid';
                    customRegionGroup.style.display = 'none';
                } else {
                    document.getElementById('b-opt-custom').classList.add('active');
                    buyerShippingState.company = '기타 (직접입력)';
                    customCompanyGroup.style.display = 'block';
                    hubSelectGroup.style.display = 'none';
                    customRegionGroup.style.display = 'block';
                }

                if (companyKey !== '픽업' && companyKey !== '기타') {
                    // 지역/거점 옵션 채우기
                    const searchGroup = document.getElementById('b-hub-search-group');
                    if (searchGroup) {
                        searchGroup.style.display = 'block';
                        if (!isInit) {
                            document.getElementById('buyer-hub-search').value = '';
                        } else if (buyerShippingState.region && buyerShippingState.hub) {
                            document.getElementById('buyer-hub-search').value = `[${buyerShippingState.region}] ${buyerShippingState.hub}`;
                        }
                    }

                    const compData = SHIPPING_DATA[buyerShippingState.company];
                    const regions = Object.keys(compData.regions);
                    const regionSelect = document.getElementById('buyer-region-select');
                    regionSelect.innerHTML = regions.map(r => `<option value="${r}">${r}</option>`).join('');
                    
                    if (!isInit) {
                        onBuyerRegionChange();
                    }
                } else {
                    const searchGroup = document.getElementById('b-hub-search-group');
                    if (searchGroup) searchGroup.style.display = 'none';
                }
            }

            recalculateBuyerTotal();
        }

        function onBuyerRegionChange(selectedHub = null) {
            const comp = buyerShippingState.company;
            const region = document.getElementById('buyer-region-select').value;
            buyerShippingState.region = region;

            const hubSelect = document.getElementById('buyer-hub-select');
            const hubs = SHIPPING_DATA[comp].regions[region] || [];
            hubSelect.innerHTML = hubs.map(h => `<option value="${h.shop}" data-cost="${h.cost}">${h.shop} (${h.cost.toLocaleString()}원)</option>`).join('');

            if (selectedHub) {
                const matched = hubs.find(h => h.shop === selectedHub);
                if (matched) hubSelect.value = selectedHub;
            }

            onBuyerHubChange();
        }

        function onBuyerHubChange() {
            const hubSelect = document.getElementById('buyer-hub-select');
            buyerShippingState.hub = hubSelect.value;

            const selectedOpt = hubSelect.options[hubSelect.selectedIndex];
            buyerShippingState.cost = selectedOpt ? parseInt(selectedOpt.getAttribute('data-cost')) : 5000;

            recalculateBuyerTotal();
        }

        // ══════════════════════════════════════
        //  거점 검색 및 초성 검색 기능 구현
        // ══════════════════════════════════════
        const CHO = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];

        function getChosung(str) {
            let r = '';
            for (let i = 0; i < str.length; i++) {
                const c = str.charCodeAt(i);
                if (c >= 0xAC00 && c <= 0xD7A3) r += CHO[Math.floor((c - 0xAC00) / 588)];
                else r += str[i];
            }
            return r;
        }

        function isChosung(str) {
            return /^[ㄱ-ㅎ\s]+$/.test(str);
        }

        function scoreMatch(d, words) {
            const fields = [
                { v: d.shop || "", w: 3 },
                { v: d.region || "", w: 2 }
            ];
            let total = 0;
            let allFound = true;

            for (const word of words) {
                let wordScore = 0;
                const isCho = isChosung(word);

                for (const f of fields) {
                    const val = f.v.toLowerCase();
                    if (isCho) {
                        const cho = getChosung(f.v);
                        if (cho.includes(word)) wordScore = Math.max(wordScore, 30 * f.w);
                    }
                    if (val === word) wordScore = Math.max(wordScore, 100 * f.w);
                    else if (val.startsWith(word)) wordScore = Math.max(wordScore, 80 * f.w);
                    else if (val.includes(word)) wordScore = Math.max(wordScore, 50 * f.w);
                }
                if (wordScore === 0) allFound = false;
                total += wordScore;
            }
            return allFound ? total : 0;
        }

        function filterBuyerHubs() {
            const q = (document.getElementById('buyer-hub-search').value || '').trim().toLowerCase();
            const resultsBox = document.getElementById('buyer-hub-search-results');
            
            const comp = buyerShippingState.company;
            if (comp === '픽업' || comp === '기타' || !comp) {
                resultsBox.style.display = 'none';
                return;
            }

            const compData = SHIPPING_DATA[comp];
            if (!compData || !compData.regions) {
                resultsBox.style.display = 'none';
                return;
            }

            // Flatten all hubs of this company
            let allHubs = [];
            Object.keys(compData.regions).forEach(regName => {
                compData.regions[regName].forEach(h => {
                    allHubs.push({
                        region: regName,
                        shop: h.shop,
                        cost: h.cost
                    });
                });
            });

            if (!q) {
                // Show all if focused but empty
                renderSearchItems(allHubs);
                return;
            }

            const words = q.split(/\s+/).filter(Boolean);
            const scored = allHubs.map(h => {
                const score = scoreMatch(h, words);
                return { hub: h, score: score };
            }).filter(item => item.score > 0)
              .sort((a, b) => b.score - a.score);

            renderSearchItems(scored.map(item => item.hub));
        }

        function renderSearchItems(items) {
            const resultsBox = document.getElementById('buyer-hub-search-results');
            if (items.length === 0) {
                resultsBox.innerHTML = '<div style="padding: 12px; font-size: 13px; color: var(--text-secondary); text-align: center;">검색 결과가 없습니다.</div>';
                resultsBox.style.display = 'block';
                return;
            }

            let html = '';
            items.forEach(h => {
                html += `
                    <div class="search-item" onclick="selectBuyerHub('${h.region.replace(/'/g, "\\'")}', '${h.shop.replace(/'/g, "\\'")}', ${h.cost})">
                        <div>
                            <span class="search-item-region">${h.region}</span>
                            <span class="search-item-title">${h.shop}</span>
                        </div>
                        <span class="search-item-price">${h.cost.toLocaleString()}원</span>
                    </div>
                `;
            });
            resultsBox.innerHTML = html;
            resultsBox.style.display = 'block';
        }

        function selectBuyerHub(region, shop, cost) {
            document.getElementById('buyer-hub-search').value = `[${region}] ${shop}`;
            document.getElementById('buyer-hub-search-results').style.display = 'none';

            // Sync with dropdowns
            const regionSelect = document.getElementById('buyer-region-select');
            regionSelect.value = region;
            
            // Re-populate and select hub
            onBuyerRegionChange(shop);
        }

        function showBuyerHubsOnFocus() {
            filterBuyerHubs();
        }

        // Close search results when clicking outside
        document.addEventListener('click', (e) => {
            const searchGroup = document.getElementById('b-hub-search-group');
            const resultsBox = document.getElementById('buyer-hub-search-results');
            if (searchGroup && !searchGroup.contains(e.target) && resultsBox) {
                resultsBox.style.display = 'none';
            }
        });

        // 소비자 화면 총 계산
        function recalculateBuyerTotal() {
            let totalBid = 0;
            buyerFoundItems.forEach(it => {
                totalBid += (parseFloat(it.soldPrice || it.sold_price) || 0);
            });

            // 합배송사 분석 및 +7,000 연산 동일 적용
            const sellerCos = [...new Set(buyerFoundItems.map(it => (it.company || '').trim()))];
            const companyCount = sellerCos.length;

            let totalShipping = 0;
            if (buyerShippingState.type === '배송') {
                if (buyerShippingState.company === '기타 (직접입력)') {
                    totalShipping = 0;
                } else {
                    const baseCost = buyerShippingState.cost;
                    totalShipping = baseCost;
                    if (companyCount > 1) {
                        totalShipping = baseCost + (companyCount - 1) * 7000;
                    }
                }
            }

            document.getElementById('b-summary-bid').textContent = totalBid + '만';
            document.getElementById('b-summary-ship').textContent = totalShipping.toLocaleString() + '원';
            
            const grandTotalWon = (totalBid * 10000) + totalShipping;
            document.getElementById('b-summary-total').textContent = grandTotalWon.toLocaleString() + '원';
        }

        // 소비자 직접 제출
        async function submitBuyerShipping() {
            if (buyerFoundItems.length === 0) return;

            showLoading(true, '배송 정보를 전송하는 중...');
            try {
                const type = buyerShippingState.type;
                const sellerCos = [...new Set(buyerFoundItems.map(it => (it.company || '').trim()))];
                const companyCount = sellerCos.length;

                // 전체 배송비 구한 뒤, 업체별로 쪼개기
                let totalShipping = 0;
                if (type === '배송') {
                    if (buyerShippingState.company === '기타 (직접입력)') {
                        totalShipping = 0;
                    } else {
                        totalShipping = buyerShippingState.cost;
                        if (companyCount > 1) {
                            totalShipping = buyerShippingState.cost + (companyCount - 1) * 7000;
                        }
                    }
                }

                const splitCostPerCompany = Math.round(totalShipping / companyCount);

                // 업체별 첫 개체에 쪼갠 금액 배부하고 업데이트
                for (const co of sellerCos) {
                    const coItems = buyerFoundItems.filter(it => (it.company || '').trim() === co);
                    
                    coItems.forEach(async (it, idx) => {
                        let shipping_type = type;
                        let shipping_company = '';
                        let shipping_region = '';
                        let shipping_cost = 0;

                        if (type === '배송') {
                            if (buyerShippingState.company === '기타 (직접입력)') {
                                shipping_company = document.getElementById('buyer-custom-company').value.trim() || '기타';
                                shipping_region = document.getElementById('buyer-custom-region').value.trim() || '직접기입';
                            } else {
                                shipping_company = buyerShippingState.company;
                                shipping_region = `${buyerShippingState.region} (${buyerShippingState.hub})`;
                            }

                            // 첫 번째 개체에 배송비 배정
                            if (idx === 0) {
                                shipping_cost = splitCostPerCompany;
                            }
                        }

                        // 메모
                        const memoVal = document.getElementById('buyer-memo-input').value.trim();
                        if (memoVal) {
                            shipping_region = `${shipping_region} [요청: ${memoVal}]`.trim();
                        }

                        await updateItemShipping(it.row, {
                            shipping_type,
                            shipping_company,
                            shipping_region,
                            shipping_cost
                        });
                    });
                }

                showToast('배송 정보 등록이 완료되었습니다! 판매자 정산서에 실시간 반영됩니다. 🚚');
                setTimeout(() => {
                    location.reload();
                }, 2000);
            } catch (e) {
                console.error(e);
                showToast('저장 실패: ' + e.message, true);
            } finally {
                showLoading(false);
            }
        }


        // 전화번호 포맷 헬퍼
        function fmtPhone(raw) {
            var ph = (raw || '').replace(/[^0-9]/g, '');
            if (ph.length === 8) ph = '010' + ph;
            if (ph.length === 11) return ph.slice(0, 3) + '-' + ph.slice(3, 7) + '-' + ph.slice(7);
            if (ph.length === 10) return ph.slice(0, 3) + '-' + ph.slice(3, 6) + '-' + ph.slice(6);
            return ph;
        }
