        }

        function maybeRefreshHostConfig(force) {
            const now = Date.now();
            const lastSyncAt = window._lastHostConfigSyncAt || 0;
            const minInterval = hasActive ? 1500 : 3000;
            if (!force && now - lastSyncAt < minInterval) return;
            window._lastHostConfigSyncAt = now;

        function render(item) {
            const _bp = (new URLSearchParams(window.location.search).get('page') || '').toLowerCase();
            const isBracketPage = _bp === 'bracket' || _bp === '3' || _bp === '3p';
            if (isBracketPage) {
                const empty = document.getElementById("empty");
                const bc = document.getElementById("broadcast");
                if (empty) empty.style.display = "none";
                if (bc) bc.style.display = "none";
                return;
            }
            window.activeItem = item;
            updateProgressText();
            let configPart = '';
            if (item && window.latestConfigMap) {
                const active = window.latestConfigMap.active_tournament;
                if (active && active !== 'none') {
                    configPart = '|' + active + '|' + (window.latestConfigMap['tournament_bracket_' + active] || '');
                }
            }
            const json = item ? (JSON.stringify(item) + configPart) : '';
            if (json === lastJson) return;
            lastJson = json;

            const empty = document.getElementById("empty");
            const bc = document.getElementById("broadcast");
            const topBar = document.getElementById("top-bar");
            const photoStack = document.getElementById("photo-stack");
            const isHost = document.body.classList.contains('host-mode');

            if (!item) {
                if (topBar) topBar.style.removeProperty("display");
                if (photoStack) photoStack.style.removeProperty("display");
                if (isHost) {
                    empty.style.display = "none";
                    bc.style.display = "block";
                    document.getElementById("hc-name").textContent = "";
                    document.getElementById("hc-sub").textContent = "";
                    const hcPhoto = document.getElementById("hc-photo");
                    hcPhoto.removeAttribute("src");
                    hcPhoto.style.display = "none";
                    const hcHeader = document.getElementById("hc-header-float");
                    if (hcHeader) hcHeader.style.paddingLeft = '32px';
                    const hcTraitsEl = document.getElementById("hc-traits-container");
                    if (hcTraitsEl) hcTraitsEl.classList.remove("has-items");
                } else {
                    empty.style.display = "";
                    bc.style.display = "block";
                    const scoreboardWrap = document.getElementById("scoreboard-wrap");
                    if (scoreboardWrap) scoreboardWrap.style.display = "none";
                    if (photoStack) photoStack.style.display = "none";
                }
                return;
            }

            empty.style.display = "none";
            bc.style.display = "block";
            const scoreboardWrap = document.getElementById("scoreboard-wrap");
            if (scoreboardWrap) {
                scoreboardWrap.style.removeProperty("display");
            }
            if (topBar) {
                if (isHost) topBar.style.removeProperty("display");
                else topBar.style.display = "flex";
            }
            if (photoStack) {
                if (isHost) photoStack.style.removeProperty("display");
                else photoStack.style.display = "flex";
                photoStack.classList.toggle('config-pending', !isHost && !page2PhotoConfigReady);
            }

            const origName = item.displayName || item.name || "";
            let displayName = origName;
            
            // Check for tournament team mapping to find company name
            if (window.latestConfigMap && window.latestConfigMap.active_tournament && window.latestConfigMap.active_tournament !== 'none') {
                const activeScale = window.latestConfigMap.active_tournament;
                const matchObj = origName.trim().match(/^([A-Pa-p])\s*[-_]?\s*([1-4])$/i);
                if (matchObj) {
                    const letter = matchObj[1].toUpperCase();
                    const idx = letter.charCodeAt(0) - 65;
                    const scaleNum = parseInt(activeScale);
                    if (idx >= 0 && idx < scaleNum) {
                        const matchIdx = Math.floor(idx / 2) + 1;
                        const slot = (idx % 2 === 0) ? 'left' : 'right';
                        const bracketKey = 'tournament_bracket_' + activeScale;
                        let company = '';
                        if (window.latestConfigMap[bracketKey]) {
                            try {
                                const bracket = JSON.parse(window.latestConfigMap[bracketKey]);
                                if (bracket && bracket.matches && bracket.matches[activeScale + '_' + matchIdx]) {
                                    company = bracket.matches[activeScale + '_' + matchIdx][slot] || '';
                                }
                            } catch(e){}
                        }
                        if (company) {
                            item.company = company;
                        }
                    }
                }
            }

            // 개체명은 원래 명칭(예: A1) 그대로 출력하되, 토너먼트 진행 중(blind)일 때는 업체명 노출을 방지하기 위해 업체명을 '팀 알파벳'으로 치환
            let cleanInfoName = origName;
            const codeFromItem = getCleanCode(item);
            if (codeFromItem) {
                const teamLetter = codeFromItem.charAt(0);
                let companyName = '';
                if (window.latestConfigMap && window.latestConfigMap.active_tournament && window.latestConfigMap.active_tournament !== 'none') {
                    const activeScale = window.latestConfigMap.active_tournament;
                    const bracketKey = 'tournament_bracket_' + activeScale;
                    if (window.latestConfigMap[bracketKey]) {
                        try {
                            const bracket = JSON.parse(window.latestConfigMap[bracketKey]);
                            const matchCount = parseInt(activeScale, 10) / 2;
                            for (let i = 1; i <= matchCount; i++) {
                                const match = bracket.matches[activeScale + '_' + i];
                                if (match) {
                                    const leftL = String.fromCharCode(65 + (i - 1) * 2);
                                    const rightL = String.fromCharCode(65 + (i - 1) * 2 + 1);
                                    if (leftL === teamLetter) { companyName = match.left; break; }
                                    if (rightL === teamLetter) { companyName = match.right; break; }
                                }
                            }
                        } catch(e){}
                    }
                }
                
                if (companyName && companyName.trim()) {
                    const escapedCompany = companyName.trim().replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                    const regex = new RegExp(escapedCompany, 'gi');
                    cleanInfoName = origName.replace(regex, teamLetter + '팀');
                } else {
                    cleanInfoName = codeFromItem;
                }
            }
            document.getElementById("info-name").textContent = cleanInfoName;
            // 페이지2 상단 바에서 업체명 표시 제거
            document.getElementById("info-sub").textContent = '';

            // 호스트 카드 데이터 렌더링
            document.getElementById("hc-name").textContent = origName;
            const subParts = [];
            if (item.company) subParts.push(item.company);
            document.getElementById("hc-sub").textContent = subParts.join(' · ');

            // 서버에서 받은 개별 사진 숨김 플래그
            if (Array.isArray(item.hiddenPhotos)) hiddenPhotos = item.hiddenPhotos;

            const hcPhoto = document.getElementById("hc-photo");
            const hcHeader = document.getElementById("hc-header-float");
            const itemPhotoHidden = hiddenPhotos.indexOf('item') >= 0;
            if (item.photoItem && !itemPhotoHidden) {
                hcPhoto.src = item.photoItem;
                hcPhoto.style.display = "block";
                if (hcHeader) hcHeader.style.paddingLeft = '120px';
            } else {
                hcPhoto.removeAttribute("src");
                hcPhoto.style.display = "none";
                if (hcHeader) hcHeader.style.paddingLeft = '32px';
            }

            // 사진 — hiddenPhotos에 포함된 키는 숨김
            const subs = { sire: "photoSire", dam: "photoDam", sibling: "photoSibling" };
            const subLabels = {
                sire: item.sireName ? ("부 · " + item.sireName) : "부",
                dam: item.damName ? ("모 · " + item.damName) : "모",
                sibling: item.siblingName ? ("동배 · " + item.siblingName) : "동배"
            };
            const visibleSubKeys = [];
            for (const [key, field] of Object.entries(subs)) {
                const isHidden = hiddenPhotos.indexOf(key) >= 0;
                if (item[field] && !isHidden) visibleSubKeys.push(key);
            }
            const activeSubKeys = visibleSubKeys.slice(0, 2);
            for (const [key, field] of Object.entries(subs)) {
                const slot = document.getElementById("slot-" + key);
                const img = document.getElementById("img-" + key);
                const label = slot.querySelector(".label");
                const visibleIndex = activeSubKeys.indexOf(key);
                slot.classList.remove("visible", "slot-primary", "slot-secondary");
                if (visibleIndex >= 0) {
                    img.src = item[field];
                    if (label) label.textContent = subLabels[key];
                    slot.classList.add("visible");
                    slot.classList.add(visibleIndex === 0 ? "slot-primary" : "slot-secondary");
                } else {
                    img.removeAttribute("src");
                }
            }
            // 사진 수에 따라 축소 클래스 적용
            const visCount = activeSubKeys.length;
            const stack = document.getElementById('photo-stack');
            stack.classList.remove('two-photos', 'three-photos');
            if (visCount === 2) stack.classList.add('two-photos');

            // 특성 — checklist/note가 바뀔 때만 pill 배지 재구성
            const traitsKey = (item.checklist || "") + "|" + (item.note || "");
            if (traitsKey !== window._lastTraitsKey) {
                window._lastTraitsKey = traitsKey;

                const track = document.getElementById("traits-track");
                track.innerHTML = "";
                if (window._marqueeRaf) { cancelAnimationFrame(window._marqueeRaf); window._marqueeRaf = null; }

                const cl = parseChecklist(item.checklist || "");
                const gm = { M: "수컷", F: "암컷", U: "미구분" };
                const yn = { O: "O", X: "X" };

                // pill 배지 생성 함수 (type: 'accent' | 'info' | '' )
                function addPill(container, text, type) {
                    const el = document.createElement("span");
                    el.className = 'pill' + (type ? ' pill-' + type : '');
                    el.textContent = text;
                    container.appendChild(el);
                }

                // 기본 정보 (악센트 컬러)
                if (cl.gender) addPill(track, gm[cl.gender] || cl.gender, 'accent');
                if (cl.weight) addPill(track, cl.weight + 'g', 'accent');
                // 출생일 (info 컬러)
                if (cl.birth) addPill(track, cl.birth, 'info');
                // 체크 항목들 (기본 컬러)
                if (cl.spot) addPill(track, '점:' + (yn[cl.spot] || cl.spot), '');
                if (cl.pin) addPill(track, '풀핀:' + (yn[cl.pin] || cl.pin), '');
                if (cl.size) addPill(track, '도살:' + (GRADE[cl.size] || cl.size), '');
                if (cl.wall) addPill(track, '월높이:' + (GRADE[cl.wall] || cl.wall), '');
                if (cl.color) addPill(track, '색감:' + (GRADE[cl.color] || cl.color), '');
                if (cl.activity) addPill(track, '활동성:' + (GRADE[cl.activity] || cl.activity), '');
                if (cl.feed) addPill(track, '먹이:' + (GRADE[cl.feed] || cl.feed), '');
                if (cl.structure) addPill(track, '체형:' + (GRADE[cl.structure] || cl.structure), '');
                if (cl.memo) addPill(track, cl.memo, '');
                if (item.note) {
                    addPill(track, item.note, '');
                }

                // 호스트 모드 특성 트랙 (page 1 용) — 비워두기
                const hcTrack = document.getElementById("hc-traits-track");
                if (hcTrack) {
                    hcTrack.innerHTML = "";
                    hcTrack.classList.remove("scroll");
                    const hcTraitsEl = hcTrack.closest('.hc-traits');
                    if (hcTraitsEl) hcTraitsEl.classList.remove('has-items');
                }
            }
        }

        function parseChecklist(str) {
            const cl = {};
            if (!str) return cl;
            str.split("|").forEach(pair => {
                const idx = pair.indexOf(":");
                if (idx > 0) cl[pair.substring(0, idx).trim()] = pair.substring(idx + 1).trim();
            });
            return cl;
        }

        let hasActive = false;
        async function smartRefresh() {
            if (document.hidden) return;
            maybeRefreshHostConfig(false);
            refreshTotalCount();
            try {
                const item = await getActiveItem();
                hasActive = !!item;
                render(item);
            } catch (err) {
                console.error("smartRefresh error", err);
            }
        }
        smartRefresh();
        let _pollTimer = null;
        function startAdaptivePoll() {
            if (_pollTimer) clearInterval(_pollTimer);
            _pollTimer = setInterval(smartRefresh, hasActive ? 2500 : 6000);
        }
        startAdaptivePoll();
        const _origRender = render;
        render = function (item) {
            const wasActive = hasActive;
            hasActive = !!item;
            lastRenderedItem = item ? JSON.parse(JSON.stringify(item)) : null;
            _origRender(item);
            if (wasActive !== hasActive) startAdaptivePoll();
        };

        // 브라우저 내 즉시 동기 (웹 → 방송)
        try {
            const bc = new BroadcastChannel('auction-photos');
            bc.onmessage = function (e) {
                if (e.data && e.data.type === 'hiddenPhotos') {
                    hiddenPhotos = e.data.hidden || [];
                    lastJson = null;
                    if (lastRenderedItem) {
                        render(Object.assign({}, lastRenderedItem, { hiddenPhotos: hiddenPhotos.slice() }));
                    } else {
                        smartRefresh();
                    }
                }
            };
        } catch (e) { }

        // ── PostMessage 수신: 설정/프리뷰에서 실시간 반영 ──
        window.addEventListener('message', function(e) {
            if (!e.data || !e.data.type) return;

            if (e.data.type === 'configUpdate') {
                // 전체 config 맵 갱신 → 티커/배너/룰 즉시 반영
                const cfg = e.data.config || {};
                const bottomBar = document.querySelector('.hc-bottom-bar');
                const bannerContainer = document.querySelector('.hc-banner-float');
                const lp = (new URLSearchParams(window.location.search).get('page') || '').toLowerCase() === 'bracket' ? 'p3_' : (document.body.classList.contains('host-mode') ? '' : 'p2_');

                // 티커 show/hide 및 위치
                if (bottomBar) {
                    if (cfg[lp + 'ticker_show'] === '0' || lp === 'p3_') {
                        bottomBar.style.setProperty('display', 'none', 'important');
                    } else {
                        bottomBar.style.removeProperty('display');
                        const tIsV2 = (v) => v && v !== 'auto' && v !== 'initial' && v !== 'unset';
                        const tT2 = cfg[lp + 'ticker_top'];
                        const tB2 = cfg[lp + 'ticker_bottom'];
                        if (tIsV2(tB2)) {
                            bottomBar.style.bottom = tB2;
                            bottomBar.style.top = 'auto';
                        } else if (tIsV2(tT2)) {
                            bottomBar.style.top = tT2;
                            bottomBar.style.bottom = 'auto';
                        } else {
                            bottomBar.style.bottom = '0';
                            bottomBar.style.top = 'auto';
                        }
                        bottomBar.style.left = '0';
                        bottomBar.style.right = '0';
                        const tH2 = ensureViewportUnit(cfg[lp + 'ticker_height'], 'vh');
                        if (tH2 && tH2 !== 'auto') bottomBar.style.height = tH2;
                    }
                }

                // 배너 show/hide 및 실시간 위치/크기 반영
                if (bannerContainer) {
                    if (cfg[lp + 'banner_show'] === '0' || lp === 'p3_') {
                        bannerContainer.classList.remove('banner-active');
                        bannerContainer.dataset.bannerHiddenByToggle = '1';
                    } else {
                        delete bannerContainer.dataset.bannerHiddenByToggle;
                        // 실시간 위치 적용
                        const layout = {
                            left: normalizeCssLength(cfg[lp + 'banner_left']),
                            right: normalizeCssLength(cfg[lp + 'banner_right']),
                            top: normalizeCssLength(cfg[lp + 'banner_top']),
                            bottom: normalizeCssLength(cfg[lp + 'banner_bottom'])
                        };
                        applyBannerPlacement(bannerContainer, layout);
                        // 실시간 크기 적용
                        const maxW = ensureViewportUnit(cfg[lp + 'banner_width'], 'vw') || ensureViewportUnit(cfg.banner_maxwidth, 'vw') || '42vw';
                        const maxH = ensureViewportUnit(cfg[lp + 'banner_height'], 'vh') || ensureViewportUnit(cfg.banner_maxheight, 'vh') || '50vh';
                        const wraps = Array.from(bannerContainer.querySelectorAll('.banner-item-wrap'));
                        wraps.forEach(function (wrap) {
                            wrap.style.setProperty('--banner-w', maxW);
                            wrap.style.setProperty('--banner-h', maxH);
                        });
                    }
                }

                // 스코어보드 폰트 크기, 투명도, 대회명 실시간 반영
                const sbWrap = document.getElementById('scoreboard-wrap');
                if (sbWrap) {
                    if (cfg.scoreboard_name_fontsize) sbWrap.style.setProperty('--sb-name-size', cfg.scoreboard_name_fontsize + 'px');
                    if (cfg.scoreboard_pill_fontsize) sbWrap.style.setProperty('--sb-pill-size', cfg.scoreboard_pill_fontsize + 'px');
                    const labelEl = sbWrap.querySelector('.top-bar-label');
                    if (labelEl) {
                        if (cfg.scoreboard_label_fontsize) labelEl.style.fontSize = cfg.scoreboard_label_fontsize + 'px';
                        if (cfg.scoreboard_label !== undefined && cfg.scoreboard_label !== '') {
                            window._baseScoreboardLabel = cfg.scoreboard_label;
                            updateProgressText();
                        }
                    }
                    if (cfg.scoreboard_opacity) {
                        const op = parseFloat(cfg.scoreboard_opacity);
                        if (!isNaN(op)) {
                            const nameSection = sbWrap.querySelector('.name-section');
                            const traitsSection = sbWrap.querySelector('.traits');
                            if (nameSection) nameSection.style.background = 'rgba(10, 15, 28, ' + op + ')';
                            if (traitsSection) traitsSection.style.background = 'rgba(20, 28, 46, ' + op + ')';
                        }
                    }
                }

                // 티커 카드 및 배너 렌더링
                renderTickerCards(cfg);

                // 호스트 모드 전용: 네임택 개별 위치 적용
                if (document.body.classList.contains('host-mode')) {
                    function applyNTPos2(el, prefix, defaultLeft, defaultBottom, defaultRight = 'auto') {
                        if (!el) return;
                        el.style.removeProperty('left');
                        el.style.removeProperty('right');
                        el.style.removeProperty('top');
                        el.style.removeProperty('bottom');
                        const isV = (v) => v && v !== 'auto' && v !== 'initial' && v !== 'unset';
                        
                        const ntLeft = cfg[prefix+'left'];
                        const ntRight = cfg[prefix+'right'];
                        const ntWidth = cfg['nametag_width'] || cfg[prefix+'width'];
                        const ntHeight = cfg['nametag_height'] || cfg[prefix+'height'];
                        const ntTop = cfg['nametag_top'] || cfg[prefix+'top'];
                        const ntBottom = cfg['nametag_bottom'] || cfg[prefix+'bottom'];

                        if (isV(ntRight)) el.style.right = ntRight;
                        else if (isV(ntLeft)) el.style.left = ntLeft;
                        else {
                            if (defaultRight !== 'auto') el.style.right = defaultRight;
                            else el.style.left = defaultLeft;
                        }
                        
                        if (isV(ntBottom)) el.style.bottom = ntBottom;
                        else if (isV(ntTop)) el.style.top = ntTop;
                        else el.style.bottom = defaultBottom;
                        
                        if (cfg[prefix+'show'] === '0') {
                            el.style.setProperty('display','none','important');
                        } else {
                            el.style.removeProperty('display');
                        }
                        // 실시간 크기 적용
                        if (ntWidth && ntWidth !== 'auto') el.style.width = ntWidth;
                        if (ntHeight && ntHeight !== 'auto') el.style.height = ntHeight;
                    }
                    applyNTPos2(document.getElementById('host-nametag-1'), 'nametag1_', '3%', '6%');
                    applyNTPos2(document.getElementById('host-nametag-2'), 'nametag2_', 'auto', '6%', '3%');

                    // 진행자 네임택 실시간 텍스트 및 폰트 크기 적용
                    const ntFontSize = parseInt(cfg.nametag_font_size, 10) || 22;
                    document.querySelectorAll('.host-nametag').forEach(el => {
                        el.style.setProperty('--nt-font-size', ntFontSize + 'px');
                        el.style.setProperty('--nt-role-font-size', Math.round(ntFontSize * 0.55) + 'px');
                    });

                    for (let i = 1; i <= 2; i++) {
                        const name = (cfg['host_name' + i] || '').trim();
                        const role = (cfg['host_role' + i] || '').trim();
                        const tag = document.getElementById('host-nametag-' + i);
                        const nameEl = document.getElementById('nt-name-' + i);
                        const roleEl = document.getElementById('nt-role-' + i);
                        if (tag) {
                            if (name && cfg['nametag' + i + '_show'] !== '0') {
                                nameEl.textContent = name;
                                roleEl.textContent = role;
                                roleEl.style.display = role ? '' : 'none';
                                tag.style.display = 'flex';
                            } else {
                                tag.style.display = 'none';
                            }
                        }
                    }
                    syncNametagWidths(cfg);
                }

                // 호스트 모드 전용: 룰 카드 렌더
                if (document.body.classList.contains('host-mode')) {
                    const stackEl = document.getElementById('hc-rules-stack');
                    if (stackEl) {
                        stackEl.innerHTML = '';
                        if (cfg.rules_position === 'top') {
                            stackEl.classList.add('hc-rules-top');
                        } else {
                            stackEl.classList.remove('hc-rules-top');
                        }
                        const rules = [];
                        for (let i = 1; i <= 10; i++) {
                            const value = cfg['rule' + i] || cfg['rule' + i + '_value'];
                            if (value) rules.push(value);
                        }
                        if (rules.length > 0) {
                            const card = document.createElement('div');
                            card.className = 'hc-rules-card';
                            rules.forEach(text => {
                                const row = document.createElement('div');
                                row.className = 'hc-rule-row';
                                const m = text.match(/^\[([^\]]+?)(?::([^\]]+))?\]\s*(.*)$/);
                                if (m) {
                                    const labelSpan = document.createElement('span');
                                    labelSpan.className = 'hc-rule-label';
                                    labelSpan.textContent = m[1];
                                    if (m[2]) labelSpan.style.color = m[2];
                                    const valueSpan = document.createElement('span');
                                    valueSpan.className = 'hc-rule-value';
                                    valueSpan.textContent = m[3];
                                    row.appendChild(labelSpan);
                                    row.appendChild(valueSpan);
                                } else {
                                    row.innerHTML = renderColorMarkup(text);
                                }
                                card.appendChild(row);
                            });
                            stackEl.appendChild(card);
                        }
                        stackEl.style.display = rules.length > 0 ? 'flex' : 'none';
                    }
                }
            }

            if (e.data.type === 'forceRefresh') {
                loadHostConfig();
                smartRefresh();
            }

            if (e.data.type === 'bracketVisibility') {
                const key = e.data.key;
                if (key !== 'bracket_full' && key !== 'bracket_live') return;
                const map = Object.assign({}, window.latestConfigMap || {});
                map[key + '_show'] = String(e.data.show) === '1' ? '1' : '0';
                window.latestConfigMap = map;
                applyBracketPageMap(map);
            }
        });

        // ══════════════════════════════════════
        //  배틀 & 토너먼트 오버레이 연출 (자바스크립트)
        // ══════════════════════════════════════
        const params = new URLSearchParams(window.location.search);
        const _pgVal = (params.get('page') || '').toLowerCase();
        const isBracketPage = _pgVal === 'bracket' || _pgVal === '3' || _pgVal === '3p';
        
        if (isBracketPage) {
            // 일반 경매 카드 숨기고 대진표 전체화면 노출
            document.getElementById('empty').style.display = 'none';
            document.getElementById('broadcast').style.display = 'none';
            // document.getElementById('bracket-page-container').style.display = 'block';
            
            // 대진표 자동 리프레시 루프 가동
            setInterval(refreshBracketPage, 3000);
            refreshBracketPage();

            // 대진표 화면에서도 실시간 경기상황(배틀 상태)을 감지하고 하이라이트를 즉각 업데이트하도록 루프 가동
            setInterval(refreshBattleOverlayState, 2000);
            refreshBattleOverlayState();
        } else {
            // 일반 경매 오버레이에서 배틀 모드 상태를 구독하여 화면에 자막 및 금액 감춤 적용
            setInterval(refreshBattleOverlayState, 2000);
        }

        // 전역 개체 캐시 fallback 확보
        window.latestItemsList = window.latestItemsList || [];

        function applyBracketPageMap(map, items) {
            if (!map) return;
            window.latestConfigMap = map;
            
            // 유효한 items 배열이 들어올 때만 전역 캐시 갱신
            if (Array.isArray(items) && items.length > 0) {
                window.latestItemsList = items;
            }
            
            const activeItems = window.latestItemsList || [];
            
            const fullShow = (map.bracket_full_show !== undefined ? String(map.bracket_full_show) : '1') === '1';
            const liveShow = (map.bracket_live_show !== undefined ? String(map.bracket_live_show) : '0') === '1';
            const bShow = map.bracket_show !== undefined ? String(map.bracket_show) : '1';
            const active = map.active_tournament || 'none';
            
            // Apply bracket positioning & size
            const treeFull = document.getElementById('bracket-page-tree-full');
            const treeLive = document.getElementById('bracket-page-tree-live');

            const fullTop = map.bracket_full_top || map.bracket_top || '5%';
            const fullLeft = map.bracket_full_left || map.bracket_left || '20%';
            const fullWidth = map.bracket_full_width || map.bracket_width || '60%';
            const fullHeight = map.bracket_full_height || map.bracket_height || '65%';
            const fullFontSize = map.bracket_full_font_size || map.bracket_font_size || '14';

            const liveTop = map.bracket_live_top || '0px';
            const liveLeft = map.bracket_live_left || '0px';
            const liveWidth = map.bracket_live_width || '100%';
            const liveHeight = map.bracket_live_height || '100%';
            const liveFontSize = map.bracket_live_font_size || '14';

            if (treeFull) {
                treeFull.style.position = 'absolute';
                treeFull.style.top = fullTop;
                treeFull.style.left = fullLeft;
                treeFull.style.width = fullWidth;
                treeFull.style.height = fullHeight;
                treeFull.style.display = 'flex';
                treeFull.style.setProperty('--bracket-fs', fullFontSize + 'px');
            }
            if (treeLive) {
                treeLive.style.position = 'absolute';
                treeLive.style.top = liveTop;
                treeLive.style.left = liveLeft;
                treeLive.style.width = liveWidth;
                treeLive.style.height = liveHeight;
                treeLive.style.display = 'flex';
                treeLive.style.setProperty('--bracket-fs', liveFontSize + 'px');
            }

            // Apply font-size via CSS variable on the container
            // + Control the visibility of the entire bracket container (On/Off master toggle)
            const containerEl = document.getElementById('bracket-page-container');
            // 대진 결과/실시간 대진은 3P 송출 화면에서만 노출한다.
            const masterShow = (bShow === '1') && isBracketPage;
            if (containerEl) {
                containerEl.style.setProperty('--bracket-fs', fullFontSize + 'px');
                if (masterShow) {
                    containerEl.classList.add('visible');
                } else {
                    containerEl.classList.remove('visible');
                }
            }

            // 전체결과/실시간대진 노출 설정을 page=3 송출 화면에서도 그대로 적용한다.
            if (treeFull) {
                const shouldShowFull = masterShow && fullShow;
                if (shouldShowFull && treeFull.dataset.wasVisible !== '1') {
                    window._animateFullResults = true;
                }
                treeFull.dataset.wasVisible = shouldShowFull ? '1' : '0';
                if (shouldShowFull) {
                    treeFull.classList.add('visible');
                } else {
                    treeFull.classList.remove('visible');
                }
            }
            if (treeLive) {
                if (masterShow && liveShow) {
                    treeLive.classList.add('visible');
                } else {
                    treeLive.classList.remove('visible');
                }
            }

            if (active === 'none') {
                if (treeFull) {
                    treeFull.innerHTML = `
                        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;gap:16px;">
                            <div style="font-size:32px;font-weight:900;color:#3b82f6;letter-spacing:0.05em;margin-bottom:8px;">TOURNAMENT</div>
                            <div style="font-size:24px;font-weight:900;color:#fff;">토너먼트 대기 중</div>
                            <div style="font-size:14px;color:#64748b;font-weight:600;">3P 대진용 배치기에서 토너먼트를 활성화해주세요.</div>
                            <div style="font-size:12px;color:#475569;margin-top:8px;">preview.html?page=3 → 방송 송출 → 16강/8강/4강 선택</div>
                        </div>
                    `;
                    treeFull.classList.toggle('visible', masterShow && fullShow);
                }
                if (treeLive) {
                    treeLive.classList.toggle('visible', masterShow && liveShow);
                }
                return;
            }
            
            const bracketKey = 'tournament_bracket_' + active;
            if (!map[bracketKey]) return;
            
            let bracket = { matches: {} };
            try { bracket = JSON.parse(map[bracketKey]); } catch(e){}

            if (masterShow && fullShow) {
                renderBracketPageTree(parseInt(active), bracket, map);
            }
            if (masterShow && liveShow) {
                renderBracketLiveView(parseInt(active), bracket, map);
            }
        }

        async function refreshBracketPage() {
            try {
                const [map, items] = await Promise.all([getConfigMap(), getItems()]);
                applyBracketPageMap(map, items);
            } catch (err) {
                console.error('refreshBracketPage error', err);
            }
        }

        let bracketFullRenderId = 0;
        let battleItemsCache = [];
        let battleItemsCacheAt = 0;
        let battleItemsRequest = null;

        async function getBattleItemsCached() {
            if (battleItemsCache.length && Date.now() - battleItemsCacheAt < 1500) {
                return battleItemsCache;
            }
            if (battleItemsRequest) return battleItemsRequest;
            battleItemsRequest = getItems()
                .then(items => {
                    battleItemsCache = items || [];
                    battleItemsCacheAt = Date.now();
                    return battleItemsCache;
                })
                .finally(() => { battleItemsRequest = null; });
            return battleItemsRequest;
        }

        async function renderBracketPageTree(scale, bracket, map) {
            const renderId = ++bracketFullRenderId;
            const tree = document.getElementById('bracket-page-tree-full');
            const currentMatch = map.battle_current_match || '';

            // 전체 결과는 수동 winner 값이 아니라 실제 낙찰 완료 데이터로 계산한다.
            let items = [];
            try { items = await getBattleItemsCached(); } catch (e) {
                console.error('Failed to load auction results for bracket', e);
            }
            if (renderId !== bracketFullRenderId) return;
            tree.innerHTML = '';

            // 업체 로고 맵 구성 (업체명 -> 로고URL)
            const teamLogoMap = {};
            for (let i = 1; i <= 20; i++) {
                const raw = map['team_logo' + i];
                if (!raw) continue;
                try {
                    const obj = JSON.parse(raw);
                    if (obj.name && obj.url) teamLogoMap[obj.name.trim()] = obj.url;
                } catch(e) {}
            }
            console.log('[bracket] teamLogoMap:', JSON.stringify(teamLogoMap));

            // 이름 매칭 헬퍼: 정확매칭 우선, 없으면 포함 매칭
            function getTeamLogo(teamName) {
                if (!teamName) return '';
                const t = teamName.trim();
                if (teamLogoMap[t]) return teamLogoMap[t];
                // 부분 매칭 (로고 등록명이 팀명에 포함되거나 반대)
                for (const [name, url] of Object.entries(teamLogoMap)) {
                    if (t.includes(name) || name.includes(t)) return url;
                }
                return '';
            }

            const isAuctionDone = item => item && ['완료', 'sold', '낙찰', '유찰'].includes(item.status);
            const toPrice = item => Number.parseFloat(item?.sold_price || item?.soldPrice || 0) || 0;

            let schedule = [];
            try { if (map.battle_schedule) schedule = JSON.parse(map.battle_schedule); } catch (e) {}
            const roundsByMatch = {};
            schedule.forEach(step => {
                if (step?.matchKey) roundsByMatch[step.matchKey] = Number(step.roundsPerMatch) || 4;
            });
            
            // 1라운드 매칭으로 회사명 -> 알파벳 매핑 생성
            const teamToLetter = {};
            const matchCount = scale / 2;
            for (let i = 1; i <= matchCount; i++) {
                const matchKey = scale + '_' + i;
                const match = bracket.matches[matchKey] || { left: '', right: '', winner: '' };
                const leftLetter = String.fromCharCode(65 + (i - 1) * 2);      // A, C, E...
                const rightLetter = String.fromCharCode(65 + (i - 1) * 2 + 1);  // B, D, F...
                if (match.left) teamToLetter[match.left.trim()] = leftLetter;
                if (match.right) teamToLetter[match.right.trim()] = rightLetter;
            }
            
            // 타겟 라운드 결정 (bracket_view_round가 있으면 그것을 사용, 없으면 battle_current_match에서 파싱, 그것도 없으면 scale 기본값)
            let targetRound = parseInt(map.bracket_view_round, 10);
            if (!targetRound && map.battle_current_match) {
                const parts = map.battle_current_match.split('_');
                if (parts.length >= 2) {
                    targetRound = parseInt(parts[1], 10);
                }
            }
            if (!targetRound) {
                targetRound = scale;
            }

            // 만약 scale이 8강인데 targetRound가 16강이 되어 있다면 scale 이하로 제한
            if (targetRound > scale) {
                targetRound = scale;
            }

            const round = targetRound;
            const rMatchCount = round / 2;
            const roundTitle = round === 2 ? '결승' : `${round}강`;
            const board = document.createElement('section');
            const shouldAnimate = window._animateFullResults === true;
            window._animateFullResults = false;
            board.className = 'sports-results-board' + (shouldAnimate ? ' animate-in' : '');
            board.innerHTML = `
                <header class="sports-results-header">
                    <div class="sports-results-heading">
                        <span class="sports-results-kicker">CDCUP MATCH CENTER</span>
                        <h2 class="sports-results-title">${roundTitle} 전체 경기 결과</h2>
                    </div>
                    <span class="sports-results-live">LIVE AUCTION DATA</span>
                </header>
            `;
            const col = document.createElement('div');
            col.className = 'sports-results-grid';
            if (rMatchCount === 1) col.style.gridTemplateColumns = 'minmax(0, 1fr)';

            for (let i = 1; i <= rMatchCount; i++) {
                const matchKey = round + '_' + i;
                const fullKey = scale + '_' + matchKey;
                const match = bracket.matches[matchKey] || { left: '', right: '', winner: '' };
                
                const leftL = teamToLetter[match.left?.trim()] || String.fromCharCode(65 + (i - 1) * 2);
                const rightL = teamToLetter[match.right?.trim()] || String.fromCharCode(65 + (i - 1) * 2 + 1);
                const roundsPerMatch = roundsByMatch[matchKey] || 4;
                let ls = 0, rs = 0, draws = 0, completedRounds = 0;
                let leftTotal = 0, rightTotal = 0;

                for (let r = 1; r <= roundsPerMatch; r++) {
                    const leftItem = findItemByCode(items, leftL + r);
                    const rightItem = findItemByCode(items, rightL + r);
                    if (!isAuctionDone(leftItem) || !isAuctionDone(rightItem)) continue;
                    const leftPrice = toPrice(leftItem);
                    const rightPrice = toPrice(rightItem);
                    completedRounds++;
                    leftTotal += leftPrice;
                    rightTotal += rightPrice;
                    if (leftPrice > rightPrice) ls++;
                    else if (rightPrice > leftPrice) rs++;
                    else draws++;
                }

                const isComplete = completedRounds === roundsPerMatch;
                let calculatedWinner = '';
                if (completedRounds > 0) {
                    // 합산 낙찰 금액이 최종 승패 기준
                    if (leftTotal > rightTotal) calculatedWinner = 'left';
                    else if (rightTotal > leftTotal) calculatedWinner = 'right';
                    else if (isComplete) calculatedWinner = 'draw';
                }
                const displayWinner = calculatedWinner || match.winner || '';
                const hasScore = completedRounds > 0;
                
                const node = document.createElement('article');
                const isCurrent = currentMatch === fullKey && !isComplete;
                node.className = 'sports-match-card' + (isCurrent ? ' is-current' : '');
                node.style.setProperty('--match-index', i - 1);
                const titleText = (round === 2) ? '결승전' : (round === 4 ? '준결승 ' + i + '조' : (round === 8 ? '8강 ' + i + '조' : '16강 ' + i + '조'));
                const leftWin = displayWinner === 'left';
                const rightWin = displayWinner === 'right';
                const stateText = isComplete ? 'FINAL' : (isCurrent ? 'LIVE' : `${completedRounds}/${roundsPerMatch} ROUND`);
                const leftName = match.left || '대기 중';
                const rightName = match.right || '대기 중';
                const leftScore = hasScore ? ls : '-';
                const rightScore = hasScore ? rs : '-';

                const fmtPrice = n => {
                    if (!n) return '0';
                    if (n >= 10000) return (n / 10000).toFixed(n % 10000 === 0 ? 0 : 1) + '만';
                    return n.toLocaleString();
                };

                const leftLogo = getTeamLogo(match.left);
                const rightLogo = getTeamLogo(match.right);

                node.innerHTML = `
                    <div class="sports-match-meta">
                        <span>${titleText}</span>
                        <span class="sports-match-state">${stateText}</span>
                    </div>
                    <div class="sports-scoreline">
                        ${leftLogo ? `<img src="${leftLogo}" class="sports-team-logo" alt="" onerror="this.style.display='none'">` : '<div class="sports-logo-placeholder"></div>'}
                        <div class="sports-team sports-team--left${leftWin ? ' is-leading' : ''}">
                            <span class="sports-team-code">${esc(leftL)} TEAM</span>
                            <strong class="sports-team-name">${esc(leftName)}</strong>
                        </div>
                        <div class="sports-score" aria-label="합산 ${leftTotal} 대 ${rightTotal}">
                            <span class="${leftWin ? 'is-leading' : ''}">${fmtPrice(leftTotal)}</span>
                            <i class="sports-score-separator">:</i>
                            <span class="${rightWin ? 'is-leading' : ''}">${fmtPrice(rightTotal)}</span>
                        </div>
                        <div class="sports-team sports-team--right${rightWin ? ' is-leading' : ''}">
                            <span class="sports-team-code">${esc(rightL)} TEAM</span>
                            <strong class="sports-team-name">${esc(rightName)}</strong>
                        </div>
                        ${rightLogo ? `<img src="${rightLogo}" class="sports-team-logo" alt="" onerror="this.style.display='none'">` : '<div class="sports-logo-placeholder"></div>'}
                    </div>
                    <div class="sports-match-footer">
                        <span>${leftScore}승</span>
                        <span class="sports-match-draws">${draws ? `무 ${draws}` : `${completedRounds}/${roundsPerMatch}`}</span>
                        <span>${rightScore}승</span>
                    </div>
                `;
                col.appendChild(node);
            }
            board.appendChild(col);
            const note = document.createElement('div');
            note.className = 'sports-results-note';
            note.textContent = '낙찰 합산 금액 기준 승패 판정';
            board.appendChild(note);
            tree.appendChild(board);
        }

        async function renderBracketLiveView(scale, bracket, map) {
            const tree = document.getElementById('bracket-page-tree-live');
            const titleEl = document.getElementById('bracket-page-title');

            // 스케줄 읽기
            let schedule = [];
            try { if (map.battle_schedule) schedule = JSON.parse(map.battle_schedule); } catch(e){}
            const stepIdx = parseInt(map.battle_step || '-1');

            if (!schedule.length || stepIdx < 0) {
                tree.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:95%;max-width:780px;margin:0 auto;padding:30px;background:rgba(15,23,42,0.65);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:2px solid rgba(255,255,255,0.08);border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,0.5);gap:16px;">
                    <div style="font-size:24px;font-weight:900;color:#fff;">경기 대기 중</div>
                    <div style="font-size:14px;color:#94a3b8;font-weight:600;">3P 배치기에서 스케줄을 생성하고 경기를 시작하세요.</div>
                </div>`;
                if (titleEl) titleEl.textContent = '대기 중';
                return;
            }

            const step = schedule[stepIdx] || schedule[0];
            const rpm = step.roundsPerMatch || 4;
            const isChamp = step.isLastRound;

            // 매치의 모든 라운드 아이템 가격 조회
            let items = [];
            try { items = await getBattleItemsCached(); } catch(e){}

            let leftTotal = 0, rightTotal = 0;
            let leftRoundWins = 0, rightRoundWins = 0;
            const roundData = [];

            for (let r = 1; r <= rpm; r++) {
                const leftItemName = step.leftTeam + r;
                const rightItemName = step.rightTeam + r;
                const lItem = findItemByCode(items, leftItemName);
                const rItem = findItemByCode(items, rightItemName);
                
                const lp = parseFloat(lItem?.sold_price || lItem?.soldPrice || 0);
                const rp = parseFloat(rItem?.sold_price || rItem?.soldPrice || 0);
                const lSold = (lItem?.status === '완료' || lItem?.status === 'sold' || lItem?.status === '낙찰' || lItem?.status === '유찰');
                const rSold = (rItem?.status === '완료' || rItem?.status === 'sold' || rItem?.status === '낙찰' || rItem?.status === '유찰');
                const bothDone = lSold && rSold;
                
                let roundWinner = '';
                if (bothDone) {
                    roundWinner = lp > rp ? 'left' : (rp > lp ? 'right' : 'draw');
                    leftTotal += lp;
                    rightTotal += rp;
                    if (roundWinner === 'left') leftRoundWins++;
                    if (roundWinner === 'right') rightRoundWins++;
                }
                
                const isCurrent = (r === step.round);
                roundData.push({ round: r, lItem, rItem, lp, rp, lSold, rSold, bothDone, roundWinner, isCurrent, leftItemName, rightItemName });
            }

            const isLastRoundDone = roundData[rpm-1]?.bothDone;

            // ═══ 대진 스텝 전환 감지 및 초기화 ═══
            if (window._lastStepIdx !== stepIdx) {
                window._playedShowdownsInitialized = false;
                window._lastStepIdx = stepIdx;
            }

            // 첫 로드 시 이미 종료된 라운드는 쇼다운 연출 제외
            if (!window._playedShowdownsInitialized) {
                window._playedShowdowns = window._playedShowdowns || new Set();
                for (let r = 1; r <= rpm; r++) {
                    const lName = step.leftTeam + r;
                    const rName = step.rightTeam + r;
                    const li = findItemByCode(items, lName);
                    const ri = findItemByCode(items, rName);
                    const ld = (li?.status === '완료' || li?.status === 'sold' || li?.status === '낙찰' || li?.status === '유찰');
                    const rd2 = (ri?.status === '완료' || ri?.status === 'sold' || ri?.status === '낙찰' || ri?.status === '유찰');
                    if (ld && rd2) {
                        const showdownKey = `${scale}_${step.leftTeam}_${step.rightTeam}_${r}`;
                        window._playedShowdowns.add(showdownKey);
                    }
                }
                window._playedShowdownsInitialized = true;
            }

            // 숫자 포맷 함수 (만 단위 최적화)
            const fmtCompact = n => {
                if (!n) return '-';
                const num = Number(n);
                if (num >= 10000) {
                    const man = num / 10000;
                    return man % 1 === 0 ? man + '만' : man.toFixed(1) + '만';
                }
                return num.toLocaleString();
            };

            // ═══ 실시간 신규 낙찰/유찰 알림 처리 ═══
            window._lastSeenSold = window._lastSeenSold || {};
            if (!window._lastSeenSoldInitialized) {
                items.forEach(i => {
                    if (i.status === '낙찰' || i.status === '유찰') {
                        window._lastSeenSold[i.row] = i.status;
                    }
                });
                window._lastSeenSoldInitialized = true;
            } else {
                items.forEach(i => {
                    if ((i.status === '낙찰' || i.status === '유찰') && window._lastSeenSold[i.row] !== i.status) {
                        window._lastSeenSold[i.row] = i.status;
                        
                        const cleanCode = getCleanCode(i);
                        if (cleanCode) {
                            const isCurrentLeft = cleanCode.startsWith(step.leftTeam);
                            const isCurrentRight = cleanCode.startsWith(step.rightTeam);
                            
                            if (isCurrentLeft || isCurrentRight) {
                                window._activeNotification = {
                                    name: cleanCode,
                                    status: i.status,
                                    price: i.sold_price || i.soldPrice || 0,
                                    winner: i.winner || '',
                                    timer: 6
                                };
                                
                                if (!window._notificationTimer) {
                                    window._notificationTimer = setInterval(() => {
                                        if (window._activeNotification) {
                                            window._activeNotification.timer--;
                                            if (window._activeNotification.timer <= 0) {
                                                window._activeNotification = null;
                                                clearInterval(window._notificationTimer);
                                                window._notificationTimer = null;
                                            }
                                            applyBracketPageMap(window.latestConfigMap);
                                        }
                                    }, 1000);
                                }
                            }
                        }
                    }
                });
            }

            // ═══ 신규 라운드 종료 감지 (쇼다운 예약) ═══
            window._playedShowdowns = window._playedShowdowns || new Set();
            for (let r = 1; r <= rpm; r++) {
                const leftItemName = step.leftTeam + r;
                const rightItemName = step.rightTeam + r;
                const lItem = findItemByCode(items, leftItemName);
                const rItem = findItemByCode(items, rightItemName);
                const lSold = (lItem?.status === '완료' || lItem?.status === 'sold' || lItem?.status === '낙찰' || lItem?.status === '유찰');
                const rSold = (rItem?.status === '완료' || rItem?.status === 'sold' || rItem?.status === '낙찰' || rItem?.status === '유찰');
                const bothDone = lSold && rSold;

                if (bothDone) {
                    const showdownKey = `${scale}_${step.leftTeam}_${step.rightTeam}_${r}`;
                    if (!window._playedShowdowns.has(showdownKey)) {
                        window._playedShowdowns.add(showdownKey);
                        
                        window._activeShowdown = {
                            key: showdownKey,
                            round: r,
                            countdown: 4
                        };
                        
                        if (!window._showdownTimer) {
                            window._showdownTimer = setInterval(() => {
                                if (window._activeShowdown) {
                                    window._activeShowdown.countdown--;
                                    if (window._activeShowdown.countdown <= 0) {
                                        window._activeShowdown = null;
                                        clearInterval(window._showdownTimer);
                                        window._showdownTimer = null;
                                    }
                                    applyBracketPageMap(window.latestConfigMap);
                                }
                            }, 1000);
                        }
                    }
                }
            }

            // ═══ 자동 진행: 순서 상관없이 첫 번째 미완료 스텝으로 점프 ═══
            if (!window._autoAdvancing && stepIdx < schedule.length - 1) {
                let targetStep = stepIdx;
                for (let s = stepIdx; s < schedule.length; s++) {
                    const st = schedule[s];
                    const lName = st.leftTeam + st.round;
                    const rName = st.rightTeam + st.round;
                    const li = findItemByCode(items, lName);
                    const ri = findItemByCode(items, rName);
                    const ld = (li?.status === '완료' || li?.status === 'sold' || li?.status === '낙찰' || li?.status === '유찰');
                    const rd2 = (ri?.status === '완료' || ri?.status === 'sold' || ri?.status === '낙찰' || ri?.status === '유찰');
                    if (ld && rd2) {
                        targetStep = s + 1;
                    } else {
                        break;
                    }
                }
                if (targetStep !== stepIdx && targetStep <= schedule.length - 1) {
                    window._autoAdvancing = true;
                    try {
                        await updateConfigs({ battle_step: String(targetStep) });
                        console.log('Auto-jumped to step', targetStep, 'from', stepIdx);
                    } catch(e) { console.error('Auto-advance failed:', e); }
                    setTimeout(() => { window._autoAdvancing = false; }, 3000);
                }
            }
            const matchTitle = step.group + '조 ' + (isChamp ? '대장전' : step.round + '라운드');
            
            if (titleEl) {
                titleEl.textContent = (scale === 4 ? '4강' : (scale === 8 ? '8강' : (scale === 16 ? '16강' : scale + '강'))) + ' ' + matchTitle;
            }

            // 현재 진행 중인 개체(status가 '진행', '진행중' 또는 'active'인 개체) 찾기
            const activeItem = items.find(i => i.status === '진행' || i.status === '진행중' || i.status === 'active');
            const nextIdx = stepIdx + 1;

            // 대장전 특수 배경
            const champGlow = isChamp ? 'background:linear-gradient(180deg,rgba(245,158,11,0.06) 0%,rgba(10,15,29,0.7) 40%);' : '';

            // 진행 중인 팀 판별
            let isLeftActive = false;
            let isRightActive = false;
            if (activeItem) {
                const activeName = getCleanCode(activeItem) || (activeItem.name || '').trim().toUpperCase();
                const activeLetter = activeName.charAt(0).toUpperCase();
                isLeftActive = (activeLetter === step.leftTeam.toUpperCase());
                isRightActive = (activeLetter === step.rightTeam.toUpperCase());
            }

            // 넥스트 매치 텍스트
            let nextMatchText = '';
            if (nextIdx < schedule.length && !isLastRoundDone) {
                const ns = schedule[nextIdx];
                const nsLabel = ns.isLastRound ? '대장전' : ns.round + '라운드';
                nextMatchText = `${ns.group}조 ${nsLabel} (${ns.leftTeam}팀 vs ${ns.rightTeam}팀)`;
            } else {
                nextMatchText = '마지막 매치 진행 중';
            }

            // 쇼다운 카운트다운 오버레이 HTML
            let showdownOverlayHtml = '';
            if (window._activeShowdown) {
                const countText = window._activeShowdown.countdown > 0 ? window._activeShowdown.countdown : 'OPEN!';
                showdownOverlayHtml = `
                    <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(9,15,29,0.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:6px;display:flex;align-items:center;justify-content:center;z-index:10;gap:8px;">
                        <span style="font-size:11px;font-weight:900;color:#3b82f6;letter-spacing:0.1em;text-transform:uppercase;">ROUND ${window._activeShowdown.round} FINISHED</span>
                        <span style="font-size:18px;font-weight:950;color:#fff;text-shadow:0 0 10px rgba(59,130,246,0.8);">${countText}</span>
                    </div>
                `;
            }

            // 알림 토스트 배너 HTML
            let notificationOverlayHtml = '';
            if (window._activeNotification) {
                const isSold = window._activeNotification.status === '낙찰';
                notificationOverlayHtml = `
                    <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(9,15,29,0.95);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:6px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 24px rgba(0,0,0,0.5);z-index:20;box-sizing:border-box;">
                        <span style="font-size:12px;font-weight:900;color:${isSold ? '#10b981' : '#f59e0b'};">${isSold ? '낙찰 완료' : '유찰'}</span>
                        <span style="font-size:13px;font-weight:800;color:#fff;margin:0 10px;flex:1;text-align:center;">[${window._activeNotification.name}] ${isSold ? fmtCompact(window._activeNotification.price) : '유찰'}</span>
                        <span style="font-size:11px;font-weight:700;color:#cbd5e1;">${isSold ? (window._activeNotification.winner || '무명') : '경매 종료'}</span>
                    </div>
                `;
            }

            // 최종 매치 결과 배너 (가로바 하단에 깔끔하게 붙임)
            let finalBanner = '';
            if (isLastRoundDone) {
                let winnerSide = 'draw';
                if (leftRoundWins > rightRoundWins) winnerSide = 'left';
                else if (rightRoundWins > leftRoundWins) winnerSide = 'right';
                else if (leftTotal > rightTotal) winnerSide = 'left';
                else if (rightTotal > leftTotal) winnerSide = 'right';
                const winner = winnerSide === 'left' ? step.leftName : (winnerSide === 'right' ? step.rightName : '무승부');
                const winLetter = winnerSide === 'left' ? step.leftTeam : step.rightTeam;
                const winnerText = winnerSide === 'draw' ? '무승부' : `${winLetter}팀 ${esc(winner)} 승리`;
                finalBanner = `
                    <div style="margin-top:6px; display:flex; align-items:center; justify-content:center; gap:8px; background:linear-gradient(90deg,rgba(15,29,52,0.97),rgba(30,58,138,0.92)); border:1px solid rgba(96,165,250,0.65); border-radius:5px; padding:6px 14px; box-shadow:0 6px 18px rgba(2,6,23,0.32); box-sizing:border-box; color:#fff; font-size:12px; font-weight:800; width:fit-content; margin-left:auto; margin-right:auto; white-space:nowrap;">
                        <span style="color:#93c5fd;font-weight:900;letter-spacing:0.08em;">FINAL</span>
                        <span>${winnerText}</span>
                        <span style="color:#94a3b8;font-size:11px;font-weight:600;">(스코어 ${leftRoundWins}:${rightRoundWins} | 총액 ${fmtCompact(leftTotal)} vs ${fmtCompact(rightTotal)})</span>
                    </div>`;
            }

            // 선공 정보
            const headerLeft = step.firstTeam === 'left' ? '<span style="color:#93c5fd;font-weight:900;font-size:11px;background:rgba(37,99,235,0.18);padding:1px 5px;border-radius:3px;white-space:nowrap;">선공</span>' : '<span style="color:#94a3b8;font-size:11px;opacity:0.6;white-space:nowrap;">후공</span>';
            const headerRight = step.firstTeam === 'right' ? '<span style="color:#93c5fd;font-weight:900;font-size:11px;background:rgba(37,99,235,0.18);padding:1px 5px;border-radius:3px;white-space:nowrap;">선공</span>' : '<span style="color:#94a3b8;font-size:11px;opacity:0.6;white-space:nowrap;">후공</span>';

            // blink keyframe 주입용 style
            const animationStyle = `
                <style>

                        0%, 100% { opacity: 0.35; }
                        50% { opacity: 1; }
                    }
                    .active-dot {
                        animation: dot-blink 1.2s infinite;
                    }
                </style>
            `;

            tree.innerHTML = `

                <div style="display:flex; flex-direction:column; width:100%; height:auto; box-sizing:border-box;">
                    <div style="position:relative; display:flex; align-items:stretch; border-radius:6px; box-shadow:0 4px 20px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06); font-family:'Pretendard', sans-serif; color:#fff; overflow:hidden; font-size:15px; font-weight:700; height:50px; width:fit-content; max-width:100%; margin:0 auto; box-sizing:border-box;">
                        
                        <!-- 알림 토스트 배너 -->
                        ${notificationOverlayHtml}
                        
                        <!-- 쇼다운 카운트다운 오버레이 -->
                        ${showdownOverlayHtml}

                        <!-- 1. 왼쪽 영역: 매치 타이틀 & 팀 정보 -->
                        <div style="display:flex; align-items:center; padding:0 18px 0 14px; background:rgba(10,15,28,0.88); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); white-space:nowrap; gap:12px;">
                            <span style="font-size:11px; font-weight:900; color:#fff; background:#d90429; padding:3px 7px; border-radius:3px; letter-spacing:0.05em; white-space:nowrap;">
                                LIVE · ${(scale === 4 ? '4강' : (scale === 8 ? '8강' : (scale === 16 ? '16강' : scale + '강')))} ${step.group}조 ${isChamp ? '대장전' : step.round + 'R'}
                            </span>
                            
                            <!-- 왼쪽 팀명 (진행 중일 때 불이 들어옴) -->
                            <span style="display:flex; align-items:center; gap:5px; font-size:16px; font-weight:800; color:${isLeftActive ? '#60a5fa' : '#94a3b8'};">
                                ${isLeftActive ? '<span class="active-dot" style="display:inline-block; width:6px; height:6px; background:#60a5fa; border-radius:50%; box-shadow:0 0 8px #60a5fa;"></span>' : ''}
                                <span style="white-space:nowrap;">${step.leftTeam}팀</span>
                            </span>
                            <span style="margin-top:2px;">${headerLeft}</span>
                            
                            <span style="color:#475569; font-size:12px; padding:0 2px;">VS</span>
                            
                            <!-- 오른쪽 팀명 (진행 중일 때 불이 들어옴) -->
                            <span style="display:flex; align-items:center; gap:5px; font-size:16px; font-weight:800; color:${isRightActive ? '#f87171' : '#94a3b8'};">
                                <span style="white-space:nowrap;">${step.rightTeam}팀</span>
                                ${isRightActive ? '<span class="active-dot" style="display:inline-block; width:6px; height:6px; background:#f87171; border-radius:50%; box-shadow:0 0 8px #f87171;"></span>' : ''}
                            </span>
                            <span style="margin-top:2px;">${headerRight}</span>
                        </div>

                        <!-- 구분선 -->
                        <div style="width:1px; background:rgba(255,255,255,0.12); flex-shrink:0;"></div>

                        <!-- 2. 가운데 영역: 실시간 스코어 및 총액 -->
                        <div style="display:flex; align-items:center; padding:0 20px; background:rgba(20,28,46,0.85); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); white-space:nowrap; gap:12px;">
                            <span style="font-size:12px; font-weight:800; color:#64748b; letter-spacing:0.04em; white-space:nowrap;">SCORE</span>
                            <span style="font-size:24px; font-weight:950; color:#fff; text-shadow:0 0 10px rgba(255,255,255,0.25); line-height:1; letter-spacing:0.02em; white-space:nowrap;">
                                ${leftRoundWins} : ${rightRoundWins}
                            </span>
                            <span style="font-size:11px; color:#cbd5e1; font-weight:700; opacity:0.85; white-space:nowrap;">
                                (${fmtCompact(leftTotal)} vs ${fmtCompact(rightTotal)})
                            </span>
                        </div>

                        <!-- 구분선 -->
                        <div style="width:1px; background:rgba(255,255,255,0.12); flex-shrink:0;"></div>

                        <!-- 3. 오른쪽 영역: 다음 경기 안내 -->
                        <div style="display:flex; align-items:center; padding:0 18px; background:rgba(20,28,46,0.85); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); white-space:nowrap; gap:8px;">
                            <span style="background:#1d4ed8; color:#dbeafe; padding:2px 6px; border-radius:3px; font-size:10px; font-weight:900; letter-spacing:0.05em; white-space:nowrap;">NEXT</span>
                            <span style="font-size:12px; font-weight:700; color:#64748b; white-space:nowrap;">${nextMatchText}</span>
                        </div>

                        <!-- 우측 주황색 악센트 스트라이프 (Top-bar와 동일하게) -->
