<!DOCTYPE html>
<html>

<head>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            alert("[BROADCAST RUNTIME ERROR]\nMessage: " + message + "\nSource: " + source + "\nLine: " + lineno + "\nCol: " + colno + "\nStack: " + (error ? error.stack : 'no stack'));
            return false;
        };
    </script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="supabase-bridge.js"></script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: transparent;
            width: 100vw;
            height: 100vh;
            font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
            overflow: hidden;
            color: #FFFFFF;
        }

        .empty {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
        }

        .broadcast {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* ── 스코어보드 스타일 상단 바 (2P 개체용) ── */
        @keyframes scoreboardSlideIn {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 스코어보드 래퍼 (라벨 + 바를 묶는 컨테이너) */
        .scoreboard-wrap {
            position: absolute;
            top: 20px;
            right: 24px;
            left: auto;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            animation: scoreboardSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* 대회명 라벨 (바 위에 표시) */
        .scoreboard-wrap .top-bar-label {
            font-size: var(--sb-label-size, 14px);
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255, 168, 0, 0.85);
            padding: 0 8px 4px 0;
        }

        .top-bar {
            display: flex;
            align-items: stretch;
            gap: 0;
            overflow: hidden;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        /* 우측 주황색 악센트 스트라이프 */
        .top-bar .accent-bar {
            width: 5px;
            flex-shrink: 0;
            background: linear-gradient(180deg, #FF6B00, #FFA800);
            order: 99; /* 맨 우측으로 이동 */
        }

        /* 이름 영역 (어두운 배경) */
        .top-bar .name-section {
            display: flex;
            align-items: center;
            padding: 10px 22px 10px 16px;
            background: rgba(10, 15, 28, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .top-bar .name {
            font-size: var(--sb-name-size, 30px);
            font-weight: 800;
            color: #FFFFFF;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }

        /* 구분선 */
        .top-bar .sep {
            width: 1px;
            background: rgba(255, 255, 255, 0.12);
            flex-shrink: 0;
        }

        /* 특성 필 영역 (약간 밝은 배경) */
        .top-bar .traits {
            display: flex;
            align-items: center;
            padding: 10px 18px;
            gap: 6px;
            background: rgba(20, 28, 46, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            flex-wrap: nowrap;
        }

        .top-bar .traits-track {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        /* pill 배지 스타일 */
        .top-bar .pill {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: var(--sb-pill-size, 17px);
            font-weight: 600;
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.08);
            color: #CBD5E1;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .top-bar .pill.pill-accent {
            background: rgba(255, 107, 0, 0.15);
            color: #FFA800;
            border-color: rgba(255, 107, 0, 0.2);
        }

        .top-bar .pill.pill-info {
            background: rgba(56, 189, 248, 0.12);
            color: #7DD3FC;
            border-color: rgba(56, 189, 248, 0.15);
        }

        /* sub 클래스는 더 이상 사용하지 않지만 호환성을 위해 숨김 */
        .top-bar .sub {
            display: none;
        }

        /* ── 우측 사진 스택 ── */
        @keyframes photoSlideUp {
            from {
                opacity: 0;
                transform: translateY(40px) translateX(var(--page2-photo-peek));
            }
            to {
                opacity: 1;
                transform: translateY(0) translateX(var(--page2-photo-peek));
            }
        }

        @keyframes photoSlideUpNoPeek {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .photo-stack {
            --page2-photo-max-height: 50vh;
            --page2-photo-max-width: 42vw;
            --page2-photo-two-max-height: 44vh;
            --page2-photo-two-max-width: 41vw;
            --page2-photo-three-max-height: 30vh;
            --page2-photo-three-max-width: 38vw;
            --page2-photo-peek: 8%;
            position: absolute;
            right: 1.5%;
            bottom: 2%;
            display: flex;
            flex-direction: column-reverse;
            align-items: flex-end;
            gap: 16px;
            z-index: 10;
        }

        .photo-stack.config-pending .sub-photo {
            visibility: hidden;
        }

        .sub-photo {
            position: relative;
            display: none;
            width: var(--page2-photo-max-width);
            height: var(--page2-photo-max-height);
            flex: 0 0 auto;
            transform: translateX(var(--page2-photo-peek));
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
        }

        .sub-photo.visible {
            display: block;
            animation: photoSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .sub-photo img {
            display: block;
            width: 100%;
            height: 100%;
            max-height: 100%;
            max-width: 100%;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            object-fit: cover;
            object-position: center center;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.75);
            transition: width 0.3s, height 0.3s;
        }

        /* 2개일 때 80% 축소 */
        .photo-stack.two-photos {
            left: 2%;
            right: 2%;
            flex-direction: row-reverse;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
        }

        .photo-stack.two-photos .sub-photo {
            transform: none;
        }

        .photo-stack.two-photos .sub-photo.visible {
            animation: photoSlideUpNoPeek 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .photo-stack.two-photos .sub-photo.slot-primary {
            transform: translateX(var(--page2-photo-peek));
            z-index: 2;
        }

        .photo-stack.two-photos .sub-photo.slot-secondary {
            transform: translateX(calc(-1 * var(--page2-photo-peek)));
            z-index: 1;
        }

        .photo-stack.two-photos .sub-photo.slot-secondary img {
            border-radius: 32px;
        }

        .photo-stack.two-photos .sub-photo.slot-secondary .label {
            left: auto !important;
            right: 16px !important;
        }

        /* 사진 라벨 */
        .sub-photo .label {
            position: absolute;
            left: 16px !important;
            right: auto !important;
            bottom: 16px !important;
            top: auto !important;
            display: inline-flex;
            align-items: center;
            width: auto;
            max-width: calc(100% - 32px);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #F8FAFC;
            font-size: 36px;
            font-weight: 800;
            padding: 8px 16px;
            border-radius: 12px;
            line-height: 1.15;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .photo-stack.two-photos .sub-photo .label {
            font-size: 34px;
        }

        .photo-stack.three-photos .sub-photo .label {
            font-size: 32px;
        }

        /* 사진 토글 버튼 */
        .photo-toggle {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            opacity: 0.15;
            transition: opacity 0.3s;
        }

        .photo-toggle:hover {
            opacity: 1;
        }

        /* ── 호스트 모드 (page=1) 전용 ── */
        .host-mode .scoreboard-wrap,
        .host-mode .top-bar,
        .host-mode .photo-stack {
            display: none !important;
        }

        .host-mode .empty {
            display: none !important;
        }

        /* 진행자 네임택 (page 1 전용) — 개별 위치 지정 */
        .host-nametag {
            display: none;
            position: absolute;
            z-index: 60;
        }
        .host-mode .host-nametag {
            /* shown via JS based on config */
        }
        .host-nametag .nt-inner {
            display: flex;
            align-items: stretch;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            animation: fadeInUp 0.5s ease-out;
        }
        .host-nametag .nt-accent {
            width: 5px;
            flex-shrink: 0;
            background: linear-gradient(180deg, #FF6B00, #FFA800);
        }
        .host-nametag .nt-body {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px 10px 14px;
            background: rgba(10, 15, 28, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .host-nametag .nt-name {
            font-size: var(--nt-font-size, 22px);
            font-weight: 800;
            color: #FFFFFF;
            white-space: nowrap;
            letter-spacing: -0.01em;
        }
        .host-nametag .nt-role {
            font-size: var(--nt-role-font-size, 12px);
            font-weight: 600;
            color: #FFA800;
            background: rgba(255, 168, 0, 0.12);
            padding: 3px 10px;
            border-radius: 4px;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 개별 룰 필 스택 (우측 하단) */
        .hc-rules-stack {
            display: none;
            position: absolute;
            bottom: 12%;
            right: 1%;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            z-index: 50;
        }

        .host-mode .hc-rules-stack {
            display: none !important;
        }

        .hc-rules-stack.hc-rules-top {
            bottom: auto;
            top: 30%;
        }

        /* 이미지 배너 (우하단 플로팅) */
        .hc-banner-float {
            display: none;
            position: absolute;
            z-index: 10005;
            place-items: center center;
        }

        .hc-banner-float.banner-active {
            display: grid;
        }

        /* ── 이미지 배너 래퍼 및 블러 레이어 ── */
        .hc-banner-float .banner-item-wrap {
            grid-area: 1 / 1;
            width: var(--banner-w, 42vw);
            height: var(--banner-h, 50vh);
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            transform: scale(0.92);
            filter: blur(8px);
            transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                filter 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .hc-banner-float .banner-item-wrap.show {
            opacity: var(--banner-opacity, 0.93);
            transform: scale(1);
            filter: blur(0);
        }

        .hc-banner-float .banner-item-wrap.exit {
            opacity: 0;
            transform: scale(1.04);
            filter: blur(6px);
        }

        /* 여백을 채우는 백그라운드 블러 이미지 */
        .hc-banner-float .banner-bg-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(28px) brightness(0.6);
            transform: scale(1.15);
            z-index: 1;
            opacity: 0.85;
        }

        /* 전면에 표시되는 선명한 원본 이미지 */
        .hc-banner-float .banner-img-main {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
        }

        .hc-rules-card {
            background: rgba(10, 10, 12, 0.90);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            min-width: 280px;
        }

        .hc-rule-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 24px;
            font-size: 38px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
        }

        .hc-rule-row+.hc-rule-row {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .hc-rule-label {
            color: #FF6B00;
            font-weight: 800;
            flex-shrink: 0;
            min-width: 3.5em;
        }

        .hc-rule-value {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
        }

        /* 헤더: 화면 상단 우측 */
        .hc-header {
            display: none;
            position: absolute;
            top: 3%;
            right: 1%;
            align-items: center;
            z-index: 50;
            background: rgba(10, 10, 12, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 20px;
            padding: 26px 38px 26px 120px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.7);
        }

        .host-mode .hc-header {
            display: none !important;
        }

        .hc-photo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.2);
            background: #111;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), 0 0 0 5px rgba(255, 255, 255, 0.06);
            position: absolute;
            left: -54px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
        }

        .hc-titles {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hc-name {
            font-size: 70px;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.5px;
            color: #fff;
            max-width: 540px;
        }

        .hc-sub {
            font-size: 48px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
            letter-spacing: 0.3px;
        }

        .hc-traits {
            width: 100%;
            overflow: hidden;
            position: relative;
            height: 60px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            display: none;
            align-items: center;
        }

        .hc-traits.has-items {
            display: flex;
        }

        .host-mode .hc-traits {
            display: none !important;
            position: absolute;
            top: 18%;
            right: 1%;
            width: auto;
            min-width: 300px;
            max-width: 50%;
            background: rgba(10, 10, 12, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 0 24px;
            z-index: 50;
        }

        .hc-traits .t {
            font-size: 48px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
        }

        /* 하단 배너 바 */
        .hc-bottom-bar {
            --ticker-shell-bg: rgba(4, 6, 10, 0.68);
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            min-height: 90px;
            padding: 14px 44px 16px;
            align-items: center;
            justify-content: center;
            background: var(--ticker-shell-bg);
            background-size: cover;
            background-position: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            overflow: hidden;
            z-index: 10004;
        }

        .hc-bottom-bar.visible {
            display: flex;
        }

        /* 자막 스폰서 로고 스타일 */
        .ticker-sponsors-left {
            position: absolute;
            left: 32px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 18px;
            z-index: 10;
        }

        .ticker-sponsors-right {
            position: absolute;
            right: 32px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 18px;
            z-index: 10;
        }

        .ticker-sponsor-img {
            max-height: 46px;
            max-width: 250px;
            object-fit: contain;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.65)) drop-shadow(0 0 1px rgba(255,255,255,0.25));
            opacity: 0.95;
            transition: transform 0.3s ease, opacity 0.3s ease;
            animation: sponsorFadeIn 0.6s ease-out forwards;
        }

        @keyframes sponsorFadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 0.95; transform: translateY(0); }
        }

        .hc-bottom-bar::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg,
                    rgba(255, 255, 255, 0.03) 0%,
                    rgba(0, 0, 0, 0.08) 100%);
            pointer-events: none;
        }

        .ticker-card-stage {
            position: relative;
            width: 100%;
            min-height: 52px;
            z-index: 1;
        }

        .ticker-card {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
            border-radius: 0;
            background: none;
            border: none;
            box-shadow: none;
            opacity: 0;
            transform: translateY(24px) scale(0.97);
            filter: blur(6px);
            transition:
                opacity 0.55s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.55s cubic-bezier(0.16, 1, 0.3, 1),
                filter 0.55s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ticker-card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: blur(0);
        }

        .ticker-card.exit {
            opacity: 0;
            transform: translateY(-18px) scale(0.97);
            filter: blur(4px);
        }

        .ticker-card-text {
            width: min(1500px, 100%);
            font-size: 40px;
            font-weight: 700;
            line-height: 1.28;
            text-align: center;
            color: rgba(255, 255, 255, 0.98);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.32);
            letter-spacing: -0.015em;
            word-break: keep-all;
        }

        /* 1P/2P 공통 스포츠 방송 그래픽 스킨 */
        .scoreboard-wrap .top-bar-label {
            color: #60a5fa;
            font-weight: 900;
            letter-spacing: 0.16em;
        }
        .top-bar {
            border: 1px solid rgba(148, 163, 184, 0.28);
            border-radius: 5px;
            box-shadow: 0 12px 32px rgba(2, 6, 23, 0.46), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .top-bar .accent-bar {
            background: linear-gradient(180deg, #d90429 0 48%, #f8fafc 48% 52%, #2563eb 52% 100%);
        }
        .top-bar .name-section {
            background: linear-gradient(135deg, rgba(3, 10, 24, 0.96), rgba(15, 29, 52, 0.94));
        }
        .top-bar .traits {
            background: rgba(17, 29, 51, 0.94);
        }
        .top-bar .pill {
            border-color: rgba(148, 163, 184, 0.2);
            border-radius: 3px;
            background: rgba(148, 163, 184, 0.1);
            color: #e2e8f0;

        }
        .hc-rule-label { color: #93c5fd; }

        .hc-bottom-bar {
            background:
                linear-gradient(90deg, rgba(3,10,24,0.96), rgba(17,29,51,0.94)),
                var(--ticker-shell-bg) !important;
            border-top: 0;
            box-shadow: 0 -10px 30px rgba(2,6,23,0.32), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .hc-bottom-bar::after {
            content: '';
            position: absolute;
            inset: 0 0 auto;
            height: 4px;
            background: linear-gradient(90deg, #d90429 0 22%, #f8fafc 22% 24%, #2563eb 24% 100%);
            pointer-events: none;
        }
        .ticker-card-text {
            font-weight: 760;
            letter-spacing: -0.025em;
            text-shadow: 0 2px 10px rgba(2,6,23,0.55);
        }
        .ticker-card-text span {
            display: inline-block;
            margin-right: 12px;
            padding: 4px 10px;
            border-radius: 3px;
            background: #d90429;
            color: #fff !important;
            font-size: 0.58em;
            font-weight: 900;
            letter-spacing: 0.05em;
            vertical-align: 0.18em;
        }

        /* ── 대진표 오버레이 스타일 ── */
        #bracket-page-container {
            --bracket-fs: 14px;
            background: transparent !important;
            transition: backdrop-filter 0.6s ease;
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            pointer-events: none;
        }
        #bracket-page-container.visible {
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }
        .bracket-tree-view {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.96) translateY(20px);
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .bracket-tree-view.visible {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateY(0);
        }
        .bracket-page-column {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 100%;
            gap: 20px;
        }
        .bracket-page-match {
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            width: calc(var(--bracket-fs) * 17);
            padding: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bracket-page-match.active-match {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            background: rgba(30, 41, 59, 0.8);
        }
        .bracket-page-match-title {
            font-size: calc(var(--bracket-fs) * 0.78);
            color: #94a3b8;
            font-weight: 800;
            text-align: center;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .bracket-page-slot {
            height: calc(var(--bracket-fs) * 2.7);
            border-radius: 6px;
            margin: 4px 0;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: var(--bracket-fs);
            font-weight: 700;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            color: #94a3b8;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .bracket-page-slot.winner-slot {
            background: linear-gradient(90deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.03));
            border-color: #10b981;
            color: #10b981;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.2);
        }
        .bracket-page-slot.loser-slot {
            opacity: 0.45;
            color: #64748b;
        }
        .bracket-page-slot.winner-slot::after {
            content: '';
            display: none;
        }
        .bracket-page-slot.loser-slot::after {
            content: '';
            display: none;
        }
        .bracket-page-team-text {
            max-width: 80%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 공중파 스포츠 중계형 전체 경기 결과 보드 */
        .sports-results-board {
            position: relative;
            width: 60%;
            margin: 0 auto;
            padding: calc(var(--bracket-fs) * 1.3) calc(var(--bracket-fs) * 1.4) calc(var(--bracket-fs) * 1.4);
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: calc(var(--bracket-fs) * 0.72);
            background:
                radial-gradient(circle at 95% 0%, rgba(37, 99, 235, 0.2), transparent 34%),
                linear-gradient(135deg, rgba(3, 10, 24, 0.98), rgba(15, 29, 52, 0.96));
            box-shadow: 0 22px 55px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255,255,255,0.08);
            color: #f8fafc;
            font-family: 'Pretendard', sans-serif;
            box-sizing: border-box;
            isolation: isolate;
        }
        .sports-results-board.animate-in {
            animation: sports-board-in 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .sports-results-board::before {
            content: '';
            position: absolute;
            inset: 0 0 auto;
            height: 4px;
            background: linear-gradient(90deg, #ef233c 0 20%, #f8fafc 20% 22%, #2563eb 22% 100%);
        }
        .sports-results-board::after {
            content: 'CDCUP';
            position: absolute;
            right: -8px;
            bottom: -34px;
            z-index: -1;
            color: rgba(255,255,255,0.025);
            font-size: calc(var(--bracket-fs) * 7.7);
            font-style: italic;
            font-weight: 950;
            letter-spacing: -0.08em;
            pointer-events: none;
        }
        .sports-results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: calc(var(--bracket-fs) * 1.3);
            margin-bottom: calc(var(--bracket-fs) * 1);
        }
        .sports-results-heading {
            display: flex;
            align-items: baseline;
            gap: calc(var(--bracket-fs) * 0.85);
            min-width: 0;
        }
        .sports-results-kicker {
            color: #60a5fa;
            font-size: calc(var(--bracket-fs) * 0.72);
            font-weight: 900;
            letter-spacing: 0.16em;
            white-space: nowrap;
        }
        .sports-results-title {
            margin: 0;
            color: #fff;
            font-size: calc(var(--bracket-fs) * 1.5);
            font-weight: 900;
            letter-spacing: -0.035em;
        }
        .sports-results-live {
            display: inline-flex;
            align-items: center;
            gap: calc(var(--bracket-fs) * 0.5);
            color: #cbd5e1;
            font-size: calc(var(--bracket-fs) * 0.72);
            font-weight: 850;
            letter-spacing: 0.1em;
            white-space: nowrap;
        }
        .sports-results-live::before {
            content: '';
            width: calc(var(--bracket-fs) * 0.5);
            height: calc(var(--bracket-fs) * 0.5);
            border-radius: 50%;
            background: #ef233c;
            box-shadow: 0 0 0 4px rgba(239,35,60,0.14);
            animation: sports-live-pulse 1.5s ease-in-out infinite;
        }
        .sports-results-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: calc(var(--bracket-fs) * 0.72);
        }
        .sports-match-card {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(203, 213, 225, 0.72);
            border-radius: 7px;
            background: linear-gradient(180deg, rgba(255,255,255,0.99), rgba(229,235,243,0.98));
            box-shadow: 0 9px 22px rgba(0, 0, 0, 0.24);
            color: #0f172a;
        }
        .sports-results-board.animate-in .sports-match-card {
            animation: sports-card-in 0.52s calc(var(--match-index, 0) * 70ms + 80ms) cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .sports-match-card.is-current {
            border-color: #ef233c;
            box-shadow: 0 0 0 1px rgba(239,35,60,0.35), 0 9px 24px rgba(0,0,0,0.28);
        }
        .sports-match-card::before {
            content: '';
            position: absolute;
            inset: 0 auto 0 0;
            width: 4px;
            background: #2563eb;
        }
        .sports-match-card.is-current::before { background: #ef233c; }
        .sports-match-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: calc(var(--bracket-fs) * 1.9);
            padding: 0 calc(var(--bracket-fs) * 0.85) 0 calc(var(--bracket-fs) * 1.05);
            border-bottom: 1px solid #cbd5e1;
            background: rgba(226,232,240,0.72);
            color: #475569;
            font-size: calc(var(--bracket-fs) * 0.72);
            font-weight: 850;
            letter-spacing: 0.04em;
        }
        .sports-match-state {
            color: #2563eb;
            font-size: calc(var(--bracket-fs) * 0.64);
            letter-spacing: 0.12em;
        }
        .sports-match-card.is-current .sports-match-state { color: #dc2626; }
        .sports-scoreline {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto minmax(0, 1fr) auto;
            align-items: center;
            gap: calc(var(--bracket-fs) * 0.57);
            min-height: calc(var(--bracket-fs) * 9.0);
            padding: calc(var(--bracket-fs) * 0.57) calc(var(--bracket-fs) * 0.85);
        }
        .sports-team-logo {
            width: calc(var(--bracket-fs) * 8.2);
            height: calc(var(--bracket-fs) * 8.2);
            border-radius: calc(var(--bracket-fs) * 0.85);
            object-fit: cover;
            background: rgba(0,0,0,0.04);
        }
        .sports-logo-placeholder {
            width: calc(var(--bracket-fs) * 8.2);
            height: calc(var(--bracket-fs) * 8.2);
        }
        .sports-team {
            min-width: 0;
            color: #64748b;
        }
        .sports-team--left { text-align: right; }
        .sports-team--right { text-align: left; }
        .sports-team-code {
            display: block;
            margin-bottom: 2px;
            color: #64748b;
            font-size: calc(var(--bracket-fs) * 0.64);
            font-weight: 850;
            letter-spacing: 0.12em;
        }
        .sports-team-name {
            display: block;
            overflow: hidden;
            color: #334155;
            font-size: var(--bracket-fs);
            font-weight: 800;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .sports-team.is-leading .sports-team-name,
        .sports-team.is-leading .sports-team-code { color: #0b4db8; }
        .sports-score {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: calc(var(--bracket-fs) * 0.5);
            min-width: calc(var(--bracket-fs) * 6.3);
            color: #0f172a;
            font-size: calc(var(--bracket-fs) * 2.15);
            font-weight: 950;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.06em;
            line-height: 1;
        }
        .sports-score-separator {
            color: #94a3b8;
            font-size: 0.72em;
            font-style: normal;
            font-weight: 700;
        }
        .sports-score .is-leading { color: #0b4db8; }
        .sports-match-footer {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: calc(var(--bracket-fs) * 0.72);
            min-height: calc(var(--bracket-fs) * 1.7);
            padding: 0 calc(var(--bracket-fs) * 0.9) 0 calc(var(--bracket-fs) * 1.15);
            background: #111d33;
            color: #dbeafe;
            font-size: calc(var(--bracket-fs) * 0.64);
            font-weight: 750;
            font-variant-numeric: tabular-nums;
        }
        .sports-match-footer span:last-child { text-align: right; }
        .sports-match-draws { color: #94a3b8; white-space: nowrap; }
        .sports-results-note {
            margin: calc(var(--bracket-fs) * 0.72) 2px 0;
            color: #94a3b8;
            font-size: calc(var(--bracket-fs) * 0.64);
            font-weight: 650;
            letter-spacing: 0.02em;
            text-align: right;
        }
        @keyframes sports-board-in {
            from { opacity: 0; transform: translateY(16px) scale(0.985); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes sports-card-in {
            from { opacity: 0; transform: translateX(-14px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes sports-live-pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        @media (max-width: 760px) {
            .sports-results-grid { grid-template-columns: 1fr; }
            .sports-results-board { width: 100%; padding: 16px 14px; }
        }

        /* ── 배틀 모드 금액 가림용 클래스 ── */
        body.battle-hide-prices .ticker-card-text,
        body.battle-hide-prices #info-sub,
        body.battle-hide-prices .hc-sub {
            filter: blur(8px) !important;
            pointer-events: none;
            user-select: none;
        }
        /* ── 3P 대진표 모드일 때 경매 관련 모든 UI 강제 숨김 ── */
        body.bracket-page #broadcast,
        body.bracket-page #empty,
        body.bracket-page #hc-header-float,
        body.bracket-page #hc-traits-container,
        body.bracket-page #hc-rules-stack,
        body.bracket-page #hc-banner-float,
        body.bracket-page .hc-bottom-bar,
        body.bracket-page .host-nametag,
        body.bracket-page .scoreboard-wrap,
        body.bracket-page #battle-matchup-card {
            display: none !important;
        }
        /* ── 3P 대진표 모드일 때 bracket 컨테이너 즉시 표시 보장 ── */
        body.bracket-page #bracket-page-container {
            display: block !important;
            opacity: 1 !important;
            visibility: visible !important;
        }
        body.bracket-page .bracket-tree-view {
            transform: none !important;
        }
        body.bracket-page .bracket-tree-view.visible {
            opacity: 1 !important;
            pointer-events: auto !important;
        }
    </style>
</head>

<body>
    <script>
        // 가장 빠른 시점에 bracket-page 클래스 부여 (JS 타이밍 이슈 원천 차단)
        (function() {
            var p = (new URLSearchParams(window.location.search).get('page') || '').toLowerCase();
            if (p === 'bracket' || p === '3' || p === '3p') {
                document.body.classList.add('bracket-page');
            }
        })();
    </script>

            <div class="nt-inner">

                <div class="nt-body">
                    <span class="nt-name" id="nt-name-2"></span>
                    <span class="nt-role" id="nt-role-2"></span>
                </div>
            </div>
        </div>

    <!-- 호스트 뷰: 우하단 이미지 배너 -->
    <div class="hc-banner-float" id="hc-banner-float"></div>

    <!-- 호스트 뷰: 하단 티커 바 -->

        <div class="ticker-sponsors-left" id="hc-ticker-sponsors-left"></div>
        <div class="ticker-card-stage" id="hc-ticker-stage"></div>
        <div class="ticker-sponsors-right" id="hc-ticker-sponsors-right"></div>
    </div>

    <!-- 전체 대진표 전용 송출 컨테이너 -->
    <div id="bracket-page-container" style="width:100%; height:100%; background:transparent; color:#fff; position:absolute; top:0; left:0; z-index:10005; overflow:hidden; font-family:'Pretendard', sans-serif; box-sizing:border-box;">
        <!-- 전체 대진표 트리 (Full Bracket) -->
        <div id="bracket-page-tree-full" class="bracket-tree-view" style="display:flex; justify-content:center; align-items:center; gap:60px; padding:20px; box-sizing:border-box;"></div>
        
        <!-- 실시간 경기 스코어보드 (Live Match) -->
        <div id="bracket-page-tree-live" class="bracket-tree-view" style="display:flex; justify-content:center; align-items:center; gap:60px; padding:20px; box-sizing:border-box;"></div>
    </div>

    <!-- 배틀 안내 자막 레이어 (z-index를 10000으로 높여 대진표 컨테이너 위에 오버레이되도록 처리) -->
    <div id="battle-announcement-overlay" style="display:none; position:absolute; top:35%; left:10%; right:10%; z-index:10000; background:rgba(9, 15, 29, 0.97); border:3px solid #3b82f6; box-shadow:0 0 40px rgba(59,130,246,0.7); padding:40px 20px; border-radius:20px; text-align:center; font-family:'Pretendard', sans-serif; box-sizing:border-box;">
        <div id="battle-ann-title" style="font-size:24px; font-weight:800; color:#94a3b8; margin-bottom:14px; letter-spacing:0.05em; text-transform:uppercase;">8강 1조 경기</div>
        <div id="battle-ann-content" style="font-size:44px; font-weight:900; color:#fff; text-shadow:0 0 15px rgba(255,255,255,0.4); word-break:keep-all; line-height:1.3;">레드팀 VS 블루팀 - 1라운드 시작!</div>
        <div id="battle-ann-sub" style="font-size:20px; font-weight:800; color:#3b82f6; margin-top:20px; display:none;">현재 스코어 1 : 0 (선공: 레드팀 / 후공: 블루팀)</div>
    </div>

    <!-- 페이지2 용 우측 실시간 매치업 오버레이 카드 -->
    <div id="battle-matchup-card" style="display:none; position:absolute; top:110px; right:24px; z-index:99; background:rgba(10, 15, 28, 0.92); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border: 1.5px solid rgba(59, 130, 246, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6); border-radius:12px; padding:14px 20px; font-family:'Pretendard', sans-serif; min-width:280px; box-sizing:border-box;">
        <div style="font-size:11px; font-weight:800; color:#3b82f6; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:6px; display:flex; align-items:center; gap:4px;">
            CURRENT MATCH
        </div>
        <div id="matchup-teams" style="font-size:18px; font-weight:800; color:#fff; word-break:keep-all;">
            [A팀] 대기중 <span style="color:#ef4444; font-size:14px; margin:0 6px;">VS</span> [B팀] 대기중
        </div>
        <div id="matchup-details" style="font-size:13px; font-weight:600; color:#94a3b8; margin-top:6px; display:flex; justify-content:space-between; align-items:center; gap:12px;">
            <span id="matchup-score">스코어 0 : 0</span>
            <span id="matchup-round" style="color:#FFA800; background:rgba(255,168,0,0.1); padding:2px 6px; border-radius:4px; font-size:11px;">1R 진행중</span>
        </div>
    </div>

    <script>
        let lastJson = null;
        let hiddenPhotos = [];
        let lastRenderedItem = null;
        let page2PhotoConfigReady = false;
        const GRADE = { "1": "낮음", "2": "보통", "3": "양호", "4": "우수", "5": "최상" };

        window._baseScoreboardLabel = "CRE WORLD CUP";
        window._totalItemsCount = 0;
        window._completedItemsCount = 0;
        window._lastCountFetchTime = 0;
        window.activeItem = null;

        function updateProgressText() {
            const labelEl = document.querySelector(".top-bar-label");
            if (!labelEl) return;
            
            let baseText = window._baseScoreboardLabel || "CRE WORLD CUP";
            if (window.activeItem && window._totalItemsCount > 0) {
                const currentOrder = window._completedItemsCount + 1;
                labelEl.textContent = baseText + ` ${currentOrder}/${window._totalItemsCount}`;
            } else {
                labelEl.textContent = baseText;
            }
        }

        function processItemsList(items) {
            window._totalItemsCount = items.length;
            window._lastCountFetchTime = Date.now();
            
            let completed = 0;
            items.forEach(it => {
                const status = (it.status || '').trim();
                if (status.indexOf('낙찰') >= 0 || status.indexOf('유찰') >= 0) {
                    completed++;
                }
            });
            window._completedItemsCount = completed;
            
            updateProgressText();
        }

        async function refreshTotalCount() {
            const now = Date.now();
            if (now - window._lastCountFetchTime < 15000 && window._totalItemsCount > 0) return;
            
            try {
                const items = await getItems();
                if (Array.isArray(items)) {
                    processItemsList(items);
                }
            } catch(e) {
                console.error("Failed to fetch items count", e);
            }
        }

        function getCleanCode(item) {
            if (!item) return '';
            const numStr = String(item.num || '').trim().toUpperCase();
            if (numStr.match(/^[A-Z]\d+$/)) {
                return numStr;
            }
            const nameUpper = (item.name || '').trim().toUpperCase();
            const match = nameUpper.match(/^([A-Z]\d+)/);
            return match ? match[1] : '';
        }

        function findItemByCode(items, code) {
            if (!items || !code) return null;
            const target = code.trim().toUpperCase();
            return items.find(i => {
                const numStr = String(i.num || '').trim().toUpperCase();
                if (numStr === target) return true;
                const nameUpper = (i.name || '').trim().toUpperCase();
                const match = nameUpper.match(/^([A-Z]\d+)/);
                if (match && match[1] === target) return true;
                if (nameUpper === target) return true;
                return false;
            });
        }

        // URL 파라미터 확인 후 host-mode 적용
        const urlParams = new URLSearchParams(window.location.search);
        const isHostMode = urlParams.get('mode') === 'host' || urlParams.get('page') === '1';
        const _pgValTemp = (urlParams.get('page') || '').toLowerCase();
        const isBracketPageTemp = _pgValTemp === 'bracket' || _pgValTemp === '3' || _pgValTemp === '3p';

        // DOM 파싱 완료 후 데이터 로드 시작
        window.addEventListener('DOMContentLoaded', () => {
            if (isHostMode) {
                document.body.classList.add('host-mode');
            }
            if (isBracketPageTemp) {
                document.body.classList.add('bracket-page');
            }
            if (isHostMode) {
                maybeRefreshHostConfig(true);
            } else {
                loadHostConfig();
            }
        });

        // [키워드] → 기본 강조색(cyan), [키워드:red] → 지정 색상
        function renderColorMarkup(text) {
            return text.replace(/\[([^\]]+?)(?::([^\]]+))?\]/g, function (_, word, color) {
                const c = color || '#FF6B00';
                return '<span style="color:' + c + ';font-weight:800;">' + word + '</span>';
            });
        }

        function splitTickerMessages(raw) {
            const text = String(raw || '').replace(/\r/g, '').trim();
            if (!text) return [];

            const newlineParts = text.split(/\n+/).map(v => v.trim()).filter(Boolean);
            if (newlineParts.length > 1) return newlineParts;

            const pipeParts = text.split('||').map(v => v.trim()).filter(Boolean);
            if (pipeParts.length > 1) return pipeParts;

            return [text];
        }

        function resetTickerMotion() {
            if (window._tickerRaf) {
                cancelAnimationFrame(window._tickerRaf);
                window._tickerRaf = null;
            }
            if (window._tickerRotateTimer) {
                clearInterval(window._tickerRotateTimer);
                window._tickerRotateTimer = null;
            }
        }

        function applyTickerBackground(bottomBar, bgValue) {
            bottomBar.style.backgroundImage = '';
            bottomBar.style.background = '';

            const raw = String(bgValue || '').trim();
            if (!raw) {
                bottomBar.style.setProperty('--ticker-shell-bg', 'rgba(4, 6, 10, 0.68)');
                return;
            }

            if (/^https?:\/\//i.test(raw)) {
                bottomBar.style.backgroundImage =
                    'linear-gradient(90deg, rgba(6, 10, 18, 0.72), rgba(8, 13, 21, 0.46), rgba(6, 10, 18, 0.72)), url("' + raw + '")';
                bottomBar.style.setProperty('--ticker-shell-bg', 'rgba(4, 6, 10, 0.52)');
                return;
            }

            if (/^url\(/i.test(raw)) {
                bottomBar.style.backgroundImage =
                    'linear-gradient(90deg, rgba(6, 10, 18, 0.72), rgba(8, 13, 21, 0.46), rgba(6, 10, 18, 0.72)), ' + raw;
                bottomBar.style.setProperty('--ticker-shell-bg', 'rgba(4, 6, 10, 0.52)');
                return;
            }

            bottomBar.style.setProperty('--ticker-shell-bg', raw);
        }

        function renderTickerCardsLegacy(cfg) {
            const bottomBar = document.querySelector('.hc-bottom-bar');
            const stage = document.getElementById('hc-ticker-stage');

            const existingTickerChildren = stage.children.length;

            // 텍스트 티커
            const tickerRaw = cfg.ticker_cards || cfg.ticker || '';
            const messages = splitTickerMessages(tickerRaw);
            const interval = Math.max(parseInt(cfg.ticker_interval, 10) || 4200, 1800);
            const bgValue = cfg.ticker_background || cfg.ticker_bg || '';
            const tickerKey = JSON.stringify({
                messages: messages,
                interval: interval,
                bg: String(bgValue || '').trim()
            });

            applyTickerBackground(bottomBar, bgValue);

            if (!messages.length) {
                resetTickerMotion();
                stage.innerHTML = '';
                bottomBar.classList.remove('visible');
                window._tickerRenderState = null;
            } else {
                bottomBar.classList.add('visible');
                if (window._tickerRenderState === tickerKey && existingTickerChildren > 0) {
                    renderImageBanners(cfg);
                    return;
                }
                resetTickerMotion();
                stage.innerHTML = '';
                let activeCard = null;
                let index = -1;

                function showLegacyTickerCard() {
                    index = (index + 1) % messages.length;
                    const card = document.createElement('div');
                    card.className = 'ticker-card';
                    const text = document.createElement('div');
                    text.className = 'ticker-card-text';
                    text.innerHTML = renderColorMarkup(messages[index]);
                    card.appendChild(text);
                    stage.appendChild(card);
                    requestAnimationFrame(() => card.classList.add('show'));
                    if (activeCard) {
                        const oldCard = activeCard;
                        oldCard.classList.remove('show');
                        setTimeout(() => {
                            if (oldCard.parentNode) oldCard.parentNode.removeChild(oldCard);
                        }, 650);
                    }
                    activeCard = card;
                }
                showLegacyTickerCard();
                if (messages.length > 1) {
                    window._tickerRotateTimer = setInterval(showLegacyTickerCard, interval);
                }
                window._tickerRenderState = tickerKey;
            }

            // 이미지 배너 (우하단 플로팅) — 텍스트 티커와 독립 동작
            renderImageBanners(cfg);
        }

        // 우하단 이미지 배너 로테이션
        function buildTickerRenderKey(messages, interval, bgValue, sponsors, logoSize, fontSize) {
            return JSON.stringify({
                messages: messages,
                interval: interval,
                bg: String(bgValue || '').trim(),
                sponsors: sponsors,
                logoSize: logoSize,
                fontSize: fontSize
            });
        }

        renderTickerCards = function (cfg) {
            const bottomBar = document.querySelector('.hc-bottom-bar');
            const stage = document.getElementById('hc-ticker-stage');
            if (!bottomBar || !stage) return;

            const _bp = (new URLSearchParams(window.location.search).get('page') || '').toLowerCase();
            const isBracketPage = _bp === 'bracket' || _bp === '3' || _bp === '3p';
            if (isBracketPage) {
                resetTickerMotion();
                stage.innerHTML = '';
                bottomBar.classList.remove('visible');
                bottomBar.style.setProperty('display', 'none', 'important');
                window._tickerRenderState = null;
                // 3P 오버레이: 배너/자막 불필요 (1P/2P 위에 겹치는 용도)
                return;
            }

            const tickerRaw = cfg.ticker_cards || cfg.ticker || '';
            const messages = splitTickerMessages(tickerRaw);
            const interval = Math.max(parseInt(cfg.ticker_interval, 10) || 4200, 1800);
            const bgValue = cfg.ticker_background || cfg.ticker_bg || '';

            // 스폰서 로고 목록 수집
            const sponsors = [];
            for (let i = 1; i <= 10; i++) {
                const url = cfg['ticker_sponsor' + i] || '';
                if (url.trim()) sponsors.push(url.trim());
            }

            const logoSize = parseInt(cfg.ticker_sponsor_size, 10) || 46;
            const fontSize = parseInt(cfg.ticker_fontsize, 10) || 40;
            const tickerKey = buildTickerRenderKey(messages, interval, bgValue, sponsors, logoSize, fontSize);

            applyTickerBackground(bottomBar, bgValue);

            if (!messages.length) {
                resetTickerMotion();
                stage.innerHTML = '';
                bottomBar.classList.remove('visible');
                window._tickerRenderState = null;
                renderImageBanners(cfg);
                return;
            }

            bottomBar.classList.add('visible');
            if (window._tickerRenderState === tickerKey && stage.children.length > 0) {
                renderImageBanners(cfg);
                return;
            }

            resetTickerMotion();
            stage.innerHTML = '';

            // 스폰서 로고 컨테이너 렌더링
            let leftContainer = bottomBar.querySelector('.ticker-sponsors-left');
            let rightContainer = bottomBar.querySelector('.ticker-sponsors-right');
            if (!leftContainer) {
                leftContainer = document.createElement('div');
                leftContainer.className = 'ticker-sponsors-left';
                leftContainer.id = 'hc-ticker-sponsors-left';
                bottomBar.insertBefore(leftContainer, bottomBar.firstChild);
            }
            if (!rightContainer) {
                rightContainer = document.createElement('div');
                rightContainer.className = 'ticker-sponsors-right';
                rightContainer.id = 'hc-ticker-sponsors-right';
                bottomBar.appendChild(rightContainer);
            }

            leftContainer.innerHTML = '';
            rightContainer.innerHTML = '';

            const N = sponsors.length;
            const leftCount = Math.ceil(N / 2);

            for (let i = 0; i < N; i++) {
                const img = document.createElement('img');
                img.className = 'ticker-sponsor-img';
                img.src = sponsors[i];
                img.style.maxHeight = logoSize + 'px';
                img.alt = 'Sponsor';
                img.onerror = () => { img.style.display = 'none'; };

                if (i < leftCount) {
                    leftContainer.appendChild(img);
                } else {
                    rightContainer.appendChild(img);
                }
            }

            // 좌우 패딩 계산 적용 (로고 개수에 비례하여 자막 영역 패딩 설정)
            // 로고 크기에 맞추어 예상 너비를 logoSize * 2 로 계산하고 간격 18px 및 마진 40px 추가
            const rightCount = N - leftCount;
            const estWidth = logoSize * 2;
            const padLeft = leftCount > 0 ? (leftCount * (estWidth + 18)) + 40 : 44;
            const padRight = rightCount > 0 ? (rightCount * (estWidth + 18)) + 40 : 44;
            stage.style.paddingLeft = padLeft + 'px';
            stage.style.paddingRight = padRight + 'px';

            let activeCard = null;
            let index = -1;

            function showNextCard() {
                index = (index + 1) % messages.length;
                const card = document.createElement('div');
                card.className = 'ticker-card';
                const text = document.createElement('div');
                text.className = 'ticker-card-text';
                text.style.fontSize = fontSize + 'px';
                text.innerHTML = renderColorMarkup(messages[index]);
                card.appendChild(text);
                stage.appendChild(card);
                requestAnimationFrame(() => card.classList.add('show'));
                if (activeCard) {
                    const oldCard = activeCard;
                    oldCard.classList.remove('show');
                    oldCard.classList.add('exit');
                    setTimeout(() => {
                        if (oldCard.parentNode) oldCard.parentNode.removeChild(oldCard);
                    }, 700);
                }
                activeCard = card;
            }

            showNextCard();
            if (messages.length > 1) {
                window._tickerRotateTimer = setInterval(showNextCard, interval);
            }
            window._tickerRenderState = tickerKey;

            renderImageBanners(cfg);
        };

        function normalizeCssLength(value) {
            const raw = String(value == null ? '' : value).trim();
            if (!raw) return '';

            const compact = raw.replace(/\s+/g, '');
            if (/^-?(?:\d+|\d*\.\d+)$/.test(compact)) {
                return compact === '0' || compact === '-0' ? '0' : compact + 'px';
            }

            if (/^-?(?:\d+|\d*\.\d+)(px|%|vw|vh|vmin|vmax|rem|em|svw|svh|lvw|lvh|dvw|dvh)$/i.test(compact)) {
                return compact;
            }

            if (/^(auto|initial|inherit|unset)$/i.test(compact)) {
                return compact.toLowerCase();
            }

            if (/^(calc|min|max|clamp)\(.+\)$/i.test(compact)) {
                return compact;
            }

            return raw;
        }

        function normalizeViewportSize(value, viewportUnit) {
            const raw = String(value == null ? '' : value).trim();
            if (!raw) return '';

            const compact = raw.replace(/\s+/g, '');
            if (/^-?(?:\d+|\d*\.\d+)$/.test(compact)) {
                if (compact === '0' || compact === '-0') return '0';
                const numeric = parseFloat(compact);
                if (Math.abs(numeric) <= 100) return compact + viewportUnit;
                return compact + 'px';
            }

            return normalizeCssLength(raw);
        }

        function ensureViewportUnit(value, defaultUnit) {
            const raw = String(value == null ? '' : value).trim();
            if (!raw) return '';
            if (raw.endsWith('%')) {
                return parseFloat(raw) + defaultUnit;
            }
            return normalizeViewportSize(raw, defaultUnit);
        }

        function normalizeOpacity(value, fallback) {
            const raw = String(value == null ? '' : value).trim();
            const fallbackValue = typeof fallback === 'number' ? fallback : 0.93;
            if (!raw) return String(fallbackValue);

            let numeric = NaN;
            if (/^-?(?:\d+|\d*\.\d+)%$/.test(raw)) {
                numeric = parseFloat(raw) / 100;
            } else if (/^-?(?:\d+|\d*\.\d+)$/.test(raw)) {
                numeric = parseFloat(raw);
                if (numeric > 1 && numeric <= 100) numeric = numeric / 100;
            }

            if (!Number.isFinite(numeric)) return String(fallbackValue);
            if (numeric < 0) numeric = 0;
            if (numeric > 1) numeric = 1;
            return String(numeric);
        }

        function applyPage2PhotoConfig(cfg) {
            const stack = document.getElementById('photo-stack');
            if (!stack) return;

            const maxW = normalizeViewportSize(cfg.page2_photo_maxwidth, 'vw') || '42vw';
            const maxH = normalizeViewportSize(cfg.page2_photo_maxheight, 'vh') || '50vh';
            const twoMaxW = normalizeViewportSize(cfg.page2_photo_two_maxwidth, 'vw') || '41vw';
            const twoMaxH = normalizeViewportSize(cfg.page2_photo_two_maxheight, 'vh') || '44vh';
            const threeMaxW = normalizeViewportSize(cfg.page2_photo_three_maxwidth, 'vw') || '38vw';
            const threeMaxH = normalizeViewportSize(cfg.page2_photo_three_maxheight, 'vh') || '30vh';
            const peek = normalizeCssLength(cfg.page2_photo_peek) || '14%';

            stack.style.setProperty('--page2-photo-max-width', maxW);
            stack.style.setProperty('--page2-photo-max-height', maxH);
            stack.style.setProperty('--page2-photo-two-max-width', twoMaxW);
            stack.style.setProperty('--page2-photo-two-max-height', twoMaxH);
            stack.style.setProperty('--page2-photo-three-max-width', threeMaxW);
            stack.style.setProperty('--page2-photo-three-max-height', threeMaxH);
            stack.style.setProperty('--page2-photo-peek', peek);
        }

        function renderImageBannersLegacy(cfg) {
            const container = document.getElementById('hc-banner-float');
            if (!container) return;

            // 기존 배너 타이머 정리
            if (window._bannerRotateTimer) {
                clearInterval(window._bannerRotateTimer);
                window._bannerRotateTimer = null;
            }
            container.innerHTML = '';

            // 이미지 배너 URL 수집 (banner1 ~ banner10)
            const urls = [];
            for (let i = 1; i <= 10; i++) {
                const url = (cfg['banner' + i] || '').trim();
                if (url) urls.push(url);
            }

            if (!urls.length) return;

            const interval = Math.max(parseInt(cfg.banner_interval, 10) || 5000, 2000);
            // 페이지별 독립 배너 위치 키 (page2는 p2_, 대진표는 p3_ 접두사)
            const bp = (new URLSearchParams(window.location.search).get('page') || '').toLowerCase() === 'bracket' ? 'p3_' : (isHostMode ? '' : 'p2_');
            const left = normalizeCssLength(cfg[bp + 'banner_left']);
            const right = normalizeCssLength(cfg[bp + 'banner_right']);
            const top = normalizeCssLength(cfg[bp + 'banner_top']);
            const bottom = normalizeCssLength(cfg[bp + 'banner_bottom']);

            container.style.left = 'auto';
            container.style.right = 'auto';
            container.style.top = 'auto';
            container.style.bottom = 'auto';

            if (right) {
                container.style.right = right;
            } else if (left) {
                container.style.left = left;
            } else {
                container.style.right = '1%';
            }

            if (bottom) {
                container.style.bottom = bottom;
            } else if (top) {
                container.style.top = top;
            } else {
                container.style.bottom = '4%';
            }

            const maxW = normalizeCssLength(cfg.banner_maxwidth) || '42vw';
            const maxH = normalizeCssLength(cfg.banner_maxheight) || '50vh';

            // 이미지 프리로드 & DOM 구성
            const imgs = [];

            urls.forEach(function (url, i) {
                const img = document.createElement('img');
                img.className = 'banner-img';
                img.src = url;
                img.style.maxWidth = maxW;
                img.style.maxHeight = maxH;
                img.onload = function () {
                    if (i === 0) img.classList.add('show');
                };
                img.onerror = function () { img.style.display = 'none'; };
                container.appendChild(img);
                imgs.push(img);
            });

            // 첫 번째 이미지 즉시 show (캐시 대비)
            if (imgs.length > 0) {
                requestAnimationFrame(() => imgs[0].classList.add('show'));
            }

            // 로테이션 (2개 이상일 때)
            if (imgs.length > 1) {
                let currentIdx = 0;
                window._bannerRotateTimer = setInterval(function () {
                    const prevIdx = currentIdx;
                    currentIdx = (currentIdx + 1) % imgs.length;
                    if (imgs[currentIdx].style.display === 'none') {
                        currentIdx = (currentIdx + 1) % imgs.length;
                    }
                    imgs[prevIdx].classList.remove('show');
                    imgs[currentIdx].classList.add('show');
                }, interval);
            }
        }

        function applyBannerPlacement(container, layout) {
            container.style.removeProperty('left');
            container.style.removeProperty('right');
            container.style.removeProperty('top');
            container.style.removeProperty('bottom');

            const isVal = (val) => val && val !== 'auto' && val !== 'initial' && val !== 'unset';

            if (isVal(layout.right)) {
                container.style.right = layout.right;
            } else if (isVal(layout.left)) {
                container.style.left = layout.left;
            } else {
                container.style.right = '1%';
            }

            if (isVal(layout.bottom)) {
                container.style.bottom = layout.bottom;
            } else if (isVal(layout.top)) {
                container.style.top = layout.top;
            } else {
                container.style.bottom = '4%';
            }
        }

        function startBannerRotation(wraps, interval) {
            if (window._bannerRotateTimer) {
                clearInterval(window._bannerRotateTimer);
                window._bannerRotateTimer = null;
            }

            if (!wraps.length) {
                window._bannerCurrentIdx = 0;
                return;
            }

            const currentIdx = typeof window._bannerCurrentIdx === 'number' ? window._bannerCurrentIdx : 0;
            window._bannerCurrentIdx = Math.max(0, Math.min(currentIdx, wraps.length - 1));

            wraps.forEach(function (wrap, idx) {
                wrap.classList.toggle('show', idx === window._bannerCurrentIdx && wrap.style.display !== 'none');
            });

            if (wraps.length <= 1) return;

            window._bannerRotateTimer = setInterval(function () {
                const prevIdx = window._bannerCurrentIdx;
                let nextIdx = (prevIdx + 1) % wraps.length;
                let guard = 0;
                while (wraps[nextIdx].style.display === 'none' && guard < wraps.length) {
                    nextIdx = (nextIdx + 1) % wraps.length;
                    guard += 1;
                }
                wraps[prevIdx].classList.remove('show');
                wraps[prevIdx].classList.add('exit');
                setTimeout(() => wraps[prevIdx].classList.remove('exit'), 800);
                wraps[nextIdx].classList.add('show');
                window._bannerCurrentIdx = nextIdx;
            }, interval);
        }

        renderImageBanners = function (cfg) {
            const container = document.getElementById('hc-banner-float');
            if (!container) return;

            const urls = [];
            for (let i = 1; i <= 10; i++) {
                const url = (cfg['banner' + i] || '').trim();
                if (url) urls.push(url);
            }

            const interval = Math.max(parseInt(cfg.banner_interval, 10) || 5000, 2000);
            // 페이지별 독립 배너 위치 키 (page2는 p2_ 접두사)
            const bp = isHostMode ? '' : 'p2_';
            const layout = {
                left: normalizeCssLength(cfg[bp + 'banner_left']),
                right: normalizeCssLength(cfg[bp + 'banner_right']),
                top: normalizeCssLength(cfg[bp + 'banner_top']),
                bottom: normalizeCssLength(cfg[bp + 'banner_bottom'])
            };
            const maxW = ensureViewportUnit(cfg[bp + 'banner_width'], 'vw') || ensureViewportUnit(cfg.banner_maxwidth, 'vw') || '42vw';
            const maxH = ensureViewportUnit(cfg[bp + 'banner_height'], 'vh') || ensureViewportUnit(cfg.banner_maxheight, 'vh') || '50vh';
            const bannerHidden = ['1', 'true', 'yes', 'on'].indexOf(String(cfg.banner_hidden || '').trim().toLowerCase()) >= 0;
            const bannerOpacity = normalizeOpacity(cfg.banner_opacity, 0.93);

            const _bp2 = (new URLSearchParams(window.location.search).get('page') || '').toLowerCase();
            const isBracketPage = _bp2 === 'bracket' || _bp2 === '3' || _bp2 === '3p';
            applyBannerPlacement(container, layout);
            container.style.setProperty('--banner-opacity', bannerOpacity);
            const bannerShowOff = cfg[bp + 'banner_show'] === '0' || container.dataset.bannerHiddenByToggle === '1' || isBracketPage;
            if (bannerHidden || bannerShowOff || !urls.length) {
                if (window._bannerRotateTimer) {
                    clearInterval(window._bannerRotateTimer);
                    window._bannerRotateTimer = null;
                }
                container.innerHTML = '';
                container.classList.remove('banner-active');
                window._bannerRenderState = null;
                window._bannerCurrentIdx = 0;
                return;
            }
            container.classList.add('banner-active');

            const imageKey = JSON.stringify({ urls: urls, maxW: maxW, maxH: maxH });
            const state = window._bannerRenderState || {};
            const wraps = Array.from(container.querySelectorAll('.banner-item-wrap'));

            if (state.imageKey === imageKey && wraps.length === urls.length) {
                wraps.forEach(function (wrap) {
                    wrap.style.setProperty('--banner-w', maxW);
                    wrap.style.setProperty('--banner-h', maxH);
                });

                if (state.interval !== interval) {
                    startBannerRotation(wraps, interval);
                }

                window._bannerRenderState = {
                    imageKey: imageKey,
                    interval: interval
                };
                return;
            }

            if (window._bannerRotateTimer) {
                clearInterval(window._bannerRotateTimer);
                window._bannerRotateTimer = null;
            }
            container.innerHTML = '';
            window._bannerCurrentIdx = 0;

            const nextWraps = [];
            urls.forEach(function (url, i) {
                const wrap = document.createElement('div');
                wrap.className = 'banner-item-wrap';
                wrap.style.setProperty('--banner-w', maxW);
                wrap.style.setProperty('--banner-h', maxH);

                const blurBg = document.createElement('div');
                blurBg.className = 'banner-bg-blur';
                blurBg.style.backgroundImage = 'url(' + JSON.stringify(url) + ')';

                const mainImg = document.createElement('img');
                mainImg.className = 'banner-img-main';
                mainImg.src = url;

                wrap.appendChild(blurBg);
                wrap.appendChild(mainImg);

                mainImg.onload = function () {
                    if (i === 0 && window._bannerCurrentIdx === 0) wrap.classList.add('show');
                };
                mainImg.onerror = function () { wrap.style.display = 'none'; };
                container.appendChild(wrap);
                nextWraps.push(wrap);
            });

            if (nextWraps.length > 0) {
                requestAnimationFrame(() => nextWraps[0].classList.add('show'));
            }

            startBannerRotation(nextWraps, interval);
            window._bannerRenderState = {
                imageKey: imageKey,
                interval: interval
            };
        };

        function syncNametagWidths(cfg) {
            const tag1 = document.getElementById('host-nametag-1');
            const tag2 = document.getElementById('host-nametag-2');
            if (tag1 && tag2) {
                tag1.style.removeProperty('width');
                tag2.style.removeProperty('width');

                const isShow1 = (cfg.host_name1 || '').trim() && cfg.nametag1_show !== '0';
                const isShow2 = (cfg.host_name2 || '').trim() && cfg.nametag2_show !== '0';
                const ntWidthCfg = cfg.nametag_width || cfg.nametag1_width || cfg.nametag2_width || '';
                const hasExplicitWidth = ntWidthCfg && ntWidthCfg !== 'auto' && ntWidthCfg !== 'initial' && ntWidthCfg !== 'unset';

                if (isShow1 && isShow2 && !hasExplicitWidth) {
                    const w1 = tag1.offsetWidth;
                    const w2 = tag2.offsetWidth;
                    const maxW = Math.max(w1, w2);
                    if (maxW > 0) {
                        tag1.style.width = maxW + 'px';
                        tag2.style.width = maxW + 'px';
                    }
                }
            }

            const bottomBar = document.querySelector('.hc-bottom-bar');

                    const tIsVal = (v) => v && v !== 'auto' && v !== 'initial' && v !== 'unset';

                    const tBottom = cfg[lp + 'ticker_bottom'];
                    if (tIsVal(tBottom)) {
                        bottomBar.style.bottom = tBottom;
                        bottomBar.style.top = 'auto';
                        bottomBar.style.removeProperty('top');
                    } else if (tIsVal(tTop)) {
                        bottomBar.style.top = tTop;
                        bottomBar.style.bottom = 'auto';
                        bottomBar.style.removeProperty('bottom');
                    } else {
                        bottomBar.style.bottom = '0';
                        bottomBar.style.top = 'auto';
                        bottomBar.style.removeProperty('top');

                    // 티커 높이 적용

            const bannerContainer = document.querySelector('.hc-banner-float');

                    bannerContainer.classList.remove('banner-active');
                    bannerContainer.dataset.bannerHiddenByToggle = '1';
                } else {
                    delete bannerContainer.dataset.bannerHiddenByToggle;
                    bannerContainer.style.removeProperty('display');
                }
            }

            // 티커 카드 및 이미지 배너 렌더링 (page 1, 2 공통)
            renderTickerCards(cfg);

            if (!document.body.classList.contains('host-mode')) return;

            // 진행자 네임택 개별 위치 적용 (nametag1_*, nametag2_*)
            function applyNTPos(el, prefix, defaultLeft, defaultBottom, defaultRight = 'auto') {
                if (!el) return;
                el.style.removeProperty('left');
                el.style.removeProperty('right');
                el.style.removeProperty('top');
                el.style.removeProperty('bottom');
                const isV = (v) => v && v !== 'auto' && v !== 'initial' && v !== 'unset';
                
                const ntLeft = cfg[prefix+'left'];
                const ntRight = cfg[prefix+'right'];
                const ntWidth = cfg['nametag_width'] || cfg[prefix+'width'];
                const ntHeight = cfg['nametag_height'] || cfg[prefix+'height'];
                const ntTop = cfg['nametag_top'] || cfg[prefix+'top'];
                const ntBottom = cfg['nametag_bottom'] || cfg[prefix+'bottom'];

                if (isV(ntRight)) el.style.right = ntRight;
                else if (isV(ntLeft)) el.style.left = ntLeft;
                else {
                    if (defaultRight !== 'auto') el.style.right = defaultRight;
                    else el.style.left = defaultLeft;
                }
                
                if (isV(ntBottom)) el.style.bottom = ntBottom;
                else if (isV(ntTop)) el.style.top = ntTop;
                else el.style.bottom = defaultBottom;
                
                if (cfg[prefix+'show'] === '0') {
                    el.style.setProperty('display','none','important');
                } else {
                    el.style.removeProperty('display');
                }
                // 네임택 크기 적용
                const ntW = ensureViewportUnit(ntWidth, 'vw');
                const ntH = ensureViewportUnit(ntHeight, 'vh');
                if (ntW && ntW !== 'auto') el.style.width = ntW;
                if (ntH && ntH !== 'auto') el.style.height = ntH;
            }
            applyNTPos(document.getElementById('host-nametag-1'), 'nametag1_', '3%', '6%');
            applyNTPos(document.getElementById('host-nametag-2'), 'nametag2_', 'auto', '6%', '3%');

            // Apply nametag font size
            const ntFontSize = parseInt(cfg.nametag_font_size, 10) || 22;
            document.querySelectorAll('.host-nametag').forEach(el => {
                el.style.setProperty('--nt-font-size', ntFontSize + 'px');
                el.style.setProperty('--nt-role-font-size', Math.round(ntFontSize * 0.55) + 'px');
            });
            // 룰 → 개별 필 박스 생성 (라벨 없이 값만) — host mode 전용
            const stackEl = document.getElementById('hc-rules-stack');
            if (stackEl) {
                stackEl.innerHTML = '';
                // rules_position 설정: 'top'이면 헤더 바로 아래에서 아래로 깔림
                if (cfg.rules_position === 'top') {
                    stackEl.classList.add('hc-rules-top');
                } else {
                    stackEl.classList.remove('hc-rules-top');
                }
                // 룰 → 단일 카드 안에 행으로 구성
                const rules = [];
                for (let i = 1; i <= 10; i++) {
                    const value = cfg['rule' + i] || cfg['rule' + i + '_value'];
                    if (value) rules.push(value);
                }
                if (rules.length > 0) {
                    const card = document.createElement('div');
                    card.className = 'hc-rules-card';
                    rules.forEach(text => {
                        const row = document.createElement('div');
                        row.className = 'hc-rule-row';
                        // [라벨] 나머지 → 라벨 + 값 분리
                        const m = text.match(/^\[([^\]]+?)(?::([^\]]+))?\]\s*(.*)$/);
                        if (m) {
                            const labelSpan = document.createElement('span');
                            labelSpan.className = 'hc-rule-label';
                            labelSpan.textContent = m[1];
                            if (m[2]) labelSpan.style.color = m[2];
                            const valueSpan = document.createElement('span');
                            valueSpan.className = 'hc-rule-value';
                            valueSpan.textContent = m[3];
                            row.appendChild(labelSpan);
                            row.appendChild(valueSpan);
                        } else {
                            row.innerHTML = renderColorMarkup(text);
                        }
                        card.appendChild(row);
                    });
                    stackEl.appendChild(card);
                }
                stackEl.style.display = rules.length > 0 ? 'flex' : 'none';
            }

            // 진행자 네임택 렌더링 (show 상태 존중)
            for (let i = 1; i <= 2; i++) {
                const name = (cfg['host_name' + i] || '').trim();
                const role = (cfg['host_role' + i] || '').trim();
                const tag = document.getElementById('host-nametag-' + i);
                const nameEl = document.getElementById('nt-name-' + i);
                const roleEl = document.getElementById('nt-role-' + i);
                if (tag) {
                    if (name && cfg['nametag' + i + '_show'] !== '0') {
                        nameEl.textContent = name;
                        roleEl.textContent = role;
                        roleEl.style.display = role ? '' : 'none';
                        tag.style.display = 'flex';
                    } else {
                        tag.style.display = 'none';
                    }
                }
            }
            syncNametagWidths(cfg);
        }

        async function loadHostConfig() {

                console.error('loadHostConfig error', err);
