<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="supabase-bridge.js"></script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: transparent;
            width: 100vw;
            height: 100vh;
            font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
            overflow: hidden;
            color: #FFFFFF;
        }

        .empty {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
        }

        .broadcast {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* ── 스코어보드 스타일 상단 바 (2P 개체용) ── */
        @keyframes scoreboardSlideIn {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 스코어보드 래퍼 (라벨 + 바를 묶는 컨테이너) */
        .scoreboard-wrap {
            position: absolute;
            top: 20px;
            right: 24px;
            left: auto;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            animation: scoreboardSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* 대회명 라벨 (바 위에 표시) */
        .scoreboard-wrap .top-bar-label {
            font-size: var(--sb-label-size, 14px);
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255, 168, 0, 0.85);
            padding: 0 8px 4px 0;
        }

        .top-bar {
            display: flex;
            align-items: stretch;
            gap: 0;
            overflow: hidden;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        /* 우측 주황색 악센트 스트라이프 */
        .top-bar .accent-bar {
            width: 5px;
            flex-shrink: 0;
            background: linear-gradient(180deg, #FF6B00, #FFA800);
            order: 99; /* 맨 우측으로 이동 */
        }

        /* 이름 영역 (어두운 배경) */
        .top-bar .name-section {
            display: flex;
            align-items: center;
            padding: 10px 22px 10px 16px;
            background: rgba(10, 15, 28, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .top-bar .name {
            font-size: var(--sb-name-size, 30px);
            font-weight: 800;
            color: #FFFFFF;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }

        /* 구분선 */
        .top-bar .sep {
            width: 1px;
            background: rgba(255, 255, 255, 0.12);
            flex-shrink: 0;
        }

        /* 특성 필 영역 (약간 밝은 배경) */
        .top-bar .traits {
            display: flex;
            align-items: center;
            padding: 10px 18px;
            gap: 6px;
            background: rgba(20, 28, 46, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            flex-wrap: nowrap;
        }

        .top-bar .traits-track {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        /* pill 배지 스타일 */
        .top-bar .pill {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: var(--sb-pill-size, 17px);
            font-weight: 600;
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.08);
            color: #CBD5E1;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .top-bar .pill.pill-accent {
            background: rgba(255, 107, 0, 0.15);
            color: #FFA800;
            border-color: rgba(255, 107, 0, 0.2);
        }

        .top-bar .pill.pill-info {
            background: rgba(56, 189, 248, 0.12);
            color: #7DD3FC;
            border-color: rgba(56, 189, 248, 0.15);
        }

        /* sub 클래스는 더 이상 사용하지 않지만 호환성을 위해 숨김 */
        .top-bar .sub {
            display: none;
        }

        /* ── 우측 사진 스택 ── */
        @keyframes photoSlideUp {
            from {
                opacity: 0;
                transform: translateY(40px) translateX(var(--page2-photo-peek));
            }
            to {
                opacity: 1;
                transform: translateY(0) translateX(var(--page2-photo-peek));
            }
        }

        @keyframes photoSlideUpNoPeek {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .photo-stack {
            --page2-photo-max-height: 50vh;
            --page2-photo-max-width: 42vw;
            --page2-photo-two-max-height: 44vh;
            --page2-photo-two-max-width: 41vw;
            --page2-photo-three-max-height: 30vh;
            --page2-photo-three-max-width: 38vw;
            --page2-photo-peek: 8%;
            position: absolute;
            right: 1.5%;
            bottom: 2%;
            display: flex;
            flex-direction: column-reverse;
            align-items: flex-end;
            gap: 16px;
            z-index: 10;
        }

        .photo-stack.config-pending .sub-photo {
            visibility: hidden;
        }

        .sub-photo {
            position: relative;
            display: none;
            width: var(--page2-photo-max-width);
            height: var(--page2-photo-max-height);
            flex: 0 0 auto;
            transform: translateX(var(--page2-photo-peek));
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
        }

        .sub-photo.visible {
            display: block;
            animation: photoSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .sub-photo img {
            display: block;
            width: 100%;
            height: 100%;
            max-height: 100%;
            max-width: 100%;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            object-fit: cover;
            object-position: center center;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.75);
            transition: width 0.3s, height 0.3s;
        }

        /* 2개일 때 80% 축소 */
        .photo-stack.two-photos {
            left: 2%;
            right: 2%;
            flex-direction: row-reverse;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
        }

        .photo-stack.two-photos .sub-photo {
            transform: none;
        }

        .photo-stack.two-photos .sub-photo.visible {
            animation: photoSlideUpNoPeek 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .photo-stack.two-photos .sub-photo.slot-primary {
            transform: translateX(var(--page2-photo-peek));
            z-index: 2;
        }

        .photo-stack.two-photos .sub-photo.slot-secondary {
            transform: translateX(calc(-1 * var(--page2-photo-peek)));
            z-index: 1;
        }

        .photo-stack.two-photos .sub-photo.slot-secondary img {
            border-radius: 32px;
        }

        .photo-stack.two-photos .sub-photo.slot-secondary .label {
            left: auto !important;
            right: 16px !important;
        }

        /* 사진 라벨 */
        .sub-photo .label {
            position: absolute;
            left: 16px !important;
            right: auto !important;
            bottom: 16px !important;
            top: auto !important;
            display: inline-flex;
            align-items: center;
            width: auto;
            max-width: calc(100% - 32px);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #F8FAFC;
            font-size: 36px;
            font-weight: 800;
            padding: 8px 16px;
            border-radius: 12px;
            line-height: 1.15;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .photo-stack.two-photos .sub-photo .label {
            font-size: 34px;
        }

        .photo-stack.three-photos .sub-photo .label {
            font-size: 32px;
        }

        /* 사진 토글 버튼 */
        .photo-toggle {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            opacity: 0.15;
            transition: opacity 0.3s;
        }

        .photo-toggle:hover {
            opacity: 1;
        }

        /* ── 호스트 모드 (page=1) 전용 ── */
        .host-mode .scoreboard-wrap,
        .host-mode .top-bar,
        .host-mode .photo-stack {
            display: none !important;
        }

        .host-mode .empty {
            display: none !important;
        }

        /* 진행자 네임택 (page 1 전용) — 개별 위치 지정 */
        .host-nametag {
            display: none;
            position: absolute;
            z-index: 60;
        }
        .host-mode .host-nametag {
            /* shown via JS based on config */
        }
        .host-nametag .nt-inner {
            display: flex;
            align-items: stretch;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            animation: fadeInUp 0.5s ease-out;
        }
        .host-nametag .nt-accent {
            width: 5px;
            flex-shrink: 0;
            background: linear-gradient(180deg, #FF6B00, #FFA800);
        }
        .host-nametag .nt-body {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px 10px 14px;
            background: rgba(10, 15, 28, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .host-nametag .nt-name {
            font-size: var(--nt-font-size, 22px);
            font-weight: 800;
            color: #FFFFFF;
            white-space: nowrap;
            letter-spacing: -0.01em;
        }
        .host-nametag .nt-role {
            font-size: var(--nt-role-font-size, 12px);
            font-weight: 600;
            color: #FFA800;
            background: rgba(255, 168, 0, 0.12);
            padding: 3px 10px;
            border-radius: 4px;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 개별 룰 필 스택 (우측 하단) */
        .hc-rules-stack {
            display: none;
            position: absolute;
            bottom: 12%;
            right: 1%;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            z-index: 50;
        }

        .host-mode .hc-rules-stack {
            display: none !important;
        }

        .hc-rules-stack.hc-rules-top {
            bottom: auto;
            top: 30%;
        }

        /* 이미지 배너 (우하단 플로팅) */
        .hc-banner-float {
            display: none;
            position: absolute;
            z-index: 10005;
            place-items: center center;
        }

        .hc-banner-float.banner-active {
            display: grid;
        }

        /* ── 이미지 배너 래퍼 및 블러 레이어 ── */
        .hc-banner-float .banner-item-wrap {
            grid-area: 1 / 1;
            width: var(--banner-w, 42vw);
            height: var(--banner-h, 50vh);
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            transform: scale(0.92);
            filter: blur(8px);
            transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                filter 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .hc-banner-float .banner-item-wrap.show {
            opacity: var(--banner-opacity, 0.93);
            transform: scale(1);
            filter: blur(0);
        }

        .hc-banner-float .banner-item-wrap.exit {
            opacity: 0;
            transform: scale(1.04);
            filter: blur(6px);
        }

        /* 여백을 채우는 백그라운드 블러 이미지 */
        .hc-banner-float .banner-bg-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(28px) brightness(0.6);
            transform: scale(1.15);
            z-index: 1;
            opacity: 0.85;
        }

        /* 전면에 표시되는 선명한 원본 이미지 */
        .hc-banner-float .banner-img-main {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
        }

        .hc-rules-card {
            background: rgba(10, 10, 12, 0.90);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            min-width: 280px;
        }

        .hc-rule-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 24px;
            font-size: 38px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
        }

        .hc-rule-row+.hc-rule-row {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .hc-rule-label {
            color: #FF6B00;
            font-weight: 800;
            flex-shrink: 0;
            min-width: 3.5em;
        }

        .hc-rule-value {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
        }

        /* 헤더: 화면 상단 우측 */
        .hc-header {
            display: none;
            position: absolute;
            top: 3%;
            right: 1%;
            align-items: center;
            z-index: 50;
            background: rgba(10, 10, 12, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 20px;
            padding: 26px 38px 26px 120px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.7);
        }

        .host-mode .hc-header {
            display: none !important;
        }

        .hc-photo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.2);
            background: #111;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), 0 0 0 5px rgba(255, 255, 255, 0.06);
            position: absolute;
            left: -54px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
        }

        .hc-titles {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hc-name {
            font-size: 70px;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.5px;
            color: #fff;
            max-width: 540px;
        }

        .hc-sub {
            font-size: 48px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
            letter-spacing: 0.3px;
        }

        .hc-traits {
            width: 100%;
            overflow: hidden;
            position: relative;
            height: 60px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            display: none;
            align-items: center;
        }

        .hc-traits.has-items {
            display: flex;
        }

        .host-mode .hc-traits {
            display: none !important;
            position: absolute;
            top: 18%;
            right: 1%;
            width: auto;
            min-width: 300px;
            max-width: 50%;
            background: rgba(10, 10, 12, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 0 24px;
            z-index: 50;
        }

        .hc-traits .t {
            font-size: 48px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
        }

        /* 하단 배너 바 */
        .hc-bottom-bar {
            --ticker-shell-bg: rgba(4, 6, 10, 0.68);
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            min-height: 90px;
            padding: 14px 44px 16px;
            align-items: center;
            justify-content: center;
            background: var(--ticker-shell-bg);
            background-size: cover;
            background-position: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            overflow: hidden;
            z-index: 10004;
        }

        .hc-bottom-bar.visible {
            display: flex;
        }

        /* 자막 스폰서 로고 스타일 */
        .ticker-sponsors-left {
            position: absolute;
            left: 32px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 18px;
            z-index: 10;
        }

        .ticker-sponsors-right {
            position: absolute;
            right: 32px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 18px;
            z-index: 10;
        }

        .ticker-sponsor-img {
            max-height: 46px;
            max-width: 250px;
            object-fit: contain;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.65)) drop-shadow(0 0 1px rgba(255,255,255,0.25));
            opacity: 0.95;
            transition: transform 0.3s ease, opacity 0.3s ease;
            animation: sponsorFadeIn 0.6s ease-out forwards;
        }

        @keyframes sponsorFadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 0.95; transform: translateY(0); }
        }

        .hc-bottom-bar::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg,
                    rgba(255, 255, 255, 0.03) 0%,
                    rgba(0, 0, 0, 0.08) 100%);
            pointer-events: none;
        }

        .ticker-card-stage {
            position: relative;
            width: 100%;
            min-height: 52px;
            z-index: 1;
        }

        .ticker-card {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
            border-radius: 0;
            background: none;
            border: none;
            box-shadow: none;
            opacity: 0;
            transform: translateY(24px) scale(0.97);
            filter: blur(6px);
            transition:
                opacity 0.55s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.55s cubic-bezier(0.16, 1, 0.3, 1),
                filter 0.55s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ticker-card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: blur(0);
        }

        .ticker-card.exit {
            opacity: 0;
            transform: translateY(-18px) scale(0.97);
            filter: blur(4px);
        }

        .ticker-card-text {
            width: min(1500px, 100%);
            font-size: 40px;
            font-weight: 700;
            line-height: 1.28;
            text-align: center;
            color: rgba(255, 255, 255, 0.98);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.32);
            letter-spacing: -0.015em;
            word-break: keep-all;
        }

        /* ── 대진표 오버레이 스타일 ── */
        #bracket-page-container {
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%) !important;
        }
        .bracket-page-column {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 100%;
            gap: 20px;
        }
        .bracket-page-match {
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            width: 240px;
            padding: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bracket-page-match.active-match {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            background: rgba(30, 41, 59, 0.8);
        }
        .bracket-page-match-title {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 800;
            text-align: center;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .bracket-page-slot {
            height: 38px;
            border-radius: 6px;
            margin: 4px 0;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 13px;
            font-weight: 700;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);

    <script>
        let lastJson = null;
        let hiddenPhotos = [];
        let lastRenderedItem = null;
        let page2PhotoConfigReady = false;
        const GRADE = { "1": "낮음", "2": "보통", "3": "양호", "4": "우수", "5": "최상" };

        // URL 파라미터 확인 후 host-mode 적용 (일반 웹)
        const urlParams = new URLSearchParams(window.location.search);
        const isHostMode = urlParams.get('mode') === 'host' || urlParams.get('page') === '1';

        // 구글 앱스 스크립트 웹앱 환경 전용 파라미터 읽기
        if (typeof google !== 'undefined' && google.script && google.script.url) {
            google.script.url.getLocation(function (location) {
                const isHost = location.parameter.mode === 'host' || location.parameter.page === '1';
                if (isHost) {
                    document.body.classList.add('host-mode');
                }
            });
        }

        // DOM 파싱 완료 후 데이터 로드 시작
        window.addEventListener('DOMContentLoaded', () => {
            if (isHostMode) {
                document.body.classList.add('host-mode');
            }
            if (isHostMode) {
                maybeRefreshHostConfig(true);
            } else {
                loadHostConfig();
            }
        });

        // [키워드] → 기본 강조색(cyan), [키워드:red] → 지정 색상
        function renderColorMarkup(text) {
            return text.replace(/\[([^\]]+?)(?::([^\]]+))?\]/g, function (_, word, color) {
                const c = color || '#FF6B00';
                return '<span style="color:' + c + ';font-weight:800;">' + word + '</span>';
            });
        }

        function splitTickerMessages(raw) {
            const text = String(raw || '').replace(/\r/g, '').trim();
            if (!text) return [];

            const newlineParts = text.split(/\n+/).map(v => v.trim()).filter(Boolean);
            if (newlineParts.length > 1) return newlineParts;

            const pipeParts = text.split('||').map(v => v.trim()).filter(Boolean);
            if (pipeParts.length > 1) return pipeParts;

            return [text];
        }

        function resetTickerMotion() {
            if (window._tickerRaf) {
                cancelAnimationFrame(window._tickerRaf);
                window._tickerRaf = null;
            }
            if (window._tickerRotateTimer) {
                clearInterval(window._tickerRotateTimer);
                window._tickerRotateTimer = null;
            }
        }

        function applyTickerBackground(bottomBar, bgValue) {
            bottomBar.style.backgroundImage = '';
            bottomBar.style.background = '';

            const raw = String(bgValue || '').trim();
            if (!raw) {
                bottomBar.style.setProperty('--ticker-shell-bg', 'rgba(4, 6, 10, 0.68)');
                return;
            }

            if (/^https?:\/\//i.test(raw)) {
                bottomBar.style.backgroundImage =
                    'linear-gradient(90deg, rgba(6, 10, 18, 0.72), rgba(8, 13, 21, 0.46), rgba(6, 10, 18, 0.72)), url("' + raw + '")';
                bottomBar.style.setProperty('--ticker-shell-bg', 'rgba(4, 6, 10, 0.52)');
                return;
            }

            if (/^url\(/i.test(raw)) {
                bottomBar.style.backgroundImage =
                    'linear-gradient(90deg, rgba(6, 10, 18, 0.72), rgba(8, 13, 21, 0.46), rgba(6, 10, 18, 0.72)), ' + raw;
                bottomBar.style.setProperty('--ticker-shell-bg', 'rgba(4, 6, 10, 0.52)');
                return;
            }

            bottomBar.style.setProperty('--ticker-shell-bg', raw);
        }

        function renderTickerCardsLegacy(cfg) {
            const bottomBar = document.querySelector('.hc-bottom-bar');
            const stage = document.getElementById('hc-ticker-stage');

            const existingTickerChildren = stage.children.length;

            // 텍스트 티커
            const tickerRaw = cfg.ticker_cards || cfg.ticker || '';
            const messages = splitTickerMessages(tickerRaw);
            const interval = Math.max(parseInt(cfg.ticker_interval, 10) || 4200, 1800);
            const bgValue = cfg.ticker_background || cfg.ticker_bg || '';
            const tickerKey = JSON.stringify({
                messages: messages,
                interval: interval,
                bg: String(bgValue || '').trim()
            });

            applyTickerBackground(bottomBar, bgValue);

            if (!messages.length) {
                resetTickerMotion();
                stage.innerHTML = '';
                bottomBar.classList.remove('visible');
                window._tickerRenderState = null;
            } else {
                bottomBar.classList.add('visible');
                if (window._tickerRenderState === tickerKey && existingTickerChildren > 0) {
                    renderImageBanners(cfg);
                    return;
                }
                resetTickerMotion();
                stage.innerHTML = '';
                let activeCard = null;
                let index = -1;

                function showLegacyTickerCard() {
                    index = (index + 1) % messages.length;
                    const card = document.createElement('div');
                    card.className = 'ticker-card';
                    const text = document.createElement('div');
                    text.className = 'ticker-card-text';
                    text.innerHTML = renderColorMarkup(messages[index]);
                    card.appendChild(text);
                    stage.appendChild(card);
                    requestAnimationFrame(() => card.classList.add('show'));
                    if (activeCard) {
                        const oldCard = activeCard;
                        oldCard.classList.remove('show');
                        setTimeout(() => {
                            if (oldCard.parentNode) oldCard.parentNode.removeChild(oldCard);
                        }, 650);
                    }
                    activeCard = card;
                }
                showLegacyTickerCard();
                if (messages.length > 1) {
                    window._tickerRotateTimer = setInterval(showLegacyTickerCard, interval);
                }
                window._tickerRenderState = tickerKey;
            }

            // 이미지 배너 (우하단 플로팅) — 텍스트 티커와 독립 동작
            renderImageBanners(cfg);
        }

        // 우하단 이미지 배너 로테이션
        function buildTickerRenderKey(messages, interval, bgValue, sponsors, logoSize, fontSize) {
            return JSON.stringify({
                messages: messages,
                interval: interval,
                bg: String(bgValue || '').trim(),
                sponsors: sponsors,
                logoSize: logoSize,
                fontSize: fontSize
            });
        }

        renderTickerCards = function (cfg) {
            const bottomBar = document.querySelector('.hc-bottom-bar');
            const stage = document.getElementById('hc-ticker-stage');
            if (!bottomBar || !stage) return;

            const tickerRaw = cfg.ticker_cards || cfg.ticker || '';
            const messages = splitTickerMessages(tickerRaw);
            const interval = Math.max(parseInt(cfg.ticker_interval, 10) || 4200, 1800);
            const bgValue = cfg.ticker_background || cfg.ticker_bg || '';

            // 스폰서 로고 목록 수집
            const sponsors = [];
            for (let i = 1; i <= 10; i++) {
                const url = cfg['ticker_sponsor' + i] || '';
                if (url.trim()) sponsors.push(url.trim());
            }

            const logoSize = parseInt(cfg.ticker_sponsor_size, 10) || 46;
            const fontSize = parseInt(cfg.ticker_fontsize, 10) || 40;
            const tickerKey = buildTickerRenderKey(messages, interval, bgValue, sponsors, logoSize, fontSize);

            applyTickerBackground(bottomBar, bgValue);

            if (!messages.length) {
                resetTickerMotion();
                stage.innerHTML = '';
                bottomBar.classList.remove('visible');
                window._tickerRenderState = null;
                renderImageBanners(cfg);
                return;
            }

            bottomBar.classList.add('visible');
            if (window._tickerRenderState === tickerKey && stage.children.length > 0) {
                renderImageBanners(cfg);
                return;
            }

            resetTickerMotion();
            stage.innerHTML = '';

            // 스폰서 로고 컨테이너 렌더링
            let leftContainer = bottomBar.querySelector('.ticker-sponsors-left');
            let rightContainer = bottomBar.querySelector('.ticker-sponsors-right');
            if (!leftContainer) {
                leftContainer = document.createElement('div');
                leftContainer.className = 'ticker-sponsors-left';
                leftContainer.id = 'hc-ticker-sponsors-left';
                bottomBar.insertBefore(leftContainer, bottomBar.firstChild);
            }
            if (!rightContainer) {
                rightContainer = document.createElement('div');
                rightContainer.className = 'ticker-sponsors-right';
                rightContainer.id = 'hc-ticker-sponsors-right';
                bottomBar.appendChild(rightContainer);
            }

            leftContainer.innerHTML = '';
            rightContainer.innerHTML = '';

            const N = sponsors.length;
            const leftCount = Math.ceil(N / 2);

            for (let i = 0; i < N; i++) {
                const img = document.createElement('img');
                img.className = 'ticker-sponsor-img';
                img.src = sponsors[i];
                img.style.maxHeight = logoSize + 'px';
                img.alt = 'Sponsor';
                img.onerror = () => { img.style.display = 'none'; };

                if (i < leftCount) {
                    leftContainer.appendChild(img);
                } else {
                    rightContainer.appendChild(img);
                }
            }

            // 좌우 패딩 계산 적용 (로고 개수에 비례하여 자막 영역 패딩 설정)
            // 로고 크기에 맞추어 예상 너비를 logoSize * 2 로 계산하고 간격 18px 및 마진 40px 추가
            const rightCount = N - leftCount;
            const estWidth = logoSize * 2;
            const padLeft = leftCount > 0 ? (leftCount * (estWidth + 18)) + 40 : 44;
            const padRight = rightCount > 0 ? (rightCount * (estWidth + 18)) + 40 : 44;
            stage.style.paddingLeft = padLeft + 'px';
            stage.style.paddingRight = padRight + 'px';

            let activeCard = null;
            let index = -1;

            function showNextCard() {
                index = (index + 1) % messages.length;
                const card = document.createElement('div');
                card.className = 'ticker-card';
                const text = document.createElement('div');
                text.className = 'ticker-card-text';
                text.style.fontSize = fontSize + 'px';
                text.innerHTML = renderColorMarkup(messages[index]);
                card.appendChild(text);
                stage.appendChild(card);
                requestAnimationFrame(() => card.classList.add('show'));
                if (activeCard) {
                    const oldCard = activeCard;
                    oldCard.classList.remove('show');
                    oldCard.classList.add('exit');
                    setTimeout(() => {
                        if (oldCard.parentNode) oldCard.parentNode.removeChild(oldCard);
                    }, 700);
                }
                activeCard = card;
            }

            showNextCard();
            if (messages.length > 1) {
                window._tickerRotateTimer = setInterval(showNextCard, interval);
            }
            window._tickerRenderState = tickerKey;

            renderImageBanners(cfg);
        };

        function normalizeCssLength(value) {
            const raw = String(value == null ? '' : value).trim();
            if (!raw) return '';

            const compact = raw.replace(/\s+/g, '');
            if (/^-?(?:\d+|\d*\.\d+)$/.test(compact)) {
                return compact === '0' || compact === '-0' ? '0' : compact + 'px';
            }

            if (/^-?(?:\d+|\d*\.\d+)(px|%|vw|vh|vmin|vmax|rem|em|svw|svh|lvw|lvh|dvw|dvh)$/i.test(compact)) {
                return compact;
            }

            if (/^(auto|initial|inherit|unset)$/i.test(compact)) {
                return compact.toLowerCase();
            }

            if (/^(calc|min|max|clamp)\(.+\)$/i.test(compact)) {
                return compact;
            }

            return raw;
        }

        function normalizeViewportSize(value, viewportUnit) {
            const raw = String(value == null ? '' : value).trim();
            if (!raw) return '';

            const compact = raw.replace(/\s+/g, '');
            if (/^-?(?:\d+|\d*\.\d+)$/.test(compact)) {
                if (compact === '0' || compact === '-0') return '0';
                const numeric = parseFloat(compact);
                if (Math.abs(numeric) <= 100) return compact + viewportUnit;
                return compact + 'px';
            }

            return normalizeCssLength(raw);
        }

        function ensureViewportUnit(value, defaultUnit) {
            const raw = String(value == null ? '' : value).trim();
            if (!raw) return '';
            if (raw.endsWith('%')) {
                return parseFloat(raw) + defaultUnit;
            }
            return normalizeViewportSize(raw, defaultUnit);
        }

        function normalizeOpacity(value, fallback) {
            const raw = String(value == null ? '' : value).trim();
            const fallbackValue = typeof fallback === 'number' ? fallback : 0.93;
            if (!raw) return String(fallbackValue);

            let numeric = NaN;
            if (/^-?(?:\d+|\d*\.\d+)%$/.test(raw)) {
                numeric = parseFloat(raw) / 100;
            } else if (/^-?(?:\d+|\d*\.\d+)$/.test(raw)) {
                numeric = parseFloat(raw);
                if (numeric > 1 && numeric <= 100) numeric = numeric / 100;
            }

            if (!Number.isFinite(numeric)) return String(fallbackValue);
            if (numeric < 0) numeric = 0;
            if (numeric > 1) numeric = 1;
            return String(numeric);
        }

        function applyPage2PhotoConfig(cfg) {
            const stack = document.getElementById('photo-stack');
            if (!stack) return;

            const maxW = normalizeViewportSize(cfg.page2_photo_maxwidth, 'vw') || '42vw';
            const maxH = normalizeViewportSize(cfg.page2_photo_maxheight, 'vh') || '50vh';
            const twoMaxW = normalizeViewportSize(cfg.page2_photo_two_maxwidth, 'vw') || '41vw';
            const twoMaxH = normalizeViewportSize(cfg.page2_photo_two_maxheight, 'vh') || '44vh';
            const threeMaxW = normalizeViewportSize(cfg.page2_photo_three_maxwidth, 'vw') || '38vw';
            const threeMaxH = normalizeViewportSize(cfg.page2_photo_three_maxheight, 'vh') || '30vh';
            const peek = normalizeCssLength(cfg.page2_photo_peek) || '14%';

            stack.style.setProperty('--page2-photo-max-width', maxW);
            stack.style.setProperty('--page2-photo-max-height', maxH);
            stack.style.setProperty('--page2-photo-two-max-width', twoMaxW);
            stack.style.setProperty('--page2-photo-two-max-height', twoMaxH);
            stack.style.setProperty('--page2-photo-three-max-width', threeMaxW);
            stack.style.setProperty('--page2-photo-three-max-height', threeMaxH);
            stack.style.setProperty('--page2-photo-peek', peek);
        }

        function renderImageBannersLegacy(cfg) {
            const container = document.getElementById('hc-banner-float');
            if (!container) return;

            // 기존 배너 타이머 정리
            if (window._bannerRotateTimer) {
                clearInterval(window._bannerRotateTimer);
                window._bannerRotateTimer = null;
            }
            container.innerHTML = '';

            // 이미지 배너 URL 수집 (banner1 ~ banner10)
            const urls = [];
            for (let i = 1; i <= 10; i++) {
                const url = (cfg['banner' + i] || '').trim();
                if (url) urls.push(url);
            }

            if (!urls.length) return;

            const interval = Math.max(parseInt(cfg.banner_interval, 10) || 5000, 2000);
            // 페이지별 독립 배너 위치 키 (page2는 p2_, 대진표는 p3_ 접두사)
            const bp = (new URLSearchParams(window.location.search).get('page') || '').toLowerCase() === 'bracket' ? 'p3_' : (isHostMode ? '' : 'p2_');
            const left = normalizeCssLength(cfg[bp + 'banner_left']);
            const right = normalizeCssLength(cfg[bp + 'banner_right']);
            const top = normalizeCssLength(cfg[bp + 'banner_top']);
            const bottom = normalizeCssLength(cfg[bp + 'banner_bottom']);

            container.style.left = 'auto';
            container.style.right = 'auto';
            container.style.top = 'auto';
            container.style.bottom = 'auto';

            if (right) {
                container.style.right = right;
            } else if (left) {
                container.style.left = left;
            } else {
                container.style.right = '1%';
            }

            if (bottom) {
                container.style.bottom = bottom;
            } else if (top) {
                container.style.top = top;
            } else {
                container.style.bottom = '4%';
            }

            const maxW = normalizeCssLength(cfg.banner_maxwidth) || '42vw';
            const maxH = normalizeCssLength(cfg.banner_maxheight) || '50vh';

            // 이미지 프리로드 & DOM 구성
            const imgs = [];

            urls.forEach(function (url, i) {
                const img = document.createElement('img');
                img.className = 'banner-img';
                img.src = url;
                img.style.maxWidth = maxW;
                img.style.maxHeight = maxH;
                img.onload = function () {
                    if (i === 0) img.classList.add('show');
                };
                img.onerror = function () { img.style.display = 'none'; };
                container.appendChild(img);
                imgs.push(img);
            });

            // 첫 번째 이미지 즉시 show (캐시 대비)
            if (imgs.length > 0) {
                requestAnimationFrame(() => imgs[0].classList.add('show'));
            }

            // 로테이션 (2개 이상일 때)
            if (imgs.length > 1) {
                let currentIdx = 0;
                window._bannerRotateTimer = setInterval(function () {
                    const prevIdx = currentIdx;
                    currentIdx = (currentIdx + 1) % imgs.length;
                    if (imgs[currentIdx].style.display === 'none') {
                        currentIdx = (currentIdx + 1) % imgs.length;
                    }
                    imgs[prevIdx].classList.remove('show');
                    imgs[currentIdx].classList.add('show');
                }, interval);
            }
        }

        function applyBannerPlacement(container, layout) {
            container.style.removeProperty('left');
            container.style.removeProperty('right');
            container.style.removeProperty('top');
            container.style.removeProperty('bottom');

            const isVal = (val) => val && val !== 'auto' && val !== 'initial' && val !== 'unset';

            if (isVal(layout.right)) {
                container.style.right = layout.right;
            } else if (isVal(layout.left)) {
                container.style.left = layout.left;
            } else {
                container.style.right = '1%';
            }

            if (isVal(layout.bottom)) {
                container.style.bottom = layout.bottom;
            } else if (isVal(layout.top)) {
                container.style.top = layout.top;
            } else {
                container.style.bottom = '4%';
            }
        }

        function startBannerRotation(wraps, interval) {
            if (window._bannerRotateTimer) {
                clearInterval(window._bannerRotateTimer);
                window._bannerRotateTimer = null;
            }

            if (!wraps.length) {
                window._bannerCurrentIdx = 0;
                return;
            }

            const currentIdx = typeof window._bannerCurrentIdx === 'number' ? window._bannerCurrentIdx : 0;
            window._bannerCurrentIdx = Math.max(0, Math.min(currentIdx, wraps.length - 1));

            wraps.forEach(function (wrap, idx) {
                wrap.classList.toggle('show', idx === window._bannerCurrentIdx && wrap.style.display !== 'none');
            });

            if (wraps.length <= 1) return;

            window._bannerRotateTimer = setInterval(function () {
                const prevIdx = window._bannerCurrentIdx;
                let nextIdx = (prevIdx + 1) % wraps.length;
                let guard = 0;
                while (wraps[nextIdx].style.display === 'none' && guard < wraps.length) {
                    nextIdx = (nextIdx + 1) % wraps.length;
                    guard += 1;
                }
                wraps[prevIdx].classList.remove('show');
                wraps[prevIdx].classList.add('exit');
                setTimeout(() => wraps[prevIdx].classList.remove('exit'), 800);
                wraps[nextIdx].classList.add('show');
                window._bannerCurrentIdx = nextIdx;
            }, interval);
        }

        renderImageBanners = function (cfg) {
            const container = document.getElementById('hc-banner-float');
            if (!container) return;

            const urls = [];
            for (let i = 1; i <= 10; i++) {
                const url = (cfg['banner' + i] || '').trim();
                if (url) urls.push(url);
            }

            const interval = Math.max(parseInt(cfg.banner_interval, 10) || 5000, 2000);
            // 페이지별 독립 배너 위치 키 (page2는 p2_ 접두사)
            const bp = isHostMode ? '' : 'p2_';
            const layout = {
                left: normalizeCssLength(cfg[bp + 'banner_left']),
                right: normalizeCssLength(cfg[bp + 'banner_right']),
                top: normalizeCssLength(cfg[bp + 'banner_top']),
                bottom: normalizeCssLength(cfg[bp + 'banner_bottom'])
            };
            const maxW = ensureViewportUnit(cfg[bp + 'banner_width'], 'vw') || ensureViewportUnit(cfg.banner_maxwidth, 'vw') || '42vw';
            const maxH = ensureViewportUnit(cfg[bp + 'banner_height'], 'vh') || ensureViewportUnit(cfg.banner_maxheight, 'vh') || '50vh';
            const bannerHidden = ['1', 'true', 'yes', 'on'].indexOf(String(cfg.banner_hidden || '').trim().toLowerCase()) >= 0;
            const bannerOpacity = normalizeOpacity(cfg.banner_opacity, 0.93);

            applyBannerPlacement(container, layout);
            container.style.setProperty('--banner-opacity', bannerOpacity);
            const bannerShowOff = cfg[bp + 'banner_show'] === '0' || container.dataset.bannerHiddenByToggle === '1';
            if (bannerHidden || bannerShowOff || !urls.length) {
                if (window._bannerRotateTimer) {
                    clearInterval(window._bannerRotateTimer);
                    window._bannerRotateTimer = null;
                }
                container.innerHTML = '';
                container.classList.remove('banner-active');
                window._bannerRenderState = null;
                window._bannerCurrentIdx = 0;
                return;
            }
            container.classList.add('banner-active');

            const imageKey = JSON.stringify({ urls: urls, maxW: maxW, maxH: maxH });
            const state = window._bannerRenderState || {};
            const wraps = Array.from(container.querySelectorAll('.banner-item-wrap'));

            if (state.imageKey === imageKey && wraps.length === urls.length) {
                wraps.forEach(function (wrap) {
                    wrap.style.setProperty('--banner-w', maxW);
                    wrap.style.setProperty('--banner-h', maxH);
                });

                if (state.interval !== interval) {
                    startBannerRotation(wraps, interval);
                }

                window._bannerRenderState = {
                    imageKey: imageKey,
                    interval: interval
                };
                return;
            }

            if (window._bannerRotateTimer) {
                clearInterval(window._bannerRotateTimer);
                window._bannerRotateTimer = null;
            }
            container.innerHTML = '';
            window._bannerCurrentIdx = 0;

            const nextWraps = [];
            urls.forEach(function (url, i) {
                const wrap = document.createElement('div');
                wrap.className = 'banner-item-wrap';
                wrap.style.setProperty('--banner-w', maxW);
                wrap.style.setProperty('--banner-h', maxH);

                const blurBg = document.createElement('div');
                blurBg.className = 'banner-bg-blur';
                blurBg.style.backgroundImage = 'url(' + JSON.stringify(url) + ')';

                const mainImg = document.createElement('img');
                mainImg.className = 'banner-img-main';
                mainImg.src = url;

                wrap.appendChild(blurBg);
                wrap.appendChild(mainImg);

                mainImg.onload = function () {
                    if (i === 0 && window._bannerCurrentIdx === 0) wrap.classList.add('show');
                };
                mainImg.onerror = function () { wrap.style.display = 'none'; };
                container.appendChild(wrap);
                nextWraps.push(wrap);
            });

            if (nextWraps.length > 0) {
                requestAnimationFrame(() => nextWraps[0].classList.add('show'));
            }

            startBannerRotation(nextWraps, interval);
            window._bannerRenderState = {
                imageKey: imageKey,
                interval: interval
            };
        };

        function syncNametagWidths(cfg) {
            const tag1 = document.getElementById('host-nametag-1');
            const tag2 = document.getElementById('host-nametag-2');
            if (tag1 && tag2) {
                tag1.style.removeProperty('width');
                tag2.style.removeProperty('width');

                const isShow1 = (cfg.host_name1 || '').trim() && cfg.nametag1_show !== '0';
                const isShow2 = (cfg.host_name2 || '').trim() && cfg.nametag2_show !== '0';
                const ntWidthCfg = cfg.nametag_width || cfg.nametag1_width || cfg.nametag2_width || '';
                const hasExplicitWidth = ntWidthCfg && ntWidthCfg !== 'auto' && ntWidthCfg !== 'initial' && ntWidthCfg !== 'unset';

                if (isShow1 && isShow2 && !hasExplicitWidth) {
                    const w1 = tag1.offsetWidth;
                    const w2 = tag2.offsetWidth;
                    const maxW = Math.max(w1, w2);
                    if (maxW > 0) {
                        tag1.style.width = maxW + 'px';
                        tag2.style.width = maxW + 'px';
                    }
                }
            }
        }

        function applyLoadedHostConfig(cfg) {
            if (!cfg) return;
            window.latestConfigMap = cfg;
            const hadPage2PhotoConfig = page2PhotoConfigReady;
            applyPage2PhotoConfig(cfg);
            page2PhotoConfigReady = true;
            const photoStack = document.getElementById('photo-stack');
            if (photoStack) photoStack.classList.remove('config-pending');
            if (!document.body.classList.contains('host-mode') && !hadPage2PhotoConfig && lastRenderedItem) {

                // 대회명 라벨 폰트 크기 (직접 스타일)
                const labelEl = sbWrap.querySelector('.top-bar-label');
                if (labelEl) {

                // 박스 투명도 (직접 background 스타일)
                if (cfg.scoreboard_opacity) {

                        if (traitsSection) traitsSection.style.background = 'rgba(20, 28, 46, ' + op + ')';
                    }
                }
            }
            
            // 페이지별 독립 배너/티커 위치 키 접두사
            const lp = (new URLSearchParams(window.location.search).get('page') || '').toLowerCase() === 'bracket' ? 'p3_' : (document.body.classList.contains('host-mode') ? '' : 'p2_');

            // 티커(자막 바) 위치 적용
            const bottomBar = document.querySelector('.hc-bottom-bar');
            if (bottomBar) {
                if (cfg[lp + 'ticker_show'] === '0') {
                    bottomBar.style.setProperty('display', 'none', 'important');
                } else {
                    bottomBar.style.removeProperty('display');
                    
                    // 티커 위치 적용 (auto 값 필터링)
                    const tIsVal = (v) => v && v !== 'auto' && v !== 'initial' && v !== 'unset';
                    const tTop = cfg[lp + 'ticker_top'];
                    const tBottom = cfg[lp + 'ticker_bottom'];
                    if (tIsVal(tBottom)) {
                        bottomBar.style.bottom = tBottom;
                        bottomBar.style.top = 'auto';
                        bottomBar.style.removeProperty('top');
                    } else if (tIsVal(tTop)) {
                        bottomBar.style.top = tTop;
                        bottomBar.style.bottom = 'auto';
                        bottomBar.style.removeProperty('bottom');
                    } else {
                        bottomBar.style.bottom = '0';
                        bottomBar.style.top = 'auto';
                        bottomBar.style.removeProperty('top');
                    }
                    // 티커는 항상 좌우 풀사이즈
                    bottomBar.style.left = '0';
                    bottomBar.style.right = '0';
                    // 티커 높이 적용
                    const tH = ensureViewportUnit(cfg[lp + 'ticker_height'], 'vh');
                    if (tH && tH !== 'auto') {
                        bottomBar.style.height = tH;
                    }
                }
            }

            const bannerContainer = document.querySelector('.hc-banner-float');
            if (bannerContainer) {
                if (cfg[lp + 'banner_show'] === '0') {
                    bannerContainer.classList.remove('banner-active');
                    bannerContainer.dataset.bannerHiddenByToggle = '1';
                } else {
                    delete bannerContainer.dataset.bannerHiddenByToggle;
                    bannerContainer.style.removeProperty('display');
                }
            }

            // 티커 카드 및 이미지 배너 렌더링 (page 1, 2 공통)
            renderTickerCards(cfg);

            if (!document.body.classList.contains('host-mode')) return;

            // 진행자 네임택 개별 위치 적용 (nametag1_*, nametag2_*)
            function applyNTPos(el, prefix, defaultLeft, defaultBottom, defaultRight = 'auto') {
                if (!el) return;
                el.style.removeProperty('left');
                el.style.removeProperty('right');
                el.style.removeProperty('top');
                el.style.removeProperty('bottom');
                const isV = (v) => v && v !== 'auto' && v !== 'initial' && v !== 'unset';
                
                const ntLeft = cfg[prefix+'left'];
                const ntRight = cfg[prefix+'right'];
                const ntWidth = cfg['nametag_width'] || cfg[prefix+'width'];
                const ntHeight = cfg['nametag_height'] || cfg[prefix+'height'];
                const ntTop = cfg['nametag_top'] || cfg[prefix+'top'];
                const ntBottom = cfg['nametag_bottom'] || cfg[prefix+'bottom'];

                if (isV(ntRight)) el.style.right = ntRight;
                else if (isV(ntLeft)) el.style.left = ntLeft;
                else {
                    if (defaultRight !== 'auto') el.style.right = defaultRight;
                    else el.style.left = defaultLeft;
                }
                
                if (isV(ntBottom)) el.style.bottom = ntBottom;
                else if (isV(ntTop)) el.style.top = ntTop;
                else el.style.bottom = defaultBottom;
                
                if (cfg[prefix+'show'] === '0') {
                    el.style.setProperty('display','none','important');
                } else {
                    el.style.removeProperty('display');
                }
                // 네임택 크기 적용
                const ntW = ensureViewportUnit(ntWidth, 'vw');
                const ntH = ensureViewportUnit(ntHeight, 'vh');
                if (ntW && ntW !== 'auto') el.style.width = ntW;
                if (ntH && ntH !== 'auto') el.style.height = ntH;
            }
            applyNTPos(document.getElementById('host-nametag-1'), 'nametag1_', '3%', '6%');
            applyNTPos(document.getElementById('host-nametag-2'), 'nametag2_', 'auto', '6%', '3%');

            // Apply nametag font size
            const ntFontSize = parseInt(cfg.nametag_font_size, 10) || 22;
            document.querySelectorAll('.host-nametag').forEach(el => {
                el.style.setProperty('--nt-font-size', ntFontSize + 'px');
                el.style.setProperty('--nt-role-font-size', Math.round(ntFontSize * 0.55) + 'px');
            });
            // 룰 → 개별 필 박스 생성 (라벨 없이 값만) — host mode 전용
            const stackEl = document.getElementById('hc-rules-stack');
            if (stackEl) {
                stackEl.innerHTML = '';
                // rules_position 설정: 'top'이면 헤더 바로 아래에서 아래로 깔림
                if (cfg.rules_position === 'top') {
                    stackEl.classList.add('hc-rules-top');
                } else {
                    stackEl.classList.remove('hc-rules-top');
                }
                // 룰 → 단일 카드 안에 행으로 구성
                const rules = [];
                for (let i = 1; i <= 10; i++) {
                    const value = cfg['rule' + i] || cfg['rule' + i + '_value'];
                    if (value) rules.push(value);
                }
                if (rules.length > 0) {
                    const card = document.createElement('div');
                    card.className = 'hc-rules-card';
                    rules.forEach(text => {
                        const row = document.createElement('div');
                        row.className = 'hc-rule-row';
                        // [라벨] 나머지 → 라벨 + 값 분리
                        const m = text.match(/^\[([^\]]+?)(?::([^\]]+))?\]\s*(.*)$/);
                        if (m) {
                            const labelSpan = document.createElement('span');
                            labelSpan.className = 'hc-rule-label';
                            labelSpan.textContent = m[1];
                            if (m[2]) labelSpan.style.color = m[2];
                            const valueSpan = document.createElement('span');
                            valueSpan.className = 'hc-rule-value';
                            valueSpan.textContent = m[3];
                            row.appendChild(labelSpan);
                            row.appendChild(valueSpan);
                        } else {
                            row.innerHTML = renderColorMarkup(text);
                        }
                        card.appendChild(row);
                    });
                    stackEl.appendChild(card);
                }
                stackEl.style.display = rules.length > 0 ? 'flex' : 'none';
            }

            // 진행자 네임택 렌더링 (show 상태 존중)
            for (let i = 1; i <= 2; i++) {
                const name = (cfg['host_name' + i] || '').trim();
                const role = (cfg['host_role' + i] || '').trim();
                const tag = document.getElementById('host-nametag-' + i);
                const nameEl = document.getElementById('nt-name-' + i);
                const roleEl = document.getElementById('nt-role-' + i);
                if (tag) {
                    if (name && cfg['nametag' + i + '_show'] !== '0') {
                        nameEl.textContent = name;
                        roleEl.textContent = role;
                        roleEl.style.display = role ? '' : 'none';
                        tag.style.display = 'flex';
                    } else {
                        tag.style.display = 'none';
                    }
                }
            }
            syncNametagWidths(cfg);
        }

        async function loadHostConfig() {
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run.withSuccessHandler(function (cfg) {
                    applyLoadedHostConfig(cfg);
                }).getConfigMap();
            } else {
                try {
                    const cfg = await getConfigMap();
                    applyLoadedHostConfig(cfg);
                } catch (err) {
                    console.error('loadHostConfig error', err);
                }
            }
        }

        function maybeRefreshHostConfig(force) {
            const now = Date.now();
            const lastSyncAt = window._lastHostConfigSyncAt || 0;
            const minInterval = hasActive ? 1500 : 3000;
            if (!force && now - lastSyncAt < minInterval) return;
            window._lastHostConfigSyncAt = now;
            loadHostConfig();
        }

            if (item && window.latestConfigMap) {
                const active = window.latestConfigMap.active_tournament;
                if (active && active !== 'none') {
                    configPart = '|' + active + '|' + (window.latestConfigMap['tournament_bracket_' + active] || '');

            if (photoStack) {

                photoStack.classList.toggle('config-pending', !isHost && !page2PhotoConfigReady);
            }

            const origName = item.displayName || item.name || "";

            if (window.latestConfigMap && window.latestConfigMap.active_tournament && window.latestConfigMap.active_tournament !== 'none') {
                const activeScale = window.latestConfigMap.active_tournament;
                const matchObj = origName.trim().match(/^([A-Pa-p])\s*[-_]?\s*([1-4])$/i);
                if (matchObj) {
                    const letter = matchObj[1].toUpperCase();
                    const idx = letter.charCodeAt(0) - 65;
                    const scaleNum = parseInt(activeScale);
                    if (idx >= 0 && idx < scaleNum) {
                        const matchIdx = Math.floor(idx / 2) + 1;
                        const slot = (idx % 2 === 0) ? 'left' : 'right';
                        const bracketKey = 'tournament_bracket_' + activeScale;
                        let company = '';
                        if (window.latestConfigMap[bracketKey]) {
                            try {
                                const bracket = JSON.parse(window.latestConfigMap[bracketKey]);
                                if (bracket && bracket.matches && bracket.matches[activeScale + '_' + matchIdx]) {
                                    company = bracket.matches[activeScale + '_' + matchIdx][slot] || '';
                                }
                            } catch(e){}
                        }
                        if (company) {
                            item.company = company;
                        }
                    }
                }

            // 개체명은 원래 명칭(예: A1) 그대로 출력

            // 페이지2 상단 바에서 업체명 표시 제거

            // 호스트 카드 데이터 렌더링
